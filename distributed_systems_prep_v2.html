{
 id:'part',title:'Partitioning',icon:'🧩',color:'#14B8A6',colorD:'#0E8C7F',
 blurb:'Split data across nodes to scale — without hot spots.',
 lessons:[
  {id:'part-1',title:'How to split',steps:[
   {t:'teach',h:'Range vs hash',body:[
     {k:'vs',a:{h:'Range',t:'contiguous key ranges. Great for range scans — but timestamp keys = hot partition.'},b:{h:'Hash',t:'even spread, no range scans (scatter-gather).'}},
     {k:'callout',c:'warn',t:'Sharding by current timestamp sends all writes to one partition — a classic hot shard.'}
   ]},
   {t:'sort',q:'Range or hash partitioning?',buckets:['Range','Hash'],items:[
     {text:'fast time-range scans',b:0},{text:'even write spread',b:1},{text:'sorted keys per node',b:0},{text:'no natural range queries',b:1}
   ]},
	   {t:'teach',h:'Consistent hashing',body:[
	     {k:'tldr',t:'Place nodes + keys on a ring; a key goes to the next node clockwise.'},
	     {k:'point',i:'➕',t:'Add/remove a node → only ~1/N of keys move (not everything).'},
	     {k:'point',i:'⚖️',t:'<b>Virtual nodes</b> spread each machine around the ring for even load.'}
	   ]},
	   {t:'htmlviz',h:'Consistent hashing — play with the ring',
    html:`<style>
.chr-wrap{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-start}
.chr-svg{width:220px;height:220px;flex:0 0 auto}
.chr-side{flex:1;min-width:158px}
.chr-controls{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.chr-controls button{font:inherit;font-weight:800;font-size:12px;padding:6px 10px;border-radius:8px;border:1.5px solid var(--color-border-primary);background:var(--color-background-secondary);color:var(--color-text-primary);cursor:pointer}
.chr-controls button:hover{filter:brightness(.97)}
.chr-controls button.on{background:var(--color-text-info);color:#fff;border-color:var(--color-text-info)}
.chr-stat{font-size:12.5px;color:var(--color-text-secondary);line-height:1.6;margin-bottom:9px}
.chr-stat b{color:var(--color-text-primary)}
.chr-load{display:flex;flex-direction:column;gap:5px}
.chr-lrow{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--color-text-secondary)}
.chr-cdot{width:11px;height:11px;border-radius:50%;flex:0 0 auto}
.chr-bar{height:9px;border-radius:5px;flex:0 0 auto;transition:width .3s}
.chr-ex{margin-top:11px;font-size:12.5px;color:var(--color-text-secondary);line-height:1.55;padding:10px 13px;background:var(--color-background-secondary);border-radius:var(--border-radius-md)}
.chr-ex b{color:var(--color-text-primary);font-weight:800}
</style>
<div class="chr-wrap">
  <svg class="chr-svg" viewBox="0 0 230 230"></svg>
  <div class="chr-side">
    <div class="chr-controls">
      <button class="chr-add" type="button">+ node</button>
      <button class="chr-del" type="button">- node</button>
      <button class="chr-vn" type="button">virtual nodes</button>
    </div>
    <div class="chr-stat"></div>
    <div class="chr-load"></div>
  </div>
</div>
<div class="chr-ex">Each key (outer dot) is owned by the <b>first node clockwise</b>. <b>Add / remove a node</b> and watch how few keys change colour — only the arc beside the change moves (~1/N), where <code>hash%N</code> would recolour nearly all of them. Toggle <b>virtual nodes</b> to give each machine several ring positions and smooth the load bars.</div>`,
    setup:function(root){
      var cx=115,cy=115,R=80;
      var PAL=['#14B8A6','#6366F1','#F59E0B','#EF4444','#8B5CF6','#EC4899'];
      var BASE={A:50,B:170,C:290,D:110,E:230,F:350},LBL=['A','B','C','D','E','F'];
      var KEYS=[8,22,38,55,78,95,118,142,168,188,205,228,255,278,300,318,338,352];
      var n=3,vnodes=false,prev=null;
      var svg=root.querySelector('.chr-svg'),statEl=root.querySelector('.chr-stat'),loadEl=root.querySelector('.chr-load'),vnBtn=root.querySelector('.chr-vn');
      function nodes(){var a=[];for(var i=0;i<n;i++)a.push({label:LBL[i],color:PAL[i]});return a;}
      function posOf(nd){return vnodes?[0,1,2].map(function(j){return (BASE[nd.label]+j*137)%360;}):[BASE[nd.label]];}
      function xy(a,rad){var t=(a-90)*Math.PI/180;return [cx+rad*Math.cos(t),cy+rad*Math.sin(t)];}
      function render(){
        var nd=nodes(),positions=[];
        nd.forEach(function(node,ni){posOf(node).forEach(function(a){positions.push({a:a,ni:ni});});});
        var owners=KEYS.map(function(k){var best=0,bd=1e9;positions.forEach(function(p){var d=((p.a-k)%360+360)%360;if(d<bd){bd=d;best=p.ni;}});return best;});
        var sorted=positions.slice().sort(function(a,b){return a.a-b.a;});
        function arc(a1,a2,rad){var p1=xy(a1,rad),p2=xy(a2,rad),delta=((a2-a1)%360+360)%360,lg=delta>180?1:0;return 'M'+p1[0]+' '+p1[1]+' A '+rad+' '+rad+' 0 '+lg+' 1 '+p2[0]+' '+p2[1];}
        var s='<circle cx="'+cx+'" cy="'+cy+'" r="'+R+'" fill="none" stroke="var(--color-border-tertiary)" stroke-width="1"/>';
        sorted.forEach(function(p,i){var prev=sorted[(i-1+sorted.length)%sorted.length];s+='<path d="'+arc(prev.a,p.a,R)+'" fill="none" stroke="'+nd[p.ni].color+'" stroke-width="6" opacity="0.85"/>';});
        positions.forEach(function(p){var d=xy(p.a,R);s+='<circle cx="'+d[0]+'" cy="'+d[1]+'" r="3.5" fill="'+nd[p.ni].color+'" stroke="#fff" stroke-width="1"/>';});
        nd.forEach(function(node){var b=xy(BASE[node.label],R);s+='<circle cx="'+b[0]+'" cy="'+b[1]+'" r="11" fill="'+node.color+'" stroke="#fff" stroke-width="2"/><text x="'+b[0]+'" y="'+(b[1]+4)+'" text-anchor="middle" font-size="12" font-weight="800" fill="#fff">'+node.label+'</text>';});
        KEYS.forEach(function(k,i){var d=xy(k,R+14);s+='<circle cx="'+d[0]+'" cy="'+d[1]+'" r="4.5" fill="'+nd[owners[i]].color+'"/>';});
        svg.innerHTML=s;
        var moveTxt='';
        if(prev){var moved=0;for(var i=0;i<owners.length;i++)if(nd[owners[i]].label!==prev[i])moved++;var pct=Math.round(moved/owners.length*100);moveTxt=' &middot; <b style="color:'+(moved?'var(--color-text-info)':'var(--color-text-success)')+'">'+moved+'/'+owners.length+' keys moved ('+pct+'%)</b>';}
        prev=owners.map(function(o){return nd[o].label;});
        statEl.innerHTML='<b>'+n+'</b> nodes &middot; <b>'+KEYS.length+'</b> keys'+(vnodes?' &middot; 3 vnodes each':'')+moveTxt;
        var counts=nd.map(function(){return 0;});owners.forEach(function(o){counts[o]++;});
        var mx=Math.max.apply(null,counts)||1;
        loadEl.innerHTML=nd.map(function(node,ni){var w=Math.round(counts[ni]/mx*80)+12;return '<div class="chr-lrow"><span class="chr-cdot" style="background:'+node.color+'"></span>Node '+node.label+'<span class="chr-bar" style="width:'+w+'px;background:'+node.color+'"></span>'+counts[ni]+'</div>';}).join('');
      }
      root.querySelector('.chr-add').onclick=function(){if(n<6){n++;render();}};
      root.querySelector('.chr-del').onclick=function(){if(n>2){n--;render();}};
      vnBtn.onclick=function(){vnodes=!vnodes;vnBtn.classList.toggle('on',vnodes);prev=null;render();};
      render();
    }},

   {t:'mcq',q:'You add/remove cache nodes frequently and want minimal key remapping. Use…',o:['hash(key) % N','range partitioning','consistent hashing','one big node'],a:2,why:'mod-N remaps almost everything when N changes; consistent hashing moves only ~1/N keys — ideal for churny membership.'},
   {t:'cloze',q:'Fill the partitioning blanks.',distract:['range','replication'],text:[
     'Naive hash(key) % N is bad because changing ',{blank:'N'},' remaps ',{blank:'almost every',alt:['almost all']},' key. ',

   {t:'teach',h:'Rebalancing strategies',body:[
     {k:'point',i:'🧱',t:'<b>Fixed partitions</b>: make many more partitions than nodes (e.g. 1000 for 10). Adding a node just moves whole partitions — no splitting. (Elasticsearch, Riak)'},
     {k:'point',i:'✂️',t:'<b>Dynamic partitioning</b>: split a partition when it grows past a threshold, merge when it shrinks — partition count tracks data volume. (HBase, MongoDB)'},
     {k:'point',i:'⚖️',t:'<b>Proportional (vnodes)</b>: a fixed number of vnodes per machine; a new machine steals a proportional slice from existing ones. (Cassandra)'},
     {k:'callout',c:'warn',t:'Never tie partition count to node count (hash mod N) — adding a node would reshuffle the whole dataset. Decouple them via fixed partitions or consistent hashing.'}
   ]},
   {t:'mcq',q:'Why create many more partitions than nodes (e.g. 1000 partitions for 10 nodes)?',o:['faster reads','adding a node just reassigns whole partitions — no data splitting','less storage','stronger consistency'],a:1,why:'Fixed-partition rebalancing moves whole partitions to the new node — simple and predictable, decoupled from node count.'},

{
 id:'cache',title:'Caching',icon:'⚡',color:'#F4B400',colorD:'#C98A00',
 blurb:'Serve hot data fast — and survive expiry storms.',
 lessons:[
  {id:'cache-1',title:'Patterns',steps:[
   {t:'teach',h:'Cache-aside (lazy loading)',body:[
     {k:'tldr',t:'The app manages the cache: check cache → on a miss, read the DB and populate it. Also called <b>lazy loading</b> — data is cached only when first requested.'},
     {k:'point',i:'🐢',t:'A miss costs <b>two round trips</b> — one to the DB, one to re-populate the cache. Worth it for read-heavy data read repeatedly.'},
     {k:'point',i:'⏲️',t:'TTL is your only consistency knob: <b>too short</b> → you lose the hit-rate benefit; <b>too long</b> → you serve stale data.'},
     {k:'callout',c:'warn',t:'<b>Invalidate, don’t update</b>: on a write, DELETE the cache key. A concurrent update-then-set race can cache a stale value forever; deleting lets the next read repopulate cleanly. (Redis, Memcached)'}
   ]},
   {t:'teach',h:'Write strategies',body:[
     {k:'vs',a:{h:'Write-through',t:'write cache + DB together. Always warm + strongly consistent, but slower + write pollution.'},b:{h:'Write-behind (write-back)',t:'write cache now, flush DB later. Lowest write latency, but a crash before flush loses data.'}},
     {k:'note',t:'Names to recognise: <b>cache-aside = lazy loading</b>; <b>write-behind = write-back</b>. Cache-aside populates on read; write-through/back populate on write.'}
   ]},
   {t:'htmlviz',h:'Cache patterns — watch the data flow',
    html:`<style>

    setup:function(root,stepper){
      var X={App:45,Cache:160,DB:275},BOX={App:[6,78],Cache:[121,78],DB:[236,78]},ORDER=['App','Cache','DB'];
      var PANELS=[
        {label:'Cache-aside read — HIT',msgs:[{f:'App',t:'Cache',x:'GET key'},{f:'Cache',t:'App',x:'value (hit)',k:'ok'}],ex:'Most reads are served straight from the cache — the fast path.'},

   {t:'htmlviz',h:'Lamport clock — step through it',
    html:`<style>
.lcv-row{display:flex;align-items:center;gap:10px;padding:7px 0}

<div class="hv-nav"><button class="hv-prev">‹</button><span class="hv-dots"></span><button class="hv-next">›</button><span class="hv-lbl"></span></div>
<div class="lcv-panel">
  <div class="lcv-rules"><b>Rule 1 — local event:</b> <code>C = C + 1</code><br><b>Rule 2 — send:</b> attach C to the message<br><b>Rule 3 — receive:</b> <code>C = max(local, received) + 1</code></div>
  <div class="lcv-ex">These three rules guarantee: if event A <b>caused</b> B, then <code>L(A) &lt; L(B)</code>.</div>
</div>
<div class="lcv-panel">
  <div class="lcv-row"><span class="lcv-node a">A</span><span class="lcv-cnt up">1</span><span class="lcv-act">writes x → +1</span></div>
  <div class="lcv-row"><span class="lcv-node b">B</span><span class="lcv-cnt">0</span></div>
  <div class="lcv-row"><span class="lcv-node c">C</span><span class="lcv-cnt">0</span></div>
  <div class="lcv-ex">A does a local event and increments: <b>0 → 1</b>.</div>
</div>
<div class="lcv-panel">
  <div class="lcv-row"><span class="lcv-node a">A</span><span class="lcv-cnt up">2</span><span class="lcv-act">send (msg carries 2)</span></div>
  <div class="lcv-row"><span class="lcv-node b">B</span><span class="lcv-cnt up">3</span><span class="lcv-act">recv: max(0,2)+1</span></div>
  <div class="lcv-row"><span class="lcv-node c">C</span><span class="lcv-cnt">0</span></div>
  <div class="lcv-ex">A increments before sending (<b>1 → 2</b>). B receives and applies Rule 3: <b>max(0, 2) + 1 = 3</b>.</div>
</div>
<div class="lcv-panel">
  <div class="lcv-row"><span class="lcv-node a">A</span><span class="lcv-cnt">2</span></div>
  <div class="lcv-row"><span class="lcv-node b">B</span><span class="lcv-cnt">3</span></div>
  <div class="lcv-row"><span class="lcv-node c">C</span><span class="lcv-cnt up">1</span><span class="lcv-act">writes z → +1</span></div>
  <div class="lcv-ex">C independently writes z: <b>0 → 1</b>. Same value as A's first event — are they ordered? <b>No, concurrent.</b> Lamport can't tell; only vector clocks can.</div>
</div>
<div class="lcv-panel">
  <div class="lcv-row"><span class="lcv-node a">A</span><span class="lcv-cnt">2</span></div>
  <div class="lcv-row"><span class="lcv-node b">B</span><span class="lcv-cnt up">4</span><span class="lcv-act">send (msg carries 4)</span></div>
  <div class="lcv-row"><span class="lcv-node c">C</span><span class="lcv-cnt up">5</span><span class="lcv-act">recv: max(1,4)+1</span></div>
  <div class="lcv-ex">B increments (<b>3 → 4</b>) and sends to C: <b>max(1, 4) + 1 = 5</b>. The causal chain A→B→C reads <b>1 &lt; 2 &lt; 3 &lt; 4 &lt; 5</b>, even though C never talked to A directly.</div>
</div>`,

     {k:'point',i:'🧮',t:'One counter per process. Compare element-wise.'},

   {t:'vecviz',h:'Vector clocks — step through it',nodes:['A','B','C'],
    rule:'Local event or send: bump your own slot. Receive: bump your slot, then take element-wise max with the message.',
    frames:[
     {cap:'Start — every node’s clock is [0,0,0].',v:[[0,0,0],[0,0,0],[0,0,0]]},

     {cap:'B sends message m2 to C (B bumps its slot; m2 carries B’s clock).',v:[[2,0,0],[0,2,0],[2,0,1]],hi:[[1,1]],msg:{from:1,to:2,label:'[0,2,0]'}},
     {cap:'C receives m2: bump own slot, then max with [0,2,0].',v:[[2,0,0],[0,2,0],[2,2,2]],hi:[[2,1],[2,2]],

   {t:'mcq',q:'V(A) < V(B) means…',o:['A has fewer events','A causally happened-before B','wall clock earlier','they’re concurrent'],a:1,why:'Every entry ≤ and at least one strictly less → A → B.'},
   {t:'recall',q:'Why do vector clocks beat Lamport clocks?',model:['Lamport gives ordering but can’t distinguish concurrent from causally-ordered events.','Vector clocks track one counter per process, so element-wise comparison reveals concurrency.']},
   {t:'teach',h:'Vector clock vs version vector',body:[
     {k:'vs',a:{h:'Vector clock',t:'one counter per <b>process</b>. Orders <b>events/messages</b> across the system — the happened-before relation (what you just stepped through).'},b:{h:'Version vector',t:'one counter per <b>replica</b>. Tracks versions of <b>one data item</b> to detect concurrent writes (siblings) in leaderless / multi-leader stores.'}},
     {k:'note',t:'Same math — element-wise ≤ means happened-before, incomparable means concurrent. They differ in <b>what you count</b> (processes vs replicas of a key) and <b>why</b> (order events vs detect conflicting object versions). Dynamo & Riak attach a version vector per key — that’s the sibling-detection from the Replication unit.'}
   ]},

  ]},

        {a:'—',b:'—',act:'',step:'HLC = (l, c)\n  l ≈ physical time\n  c breaks ties within the same millisecond',cap:'Physical clocks repeat or stall within a millisecond. HLC adds a small counter <b>c</b> so timestamps stay strictly ordered while staying close to real time.'},
        {a:'(100, 0)',b:'—',act:'A',step:'Node A — local event, physical = 100ms\n  l = max(0, 100) = 100   → l advanced → c = 0\n  HLC_A = (100, 0)',cap:'A local/send event sets l = max(old l, physical clock). Physical jumped ahead of l, so the counter c resets to 0.'},
        {a:'(100, 0)',b:'(101, 0)',act:'B',step:'Node B receives HLC=(100,0) from A, physical = 101ms\n  l = max(l_B=0, recv_l=100, physical=101) = 101  → l advanced → c = 0\n  HLC_B = (101, 0)',cap:'On receive, l = max(local, message l, physical). 101 is the max and beats both, so c = 0.'},
        {a:'(100, 0)',b:'(101, 1)',act:'B',step:'Two events fire on B in the same millisecond (physical = 101ms)\n  event 1: HLC = (101, 0)\n  event 2: l = max(101, 101) = 101 → l unchanged → c++\n  HLC_B = (101, 1)   ← still strictly ordered',cap:'Physical time did not advance, so l stays 101 and c increments — same-millisecond events still get distinct, ordered stamps.'},
        {a:'(100, 0)',b:'(101, 1)',act:'',step:'Compare HLC_A=(100,0) vs HLC_B=(101,0)\n  l_A < l_B  →  A happened-before B  ✓\n  100ms and 101ms are still meaningful real timestamps  ✓',cap:'Compare l first, then c on a tie. HLC gives a total causal order AND stays close to wall-clock time — unlike Lamport, whose numbers are not real times.'}
      ];
      function panel(s){return '<div class="hlc-panel"><div class="hlc-state">'
        +'<div class="hlc-node'+(s.act==='A'?' bump':(s.a==='—'?' idle':''))+'"><div class="hnm">Node A</div><div class="hval">'+s.a+'</div></div>'
        +'<div class="hlc-node'+(s.act==='B'?' bump':(s.b==='—'?' idle':''))+'"><div class="hnm">Node B</div><div class="hval">'+s.b+'</div></div>'
        +'</div><div class="hlc-step">'+s.step+'</div><div class="hlc-cap">'+s.cap+'</div></div>';}
      root.querySelector('.hlc-host').innerHTML=STEPS.map(panel).join('');
      stepper(root,STEPS.length,{panelClass:'hlc-panel',labels:['HLC = (l, c)','A: local event','B: receives','B: same-ms tie','Compare']});
    }},

{
 id:'msg',title:'Messaging & Streaming',icon:'📨',color:'#58CC02',colorD:'#46a302',
 blurb:'Decouple services and absorb spikes with queues & logs.',
 lessons:[
  {id:'msg-1',title:'Queues vs logs',steps:[
   {t:'teach',h:'Two shapes',body:[
     {k:'vs',a:{h:'Queue (SQS/Rabbit)',t:'message goes to ONE consumer, then gone. No replay.'},b:{h:'Log (Kafka)',t:'append-only + retained; many consumers, replay by offset.'}},
     {k:'point',i:'🔢',t:'Kafka splits a topic into <b>partitions</b>. Ordering is guaranteed <b>only within a partition</b>, not across — so pick a partition key (e.g. user_id) to keep one key’s events in order.'}
   ]},
   {t:'teach',h:'Kafka internals',body:[
     {k:'point',i:'👥',t:'<b>Consumer groups</b>: each partition is read by exactly ONE consumer in a group — so consumer parallelism is capped by partition count. Add partitions to scale out.'},
     {k:'point',i:'🛡️',t:'<b>ISR</b> (in-sync replicas): a partition has a leader + follower replicas; <code>acks=all</code> commits only once the ISR set has it — that’s the durability knob.'},
     {k:'point',i:'🗄️',t:'<b>Retention</b> keeps messages for a time/size window (replayable); <b>log compaction</b> instead keeps only the latest value per key.'}
   ]},
   {t:'sort',q:'Queue or log?',buckets:['Queue','Log'],items:[
     {text:'replay from any offset',b:1},{text:'one consumer per message',b:0},{text:'multiple independent readers',b:1},{text:'deleted after consume',b:0}
   ]},
   {t:'teach',h:'Delivery semantics',body:[
     {k:'point',i:'1️⃣',t:'<b>At-most-once</b>: may lose, never duplicate.'},
     {k:'point',i:'🔁',t:'<b>At-least-once</b>: never lose, may duplicate → need idempotency.'},
     {k:'point',i:'🎯',t:'<b>Exactly-once</b>: hard; usually = at-least-once + idempotent processing.'}
   ]},
   {t:'cloze',q:'Fill the delivery blanks.',distract:['ordered','synchronous'],text:[
     'The pragmatic default is ',{blank:'at-least-once'},' delivery, which can ',{blank:'duplicate'},
     ' messages — so consumers must be ',{blank:'idempotent'},'. True exactly-once over a network is ',{blank:'impossible'},'.'
   ]},
   {t:'mcq',q:'Kafka guarantees ordering…',o:['globally','within a partition only','never','per consumer'],a:1,why:'Order holds within a partition; pick the partition key to keep a key’s events ordered.'},
   {t:'mcq',q:'In a Kafka consumer group, a partition is consumed by…',o:['every consumer','exactly one consumer in the group','the leader only','no one'],a:1,why:'One partition → one consumer per group, so consumer parallelism is bounded by the partition count.'},
   {t:'match',q:'Need → messaging choice.',pairs:[['Replay + many independent readers','Log (Kafka)'],['One consumer per message, work distribution','Queue'],['Must never lose; dupes OK if idempotent','At-least-once'],['Keep one user’s events ordered','Partition by key']]},
   {t:'mcq',q:'Payment events must never be lost (duplicates tolerable if handled). Delivery semantics?',o:['at-most-once','at-least-once + idempotent consumer','fire-and-forget','exactly-once over the wire'],a:1,why:'At-least-once guarantees no loss; an idempotent consumer makes the inevitable duplicates harmless — the cheap path to an exactly-once effect.'},
   {t:'recall',q:'How do systems achieve "exactly-once" in practice?',model:['Use at-least-once delivery plus idempotent processing (or transactional offset+write).','Repeats become harmless, so the observable effect is exactly-once — much cheaper than true EO delivery.']}
  ]},
  {id:'msg-2',title:'Reliability',steps:[
   {t:'teach',h:'Outbox & CDC',body:[
     {k:'cause',a:'Writing DB + publishing event separately',b:'A crash between them = lost/phantom events (dual-write problem)'},
     {k:'point',i:'📦',t:'<b>Outbox</b>: write business row + outbox row in one txn; a relay publishes it.'},
     {k:'point',i:'🔌',t:'<b>CDC</b> (Debezium) tails the WAL to emit the change stream.'}
   ]},
   {t:'mcq',q:'The transactional outbox solves…',o:['cache misses','the dual-write problem','leader election','hot keys'],a:1,why:'One local txn writes both the data and the event; a relay/CDC publishes reliably.'},
   {t:'teach',h:'Backpressure & DLQs',body:[
     {k:'point',i:'🌊',t:'Pull-based consumers (Kafka) get backpressure for free; bound your buffers.'},
     {k:'point',i:'☠️',t:'Poison messages → a dead-letter queue after N retries, so the pipeline isn’t blocked.'}
   ]},
   {t:'recall',q:'What is the dual-write problem and how does the outbox fix it?',model:['Writing to the DB and a broker separately has no atomicity — a crash leaves them inconsistent.','The outbox writes the row + an event in ONE DB txn; a relay (or CDC) then publishes, at-least-once.']}
  ]},
  {id:'msg-3',title:'Event sourcing & CQRS',steps:[
   {t:'teach',h:'Store events, not state',body:[
     {k:'keyt',term:'Event sourcing',def:'persist the append-only log of events as the source of truth; current state is a fold (replay) of those events.'},
     {k:'point',i:'🕰️',t:'You get a full audit trail and time-travel (rebuild state as of any point) for free.'},
     {k:'callout',c:'warn',t:'Cost: replaying long logs is slow → snapshots; and you must version/evolve event schemas forever.'}
   ]},
   {t:'teach',h:'CQRS',body:[
     {k:'keyt',term:'CQRS',def:'Command Query Responsibility Segregation — separate the write model from one or more read models (projections).'},
     {k:'point',i:'🔭',t:'Writes append events; async projections build query-optimised read views. Reads scale independently — but are eventually consistent.'},
     {k:'note',t:'Often paired with event sourcing, but not required. Don’t reach for either unless audit/temporal needs or read/write asymmetry justify the complexity.'}
   ]},
   {t:'mcq',q:'In event sourcing, the source of truth is…',o:['the current row','the append-only event log','a cache','a snapshot'],a:1,why:'State is derived by replaying the event log; snapshots are just an optimization.'},
   {t:'cloze',q:'Fill the event-sourcing blanks.',distract:['sharding','quorum'],text:[
     {blank:'Event sourcing',alt:['event-sourcing']},' stores the ',{blank:'log',alt:['event log']},' of changes as truth; current state is a ',{blank:'replay',alt:['fold','projection']},
     '. ',{blank:'CQRS',alt:['cqrs']},' splits the write model from read-optimised ',{blank:'projections',alt:['read models','views']},'.'
   ]},
   {t:'recall',q:'What are event sourcing and CQRS, and the main trade-off?',model:['Event sourcing: the append-only event log is the source of truth; state = replay of events → audit trail + time travel.','CQRS: separate write model from read models (projections), so reads scale independently — at the cost of eventual consistency.','Trade-off: more moving parts (snapshots, schema evolution, projection lag) — use only when audit/temporal or read/write asymmetry needs justify it.']}
  ]}
 ],

   {q:'At-least-once delivery requires…',o:['exactly-once HW','idempotent consumers','no retries','a lock'],a:1},
   {q:'Kafka ordering holds…',o:['globally','per partition','per consumer','never'],a:1},
   {q:'Kafka consumer parallelism is capped by…',o:['brokers','partition count','replicas','topics'],a:1},
   {q:'The outbox pattern fixes…',o:['hot keys','dual-write inconsistency','stale reads','GC pauses'],a:1},
   {q:'Poison messages go to a…',o:['cache','dead-letter queue','replica','leader'],a:1},
   {q:'Pull-based consumers give…',o:['natural backpressure','no ordering','exactly-once','lower durability'],a:0},
   {q:'Event sourcing’s source of truth is…',o:['the current row','the append-only event log','a cache','a snapshot'],a:1},
   {q:'CQRS separates…',o:['regions','the write model from read models','producers from brokers','disks'],a:1}
 ]}
},

 id:'lb',title:'Load Balancing',icon:'🔀',color:'#1CB0F6',colorD:'#1899D6',
 blurb:'Spread traffic for scale and survive dead backends.',
 lessons:[
  {id:'lb-1',title:'L4 vs L7',steps:[
   {t:'teach',h:'Two layers',body:[
     {k:'vs',a:{h:'L4 (transport)',t:'routes by IP/port, no payload peek. Fast, connection-level.'},b:{h:'L7 (application)',t:'reads HTTP — route by path/header, TLS, retries. Pricier.'}}
   ]},
   {t:'sort',q:'L4 or L7?',buckets:['L4','L7'],items:[
     {text:'route by URL path',b:1},{text:'raw TCP forwarding',b:0},{text:'TLS termination',b:1},{text:'lowest overhead',b:0}
   ]},
   {t:'teach',h:'Algorithms',body:[
     {k:'point',i:'🔄',t:'Round-robin / weighted; least-connections.'},
     {k:'point',i:'🎯',t:'<b>Power of two choices</b>: sample 2 random, pick the lighter — near-optimal, O(1).'},
     {k:'point',i:'🧷',t:'Consistent hashing for affinity (same key → same backend).'}
   ]},
   {t:'mcq',q:'Why does "power of two choices" beat strict least-connections?',o:['it’s simpler','avoids herding everyone onto one "best" node','uses less memory','needs no health checks'],a:1,why:'Sampling two avoids the stampede onto a single least-loaded node.'},
   {t:'recall',q:'When do you need an L7 load balancer over L4?',model:['When routing depends on HTTP content (path, header, cookie), or you want TLS termination, retries, rewrites.','L4 is faster but can only route by IP/port and pins a whole connection.']}
  ]},
  {id:'lb-2',title:'Health & global',steps:[
   {t:'teach',h:'Health checks',body:[
     {k:'point',i:'🩺',t:'Active probes /healthz; passive ejects hosts on repeated 5xx.'},
     {k:'callout',c:'warn',t:'Deep checks + a shared dependency blip can eject ALL hosts at once — "fail open" to avoid that.'}
   ]},
   {t:'teach',h:'Going global & stateless',body:[
     {k:'point',i:'🌍',t:'GeoDNS or anycast routes users to the nearest/healthy region.'},
     {k:'note',t:'Prefer stateless servers (state in Redis/JWT) so any node serves any request — no sticky sessions.'}
   ]},
   {t:'recall',q:'Why prefer stateless servers over sticky sessions?',model:['Stateless = any instance can serve any request, so scaling and failover are trivial.','Sticky sessions pin users to a node, breaking even load and losing state on failover. Externalise state instead.']}
  ]}
 ],

   {q:'An L4 LB routes by…',o:['HTTP path','IP/port','cookie','header'],a:1},
   {q:'TLS termination needs…',o:['L4','L7','DNS','anycast'],a:1},
   {q:'Power-of-two-choices avoids…',o:['encryption','herding onto one node','range scans','GC'],a:1},
   {q:'Anycast helps with…',o:['storage','fast regional failover/routing','hashing','locks'],a:1},
   {q:'Sticky sessions hurt because…',o:['too fast','break even load + lose state on failover','no TLS','too cheap'],a:1},
   {q:'A health-check death spiral is mitigated by…',o:['deeper checks','fail-open thresholds','more retries','sticky sessions'],a:1}
 ]}

{
 id:'rl',title:'Rate Limiting',icon:'🚦',color:'#FF4B4B',colorD:'#E63946',
 blurb:'Protect services from overload and abuse.',
 lessons:[
  {id:'rl-1',title:'Algorithms',steps:[
   {t:'teach',h:'Bucket families',body:[
     {k:'vs',a:{h:'Token bucket',t:'tokens refill at rate R, capacity B. Allows bursts up to B.'},b:{h:'Leaky bucket',t:'constant drain. Smooths output, no bursts.'}}
   ]},
   {t:'mcq',q:'You must allow short bursts but cap the average. Which?',o:['leaky bucket','token bucket','fixed window','none'],a:1,why:'Token bucket permits a burst up to capacity, then enforces the refill rate.'},
   {t:'teach',h:'Window counters',body:[
     {k:'point',i:'🪟',t:'<b>Fixed window</b>: simple, but boundary bursts (2× at the edge).'},
     {k:'point',i:'🌊',t:'<b>Sliding window counter</b>: weight previous window — smooth, O(1).'}
   ]},
   {t:'sort',q:'Bursty-friendly or smoothing?',buckets:['Allows bursts','Smooths/strict'],items:[
     {text:'token bucket',b:0},{text:'leaky bucket',b:1}
   ]},
   {t:'recall',q:'Token bucket vs leaky bucket — when each?',model:['Token bucket: allow bursts up to B, average bounded by R — good for APIs.','Leaky bucket: constant outflow, no bursts — good when the downstream needs smooth traffic.']}
  ]},
  {id:'rl-2',title:'Distributed',steps:[
   {t:'teach',h:'Across a fleet',body:[
     {k:'cause',a:'Per-instance counters',b:'N instances × R = N×R effective limit (wrong!)'},
     {k:'point',i:'🧰',t:'Use a shared store (Redis INCR/Lua) or distribute quota slices per node.'},
     {k:'point',i:'📨',t:'Respond 429 + Retry-After; limit at the edge/gateway.'}
   ]},
   {t:'cloze',q:'Fill the distributed-limit blanks.',distract:['cache','shard'],text:[
     'Per-instance counters give an effective limit of ',{blank:'N×R',alt:['NxR','N*R']},'. Use a shared ',
     {blank:'Redis',alt:['redis']},' counter or per-node ',{blank:'quota'},', and return ',{blank:'429'},' with Retry-After.'
   ]},
   {t:'recall',q:'Why are per-instance counters wrong for a global limit?',model:['Each of N instances independently allows R, so total ≈ N×R, not R.','Fix with a shared counter (Redis) or by handing each node a slice of the global quota.']}
  ]}
 ],

   {q:'Leaky bucket gives…',o:['bursts','constant outflow','no limit','random drops'],a:1},
   {q:'Fixed windows suffer…',o:['boundary bursts','no limit','high memory','drift'],a:0},
   {q:'A global limit across nodes needs…',o:['per-node counters','a shared store or quota','no coordination','DNS'],a:1},

 ]}

{
 id:'scale',title:'Scalability & Numbers',icon:'📈',color:'#EC4899',colorD:'#C9377D',
 blurb:'Estimate first, then scale. Know the numbers.',
 lessons:[
  {id:'scale-1',title:'Estimate',steps:[
   {t:'teach',h:'Back-of-envelope',body:[
     {k:'point',i:'👥',t:'QPS ≈ DAU × actions ÷ 86,400. Peak ≈ 2–10× average.'},
     {k:'point',i:'💾',t:'Storage ≈ writes/day × bytes × retention × replication (×3).'},
     {k:'point',i:'🔥',t:'Cache the hot ~20% (80/20). Size = hot keys × value size.'}
   ]},
   {t:'teach',h:'Latency numbers to know',body:[
     {k:'point',i:'⚡',t:'Memory read ≈ <b>100 ns</b>; SSD random read ≈ <b>16 µs</b> (~100× slower).'},
     {k:'point',i:'🏢',t:'Round trip within a datacenter ≈ <b>0.5 ms</b>.'},
     {k:'point',i:'🌍',t:'Cross-continent round trip ≈ <b>150 ms</b> — dwarfs the rest, so cache/CDN near users.'}
   ]},
   {t:'order',q:'Order these latencies FASTEST → SLOWEST.',items:['Memory read (~100ns)','SSD read (~16µs)','Datacenter round trip (~0.5ms)','Cross-continent round trip (~150ms)']},
   {t:'mcq',q:'Roughly, 1 day in seconds is…',o:['~3,600','~86,400','~1,000,000','~604,800'],a:1,why:'86,400 ≈ 10^5 — the handiest estimation constant.'},
   {t:'recall',q:'Give the 3-step recipe for capacity estimation.',model:['Traffic: DAU × actions ÷ 86,400 → QPS; peak = 2–10×.','Storage: writes/day × bytes × retention × replication.','Cache: 80/20 — size the hot working set, not total reads.']}
  ]},
  {id:'scale-2',title:'Scale out',steps:[
   {t:'teach',h:'Vertical vs horizontal',body:[
     {k:'vs',a:{h:'Vertical',t:'bigger box. Simple, but a ceiling + SPOF.'},b:{h:'Horizontal',t:'more boxes. Unbounded + fault-tolerant, but adds coordination.'}},
     {k:'note',t:'Make app servers stateless → the DB becomes the bottleneck (hence replicas, sharding, caching).'}
   ]},
   {t:'teach',h:'Storage engines',body:[
     {k:'vs',a:{h:'LSM-tree',t:'sequential writes + compaction. Write-optimized (Cassandra, RocksDB).'},b:{h:'B-tree',t:'update-in-place. Read/range-optimized (Postgres, MySQL).'}}
   ]},
   {t:'cloze',q:'Fill the storage-engine blanks.',distract:['hash','cache'],text:[
     'Write-heavy ingest (logs, time-series) suits an ',{blank:'LSM',alt:['LSM-tree']},'-tree: ',
     {blank:'sequential'},' writes plus background ',{blank:'compaction'},'. Read/range-heavy work suits a ',{blank:'B-tree',alt:['btree','B tree']},'.'
   ]},
	   {t:'mcq',q:'For a write-heavy time-series workload, pick…',o:['B-tree','LSM-tree','in-memory hash','none'],a:1,why:'LSM buffers in memory and flushes sequentially — high write throughput.'},
	   {t:'recall',q:'Why does making app servers stateless matter for scaling?',model:['Any instance can serve any request, so you just add instances behind a load balancer.','State moves to DB/cache/token, and the database becomes the scaling bottleneck to address with replicas/sharding.']}
		  ]},
	  {id:'scale-3',title:'Unique IDs',steps:[
	   {t:'teach',h:'Choosing an ID scheme',body:[
	     {k:'tldr',t:'IDs are not just uniqueness. They affect sort order, coordination, shard routing, and index write performance.'},
	     {k:'point',i:'📌',t:'Random IDs like UUID v4 distribute uniqueness well but insert all over a B-tree index.'},
	     {k:'point',i:'⏱️',t:'Time-ordered IDs like Snowflake or UUID v7 preserve index locality and are usually better for high-write databases.'}
	   ]},
	   {t:'htmlviz',h:'Unique ID trade-offs',
	    html:`<style>
	      .idv-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
	      .idv-card{border:1.5px solid var(--color-border-primary);border-radius:12px;background:var(--color-background-secondary);padding:11px;display:grid;gap:7px;min-width:0}

      .idv-ts{background:#6366F1}.idv-mc{background:#14B8A6}.idv-sq{background:#F59E0B}
	      @media(max-width:720px){.idv-grid{grid-template-columns:1fr}}
	    </style>
	    <div class="idv-grid">
	      <div class="idv-card">
	        <h4>Auto-increment DB</h4>
	        <div class="idv-pillrow"><span class="idv-pill">sortable</span><span class="idv-pill bad">DB round-trip</span></div>
	        <p>Sequential and great for index locality, but a single counter becomes awkward across shards.</p>
	      </div>
	      <div class="idv-card">
	        <h4>UUID v4</h4>
	        <div class="idv-pillrow"><span class="idv-pill bad">not sortable</span><span class="idv-pill">no coordination</span></div>
	        <p>Random 128-bit universal IDs. Fine for many apps, but poor B-tree locality at high write volume.</p>
	      </div>
	      <div class="idv-card">
	        <h4>UUID v7 / ULID</h4>
	        <div class="idv-pillrow"><span class="idv-pill">time-ordered</span><span class="idv-pill">no coordination</span></div>
	        <p>Client-generated, roughly chronological IDs. UUID v7 is the modern default when DB index locality matters.</p>
	      </div>
	      <div class="idv-card">
	        <h4>Snowflake</h4>
	        <div class="idv-pillrow"><span class="idv-pill">sortable</span><span class="idv-pill bad">worker ID config</span></div>
	        <p>Great at scale after assigning machine IDs once. Common for distributed records, events, and timelines.</p>
	      </div>
	      <div class="idv-card">
	        <h4>Hash of content</h4>
	        <div class="idv-pillrow"><span class="idv-pill bad">not time-sortable</span><span class="idv-pill">deterministic</span></div>
	        <p>Use for deduplication and content-addressable storage, not for chronological database rows.</p>
	      </div>
	      <div class="idv-card idv-wide">
	        <h4>Snowflake 64-bit layout</h4>
	        <div class="idv-bar"><div class="idv-seg idv-ts" style="flex:41 1 0">41-bit timestamp<small>~69 yrs</small></div><div class="idv-seg idv-mc" style="flex:10 1 0">10-bit machine<small>1024 workers</small></div><div class="idv-seg idv-sq" style="flex:12 1 0">12-bit seq<small>4096/ms</small></div></div>
	        <p>4096 IDs/ms/machine, about 4M IDs/sec/machine, with no request-time coordination.</p>
	      </div>
	    </div>`},
	   {t:'sort',q:'Which ID property is the main trade-off?',buckets:['Good index locality','Poor index locality'],items:[
	     {text:'UUID v4 random inserts',b:1},{text:'Snowflake time prefix',b:0},{text:'UUID v7 time-ordered prefix',b:0},{text:'auto-increment sequence',b:0}
	   ]},
	   {t:'mcq',q:'For a high-write DB table where insertion order matters, the safest modern default is…',o:['UUID v4','UUID v7','hash of content','random int'],a:1,why:'UUID v7 keeps client-side generation while making IDs time-ordered, which improves B-tree index locality.'},
	   {t:'mcq',q:'Snowflake IDs require coordination for…',o:['every ID generation request','assigning machine/worker IDs','every read','B-tree page splits'],a:1,why:'Once worker IDs are assigned, each machine can generate IDs locally from timestamp + worker ID + sequence.'},
	   {t:'cloze',q:'Fill the ID-generation blanks.',distract:['range','quorum'],text:[
	     'UUID v4 is random and hurts ',{blank:'B-tree',alt:['btree','B tree']},' locality. ',
	     {blank:'UUID v7',alt:['uuid v7']},' is time-ordered without coordination. ',
	     {blank:'Snowflake',alt:['snowflake']},' uses timestamp + worker ID + sequence, so worker ID assignment is the coordination point.'
	   ]},
	   {t:'recall',q:'When an interviewer asks “how do you generate IDs?”, what should you say?',model:['Name the scheme and the reason: UUID v7 for client-generated, time-ordered IDs with good DB index locality; Snowflake when you control worker IDs and need compact sortable 64-bit IDs.','Avoid defaulting to UUID v4 for write-heavy indexed tables unless random insert overhead is acceptable.','Use content hashes only when identity is derived from bytes, such as dedup or content-addressable storage.']}
	  ]}
	 ],
	 boss:{title:'Scalability Boss',time:85,q:[
	   {q:'Peak QPS is usually…',o:['= average','2–10× average','100× average','< average'],a:1},
	   {q:'1 day ≈ … seconds',o:['3.6k','86.4k','1M','600k'],a:1},
	   {q:'Horizontal scaling adds…',o:['a ceiling','coordination complexity','nothing','a SPOF'],a:1},
	   {q:'LSM-trees are…',o:['read-optimized','write-optimized','in-memory only','encrypted'],a:1},
	   {q:'B-trees excel at…',o:['write bursts','reads + range scans','compaction','hashing'],a:1},
	   {q:'Stateless servers make … the bottleneck',o:['the LB','the database','DNS','the cache'],a:1},
	   {q:'UUID v4 hurts DB indexes because…',o:['it is too short','random insert positions cause B-tree churn','it needs a central server','it is encrypted'],a:1},
	   {q:'Snowflake coordinates…',o:['every request','worker ID assignment','every read','all shards per insert'],a:1},
	   {q:'Modern time-ordered UUID choice:',o:['UUID v4','UUID v7','content hash','auto-increment only'],a:1}
	 ]}
},
{
 id:'rel',title:'Reliability',icon:'🛡️',color:'#0EA5A0',colorD:'#0E8C7F',
 blurb:'Failure is normal. Contain it gracefully.',
 lessons:[
  {id:'rel-1',title:'Targets & breakers',steps:[
   {t:'teach',h:'SLI / SLO / error budget',body:[
     {k:'keyt',term:'SLI → SLO → SLA',def:'measured number → internal target → customer promise (with penalties).'},
     {k:'point',i:'💰',t:'Error budget = 100% − SLO. 99.9% ≈ 43 min/month of allowed downtime.'}
   ]},
   {t:'teach',h:'Circuit breaker',body:[
     {k:'cause',a:'A dependency starts failing/slow',b:'Breaker OPENS → fail fast, stop the cascade'},
     {k:'point',i:'🔁',t:'CLOSED → (too many fails) OPEN → (cooldown) HALF-OPEN → test → CLOSED/OPEN.'}
   ]},
   {t:'cloze',q:'Fill the resilience blanks.',distract:['retry','shard'],text:[
     'A circuit breaker ',{blank:'opens',alt:['open']},' after too many failures and ',{blank:'fails fast',alt:['fail fast','fail-fast']},
     ', preventing a ',{blank:'cascading',alt:['cascade']},' failure. Always pair calls with a ',{blank:'timeout'},'.'
   ]},
   {t:'mcq',q:'An OPEN circuit breaker…',o:['passes calls','fails fast without calling','queues calls','retries forever'],a:1,why:'Failing fast frees threads and lets the dependency recover.'},
   {t:'recall',q:'What is an error budget and how do teams use it?',model:['Error budget = 100% − SLO (e.g. 0.1% ≈ 43 min/month for 99.9%).','Budget left → ship features; budget spent → freeze releases and fix stability.']}
  ]},
  {id:'rel-2',title:'Retries & multi-region',steps:[
   {t:'teach',h:'Retries done right',body:[
     {k:'point',i:'📈',t:'Exponential backoff: 1s, 2s, 4s…'},
     {k:'point',i:'🎲',t:'<b>Jitter</b> so clients don’t retry in sync (retry storm).'},
     {k:'callout',c:'warn',t:'Retry at ONE layer only — 3 layers × 3 retries = 27× amplification in an incident.'}
   ]},
   {t:'mcq',q:'Why add jitter to backoff?',o:['retry faster','prevent synchronized retry storms','make idempotent','cut latency'],a:1,why:'Randomness spreads retries so a recovering service isn’t re-stampeded.'},
   {t:'teach',h:'Multi-region & DR',body:[
     {k:'vs',a:{h:'Active-passive',t:'standby takes over on failure. Simple; failover delay.'},b:{h:'Active-active',t:'all regions serve; needs conflict resolution.'}},
     {k:'point',i:'⏱️',t:'RPO ≈ data you can lose (replication lag); RTO ≈ time to recover.'}
   ]},
   {t:'recall',q:'Explain RPO vs RTO in one line each.',model:['RPO = how much data you can afford to lose — set by replication lag (sync≈0, async≈lag).','RTO = how fast you must be back — set by failover automation + DNS/anycast propagation.']}
  ]},
  {id:'rel-3',title:'Isolation & observability',steps:[
   {t:'teach',h:'Contain the blast radius',body:[
     {k:'keyt',term:'Bulkhead',def:'isolate resources (separate thread/connection pools per dependency) so one slow dependency can’t exhaust everything and sink the whole service.'},
     {k:'keyt',term:'Load shedding',def:'under overload, drop or reject low-priority work early (429) to protect the core — better to serve some than topple over.'},
     {k:'note',t:'Pair with backpressure: shed at the edge before expensive work, and prioritise (e.g. paying users / health checks) when shedding.'}
   ]},
   {t:'teach',h:'Observability: know what’s happening',body:[
     {k:'point',i:'📊',t:'Three pillars: <b>metrics</b> (aggregate trends), <b>logs</b> (discrete events), <b>traces</b> (one request across services).'},
     {k:'point',i:'🚦',t:'<b>RED</b> (Rate, Errors, Duration) for services; <b>USE</b> (Utilization, Saturation, Errors) for resources. Alert on SLO burn, not raw CPU.'},
     {k:'point',i:'🧵',t:'Propagate a <b>trace/correlation ID</b> through every hop so you can follow a single request end-to-end.'}
   ]},
   {t:'mcq',q:'A bulkhead protects you by…',o:['retrying faster','isolating resource pools so one dependency can’t starve the rest','adding caches','sharding data'],a:1,why:'Separate pools per dependency contain failures — a hung dependency exhausts only its own pool.'},
   {t:'mcq',q:'Under overload, load shedding means…',o:['retry everything','drop/reject low-priority work to protect the core','scale to zero','ignore errors'],a:1,why:'Serving a subset cleanly beats collapsing under everything; shed early and by priority.'},
   {t:'teach',h:'Changing schema without downtime',body:[
     {k:'keyt',term:'Expand–contract',def:'roll schema changes in phases: EXPAND (add the new column/table, write both), MIGRATE (backfill + read new), CONTRACT (drop the old) — each step is backward-compatible.'},
     {k:'callout',c:'warn',t:'Never rename/drop in one shot during a rolling deploy — old and new code run at once. Backfill in batches to avoid long locks.'}
   ]},
   {t:'cloze',q:'Fill the resilience blanks.',distract:['sharding','quorum'],text:[
     'A ',{blank:'bulkhead'},' isolates pools so one dependency can’t starve the rest; ',{blank:'load shedding',alt:['shedding','load-shedding']},
     ' drops low-priority work under overload. Schema changes roll out ',{blank:'expand',alt:['expand-contract','expand–contract']},'-then-contract, backward-compatible at each step.'
   ]},
   {t:'recall',q:'How do you change a column safely under a rolling deploy?',model:['Expand–contract: add the new column (don’t touch the old), deploy code that writes BOTH.','Backfill the new column in batches, then switch reads to it.','Once nothing uses the old column, contract: drop it. Every step is backward-compatible so old + new code coexist.']}
  ]}
 ],
 boss:{title:'Reliability Boss',time:85,q:[
   {q:'Error budget =',o:['SLO','100% − SLO','SLA','uptime'],a:1},
   {q:'An OPEN breaker…',o:['passes calls','fails fast','queues','retries'],a:1},
   {q:'Jitter on retries prevents…',o:['data loss','retry storms','stale reads','GC'],a:1},
   {q:'Retry amplification is fixed by…',o:['more retries','retrying at one layer','no timeouts','sticky sessions'],a:1},
   {q:'RPO is bounded by…',o:['DNS TTL','replication lag','RTO','CPU'],a:1},
   {q:'Active-active needs…',o:['no replication','conflict resolution','one region','a lock'],a:1},
   {q:'A bulkhead…',o:['retries faster','isolates resource pools','adds caching','shards data'],a:1},
   {q:'Load shedding under overload…',o:['retries all','drops low-priority work','scales to zero','disables logs'],a:1},
   {q:'Safe online schema change uses…',o:['rename in place','expand–contract + backfill','a global lock','downtime'],a:1}
 ]}
},

 id:'pat',title:'Design Patterns',icon:'🧠',color:'#A560E8',colorD:'#7C3AED',
 blurb:'Recognise the shape, reuse the playbook.',
 lessons:[
  {id:'pat-1',title:'Spot the pattern',steps:[
   {t:'teach',h:'Core playbooks',body:[
     {k:'point',i:'📡',t:'<b>Real-time updates</b>: polling → SSE → WebSocket; pub/sub server-side.'},
     {k:'point',i:'⏳',t:'<b>Long-running tasks</b>: enqueue job, return id, workers process.'},
     {k:'point',i:'🔒',t:'<b>Contention</b>: DB transaction / optimistic CAS before distributed locks.'}
   ]},
   {t:'match',q:'Match the problem to its pattern.',pairs:[['Live chat updates','Real-time push'],['Video transcoding','Long-running task'],['Last concert seat','Contention control']]},
   {t:'teach',h:'More playbooks',body:[
     {k:'point',i:'📖',t:'<b>Scaling reads</b>: index → replicas → cache/CDN.'},
     {k:'point',i:'✍️',t:'<b>Scaling writes</b>: shard by a good key; batch; buffer bursts.'},
     {k:'point',i:'🎞️',t:'<b>Large blobs</b>: presigned URL direct to S3 + CDN.'},
     {k:'point',i:'📍',t:'<b>Proximity</b>: geospatial index (geohash/quadtree).'}

  ]}
 ],

   {q:'Large blobs use…',o:['app streaming','presigned URLs + CDN','the DB','email'],a:1},

 id:'fw',title:'Interview Framework',icon:'🎯',color:'#58CC02',colorD:'#46a302',
 blurb:'Structure beats panic. Drive the conversation.',
 lessons:[
  {id:'fw-1',title:'The flow',steps:[
   {t:'teach',h:'A repeatable structure',body:[
     {k:'point',i:'1️⃣',t:'Requirements: functional (top 3!) + non-functional (quantified).'},
     {k:'point',i:'2️⃣',t:'Core entities → API → high-level design (boxes that satisfy the API).'},
     {k:'point',i:'3️⃣',t:'Deep dives: harden against NFRs, bottlenecks, failure.'},
     {k:'point',i:'🔑',t:'API tips: derive the current user from the <b>auth token</b> (never the request body); paginate feeds with a <b>cursor (keyset)</b>, not offset.'},
     {k:'point',i:'🧮',t:'Do back-of-envelope math <b>only when a number changes the design</b> (e.g. does the heap fit on one node?) — not as ritual.'}
   ]},
   {t:'order',q:'Order the interview steps.',items:['Clarify requirements','Define core entities + API','High-level design','Deep dives','Wrap up: bottlenecks & SPOFs']},
   {t:'mcq',q:'Per the delivery framework, do upfront capacity math when…',o:['always, in detail','only when a number changes the design','never','at the end'],a:1,why:'Estimate only when it drives a decision (e.g. does the heap fit on one node?).'},
   {t:'teach',h:'Common mistakes',body:[
     {k:'callout',c:'warn',t:'Designing before clarifying; over-engineering for 1K users; hand-waving the hard part; ignoring failure.'}
   ]},
   {t:'recall',q:'Name the non-functional requirements you should always probe.',model:['Consistency vs availability, scale (DAU/QPS/read:write), latency targets.','Durability, security/compliance, fault tolerance — quantify the top 3–5 that matter here.']}
  ]},
  {id:'fw-2',title:'Make the call',steps:[
   {t:'teach',h:'The recurring forks',body:[
     {k:'tldr',t:'Most designs hit the same forks. Memorize the deciding QUESTION, not a default answer.'},
     {k:'vs',a:{h:'SQL',t:'transactions, joins, strong consistency (orders, payments).'},b:{h:'NoSQL',t:'huge scale + simple access, flexible schema, write-heavy.'}},
     {k:'vs',a:{h:'Strong consistency',t:'balances, uniqueness, "did it commit?"'},b:{h:'Eventual',t:'likes, views, search indexes, analytics.'}}
   ]},
   {t:'sort',q:'SQL or NoSQL for this workload?',buckets:['SQL','NoSQL'],items:[
     {text:'Payments with multi-row transactions',b:0},{text:'10M writes/sec of sensor data',b:1},{text:'Complex joins + ad-hoc queries',b:0},{text:'Flexible schema, simple key access',b:1}
   ]},
   {t:'match',q:'Match the use-case to the right datastore.',pairs:[['Cache / sessions','Key-value (Redis)'],['Full-text search','Elasticsearch'],['Multi-hop relationships','Graph DB'],['Append-heavy time-series','Wide-column (Cassandra)']]},
   {t:'mcq',q:'Correctness is critical (money, inventory, locks). Pick…',o:['AP (availability)','CP (consistency)','eventual','LWW'],a:1,why:'When a wrong answer is unacceptable, choose consistency (CP) even at some availability cost.'},
   {t:'mcq',q:'Caller needs the result now and the work is short. Sync or async?',o:['async via a queue','synchronous','always async','fire-and-forget'],a:1,why:'Sync is simpler with clear back-pressure; go async only for slow/heavy work, spikes, or decoupling.'},
   {t:'cloze',q:'Fill the decision blanks.',distract:['offset','vertical'],text:[
     'Choose ',{blank:'SQL'},' for transactions and joins; ',{blank:'NoSQL'},' for huge scale + simple access. Use ',
     {blank:'eventual',alt:['eventual consistency']},' consistency for likes/views, but ',{blank:'strong',alt:['strong consistency']},' for balances and "did it commit?".'
   ]},
   {t:'recall',q:'Give the deciding question for: SQL vs NoSQL, CP vs AP, sync vs async.',model:['SQL vs NoSQL: "do I need transactions/joins/strong consistency, or huge-scale simple access?"','CP vs AP: "is a wrong/stale answer unacceptable here?" (money → CP; feeds → AP).','Sync vs async: "does the caller need the result now and is the work short?" If yes, sync.']}
  ]}
 ],
 boss:{title:'Framework Boss',time:60,q:[

   {q:'Pagination for feeds should be…',o:['offset','cursor/keyset','none','random'],a:1},
   {q:'The deep-dive phase is where you…',o:['draw boxes','harden vs NFRs & failure','clarify scope','estimate'],a:1},
   {q:'A common failure is…',o:['clarifying too much','designing before clarifying','listening','simple designs'],a:1}
 ]}
},

 id:'data',title:'Data & ML Infra',icon:'🤖',color:'#1CB0F6',colorD:'#1899D6',

{
 id:'conc',title:'Concurrency Control',icon:'🧵',color:'#6366F1',colorD:'#4F46E5',
 blurb:'The anomaly zoo — and how databases stop it.',
 lessons:[
  {id:'conc-1',title:'Anomaly zoo',steps:[
   {t:'teach',h:'Read phenomena',body:[
     {k:'point',i:'🩸',t:'<b>Dirty read</b>: you read another txn’s uncommitted write — if it rolls back, you acted on data that never existed. <i>You see a $0 balance mid-transfer: the debit committed, the credit hasn’t yet.</i> (fix: read committed)'},
     {k:'point',i:'🔁',t:'<b>Non-repeatable read</b> (read skew): a row changes value between two reads in one txn. <i>A backup reads A=$500, a transfer moves $100 to B, then it reads B=$600 → totals $1100.</i> (fix: snapshot isolation)'},
     {k:'point',i:'👻',t:'<b>Phantom</b>: a query’s result set gains/loses rows mid-txn — often the root of write skew. <i>Two users both ask “any booking for room 42 @2pm?” (none), both insert → double-booked.</i> (fix: predicate/index-range locks)'}
   ]},
   {t:'teach',h:'The sneaky write anomalies',body:[
     {k:'keyt',term:'Dirty write',def:'overwrite another txn’s UNCOMMITTED write — two txns interleave writes to one row. e.g. Alice buys a car: listing → Alice, but the invoice goes to Bob. (fix: read committed)'},
     {k:'keyt',term:'Lost update',def:'two read-modify-write cycles on the SAME object; one silently clobbers the other. e.g. counter=42, two requests both read 42 and write 43 → 43, not 44. (fix: CAS / SELECT FOR UPDATE)'},
     {k:'keyt',term:'Write skew',def:'two txns read an overlapping set, write DIFFERENT rows, together breaking an invariant. e.g. two on-call doctors each see the other on call, both clock off → zero on call. (fix: serializable / SSI)'},

<div class="phv-panel">

    <div class="phv-col"><div class="phv-ct">Txn A (Alice)</div><div class="phv-sql"><span class="kw">SELECT COUNT(*)</span> FROM bookings\n<span class="kw">WHERE</span> room=<span class="hl">42</span> <span class="kw">AND</span> time=<span class="hl">'2pm'</span>;\n\n<span class="hl">→ 0 (slot free)</span></div></div>

<div class="fcv-panel">
  <div class="fcv-tl">
    <div class="fcv-evt"><div class="fcv-actor">Client A</div><div class="fcv-desc">Acquires lock from ZooKeeper (lease 10s)</div></div>
    <div class="fcv-evt bad"><div class="fcv-actor">Client A</div><div class="fcv-desc"><b>GC pause — frozen 15s</b></div></div>
    <div class="fcv-evt"><div class="fcv-actor">ZooKeeper</div><div class="fcv-desc">Lease expires → grants lock to Client B</div></div>
    <div class="fcv-evt"><div class="fcv-actor">Client B</div><div class="fcv-desc">Holds lock, writes to storage</div></div>
    <div class="fcv-evt bad"><div class="fcv-actor">Client A</div><div class="fcv-desc">Wakes up, <b>still thinks it holds the lock</b>, writes</div></div>
  </div>
  <div class="fcv-ex">Two clients both believe they hold the lock. Client A is a <b>zombie</b> — it missed its own lease expiry, and its writes can corrupt Client B's data.</div>
</div>
<div class="fcv-panel">
  <div class="fcv-tl">
    <div class="fcv-evt"><div class="fcv-actor">Client A</div><div class="fcv-desc">Acquires lock → <b>fencing token #33</b></div></div>
    <div class="fcv-evt bad"><div class="fcv-actor">Client A</div><div class="fcv-desc">GC pause — frozen 15s</div></div>
    <div class="fcv-evt"><div class="fcv-actor">ZooKeeper</div><div class="fcv-desc">Lease expires → lock + <b>token #34</b> to Client B</div></div>
    <div class="fcv-evt"><div class="fcv-actor">Client B</div><div class="fcv-desc">Writes with #34 → storage records max=34</div></div>
    <div class="fcv-evt bad"><div class="fcv-actor">Client A</div><div class="fcv-desc">Wakes, writes with stale token #33</div></div>
    <div class="fcv-evt good"><div class="fcv-actor">Storage</div><div class="fcv-desc"><b>Rejects #33</b> — lower than max seen (34)</div></div>
  </div>
  <div class="fcv-ex">Storage itself enforces ordering. It doesn't matter that A thinks it holds the lock — the token proves it's stale. ZooKeeper's <b>zxid</b> serves exactly this purpose.</div>
</div>`,

 id:'batch',title:'Batch & Stream',icon:'🌊',color:'#EA580C',colorD:'#C2410C',
 blurb:'MapReduce, dataflow, windows, and exactly-once.',
 lessons:[
  {id:'batch-1',title:'Batch processing',steps:[
   {t:'teach',h:'MapReduce',body:[
     {k:'cause',a:'Map (transform each record) → shuffle by key',b:'Reduce (aggregate per key) → output'},
     {k:'point',i:'🗺️',t:'<b>Map</b> emits key→value; <b>Reduce</b> folds all values for a key.'}
   ]},
   {t:'teach',h:'Beyond MapReduce',body:[
     {k:'vs',a:{h:'MapReduce',t:'materializes every intermediate step to disk. Robust but slow.'},b:{h:'Dataflow (Spark/Flink)',t:'keeps intermediates in memory, pipelines stages. Much faster.'}},
     {k:'point',i:'🔗',t:'Joins: sort-merge, broadcast-hash (small side), partitioned-hash.'}
   ]},
   {t:'mcq',q:'Why do Spark/Flink beat classic MapReduce?',o:['they use SQL','they don’t materialize every intermediate step to disk','they avoid the shuffle','they need no cluster'],a:1,why:'Dataflow engines pipeline stages in memory instead of writing each step to disk.'},
   {t:'recall',q:'Describe map and reduce in one line each.',model:['Map: transform each input record into key→value pairs (embarrassingly parallel).','Reduce: gather all values for a key (after a shuffle) and aggregate them into output.']}
  ]},
  {id:'batch-2',title:'Stream processing',steps:[
   {t:'teach',h:'Time & windows',body:[
     {k:'point',i:'⏰',t:'<b>Event time</b> (when it happened) vs <b>processing time</b> (when seen). Prefer event time.'},
     {k:'point',i:'🪟',t:'Windows: tumbling (fixed, non-overlap), hopping (overlap), session (by activity gap).'},
     {k:'point',i:'🌊',t:'<b>Watermarks</b> bound how long to wait for late events.'}
   ]},
   {t:'teach',h:'Correctness',body:[
     {k:'point',i:'💾',t:'Stateful operators checkpoint their state for fault tolerance.'},
     {k:'point',i:'🎯',t:'Exactly-once = checkpoints + idempotent/transactional sinks.'}
   ]},
   {t:'cloze',q:'Fill the streaming blanks.',distract:['offset','partition'],text:[
     'Group by ',{blank:'event time',alt:['event-time']},', not processing time. ',{blank:'Watermarks',alt:['watermark']},
     ' bound lateness, and ',{blank:'tumbling'},' windows are fixed and non-overlapping. Checkpoints give ',{blank:'exactly-once'},' processing.'
   ]},
   {t:'match',q:'Match the window to its shape.',pairs:[['Tumbling','Fixed, non-overlapping'],['Hopping','Fixed, overlapping'],['Session','Bounded by an activity gap']]},
   {t:'mcq',q:'Which window groups events by gaps of inactivity?',o:['tumbling','hopping','session','global'],a:2,why:'A session window closes after a period of no events for that key.'},
   {t:'recall',q:'Why prefer event time over processing time?',model:['Event time reflects when things actually happened, so results are correct regardless of delays or replays.','Processing time depends on when the system happened to see the event — it drifts with lag and reprocessing.']}
  ]},
  {id:'batch-3',title:'Architectures & tiering',steps:[
   {t:'teach',h:'Lambda vs Kappa',body:[
     {k:'vs',a:{h:'Lambda',t:'two paths — a batch layer for accurate, reprocessable results + a speed layer for fresh approximate ones; serving merges them. Powerful, but you maintain TWO codebases.'},b:{h:'Kappa',t:'one streaming path; reprocess by replaying the log. Simpler — one codebase — if streaming alone meets accuracy needs.'}},
     {k:'note',t:'Kappa is the modern default when your stream processor can replay; Lambda lingers where batch tools are much cheaper/more accurate for the bulk path.'}
   ]},
   {t:'teach',h:'Data lifecycle tiering',body:[
     {k:'point',i:'🔥',t:'<b>Hot</b>: recent, frequently-read — fast store (SSD/in-memory/standard object).'},
     {k:'point',i:'🌤️',t:'<b>Warm</b>: occasional access — cheaper, slower (infrequent-access tiers).'},
     {k:'point',i:'🧊',t:'<b>Cold</b>: rarely read, keep for compliance — cheapest, slow retrieval (Glacier/archive).'},
     {k:'note',t:'Lifecycle policies age data hot → warm → cold automatically; time-series/logs are the classic case.'}
   ]},
   {t:'mcq',q:'Kappa architecture differs from Lambda by…',o:['using two code paths','using one streaming path and replaying to reprocess','dropping streaming','requiring a warehouse'],a:1,why:'Kappa keeps a single streaming codebase and reprocesses by replaying the log; Lambda maintains separate batch + speed layers.'},
   {t:'cloze',q:'Fill the tiering blanks.',distract:['shard','quorum'],text:[
     {blank:'Lambda',alt:['lambda']},' runs batch + speed layers; ',{blank:'Kappa',alt:['kappa']},' uses one stream and ',{blank:'replays',alt:['replay']},' to reprocess. Aging data flows ',{blank:'hot',alt:['hot-warm-cold']},' → warm → cold to cut cost.'
   ]},
   {t:'recall',q:'Lambda vs Kappa, and how does data tiering save cost?',model:['Lambda: a batch layer (accurate, reprocessable) plus a speed layer (fresh, approximate), merged at serving — but two codebases.','Kappa: one streaming pipeline; reprocess by replaying the log — simpler when streaming meets accuracy needs.','Tiering ages data hot → warm → cold (e.g. SSD → infrequent-access → Glacier) via lifecycle policies, paying less for rarely-read data.']}
  ]}
 ],

 ]}

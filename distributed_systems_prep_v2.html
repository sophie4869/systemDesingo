{
 id:'trouble',title:'Distributed Trouble',icon:'⚠️',color:'#BE185D',colorD:'#9D174D',
 blurb:'Networks drop, clocks drift, processes pause.',
 lessons:[
  {id:'trouble-1',title:'Networks & clocks',steps:[
   {t:'teach',h:'Unreliable networks',body:[
     {k:'tldr',t:'You can’t tell a lost request from a slow one — a timeout is just a guess.'},
     {k:'point',i:'⏳',t:'Too short = false failures; too long = slow detection. There’s no perfect timeout.'}
   ]},
   {t:'teach',h:'Unreliable clocks',body:[
     {k:'vs',a:{h:'Time-of-day clock',t:'wall-clock; can jump backward on NTP sync. Don’t measure durations with it.'},b:{h:'Monotonic clock',t:'only goes forward; use it for elapsed time / timeouts.'}},
     {k:'callout',c:'warn',t:'Clock skew breaks Last-Write-Wins — a laggy clock can silently drop the newer write.'}
   ]},
   {t:'cloze',q:'Fill the clock blanks.',distract:['vector','logical'],text:[
     'Measure durations with the ',{blank:'monotonic'},' clock, never the ',{blank:'time-of-day',alt:['time of day','wall-clock','wall clock']},
     ' clock which can jump on NTP sync. Clock ',{blank:'skew'},' makes ',{blank:'LWW',alt:['last-write-wins']},' silently drop writes.'
   ]},
   {t:'mcq',q:'To measure how long an operation took, use…',o:['the time-of-day clock','the monotonic clock','a vector clock','NTP directly'],a:1,why:'Monotonic clocks never jump backward; time-of-day can be reset by NTP mid-measurement.'},
   {t:'recall',q:'Time-of-day vs monotonic clock — when each?',model:['Time-of-day: for timestamps/calendar time, but it can jump (NTP) — bad for durations.','Monotonic: always increases — use it for elapsed time, timeouts, and benchmarks.']}
  ]},
  {id:'trouble-2',title:'Pauses & truth',steps:[
   {t:'teach',h:'Process pauses',body:[
     {k:'cause',a:'GC stop-the-world / VM migration / paging',b:'A node freezes, then resumes thinking no time passed'},
     {k:'callout',c:'warn',t:'A paused lock holder can wake up after its lease expired and corrupt data — TTL alone won’t save you.'}
   ]},
   {t:'teach',h:'Truth is decided by majority',body:[
     {k:'point',i:'🗳️',t:'A node can’t trust its own view; a quorum/majority decides what’s true.'},
     {k:'point',i:'🎟️',t:'<b>Fencing tokens</b>: every lock grant gets an increasing number; storage rejects an older token.'}
   ]},
   {t:'mcq',q:'A GC-paused client resumes holding a now-expired lock. What makes writes safe?',o:['a longer TTL','fencing tokens','a faster network','retries'],a:1,why:'Storage rejects writes carrying a token lower than the highest it has seen — the stale holder is fenced out.'},
   {t:'build',q:'Pick real causes of an unexpected multi-second pause.',options:['GC stop-the-world','VM live migration','Memory paging/swapping','A tight CPU loop','SIGSTOP'],correct:[0,1,2,4]},
   {t:'recall',q:'Why is a TTL lock unsafe without fencing tokens?',model:['A paused client’s clock doesn’t advance — it can wake after the lease expired, unaware it’s stale.','Fencing tokens (monotonic per grant) let storage reject the old holder’s writes, preventing corruption.']}
  ]}
 ],
 boss:{title:'Trouble Boss',time:70,q:[
   {q:'A network timeout is…',o:['exact','a guess','always right','unnecessary'],a:1},
   {q:'Measure elapsed time with…',o:['time-of-day clock','monotonic clock','vector clock','NTP'],a:1},
   {q:'Clock skew can break…',o:['hashing','last-write-wins','TCP','compression'],a:1},
   {q:'A GC pause can make a node…',o:['faster','hold a stale lock','skip writes','rebalance'],a:1},
   {q:'Stale lock holders are stopped by…',o:['longer TTL','fencing tokens','retries','bigger heap'],a:1},
   {q:'In a distributed system, truth is decided by…',o:['one node','a quorum/majority','the client','the clock'],a:1}
 ]}
},
{
 id:'decide',title:'Design Decisions',icon:'🧭',color:'#0EA5E9',colorD:'#0284C7',
 blurb:'One scenario, two paths — pick fast and justify.',
 lessons:[
  {id:'decide-1',title:'Pick a side',steps:[
   {t:'teach',h:'The recurring forks',body:[
     {k:'tldr',t:'Most designs come down to a few binary forks. Memorize the deciding question, not a default answer.'},
     {k:'point',i:'🗄️',t:'<b>SQL vs NoSQL</b>: transactions/joins/strong consistency → SQL; huge scale + simple access → NoSQL.'},
     {k:'point',i:'📨',t:'<b>Queue vs log</b>: one consumer, no replay → queue; many subscribers + replay → log.'},
     {k:'point',i:'⚡',t:'<b>Cache vs read replica</b>: hot keys / sub-ms → cache; scale all reads → replica.'},
     {k:'point',i:'⏱️',t:'<b>Sync vs async</b>: caller needs the result now → sync; slow work / spikes / fan-out → async.'},
     {k:'point',i:'🗣️',t:'Say the deciding question out loud, then commit + justify — interviewers grade the <b>why</b>.'}
   ]},
   {t:'sort',q:'SQL or NoSQL?',buckets:['SQL','NoSQL'],items:[
     {text:'transactions + joins (orders, payments)',b:0},{text:'huge scale, simple access, flexible schema',b:1},{text:'strong consistency on money',b:0},{text:'write-heavy event firehose',b:1}
   ]},
   {t:'sort',q:'Message queue or log (Kafka)?',buckets:['Queue','Log'],items:[
     {text:'one consumer per message, no replay',b:0},{text:'multiple subscribers + replay',b:1},{text:'ordered event stream',b:1},{text:'work distribution',b:0}
   ]},
   {t:'sort',q:'Cache or read replica?',buckets:['Cache','Read replica'],items:[
     {text:'hot keys, sub-ms reads',b:0},{text:'scale ALL reads incl. cold',b:1},{text:'offload the primary / analytics',b:1},{text:'cut repeated lookups',b:0}
   ]},
   {t:'sort',q:'Sync or async?',buckets:['Sync','Async'],items:[
     {text:'caller needs the result now',b:0},{text:'slow / heavy work',b:1},{text:'spikes to absorb, fan-out',b:1},{text:'short work, clear back-pressure',b:0}
   ]},
   {t:'recall',q:'CP vs AP — what is the deciding question?',model:['"Is a wrong/stale answer acceptable here?"','No (money, inventory, locks) → CP. Yes (feeds, counts, search) → AP for availability + latency.']}
  ]},
  {id:'decide-2',title:'Which datastore?',steps:[
   {t:'teach',h:'Match data to store',body:[
     {k:'point',i:'🧱',t:'<b>Relational</b>: ACID txns, joins, strong consistency.'},
     {k:'point',i:'🪣',t:'<b>Wide-column</b> (Cassandra): huge write throughput, time-series.'},
     {k:'point',i:'🔎',t:'<b>Search</b> (Elasticsearch): full-text + faceted. <b>Graph</b>: multi-hop relationships.'},
     {k:'note',t:'Pick by access pattern + consistency need, never by brand familiarity.'}
   ]},
   {t:'match',q:'Match the workload to its datastore.',pairs:[['ACID txns + joins','Relational (Postgres)'],['Write-heavy time-series','Wide-column (Cassandra)'],['Full-text search','Elasticsearch'],['Multi-hop relationships','Graph (Neo4j)']]},
   {t:'sort',q:'Strong or eventual consistency?',buckets:['Strong','Eventual'],items:[
     {text:'account balance',b:0},{text:'like / view counts',b:1},{text:'inventory',b:0},{text:'search index',b:1}
   ]},
   {t:'cloze',q:'Fill the datastore decision rule.',distract:['cache','queue'],text:[
     'Need transactions or joins → ',{blank:'SQL',alt:['relational']},'. Write-heavy at huge scale → ',
     {blank:'wide-column',alt:['wide column','Cassandra']},'. Full-text search → ',{blank:'Elasticsearch',alt:['search']},
     '. In the interview the ',{blank:'justification',alt:['reasoning','why']},' is graded, not the pick.'
   ]},
   {t:'mcq',q:'Feed delivery for a celebrity with 50M followers — fanout on write or read?',o:['pure fanout-on-write','fanout-on-read / hybrid for celebrities','neither','sharding'],a:1,why:'Pushing one post to 50M timelines is too expensive; pull/merge celebrity posts at read time (hybrid).'},
   {t:'recall',q:'How do you choose a database in an interview?',model:['State the access pattern and consistency need first ("read-heavy key lookups, eventual is fine").','Then name the store and justify: "so a wide-column KV like Cassandra fits." The justification is what’s graded.']}
  ]},
  {id:'decide-3',title:'Signal → strategy',steps:[
   {t:'teach',h:'Train the reflex',body:[
     {k:'tldr',t:'Interviews reward a fast, justified jump from a constraint to a strategy. Learn the trigger → tool reflexes.'},
     {k:'point',i:'🌍',t:'Users worldwide + static/media → <b>CDN / edge cache</b>. Read-heavy → <b>replicas + cache</b>. Hot key → <b>dedicated cache / fanout-on-read</b>.'},
     {k:'point',i:'🌊',t:'Spiky or slow work → <b>queue (async buffer)</b>. Wrong/stale answer unacceptable → <b>CP / strong consistency</b>.'}
   ]},
   {t:'match',q:'Signal → first-reach strategy.',pairs:[['Users across continents, static assets','CDN / edge cache'],['Read:write ≈ 100:1, staleness OK','Cache + read replicas'],['10× launch-day traffic spike','Queue + autoscale (async)'],['Must never double-charge on retry','Idempotency key'],['Celebrity key — 90% of reads','Fanout-on-read / dedicated cache']]},
   {t:'sort',q:'Strong consistency (CP) or availability-first (AP)?',buckets:['CP (strong)','AP (available)'],items:[
     {text:'payment / account balance',b:0},{text:'social feed',b:1},{text:'inventory decrement',b:0},{text:'view counts',b:1}
   ]},
   {t:'mcq',q:'Global users, media-heavy, reads dominate. First reach for…',o:['a bigger DB','a CDN / edge cache','more shards','a message queue'],a:1,why:'Geographically distributed, read-heavy static/media → cache at the edge near users (CDN).'},
   {t:'mcq',q:'A burst of writes you can process within minutes, not seconds. Best fit?',o:['synchronous write path','a queue to buffer + async workers','a bigger cache','a distributed lock'],a:1,why:'Decouple the spike: enqueue and process asynchronously so the front-end stays responsive.'},
   {t:'mcq',q:'Reads dominate 100:1 and brief staleness is fine. Cheapest scale move?',o:['shard the writes','cache + read replicas','switch to NoSQL','add a queue'],a:1,why:'Read-heavy + staleness-tolerant → serve from cache and read replicas before anything more invasive.'},
   {t:'cloze',q:'Fill the reflexes.',distract:['shard','lock'],text:[
     'Worldwide static content → ',{blank:'CDN',alt:['edge','edge cache']},'. Read-heavy with tolerable staleness → ',{blank:'cache',alt:['caching']},
     ' + replicas. Spiky/slow work → a ',{blank:'queue',alt:['message queue']},'. Money/inventory → ',{blank:'CP',alt:['strong']},' (strong consistency).'
   ]},
   {t:'recall',q:'Fire 4 signal→strategy reflexes you can use in an interview.',model:['Global users + static/media → CDN/edge cache near users.','Read-heavy, staleness OK → cache + read replicas; hot key → dedicated cache / fanout-on-read.','Spiky or slow work → queue + async workers to smooth the load.','Wrong/stale answer unacceptable (money, inventory) → CP/strong consistency; otherwise AP for availability + latency.']}
  ]}
 ],
 boss:{title:'Decisions Boss',time:85,q:[
   {q:'Orders + payments need…',o:['NoSQL for scale','SQL (transactions/joins)','a cache','a queue'],a:1},
   {q:'You need replay + multiple subscribers →',o:['a queue (SQS)','a log (Kafka)','a cache','a cron'],a:1},
   {q:'Hot-key sub-ms reads →',o:['read replica','cache','bigger DB','sharding'],a:1},
   {q:'Slow heavy work with spikes →',o:['sync call','async + queue','a lock','a join'],a:1},
   {q:'Account balance needs…',o:['eventual','strong consistency','a cache TTL','LWW'],a:1},
   {q:'Full-text search →',o:['Postgres LIKE','Elasticsearch','a graph DB','Redis'],a:1},
   {q:'Celebrity feed fanout →',o:['write to all 50M','read-time / hybrid','no fanout','a cron'],a:1},
   {q:'Global users + static media → first reach for…',o:['a CDN / edge cache','more shards','a queue','a lock'],a:0},
   {q:'A 10× write spike you can process later → use…',o:['a sync path','a queue + async workers','a bigger cache','2PC'],a:1}
 ]}
},
{
 id:'mock',title:'Mock Designs',icon:'🎤',color:'#7C3AED',colorD:'#6D28D9',
 blurb:'Full end-to-end design reps — the real 45-minute interview.',
 lessons:[
  {id:'mock-1',title:'URL shortener',steps:[
   {t:'teach',h:'1 · Requirements',body:[
     {k:'tldr',t:'Design Bitly. Functional: create short link, redirect, basic analytics.'},
     {k:'point',i:'📐',t:'NFRs: <b>read-heavy</b> (~100:1), low-latency redirects, high availability, codes globally unique.'}
   ]},
   {t:'recall',q:'2 · Entities + 3 · core API. Say them out loud.',model:['Entities: urls(code PK, long_url, owner, created_at, click_count).','API: POST /urls {long_url} → {code}; GET /{code} → 301/302 redirect; GET /urls/{code} → analytics.','Current user from the auth token.']},
   {t:'mcq',q:'Best way to generate unique short codes?',o:['hash the URL and truncate (collisions)','base62-encode a unique counter/ID','a random string, retry on clash','a UUID v4'],a:1,why:'Base62 of a monotonic ID is collision-free and short (~7 chars covers 3.5e12). Hash-truncate risks collisions.'},
   {t:'build',q:'4 · Pick the high-level components.',options:['ID/counter generator','KV store (code → URL)','CDN / cache for redirects','Async analytics pipeline','A graph database','A relational DB with heavy joins'],correct:[0,1,2,3]},
   {t:'mcq',q:'5 · Where is the main load / bottleneck?',o:['writing new links','the redirect reads (100:1) — cache/CDN them','analytics','the ID generator'],a:1,why:'Reads dominate ~100:1; serve redirects from cache/CDN + read replicas, never the primary.'},
   {t:'recall',q:'6 · Deep dive + a failure mode.',model:['Scale reads: cache/CDN hot codes + read replicas; shard the KV store by code.','301 (cached by browser, fewer analytics) vs 302 (every hit counted).','Failure: a viral link expires from cache → stampede; use a mutex/stale-while-revalidate.']}
  ]},
  {id:'mock-2',title:'News feed / Twitter',steps:[
   {t:'teach',h:'1 · Requirements',body:[
     {k:'tldr',t:'Post a tweet, follow users, see a home timeline (recent posts from people you follow).'},
     {k:'point',i:'📐',t:'NFRs: read-heavy, feed <200ms, ~100M DAU, eventual consistency is fine.'}
   ]},
   {t:'recall',q:'2 · Entities + 3 · API.',model:['Entities: users, tweets(snowflake id, author, text, ts), follows(follower, followee), timeline cache.','API: POST /tweets; GET /feed?cursor=&limit; POST/DELETE /follows. Cursor (keyset) pagination.']},
   {t:'mcq',q:'Feed delivery for NORMAL users?',o:['fanout-on-read (assemble each time)','fanout-on-write (precompute timelines)','recompute nightly','no caching'],a:1,why:'Reads dominate, so precompute each user’s timeline on write — cheap reads.'},
   {t:'build',q:'4 · High-level components.',options:['Fanout-on-write workers','Timeline cache (Redis)','Follow-graph store','Object store + CDN for media','A global lock service'],correct:[0,1,2,3]},
   {t:'mcq',q:'5 · The hard bottleneck?',o:['posting tweets','celebrity fanout (1 post → millions of writes)','following users','storing media'],a:1,why:'Fanning out a celebrity’s post to 50M timelines is too expensive on write.'},
   {t:'recall',q:'6 · Deep dive + failure.',model:['Hybrid fanout: push for normal users, pull/merge celebrity tweets at read time.','Time-sortable IDs (Snowflake) give ordering for free.','Failure: replication lag → read-your-writes for your own posts; viral spikes → cache + read-time merge.']}
  ]},
  {id:'mock-3',title:'Chat / WhatsApp',steps:[
   {t:'teach',h:'1 · Requirements',body:[
     {k:'tldr',t:'1:1 + group messaging, delivery + read receipts, presence, offline delivery.'},
     {k:'point',i:'📐',t:'NFRs: low latency, ordered per conversation, durable, huge fan-in of connections.'}
   ]},
   {t:'recall',q:'2 · Entities + 3 · API.',model:['Entities: conversations, messages(conv_id, msg_id snowflake, sender, body), members(last_read_id).','API: POST send {client_msg_id, text} (idempotency); GET history?before=; WS subscribe for realtime + receipts.']},
   {t:'mcq',q:'Real-time delivery uses…',o:['HTTP polling forever','persistent WebSocket + pub/sub fanout','email','a nightly batch'],a:1,why:'WebSocket (or SSE) pushes messages instantly; pub/sub fans out to the recipient’s connection. Poll only as fallback.'},
   {t:'build',q:'4 · High-level components.',options:['WebSocket gateway servers','Pub/Sub for fanout','Message store (wide-column)','Presence + push-notification service','A relational DB with cross-shard joins'],correct:[0,1,2,3]},
   {t:'mcq',q:'5 · Bottleneck?',o:['storing messages','millions of persistent connections + large-group fanout','presence','read receipts'],a:1,why:'Holding millions of live connections is stateful and hard; route by consistent hashing.'},
   {t:'recall',q:'6 · Deep dive + failure.',model:['Stateful gateways in a consistent-hash ring; pub/sub routes to the recipient’s gateway.','Idempotency keys (client_msg_id) for at-least-once; per-conversation snowflake gives ordering.','Failure: a gateway dies → client reconnects elsewhere; undelivered messages are persisted + redelivered.']}
  ]},
  {id:'mock-4',title:'Ticket booking',steps:[
   {t:'teach',h:'1 · Requirements',body:[
     {k:'tldr',t:'Browse events/seats, hold a seat, book it, pay — with NO double-booking.'},
     {k:'point',i:'📐',t:'NFRs: strong consistency on seats, extreme contention at on-sale, payment integrity.'}
   ]},
   {t:'recall',q:'2 · Entities + 3 · API.',model:['Entities: events, seats(status[AVAILABLE|HELD|BOOKED], held_by, hold_expires_at, version), bookings.','API: hold(seat), confirm(seat), release(seat).']},
   {t:'mcq',q:'Prevent double-booking — first tool?',o:['a distributed lock service','an atomic conditional update / optimistic concurrency (DB)','2PC across services','sharding the seats table'],a:1,why:'Start with the DB: UPDATE … WHERE status=AVAILABLE (compare-and-set). Reach for distributed locks only if data spans systems.'},
   {t:'build',q:'4 · High-level components.',options:['Relational DB (ACID)','Seat hold with TTL','Payment via saga','Virtual waiting room / queue for spikes','A cache as the source of truth'],correct:[0,1,2,3]},
   {t:'mcq',q:'5 · Bottleneck?',o:['browsing seats','contention on popular seats / hot DB rows at on-sale','payment','email confirmation'],a:1,why:'Everyone grabs the same seats at 10:00 — hot rows. Shed load with a waiting-room queue.'},
   {t:'recall',q:'6 · Deep dive + failure.',model:['Optimistic CAS on seat status + a hold TTL that auto-releases abandoned holds; the confirm is conditional (only if still HELD by you). Add a hold_version/fencing token if a stale client can resume and retry.','Waiting-room queue to serialize/shed the on-sale spike; payment as a saga (compensate on failure).','Failure: held seat never confirmed → TTL releases it back to AVAILABLE.']}
  ]},
  {id:'mock-5',title:'Distributed rate limiter',steps:[
   {t:'teach',h:'1 · Requirements',body:[
     {k:'tldr',t:'Limit requests per user/API-key, across many gateway nodes, with low latency.'},
     {k:'point',i:'📐',t:'NFRs: accurate-ish global limit, tiny added latency, decide fail-open vs fail-closed.'}
   ]},
   {t:'recall',q:'2 · Entities + 3 · API.',model:['Entities: counters keyed by (key, window) or (key → token bucket state).','API: middleware allow/deny per request; on deny return 429 + Retry-After.']},
   {t:'mcq',q:'Algorithm: allow short bursts but cap the average?',o:['leaky bucket','token bucket','fixed window','no limiter can'],a:1,why:'Token bucket bursts up to capacity, then enforces the refill rate.'},
   {t:'build',q:'4 · High-level components.',options:['Token-bucket logic','Shared Redis counters (atomic INCR/Lua)','Per-node local quota + periodic sync','Edge / API-gateway enforcement','A relational DB write per request'],correct:[0,1,2,3]},
   {t:'mcq',q:'5 · Bottleneck?',o:['the algorithm','the shared counter becomes a hotspot / SPOF','the gateway','the client'],a:1,why:'A single shared store per request is a hotspot; mitigate with local pre-checks + quota distribution.'},
   {t:'recall',q:'6 · Deep dive + failure.',model:['Redis Lua token-bucket, or hand each node a slice of the global quota; sticky-route a key to one node.','Enforce at the edge/gateway before expensive backends; return 429 + Retry-After.','Failure: Redis down → fail-open (allow) to avoid taking the whole API down.']}
  ]},
  {id:'mock-6',title:'Video upload + streaming',steps:[
   {t:'teach',h:'1 · Requirements',body:[
     {k:'tldr',t:'Upload large videos, transcode to multiple renditions, stream to millions (adaptive bitrate).'},
     {k:'point',i:'📐',t:'NFRs: huge egress bandwidth, global low latency, resumable uploads.'}
   ]},
   {t:'recall',q:'2 · Entities + 3 · API.',model:['Entities: videos(metadata, status), renditions (per quality).','API: request presigned upload URL; get manifest (HLS/DASH) + stream segments.']},
   {t:'mcq',q:'Large uploads should…',o:['stream bytes through app servers','use a presigned URL direct to object storage (S3)','go into the database','be emailed'],a:1,why:'Presigned URL → client uploads straight to S3, keeping gigabytes off your app tier.'},
   {t:'build',q:'4 · High-level components.',options:['Presigned-URL upload to S3','Transcoding worker pool (queue)','CDN for delivery','Metadata DB + object storage','Synchronous transcode in the request'],correct:[0,1,2,3]},
   {t:'mcq',q:'5 · Bottleneck?',o:['metadata writes','serving the bytes — egress bandwidth (Tbps)','transcoding speed','upload size'],a:1,why:'Average egress is enormous; a CDN is mandatory — no origin serves that.'},
   {t:'recall',q:'6 · Deep dive + failure.',model:['Resumable chunked upload → S3; async transcode pipeline (long-running tasks) into ABR renditions; deliver via CDN.','Failure: a transcode job fails → retry / dead-letter; partial upload resumes; reconcile DB metadata with S3 event notifications.']}
  ]},
  {id:'mock-7',title:'Metrics / log pipeline',steps:[
   {t:'teach',h:'1 · Requirements',body:[
     {k:'tldr',t:'Ingest millions of events/sec, store time-series, power dashboards + alerts.'},
     {k:'point',i:'📐',t:'NFRs: high write throughput, range queries by time, bounded retention cost.'}
   ]},
   {t:'recall',q:'2 · Entities + 3 · API.',model:['Entities: time-series points (metric, host/tags, timestamp, value).','API: ingest (batched), query a metric over a time range, define alert rules.']},
   {t:'mcq',q:'How do you partition the storage?',o:['by user id','by (metric/series, time bucket) in a TSDB','randomly','one big table'],a:1,why:'Bucketing by series + time keeps partitions bounded and makes range queries touch only relevant buckets.'},
   {t:'build',q:'4 · High-level components.',options:['Ingestion buffer (Kafka)','Stream processor (Flink) for aggregation','Time-series DB','Rollup / downsampling jobs','Object store for cold data','One relational table for every point'],correct:[0,1,2,3,4]},
   {t:'mcq',q:'5 · Bottleneck?',o:['querying','write volume + high cardinality + retention cost','alerting','dashboards'],a:1,why:'Sustained high-cardinality writes and years of retention dominate; fix with rollups + TTL tiers.'},
   {t:'recall',q:'6 · Deep dive + failure.',model:['Kafka absorbs spikes → stream aggregation → TSDB; downsample raw → 1-min → 1-hour with TTL per tier; long-range queries read coarse rollups.','Failure: ingestion spike → Kafka buffers / backpressure; idempotent writes give exactly-once aggregation.']}
  ]},
  {id:'mock-8',title:'Payment / order system',steps:[
   {t:'teach',h:'1 · Requirements',body:[
     {k:'tldr',t:'Place an order across order, payment, and inventory services — charged exactly once.'},
     {k:'point',i:'📐',t:'NFRs: correctness > availability, idempotent, no double-charge, no oversell.'}
   ]},

let toastT=null;

/* ---------------- helpers ---------------- */
const APP=()=>document.getElementById('app');
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function lessonById(id){for(const u of UNITS)for(const l of u.lessons)if(l.id===id)return{u,l};return null;}
const GOOD_PCT=80; // best score at/above this counts as a ✓ pass (no retry nudge)
function tierOf(id){if(!S.done[id])return null;if(S.perfect[id])return 'perfect';return (S.best[id]||0)>=GOOD_PCT?'good':'partial';}
function unitProgress(u){const total=u.lessons.length+1;let d=0;u.lessons.forEach(l=>{if(S.done[l.id])d++;});if(S.done['boss-'+u.id])d++;return{d,total};}
function unitUnlocked(ui){if(S.unlockAll||ui===0)return true;const prev=UNITS[ui-1];return !!S.done['boss-'+prev.id];}
function lessonUnlocked(u,li){if(S.unlockAll||li===0)return true;return !!S.done[u.lessons[li-1].id];}
function bossUnlocked(u){if(S.unlockAll)return true;return u.lessons.every(l=>S.done[l.id]);}

  if(!curUnit&&UNITS.length)curUnit=UNITS[UNITS.length-1].id;

  UNITS.forEach((u,ui)=>{const bd=S.done['boss-'+u.id];const open=unitUnlocked(ui);

  h+='<div class="actions">'

      +(unlocked&&uRecall?'<button class="udrill" data-unitrecall="'+u.id+'" title="Drill this unit\'s explain-it questions">🗣️ drill</button>':'')
      +'<div class="u-k">Unit '+(ui+1)+' · '+d+'/'+total+'</div>'
      +'<div class="u-t">'+u.icon+' '+u.title+(unlocked?'':' 🔒')+'</div>'

    u.lessons.forEach((l,li)=>{
      const open=unlocked&&lessonUnlocked(u,li);

  document.getElementById('unlockBtn').onclick=()=>{S.unlockAll=!S.unlockAll;save();renderHome();};
  if(scrollToNext){requestAnimationFrame(function(){

/* ============================ LESSON RUNNER ============================ */
var R=null; // active run state
function isQuizStep(t){return t==='mcq'||t==='sort'||t==='match'||t==='order'||t==='build'||t==='cloze'||t==='recall';}
function startLesson(id){
  const {u,l}=lessonById(id);
  const quizN=l.steps.filter(s=>isQuizStep(s.t)).length;
  const t=Math.max(60,quizN*25); // clock only ticks on quiz steps; learning steps are untimed
  R={mode:'lesson',unit:u,lesson:l,steps:l.steps,idx:0,frontier:0,hearts:HEARTS,combo:0,maxCombo:0,xp:0,correct:0,graded:0,mistakes:0,time:t,timeLeft:t};
  renderStep(); // renderStep starts/pauses the timer per step
}
/* run the countdown only on a fresh quiz step (or in boss mode); pause it on learning/review steps */
function manageTimer(){
  if(R.timeLeft==null){return;}
  const step=R.steps[R.idx];
  const active=(R.mode==='boss')||(R.idx>=R.frontier&&step&&isQuizStep(step.t));
  if(active){startTimer();}else{stopTimer();}
}
function startBoss(uid){
  const u=UNITS.find(x=>x.id===uid);
  const steps=shuffle(u.boss.q).map(q=>({t:'mcq',q:q.q,o:q.o,a:q.a,boss:true}));
  R={mode:'boss',unit:u,bossTitle:u.boss.title,steps,idx:0,frontier:0,hearts:HEARTS,combo:0,maxCombo:0,xp:0,correct:0,graded:0,mistakes:0,time:u.boss.time,timeLeft:u.boss.time};
  startTimer();
  renderStep();
}
function startReview(){
  let pool=Object.values(S.mistakes);
  if(S.reviewSkipRecall)pool=pool.filter(s=>s.t!=='recall');
  const steps=shuffle(pool).slice(0,15);
  if(!steps.length){toast(S.reviewSkipRecall?'No non-explain-it mistakes to review 🎉':'No mistakes to review — nice! 🎉');return;}
  R={mode:'review',source:'mistakes',unit:{id:'review'},steps,idx:0,frontier:0,hearts:99,combo:0,maxCombo:0,xp:0,correct:0,graded:0,mistakes:0};
  renderStep();
}
function startRecallReview(){
  const steps=shuffle(UNITS.flatMap(u=>u.lessons.flatMap(l=>l.steps)).filter(s=>s.t==='recall'));
  if(!steps.length){toast('No explain-it questions found.');return;}
  R={mode:'review',source:'recall',unit:{id:'recall'},steps,idx:0,frontier:0,hearts:99,combo:0,maxCombo:0,xp:0,correct:0,graded:0,mistakes:0};
  renderStep();
}
function startUnitRecall(uid){
  const u=UNITS.find(x=>x.id===uid);
  const steps=shuffle(u.lessons.flatMap(l=>l.steps).filter(s=>s.t==='recall'));
  if(!steps.length){toast('No explain-it questions in this unit.');return;}
  R={mode:'review',source:'unitrecall',unit:u,steps,idx:0,frontier:0,hearts:99,combo:0,maxCombo:0,xp:0,correct:0,graded:0,mistakes:0};
  renderStep();
}

let timerH=null;
function startTimer(){
  stopTimer();
  timerH=setInterval(()=>{
    R.timeLeft--;
    const el=document.getElementById('timerTxt');
    if(el){el.textContent=R.timeLeft+'s';el.parentElement.classList.toggle('low',R.timeLeft<=15);}
    if(R.timeLeft<=0){stopTimer();finishRun(true);}
  },1000);
}
function stopTimer(){if(timerH){clearInterval(timerH);timerH=null;}}

function topbarHTML(){
  const pct=Math.round(R.idx/R.steps.length*100);
  let right='';
  if(R.timeLeft!=null){
    const step=R.steps[R.idx];
    const active=(R.mode==='boss')||(R.idx>=R.frontier&&step&&isQuizStep(step.t));
    right=active
      ?'<div class="timer"><span>⏱️</span><span id="timerTxt">'+R.timeLeft+'s</span></div>'
      :'<div class="timer paused" title="Timer pauses while you learn — runs during quiz steps"><span>⏸</span><span>'+R.timeLeft+'s</span></div>';
  }
  const back=(R.idx>0&&R.mode!=='boss')?'<button class="lback" id="backBtn" title="Previous">←</button>':'';
  return '<div class="lhead">'
    +'<button class="close" id="quitBtn">×</button>'
    +back
    +'<div class="pbar"><i style="width:'+pct+'%"></i></div>'
    +'<div class="lhearts">❤️ '+R.hearts+'</div>'
    +right+'</div>';
}

function renderStep(){
  if(R.idx>=R.steps.length){finishRun(false);return;}
  const step=R.steps[R.idx];
  let h=topbarHTML()+'<div class="stage" id="stage"></div>';
  h+='<div class="combo" id="combo"></div>';
  APP().innerHTML=h;
  document.getElementById('quitBtn').onclick=()=>{stopTimer();if(R.mode!=='boss'){renderHome(true);return;}if(confirm('Quit the timed boss? Your attempt will be lost.'))renderHome(true);else startTimer();};
  const bb=document.getElementById('backBtn');if(bb)bb.onclick=backStep;
  const stage=document.getElementById('stage');
  if(R.idx<R.frontier){renderReview(stage,step);}
  else{({teach:stTeach,mcq:stMcq,sort:stSort,match:stMatch,order:stOrder,build:stBuild,recall:stRecall,cloze:stCloze,vecviz:stVecViz,htmlviz:stHtmlViz}[step.t])(stage,step);}
  manageTimer();
  try{window.scrollTo(0,0);}catch(e){}
}
function backStep(){if(R.idx>0){R.idx--;renderStep();}}
function renderReview(stage,step){
  if(step.t==='vecviz'){stVecViz(stage,step);return;}
  if(step.t==='htmlviz'){stHtmlViz(stage,step);return;}
  let h='<div class="q-sub">↩ Review (already answered)</div>';
  if(step.t==='teach'){h+='<div class="q-title">'+step.h+'</div>';step.body.forEach(b=>h+=blockHTML(b));}
  else if(step.t==='mcq'){h+='<div class="q-title">'+step.q+'</div><div class="opts">';step.o.forEach((o,i)=>{h+='<div class="opt '+(i===step.a?'correct':'dim')+'">'+o+'</div>';});h+='</div>';if(step.why)h+='<div class="rev-note">✅ '+step.why+'</div>';}
  else if(step.t==='sort'){h+='<div class="q-title">'+step.q+'</div><div class="rev-list">'+step.items.map(it=>'<div>'+it.text+' → <b>'+step.buckets[it.b]+'</b></div>').join('')+'</div>';}
  else if(step.t==='match'){h+='<div class="q-title">'+step.q+'</div><div class="rev-list">'+step.pairs.map(p=>'<div>'+p[0]+' &nbsp;↔&nbsp; <b>'+p[1]+'</b></div>').join('')+'</div>';}
  else if(step.t==='order'){h+='<div class="q-title">'+step.q+'</div><div class="rev-list">'+step.items.map((t,n)=>'<div><b>'+(n+1)+'.</b> '+t+'</div>').join('')+'</div>';}
  else if(step.t==='build'){h+='<div class="q-title">'+step.q+'</div><div class="rev-list">'+step.correct.map(i=>'<div>✓ '+step.options[i]+'</div>').join('')+'</div>';}
  else if(step.t==='cloze'){h+='<div class="q-title">'+(step.q||'')+'</div><div class="rev-fill">'+step.text.map(t=>typeof t==='string'?t:'<b>'+t.blank+'</b>').join('')+'</div>';}
  else if(step.t==='recall'){h+='<div class="q-title">'+step.q+'</div><div class="model"><h4>Model answer</h4><ul>'+step.model.map(x=>'<li>'+x+'</li>').join('')+'</ul></div>';}
  stage.innerHTML=h;
  footBtn('Next →',nextStep);
}

function showCombo(){
  if(R.combo>=2){const c=document.getElementById('combo');if(c){c.textContent='🔥 '+R.combo+' combo!';c.classList.add('show');setTimeout(()=>c.classList.remove('show'),900);}}
}

function nextStep(){R.idx++;if(R.idx>R.frontier)R.frontier=R.idx;renderStep();}

/* ---------- step: htmlviz (embedded HTML/CSS widget with a scoped setup fn) ---------- */
function stHtmlViz(stage,step){
  stage.innerHTML='<div class="q-sub">🎬 Visualize</div><div class="q-title">'+step.h+'</div><div class="htmlviz">'+step.html+'</div>';
  const root=stage.querySelector('.htmlviz');
  if(step.setup){try{step.setup(root,vizStepper);}catch(e){}}
  footBtn('Got it',()=>nextStep());
}
/* reusable prev/next stepper for htmlviz widgets. Panels (class panelClass) are pre-rendered in the html; this toggles visibility + dots + label. */
function vizStepper(root,n,opts){
  opts=opts||{};let cur=0;
  const dots=root.querySelector('.hv-dots');
  if(dots)for(let i=0;i<n;i++){const d=document.createElement('span');d.className='hv-dot';dots.appendChild(d);}
  const panels=root.querySelectorAll('.'+opts.panelClass);
  const prev=root.querySelector('.hv-prev'),next=root.querySelector('.hv-next'),lbl=root.querySelector('.hv-lbl');
  function show(){
    panels.forEach((p,i)=>{p.style.display=i===cur?'':'none';});
    root.querySelectorAll('.hv-dot').forEach((d,i)=>d.classList.toggle('on',i===cur));
    if(lbl&&opts.labels)lbl.textContent=opts.labels[cur];
    if(prev)prev.disabled=cur===0;
    if(next)next.disabled=cur===n-1;
  }
  if(prev)prev.addEventListener('click',()=>{if(cur>0){cur--;show();}});
  if(next)next.addEventListener('click',()=>{if(cur<n-1){cur++;show();}});
  show();
}

/* feedback bar + advance */
function feedback(ok,msg,onNext){
  const bar=document.createElement('div');
  bar.className='feedback '+(ok?'good':'bad');
  bar.innerHTML='<div class="inner"><h4>'+(ok?'✅ Nice!':'❌ Not quite')+'</h4><p>'+msg+'</p><button class="btn '+(ok?'':'red')+'" id="contBtn">Continue</button></div>';
  APP().appendChild(bar);
  let done=false;
  const go=()=>{if(done)return;done=true;clearTimeout(tm);bar.remove();onNext();};
  document.getElementById('contBtn').onclick=go;
  // auto-advance on a correct answer; wrong answers wait so you can read the explanation
  const tm=ok?setTimeout(go,3500):null;
}

/* heart / xp / combo bookkeeping for graded steps */
function grade(ok,gain){
  R.graded++;
  if(ok){R.correct++;R.combo++;R.maxCombo=Math.max(R.maxCombo,R.combo);const bonus=Math.max(0,R.combo-1)*2;R.xp+=gain+bonus;showCombo();}
  else{R.combo=0;R.hearts--;R.mistakes++;}
  const heartEl=document.querySelector('.lhearts');if(heartEl)heartEl.textContent='❤️ '+R.hearts;
}

/* mistake bank — records graded steps you miss, removes them once mastered */
function sigOf(step){return step.q?(step.t+'|'+step.q):(step.t+'|'+JSON.stringify(step.text||step.items||step.pairs||step.options||''));}
function finishGraded(step,perfect){
  const sig=sigOf(step);
  if(perfect){if(S.mistakes[sig])delete S.mistakes[sig];}
  else{const c=Object.assign({},step);delete c.__d;S.mistakes[sig]=c;}
  save();
}

/* ---------- step: teach ---------- */
function blockHTML(b){
  if(b.k==='tldr')return '<div class="tldr"><span class="tag">TL;DR</span><span>'+b.t+'</span></div>';
  if(b.k==='point')return '<div class="point"><span class="pi">'+b.i+'</span><span>'+b.t+'</span></div>';
  if(b.k==='cause')return '<div class="cause"><div class="box">'+b.a+'</div><div class="arrow">→</div><div class="box">'+b.b+'</div></div>';
  if(b.k==='vs')return '<div class="vs"><div class="col a"><h4>'+b.a.h+'</h4>'+b.a.t+'</div><div class="col b"><h4>'+b.b.h+'</h4>'+b.b.t+'</div></div>';
  if(b.k==='keyt')return '<div class="keyt"><b>'+b.term+'</b> — '+b.def+'</div>';
  if(b.k==='callout')return '<div class="callout '+b.c+'"><span>'+(b.c==='warn'?'⚠️':b.c==='mem'?'🧠':'💡')+'</span><span>'+b.t+'</span></div>';
  if(b.k==='note')return '<div class="callout note"><span>💡</span><span>'+b.t+'</span></div>';
  if(b.k==='mnemonic')return '<div class="callout mem"><span>🧠</span><span>'+b.t+'</span></div>';
  return '';
}
function stTeach(stage,step){
  let h='<div class="q-sub">📘 Learn</div><div class="q-title">'+step.h+'</div>';
  step.body.forEach(b=>h+=blockHTML(b));
  stage.innerHTML=h;
  footBtn('Got it',()=>nextStep());
}

/* ---------- step: vecviz (interactive version-vector walkthrough) ---------- */
function stVecViz(stage,step){
  const nodes=step.nodes,frames=step.frames,nc=['na','nb','nc'];
  let f=0;
  const legend='each clock = [ '+nodes.map((n,i)=>'<span class="vv-tag '+nc[i]+'">'+n+'</span>').join(' , ')+' ]';
  function draw(){
    const fr=frames[f];
    let h='<div class="q-sub">🎬 Watch it run · use ← → to step</div><div class="q-title">'+step.h+'</div>';
    h+='<div class="vv-legend">'+legend+'</div>';
    h+='<div class="vv-cap">'+fr.cap+'</div>';
    h+='<div class="vv-grid">';
    nodes.forEach((nm,r)=>{
      const sending=fr.msg&&fr.msg.from===r,receiving=fr.msg&&fr.msg.to===r;
      h+='<div class="vv-row">';
      h+='<div class="vv-node '+nc[r]+'">'+nm+'</div>';
      h+='<div class="vv-vec">[ ';
      fr.v[r].forEach((val,c)=>{
        const hot=(fr.hi||[]).some(p=>p[0]===r&&p[1]===c);
        h+='<span class="vv-cell'+(hot?' hot':'')+'">'+val+'</span>';
        h+=c<fr.v[r].length-1?'<span class="vv-comma">, </span>':'';
      });
      h+=' ]</div>';
      if(sending)h+='<div class="vv-tagmsg out">sends ✉️</div>';
      else if(receiving)h+='<div class="vv-tagmsg in">📥 incoming…</div>';
      h+='</div>';
    });
    h+='</div>';
    if(fr.msg)h+='<div class="vv-msg">✉️ <b>'+nodes[fr.msg.from]+' → '+nodes[fr.msg.to]+'</b> &nbsp;carries clock '+fr.msg.label+'</div>';
    if(fr.verdict)h+='<div class="vv-verdict '+fr.verdict.cls+'">'+fr.verdict.t+'</div>';
    if(step.rule)h+='<div class="vv-rule">📏 '+step.rule+'</div>';
    h+='<div class="vv-nav"><button class="vv-btn" id="vzPrev"'+(f===0?' disabled':'')+'>← Prev</button>';
    h+='<div class="vv-dots">';
    frames.forEach((_,i)=>h+='<span class="vv-dot'+(i===f?' on':i<f?' seen':'')+'"></span>');
    h+='</div><button class="vv-btn" id="vzNext"'+(f===frames.length-1?' disabled':'')+'>Next →</button></div>';
    stage.innerHTML=h;
    const p=document.getElementById('vzPrev'),n=document.getElementById('vzNext');
    if(p)p.onclick=()=>{if(f>0){f--;draw();}};
    if(n)n.onclick=()=>{if(f<frames.length-1){f++;draw();}};
  }
  draw();
  footBtn('Got it',()=>nextStep());
}

/* ---------- step: mcq ---------- */
function stMcq(stage,step){
  let h='<div class="q-sub">'+(step.boss?'⚡ Speed round':'🧩 Quick check')+'</div><div class="q-title">'+step.q+'</div><div class="opts">';
  step.o.forEach((o,i)=>h+='<button class="opt" data-i="'+i+'">'+o+'</button>');
  h+='</div>';stage.innerHTML=h;
  let locked=false;
  stage.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{
    if(locked)return;locked=true;
    const i=+b.dataset.i, ok=i===step.a;
    stage.querySelectorAll('.opt').forEach((x,j)=>{x.classList.add('dim');if(j===step.a)x.classList.add('correct');});
    b.classList.remove('dim');b.classList.add(ok?'correct':'wrong');
    grade(ok,10);finishGraded(step,ok);
    if(R.hearts<=0&&!ok){setTimeout(()=>finishRun(false),650);return;}
    if(step.boss){setTimeout(()=>nextStep(),ok?550:900);}
    else feedback(ok,ok?(step.why||'Correct.'):(step.why||'Review and continue.'),nextStep);
  });
}

/* ---------- step: sort ---------- */
function stSort(stage,step){
  let qi=0,wrong=0;const items=shuffle(step.items);
  function draw(){
    if(qi>=items.length){finishGraded(step,wrong===0);nextStep();return;}
    const it=items[qi];
    let locked=false;
    stage.innerHTML='<div class="q-sub">👆 Sort it</div><div class="q-title">'+step.q+'</div>'
      +'<div class="sortcard" id="sc">'+it.text+'</div>'
      +'<div class="bucketrow"><button class="btn grey" data-b="0">'+step.buckets[0]+'</button><button class="btn blue" data-b="1">'+step.buckets[1]+'</button></div>';
    stage.querySelectorAll('[data-b]').forEach(btn=>btn.onclick=()=>{
      if(locked)return;locked=true;
      const b=+btn.dataset.b, ok=b===it.b;
      const sc=document.getElementById('sc');
      sc.classList.add(ok?'flash-g':'flash-r');
      grade(ok,6);if(!ok)wrong++;
      if(!ok)sc.textContent=it.text+'  →  '+step.buckets[it.b];
      if(R.hearts<=0&&!ok){setTimeout(()=>finishRun(false),700);return;}
      setTimeout(()=>{qi++;draw();},ok?420:950);
    });
  }
  draw();
}

/* ---------- step: match ---------- */
function stMatch(stage,step){
  const L=shuffle(step.pairs.map((p,i)=>({t:p[0],i})));
  const Rr=shuffle(step.pairs.map((p,i)=>({t:p[1],i})));
  let h='<div class="q-sub">🔗 Match pairs</div><div class="q-title">'+step.q+'</div><div class="matchgrid"><div class="matchcol" id="mL"></div><div class="matchcol" id="mR"></div></div>';
  stage.innerHTML=h;
  const cL=document.getElementById('mL'),cR=document.getElementById('mR');
  L.forEach(x=>{const b=document.createElement('button');b.className='mitem';b.textContent=x.t;b.dataset.i=x.i;b.dataset.side='L';cL.appendChild(b);});
  Rr.forEach(x=>{const b=document.createElement('button');b.className='mitem';b.textContent=x.t;b.dataset.i=x.i;b.dataset.side='R';cR.appendChild(b);});
  let selL=null,selR=null,left=step.pairs.length,wrong=0;
  function clearSel(){selL&&selL.classList.remove('sel');selR&&selR.classList.remove('sel');selL=selR=null;}
  function tryMatch(){
    if(!selL||!selR)return;
    if(selL.dataset.i===selR.dataset.i){
      [selL,selR].forEach(e=>{e.classList.remove('sel');e.classList.add('done');e.disabled=true;});
      grade(true,7);clearSel();left--;
      if(left===0){finishGraded(step,wrong===0);setTimeout(()=>nextStep(),450);}
    }else{
      const a=selL,b=selR;a.classList.add('bad');b.classList.add('bad');grade(false,0);wrong++;
      setTimeout(()=>{a.classList.remove('bad','sel');b.classList.remove('bad','sel');},350);clearSel();
      if(R.hearts<=0)setTimeout(()=>finishRun(false),500);
    }
  }
  stage.querySelectorAll('.mitem').forEach(b=>b.onclick=()=>{
    if(b.classList.contains('done'))return;
    if(b.dataset.side==='L'){selL&&selL.classList.remove('sel');selL=b;}
    else{selR&&selR.classList.remove('sel');selR=b;}
    b.classList.add('sel');tryMatch();
  });
}

/* ---------- step: order ---------- */
function stOrder(stage,step){
  const correct=step.items;
  const bank=shuffle(correct.map((t,i)=>({t,i})));
  let placed=[];
  function draw(){
    let h='<div class="q-sub">🔢 Put in order</div><div class="q-title">'+step.q+'</div>';
    h+='<div class="orderzone" id="zone">'+(placed.length?'':'<span class="muted" style="font-weight:700;font-size:13px">tap chips below in order…</span>')+'</div>';
    h+='<div class="bank" id="bank"></div>';
    stage.innerHTML=h;
    const zone=document.getElementById('zone');zone.innerHTML=placed.length?'':zone.innerHTML;
    placed.forEach((p,n)=>{const d=document.createElement('div');d.className='chip placed';d.innerHTML='<span class="num">'+(n+1)+'</span>'+p.t;zone.appendChild(d);});
    const bk=document.getElementById('bank');
    bank.forEach(b=>{if(placed.find(p=>p.id===b.i))return;const el=document.createElement('button');el.className='chip';el.textContent=b.t;el.onclick=()=>{placed.push({t:b.t,id:b.i});if(placed.length===correct.length)check();else draw();};bk.appendChild(el);});
    if(placed.length){footBtn('Undo last',()=>{placed.pop();draw();},'grey');}
  }
  function check(){
    let ok=placed.every((p,n)=>p.id===n);
    grade(ok,16);finishGraded(step,ok);
    let h='<div class="q-sub">🔢 Put in order</div><div class="q-title">'+step.q+'</div><div class="bank">';
    placed.forEach((p,n)=>{const right=p.id===n;h+='<div class="chip '+(right?'ok':'no')+'"><span class="num">'+(n+1)+'</span>'+p.t+(right?'  ✓':'  ✗')+'</div>';});
    h+='</div>';stage.innerHTML=h;
    clearFoot();
    if(R.hearts<=0&&!ok){setTimeout(()=>finishRun(false),700);return;}
    feedback(ok,ok?'Perfect order!':'Correct order: '+correct.join(' → '),nextStep);
  }
  draw();
}

/* ---------- step: build (multi-select) ---------- */
function stBuild(stage,step){
  const sel=new Set();
  let h='<div class="q-sub">🛠️ Build it</div><div class="q-title">'+step.q+'</div><div class="buildgrid" id="bg"></div>';
  stage.innerHTML=h;
  const bg=document.getElementById('bg');
  step.options.forEach((o,i)=>{const b=document.createElement('button');b.className='bopt';b.textContent=o;b.onclick=()=>{if(sel.has(i)){sel.delete(i);b.classList.remove('on');}else{sel.add(i);b.classList.add('on');}};bg.appendChild(b);});
  footBtn('Check',()=>{
    const correct=new Set(step.correct);
    const ok=sel.size===correct.size&&[...sel].every(i=>correct.has(i));
    bg.querySelectorAll('.bopt').forEach((b,i)=>{b.disabled=true;b.classList.remove('on');if(correct.has(i))b.classList.add('good');else if(sel.has(i))b.classList.add('miss');});
    grade(ok,16);finishGraded(step,ok);clearFoot();
    if(R.hearts<=0&&!ok){setTimeout(()=>finishRun(false),700);return;}
    feedback(ok,ok?'Exactly the right set!':'Green = correct picks.',nextStep);
  });
}

/* ---------- step: recall (output / explain) ---------- */
function stRecall(stage,step){
  let h='<div class="q-sub">🗣️ Explain it (out loud!)</div><div class="q-title">'+step.q+'</div>'
    +'<div class="recall"><textarea id="ra" placeholder="Optional: jot your answer or say it aloud, then reveal."></textarea></div>';
  stage.innerHTML=h;
  footBtn('Reveal model answer',()=>{
    stopTimer(); // self-graded from here — stop the clock while you read + judge
    const tEl=document.querySelector('.timer');if(tEl)tEl.classList.add('paused');
    const m=document.createElement('div');m.className='model';
    m.innerHTML='<h4>Model answer</h4><ul>'+step.model.map(x=>'<li>'+x+'</li>').join('')+'</ul>'
      +'<div class="gradebtns"><button class="btn" data-g="2">Nailed it</button><button class="btn blue" data-g="1">Partly</button><button class="btn grey" data-g="0">Missed</button></div>';
    document.getElementById('stage').appendChild(m);
    clearFoot();
    m.querySelectorAll('[data-g]').forEach(b=>b.onclick=()=>{
      const g=+b.dataset.g;
      // recall is self-graded → kept OUT of the accuracy % (graded/correct untouched), but still earns XP + tracks recallNailed
      R.xp+= (g===2?15:g===1?8:3);
      if(g===2){S.recallNailed=(S.recallNailed||0)+1;}
      else{R.mistakes++;} // a self-acknowledged miss means the run isn't flawless (no flawless bonus / gold)
      // Partly / Missed → log for review; Nailed it → clears it from the review queue
      finishGraded(step,g===2);
      nextStep();
    });
  });
}

/* ---------- step: cloze (masked fill-in) ---------- */
function stCloze(stage,step){
  const tokens=step.text;
  const slotPos=[];tokens.forEach((t,i)=>{if(typeof t!=='string')slotPos.push(i);});
  const answers=slotPos.map(i=>tokens[i].blank);
  const bank=shuffle(answers.concat(step.distract||[]).map((w,i)=>({w,used:false,id:i})));
  const filled={};
  const norm=s=>String(s).toLowerCase().replace(/[^a-z0-9+>]/g,'');
  function nextEmpty(){for(let p=0;p<slotPos.length;p++)if(filled[p]==null)return p;return -1;}
  function allFilled(){return slotPos.every((_,p)=>filled[p]!=null);}
  function draw(){
    let h='<div class="q-sub">🧩 Masked recall — fill the blanks</div>';
    if(step.q)h+='<div class="q-title" style="font-size:17px">'+step.q+'</div>';
    h+='<div class="cloze">';let p=0;
    tokens.forEach(t=>{
      if(typeof t==='string'){h+='<span>'+t+'</span>';}
      else{const pos=p++;const bid=filled[pos];const w=bid!=null?bank.find(x=>x.id===bid).w:'';h+='<button class="slot'+(w?' filled':'')+'" data-p="'+pos+'">'+(w||'_____')+'</button>';}
    });
    h+='</div><div class="wordbank" id="wb"></div>';
    stage.innerHTML=h;
    const wb=document.getElementById('wb');
    bank.forEach(b=>{const c=document.createElement('button');c.className='word';c.textContent=b.w;c.disabled=b.used;c.onclick=()=>{const e=nextEmpty();if(e<0)return;filled[e]=b.id;b.used=true;draw();};wb.appendChild(c);});
    stage.querySelectorAll('.slot').forEach(s=>s.onclick=()=>{const pos=+s.dataset.p;if(filled[pos]!=null){bank.find(x=>x.id===filled[pos]).used=false;delete filled[pos];draw();}});
    if(allFilled())footBtn('Check',check);else clearFoot();
  }
  function check(){
    let ok=true;
    slotPos.forEach((ti,p)=>{const ans=tokens[ti];const got=bank.find(x=>x.id===filled[p]).w;const good=norm(got)===norm(ans.blank)||(ans.alt||[]).some(a=>norm(a)===norm(got));if(!good)ok=false;});
    stage.querySelectorAll('.slot').forEach(s=>{const p=+s.dataset.p;const ans=tokens[slotPos[p]];const got=bank.find(x=>x.id===filled[p]).w;const good=norm(got)===norm(ans.blank)||(ans.alt||[]).some(a=>norm(a)===norm(got));s.classList.add(good?'sgood':'sbad');s.disabled=true;if(!good)s.textContent=ans.blank;});
    stage.querySelectorAll('#wb .word').forEach(c=>c.disabled=true);
    grade(ok,14);finishGraded(step,ok);clearFoot();
    if(R.hearts<=0&&!ok){setTimeout(()=>finishRun(false),700);return;}
    feedback(ok,ok?'Every blank correct — that’s the real text, locked in.':'Filled the right words in for you — read the full sentence once more.',nextStep);
  }
  draw();
}

/* ---------- footer button helpers ---------- */
function footBtn(label,fn,cls){
  clearFoot();
  const bar=document.createElement('div');bar.className='footbar';bar.id='footbar';
  bar.innerHTML='<div class="inner"><button class="btn '+(cls||'')+'" id="fbtn">'+label+'</button></div>';
  APP().appendChild(bar);document.getElementById('fbtn').onclick=fn;
}
function clearFoot(){const f=document.getElementById('footbar');if(f)f.remove();}

/* ============================ RESULTS ============================ */
function finishRun(timedOut){
  stopTimer();
  if(R.mode==='review'){commitRun(true);return resultsScreen(true);}
  if(R.mode==='boss'){
    const ok = !timedOut && R.hearts>0 && acc()>=0.6;
    if(ok){S.done['boss-'+R.unit.id]=true;recordResult('boss-'+R.unit.id);commitRun(true);}
    else{commitRun(false);}
    return resultsScreen(ok);
  }
  if(R.hearts>0&&!timedOut){S.done[R.lesson.id]=true;recordResult(R.lesson.id);commitRun(true);resultsScreen(true);}
  else{commitRun(false);resultsScreen(false);}
}
function recordResult(id){
  const flawless=R.mistakes===0 && R.correct===R.graded;
  S.perfect[id]=S.perfect[id]||flawless;
  S.best[id]=Math.max(S.best[id]||0, R.graded?Math.round(R.correct/R.graded*100):100);
}
function acc(){return R.graded?R.correct/R.graded:0;}
function commitRun(success){
  if(success){
    R.xp+=20; // completion bonus
    if(R.mistakes===0){R.xp+=20;S.flawless=true;}
  }
  S.xp+=R.xp;
  save();checkBadges();
}
function resultsScreen(success){
  stopTimer();
  let h;
  if(success){
    const a=Math.round(acc()*100);
    h='<div class="center"><div class="big">🎉</div><h2>'+(R.mode==='boss'?'Boss defeated!':'Quest complete!')+'</h2>'
      +'<p>'+(R.mistakes===0?'Flawless run — perfect!':'Nice work. Keep the streak going!')+'</p>'
      +'<div class="statrow">'
      +'<div class="statbox xp"><div class="v">+'+R.xp+'</div><div class="l">XP</div></div>'
      +'<div class="statbox combo"><div class="v">'+R.maxCombo+'</div><div class="l">Max combo</div></div>'
      +'<div class="statbox acc"><div class="v">'+a+'%</div><div class="l">Accuracy</div></div>'
      +'</div>';
    h+='<button class="btn" id="homeBtn">Continue</button></div>';
  }else{
    h='<div class="center"><div class="big">💔</div><h2>Out of hearts</h2>'
      +'<p>'+(R.mode==='boss'?'The boss got you this time.':'Almost! Review and try again — you’ve got this.')+'</p>'
      +'<div class="statrow"><div class="statbox xp"><div class="v">+'+R.xp+'</div><div class="l">XP earned</div></div></div>';
    h+='<button class="btn blue" id="retryBtn">Try again</button><div style="height:12px"></div><button class="btn grey" id="homeBtn">Back to map</button></div>';
  }
  clearFoot();APP().innerHTML=h;
  const hb=document.getElementById('homeBtn');if(hb)hb.onclick=()=>renderHome(true);
  const rb=document.getElementById('retryBtn');if(rb)rb.onclick=()=>{R.mode==='boss'?startBoss(R.unit.id):R.mode==='review'?(R.source==='recall'?startRecallReview():R.source==='unitrecall'?startUnitRecall(R.unit.id):startReview()):startLesson(R.lesson.id);};
  if(success){burst();}
}
function burst(){
  const t=document.getElementById('toast');
  // lightweight celebratory toast already; add confetti emojis
  toast('🎊 +'+R.xp+' XP'+(levelOf(S.xp)>levelOf(S.xp-R.xp)?'  —  Level up!':''));
}

/* ============================ keyboard control ============================ */
function keyAction(e){
  if(e.metaKey||e.ctrlKey||e.altKey)return;
  const tag=(e.target&&e.target.tagName)||'';
  if(tag==='INPUT'||tag==='TEXTAREA')return; // let typing work (recall textarea)
  const k=e.key;
  if(k==='Escape'){const q=document.getElementById('quitBtn');if(q){q.click();e.preventDefault();}return;}
  if(k==='Backspace'){const b=document.getElementById('backBtn');if(b){b.click();e.preventDefault();}return;}
  // recall self-grade after reveal: 1=Nailed, 2=Partly, 3=Missed
  const grades=document.querySelectorAll('.gradebtns [data-g]');
  if(grades.length){const map={'1':'2','2':'1','3':'0'};if(map[k]){const b=document.querySelector('.gradebtns [data-g="'+map[k]+'"]');if(b){b.click();e.preventDefault();}}return;}
  // feedback Continue bar
  const cont=document.getElementById('contBtn');
  if(cont){if(k==='Enter'||k===' '){cont.click();e.preventDefault();}return;}
  // MCQ options 1..N (only before answering)
  const opts=document.querySelectorAll('.opts .opt');
  if(opts.length){
    if(!document.querySelector('.opt.dim,.opt.correct,.opt.wrong')){const n=parseInt(k,10);if(n>=1&&n<=opts.length){opts[n-1].click();e.preventDefault();}}
    return;
  }
  // sort buckets: 1/← and 2/→
  const buckets=document.querySelectorAll('.bucketrow [data-b]');
  if(buckets.length){if(k==='1'||k==='ArrowLeft'){buckets[0].click();e.preventDefault();}else if(k==='2'||k==='ArrowRight'){buckets[1].click();e.preventDefault();}return;}
  // build: number toggles, Enter checks
  const bopts=document.querySelectorAll('#bg .bopt');
  if(bopts.length){
    const n=parseInt(k,10);
    if(n>=1&&n<=bopts.length){if(!bopts[n-1].disabled){bopts[n-1].click();e.preventDefault();}return;}
    if(k==='Enter'||k===' '){const fb=document.getElementById('fbtn');if(fb){fb.click();e.preventDefault();}return;}
  }
  // vecviz frame stepping with ← →
  const vzP=document.getElementById('vzPrev'),vzN=document.getElementById('vzNext');
  if(vzP&&vzN){if(k==='ArrowLeft'){if(!vzP.disabled)vzP.click();e.preventDefault();return;}if(k==='ArrowRight'){if(!vzN.disabled)vzN.click();e.preventDefault();return;}}
  // generic footer (Got it / Reveal / Check / Next) — but never auto-Undo
  const fb=document.getElementById('fbtn');
  if(fb&&(k==='Enter'||k===' ')&&!/undo/i.test(fb.textContent)){fb.click();e.preventDefault();}
}
document.addEventListener('keydown',keyAction);

/* ============================ boot ============================ */
renderHome(true);
</script>
</body>
</html>

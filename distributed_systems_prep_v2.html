}
function startBoss(uid){
  const u=UNITS.find(x=>x.id===uid);
  const steps=shuffle(u.boss.q).map(q=>({t:'mcq',q:q.q,o:q.o,a:q.a,boss:true}));
  R={mode:'boss',unit:u,bossTitle:u.boss.title,steps,idx:0,frontier:0,hearts:HEARTS,combo:0,maxCombo:0,xp:0,correct:0,graded:0,mistakes:0,time:u.boss.time,timeLeft:u.boss.time};
  startTimer();
  renderStep();
}
function startReview(){
  const steps=shuffle(Object.values(S.mistakes)).slice(0,15);
  if(!steps.length){toast('No mistakes to review — nice! 🎉');return;}
  R={mode:'review',unit:{id:'review'},steps,idx:0,frontier:0,hearts:99,combo:0,maxCombo:0,xp:0,correct:0,graded:0,mistakes:0};
  renderStep();
}

let timerH=null;
function startTimer(){
  stopTimer();
  timerH=setInterval(()=>{
    R.timeLeft--;
    const el=document.getElementById('timerTxt');
    if(el){el.textContent=R.timeLeft+'s';el.parentElement.classList.toggle('low',R.timeLeft<=15);}
    if(R.timeLeft<=0){stopTimer();finishRun(true);}
  },1000);
}
function stopTimer(){if(timerH){clearInterval(timerH);timerH=null;}}

function topbarHTML(){
  const pct=Math.round(R.idx/R.steps.length*100);
  let right='';
  if(R.mode==='boss'){right='<div class="timer"><span>⏱️</span><span id="timerTxt">'+R.timeLeft+'s</span></div>';}
  const back=(R.idx>0&&R.mode!=='boss')?'<button class="lback" id="backBtn" title="Previous">←</button>':'';
  return '<div class="lhead">'
    +'<button class="close" id="quitBtn">×</button>'
    +back
    +'<div class="pbar"><i style="width:'+pct+'%"></i></div>'
    +'<div class="lhearts">❤️ '+R.hearts+'</div>'
    +right+'</div>';
}

function renderStep(){
  if(R.idx>=R.steps.length){finishRun(false);return;}
  const step=R.steps[R.idx];
  let h=topbarHTML()+'<div class="stage" id="stage"></div>';
  h+='<div class="combo" id="combo"></div>';
  APP().innerHTML=h;
  document.getElementById('quitBtn').onclick=()=>{stopTimer();if(confirm('Quit this quest? Progress in it will be lost.'))renderHome();else if(R.mode==='boss')startTimer();};
  const bb=document.getElementById('backBtn');if(bb)bb.onclick=backStep;
  const stage=document.getElementById('stage');
  if(R.idx<R.frontier){renderReview(stage,step);}
  else{({teach:stTeach,mcq:stMcq,sort:stSort,match:stMatch,order:stOrder,build:stBuild,recall:stRecall,cloze:stCloze,vecviz:stVecViz}[step.t])(stage,step);}
  try{window.scrollTo(0,0);}catch(e){}
}
function backStep(){if(R.idx>0){R.idx--;renderStep();}}
function renderReview(stage,step){
  if(step.t==='vecviz'){stVecViz(stage,step);return;}
  let h='<div class="q-sub">↩ Review (already answered)</div>';
  if(step.t==='teach'){h+='<div class="q-title">'+step.h+'</div>';step.body.forEach(b=>h+=blockHTML(b));}
  else if(step.t==='mcq'){h+='<div class="q-title">'+step.q+'</div><div class="opts">';step.o.forEach((o,i)=>{h+='<div class="opt '+(i===step.a?'correct':'dim')+'">'+o+'</div>';});h+='</div>';if(step.why)h+='<div class="rev-note">✅ '+step.why+'</div>';}
  else if(step.t==='sort'){h+='<div class="q-title">'+step.q+'</div><div class="rev-list">'+step.items.map(it=>'<div>'+it.text+' → <b>'+step.buckets[it.b]+'</b></div>').join('')+'</div>';}
  else if(step.t==='match'){h+='<div class="q-title">'+step.q+'</div><div class="rev-list">'+step.pairs.map(p=>'<div>'+p[0]+' &nbsp;↔&nbsp; <b>'+p[1]+'</b></div>').join('')+'</div>';}
  else if(step.t==='order'){h+='<div class="q-title">'+step.q+'</div><div class="rev-list">'+step.items.map((t,n)=>'<div><b>'+(n+1)+'.</b> '+t+'</div>').join('')+'</div>';}
  else if(step.t==='build'){h+='<div class="q-title">'+step.q+'</div><div class="rev-list">'+step.correct.map(i=>'<div>✓ '+step.options[i]+'</div>').join('')+'</div>';}
  else if(step.t==='cloze'){h+='<div class="q-title">'+(step.q||'')+'</div><div class="rev-fill">'+step.text.map(t=>typeof t==='string'?t:'<b>'+t.blank+'</b>').join('')+'</div>';}
  else if(step.t==='recall'){h+='<div class="q-title">'+step.q+'</div><div class="model"><h4>Model answer</h4><ul>'+step.model.map(x=>'<li>'+x+'</li>').join('')+'</ul></div>';}
  stage.innerHTML=h;
  footBtn('Next →',nextStep);
}

function showCombo(){
  if(R.combo>=2){const c=document.getElementById('combo');if(c){c.textContent='🔥 '+R.combo+' combo!';c.classList.add('show');setTimeout(()=>c.classList.remove('show'),900);}}
}

function nextStep(){R.idx++;if(R.idx>R.frontier)R.frontier=R.idx;renderStep();}

/* feedback bar + advance */
function feedback(ok,msg,onNext){
  const bar=document.createElement('div');
  bar.className='feedback '+(ok?'good':'bad');
  bar.innerHTML='<div class="inner"><h4>'+(ok?'✅ Nice!':'❌ Not quite')+'</h4><p>'+msg+'</p><button class="btn '+(ok?'':'red')+'" id="contBtn">Continue</button></div>';
  APP().appendChild(bar);
  let done=false;
  const go=()=>{if(done)return;done=true;clearTimeout(tm);bar.remove();onNext();};
  document.getElementById('contBtn').onclick=go;
  // auto-advance on a correct answer; wrong answers wait so you can read the explanation
  const tm=ok?setTimeout(go,1300):null;
}

/* heart / xp / combo bookkeeping for graded steps */
function grade(ok,gain){
  R.graded++;
  if(ok){R.correct++;R.combo++;R.maxCombo=Math.max(R.maxCombo,R.combo);const bonus=Math.max(0,R.combo-1)*2;R.xp+=gain+bonus;showCombo();}
  else{R.combo=0;R.hearts--;R.mistakes++;}
  const heartEl=document.querySelector('.lhearts');if(heartEl)heartEl.textContent='❤️ '+R.hearts;
}

/* mistake bank — records graded steps you miss, removes them once mastered */
function sigOf(step){return step.q?(step.t+'|'+step.q):(step.t+'|'+JSON.stringify(step.text||step.items||step.pairs||step.options||''));}
function finishGraded(step,perfect){
  const sig=sigOf(step);
  if(perfect){if(S.mistakes[sig])delete S.mistakes[sig];}
  else{const c=Object.assign({},step);delete c.__d;S.mistakes[sig]=c;}
  save();
}

/* ---------- step: teach ---------- */
function blockHTML(b){
  if(b.k==='tldr')return '<div class="tldr"><span class="tag">TL;DR</span><span>'+b.t+'</span></div>';
  if(b.k==='point')return '<div class="point"><span class="pi">'+b.i+'</span><span>'+b.t+'</span></div>';
  if(b.k==='cause')return '<div class="cause"><div class="box">'+b.a+'</div><div class="arrow">→</div><div class="box">'+b.b+'</div></div>';
  if(b.k==='vs')return '<div class="vs"><div class="col a"><h4>'+b.a.h+'</h4>'+b.a.t+'</div><div class="col b"><h4>'+b.b.h+'</h4>'+b.b.t+'</div></div>';
  if(b.k==='keyt')return '<div class="keyt"><b>'+b.term+'</b> — '+b.def+'</div>';
  if(b.k==='callout')return '<div class="callout '+b.c+'"><span>'+(b.c==='warn'?'⚠️':b.c==='mem'?'🧠':'💡')+'</span><span>'+b.t+'</span></div>';
  if(b.k==='note')return '<div class="callout note"><span>💡</span><span>'+b.t+'</span></div>';
  if(b.k==='mnemonic')return '<div class="callout mem"><span>🧠</span><span>'+b.t+'</span></div>';
  return '';
}
function stTeach(stage,step){
  let h='<div class="q-sub">📘 Learn</div><div class="q-title">'+step.h+'</div>';
  step.body.forEach(b=>h+=blockHTML(b));
  stage.innerHTML=h;
  footBtn('Got it',()=>nextStep());
}

/* ---------- step: vecviz (interactive version-vector walkthrough) ---------- */
function stVecViz(stage,step){
  const nodes=step.nodes,frames=step.frames,nc=['na','nb','nc'];
  let f=0;
  const legend='each clock = [ '+nodes.map((n,i)=>'<span class="vv-tag '+nc[i]+'">'+n+'</span>').join(' , ')+' ]';
  function draw(){
    const fr=frames[f];
    let h='<div class="q-sub">🎬 Watch it run · use ← → to step</div><div class="q-title">'+step.h+'</div>';
    h+='<div class="vv-legend">'+legend+'</div>';
    h+='<div class="vv-cap">'+fr.cap+'</div>';
    h+='<div class="vv-grid">';
    nodes.forEach((nm,r)=>{
      const sending=fr.msg&&fr.msg.from===r,receiving=fr.msg&&fr.msg.to===r;
      h+='<div class="vv-row">';
      h+='<div class="vv-node '+nc[r]+'">'+nm+'</div>';
      h+='<div class="vv-vec">[ ';
      fr.v[r].forEach((val,c)=>{
        const hot=(fr.hi||[]).some(p=>p[0]===r&&p[1]===c);
        h+='<span class="vv-cell'+(hot?' hot':'')+'">'+val+'</span>';
        h+=c<fr.v[r].length-1?'<span class="vv-comma">, </span>':'';
      });
      h+=' ]</div>';
      if(sending)h+='<div class="vv-tagmsg out">sends ✉️</div>';
      else if(receiving)h+='<div class="vv-tagmsg in">📥 incoming…</div>';
      h+='</div>';
    });
    h+='</div>';
    if(fr.msg)h+='<div class="vv-msg">✉️ <b>'+nodes[fr.msg.from]+' → '+nodes[fr.msg.to]+'</b> &nbsp;carries clock '+fr.msg.label+'</div>';
    if(fr.verdict)h+='<div class="vv-verdict '+fr.verdict.cls+'">'+fr.verdict.t+'</div>';
    if(step.rule)h+='<div class="vv-rule">📏 '+step.rule+'</div>';
    h+='<div class="vv-nav"><button class="vv-btn" id="vzPrev"'+(f===0?' disabled':'')+'>← Prev</button>';
    h+='<div class="vv-dots">';
    frames.forEach((_,i)=>h+='<span class="vv-dot'+(i===f?' on':i<f?' seen':'')+'"></span>');
    h+='</div><button class="vv-btn" id="vzNext"'+(f===frames.length-1?' disabled':'')+'>Next →</button></div>';
    stage.innerHTML=h;
    const p=document.getElementById('vzPrev'),n=document.getElementById('vzNext');
    if(p)p.onclick=()=>{if(f>0){f--;draw();}};
    if(n)n.onclick=()=>{if(f<frames.length-1){f++;draw();}};
  }
  draw();
  footBtn('Got it',()=>nextStep());
}

/* ---------- step: mcq ---------- */
function stMcq(stage,step){
  let h='<div class="q-sub">'+(step.boss?'⚡ Speed round':'🧩 Quick check')+'</div><div class="q-title">'+step.q+'</div><div class="opts">';
  step.o.forEach((o,i)=>h+='<button class="opt" data-i="'+i+'">'+o+'</button>');
  h+='</div>';stage.innerHTML=h;
  let locked=false;
  stage.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{
    if(locked)return;locked=true;
    const i=+b.dataset.i, ok=i===step.a;
    stage.querySelectorAll('.opt').forEach((x,j)=>{x.classList.add('dim');if(j===step.a)x.classList.add('correct');});
    b.classList.remove('dim');b.classList.add(ok?'correct':'wrong');
    grade(ok,10);finishGraded(step,ok);
    if(R.hearts<=0&&!ok){setTimeout(()=>finishRun(false),650);return;}
    if(step.boss){setTimeout(()=>nextStep(),ok?550:900);}
    else feedback(ok,ok?(step.why||'Correct.'):(step.why||'Review and continue.'),nextStep);
  });
}

/* ---------- step: sort ---------- */
function stSort(stage,step){
  let qi=0,wrong=0;const items=shuffle(step.items);
  function draw(){
    if(qi>=items.length){finishGraded(step,wrong===0);nextStep();return;}
    const it=items[qi];
    let locked=false;
    stage.innerHTML='<div class="q-sub">👆 Sort it</div><div class="q-title">'+step.q+'</div>'
      +'<div class="sortcard" id="sc">'+it.text+'</div>'
      +'<div class="bucketrow"><button class="btn grey" data-b="0">'+step.buckets[0]+'</button><button class="btn blue" data-b="1">'+step.buckets[1]+'</button></div>';
    stage.querySelectorAll('[data-b]').forEach(btn=>btn.onclick=()=>{
      if(locked)return;locked=true;
      const b=+btn.dataset.b, ok=b===it.b;
      const sc=document.getElementById('sc');
      sc.classList.add(ok?'flash-g':'flash-r');
      grade(ok,6);if(!ok)wrong++;
      if(!ok)sc.textContent=it.text+'  →  '+step.buckets[it.b];
      if(R.hearts<=0&&!ok){setTimeout(()=>finishRun(false),700);return;}
      setTimeout(()=>{qi++;draw();},ok?420:950);
    });
  }
  draw();
}

/* ---------- step: match ---------- */
function stMatch(stage,step){
  const L=shuffle(step.pairs.map((p,i)=>({t:p[0],i})));
  const Rr=shuffle(step.pairs.map((p,i)=>({t:p[1],i})));
  let h='<div class="q-sub">🔗 Match pairs</div><div class="q-title">'+step.q+'</div><div class="matchgrid"><div class="matchcol" id="mL"></div><div class="matchcol" id="mR"></div></div>';
  stage.innerHTML=h;
  const cL=document.getElementById('mL'),cR=document.getElementById('mR');
  L.forEach(x=>{const b=document.createElement('button');b.className='mitem';b.textContent=x.t;b.dataset.i=x.i;b.dataset.side='L';cL.appendChild(b);});
  Rr.forEach(x=>{const b=document.createElement('button');b.className='mitem';b.textContent=x.t;b.dataset.i=x.i;b.dataset.side='R';cR.appendChild(b);});
  let selL=null,selR=null,left=step.pairs.length,wrong=0;
  function clearSel(){selL&&selL.classList.remove('sel');selR&&selR.classList.remove('sel');selL=selR=null;}
  function tryMatch(){
    if(!selL||!selR)return;
    if(selL.dataset.i===selR.dataset.i){
      [selL,selR].forEach(e=>{e.classList.remove('sel');e.classList.add('done');e.disabled=true;});
      grade(true,7);clearSel();left--;
      if(left===0){finishGraded(step,wrong===0);setTimeout(()=>nextStep(),450);}
    }else{
      const a=selL,b=selR;a.classList.add('bad');b.classList.add('bad');grade(false,0);wrong++;
      setTimeout(()=>{a.classList.remove('bad','sel');b.classList.remove('bad','sel');},350);clearSel();
      if(R.hearts<=0)setTimeout(()=>finishRun(false),500);
    }
  }
  stage.querySelectorAll('.mitem').forEach(b=>b.onclick=()=>{
    if(b.classList.contains('done'))return;
    if(b.dataset.side==='L'){selL&&selL.classList.remove('sel');selL=b;}
    else{selR&&selR.classList.remove('sel');selR=b;}
    b.classList.add('sel');tryMatch();
  });
}

/* ---------- step: order ---------- */
function stOrder(stage,step){
  const correct=step.items;
  const bank=shuffle(correct.map((t,i)=>({t,i})));
  let placed=[];
  function draw(){
    let h='<div class="q-sub">🔢 Put in order</div><div class="q-title">'+step.q+'</div>';
    h+='<div class="orderzone" id="zone">'+(placed.length?'':'<span class="muted" style="font-weight:700;font-size:13px">tap chips below in order…</span>')+'</div>';
    h+='<div class="bank" id="bank"></div>';
    stage.innerHTML=h;
    const zone=document.getElementById('zone');zone.innerHTML=placed.length?'':zone.innerHTML;
    placed.forEach((p,n)=>{const d=document.createElement('div');d.className='chip placed';d.innerHTML='<span class="num">'+(n+1)+'</span>'+p.t;zone.appendChild(d);});
    const bk=document.getElementById('bank');
    bank.forEach(b=>{if(placed.find(p=>p.id===b.i))return;const el=document.createElement('button');el.className='chip';el.textContent=b.t;el.onclick=()=>{placed.push({t:b.t,id:b.i});if(placed.length===correct.length)check();else draw();};bk.appendChild(el);});
    if(placed.length){footBtn('Undo last',()=>{placed.pop();draw();},'grey');}
  }
  function check(){
    let ok=placed.every((p,n)=>p.id===n);
    grade(ok,16);finishGraded(step,ok);
    let h='<div class="q-sub">🔢 Put in order</div><div class="q-title">'+step.q+'</div><div class="bank">';
    placed.forEach((p,n)=>{const right=p.id===n;h+='<div class="chip '+(right?'ok':'no')+'"><span class="num">'+(n+1)+'</span>'+p.t+(right?'  ✓':'  ✗')+'</div>';});
    h+='</div>';stage.innerHTML=h;
    clearFoot();
    if(R.hearts<=0&&!ok){setTimeout(()=>finishRun(false),700);return;}
    feedback(ok,ok?'Perfect order!':'Correct order: '+correct.join(' → '),nextStep);
  }
  draw();
}

/* ---------- step: build (multi-select) ---------- */
function stBuild(stage,step){
  const sel=new Set();
  let h='<div class="q-sub">🛠️ Build it</div><div class="q-title">'+step.q+'</div><div class="buildgrid" id="bg"></div>';
  stage.innerHTML=h;
  const bg=document.getElementById('bg');
  step.options.forEach((o,i)=>{const b=document.createElement('button');b.className='bopt';b.textContent=o;b.onclick=()=>{if(sel.has(i)){sel.delete(i);b.classList.remove('on');}else{sel.add(i);b.classList.add('on');}};bg.appendChild(b);});
  footBtn('Check',()=>{
    const correct=new Set(step.correct);
    const ok=sel.size===correct.size&&[...sel].every(i=>correct.has(i));
    bg.querySelectorAll('.bopt').forEach((b,i)=>{b.disabled=true;b.classList.remove('on');if(correct.has(i))b.classList.add('good');else if(sel.has(i))b.classList.add('miss');});
    grade(ok,16);finishGraded(step,ok);clearFoot();
    if(R.hearts<=0&&!ok){setTimeout(()=>finishRun(false),700);return;}
    feedback(ok,ok?'Exactly the right set!':'Green = correct picks.',nextStep);
  });
}

/* ---------- step: recall (output / explain) ---------- */
function stRecall(stage,step){
  let h='<div class="q-sub">🗣️ Explain it (out loud!)</div><div class="q-title">'+step.q+'</div>'
    +'<div class="recall"><textarea id="ra" placeholder="Optional: jot your answer or say it aloud, then reveal."></textarea></div>';
  stage.innerHTML=h;
  footBtn('Reveal model answer',()=>{
    const m=document.createElement('div');m.className='model';
    m.innerHTML='<h4>Model answer</h4><ul>'+step.model.map(x=>'<li>'+x+'</li>').join('')+'</ul>'
      +'<div class="gradebtns"><button class="btn" data-g="2">Nailed it</button><button class="btn blue" data-g="1">Partly</button><button class="btn grey" data-g="0">Missed</button></div>';
    document.getElementById('stage').appendChild(m);
    clearFoot();
    m.querySelectorAll('[data-g]').forEach(b=>b.onclick=()=>{
      const g=+b.dataset.g;
      R.graded++;R.correct+= (g===2?1:0);
      R.xp+= (g===2?15:g===1?8:3);
      if(g===2){S.recallNailed=(S.recallNailed||0)+1;}
      // Partly / Missed → log for review; Nailed it → clears it from the review queue
      finishGraded(step,g===2);
      nextStep();
    });
  });
}

/* ---------- step: cloze (masked fill-in) ---------- */
function stCloze(stage,step){
  const tokens=step.text;
  const slotPos=[];tokens.forEach((t,i)=>{if(typeof t!=='string')slotPos.push(i);});
  const answers=slotPos.map(i=>tokens[i].blank);
  const bank=shuffle(answers.concat(step.distract||[]).map((w,i)=>({w,used:false,id:i})));
  const filled={};
  const norm=s=>String(s).toLowerCase().replace(/[^a-z0-9+>]/g,'');
  function nextEmpty(){for(let p=0;p<slotPos.length;p++)if(filled[p]==null)return p;return -1;}
  function allFilled(){return slotPos.every((_,p)=>filled[p]!=null);}
  function draw(){
    let h='<div class="q-sub">🧩 Masked recall — fill the blanks</div>';
    if(step.q)h+='<div class="q-title" style="font-size:17px">'+step.q+'</div>';
    h+='<div class="cloze">';let p=0;
    tokens.forEach(t=>{
      if(typeof t==='string'){h+='<span>'+t+'</span>';}
      else{const pos=p++;const bid=filled[pos];const w=bid!=null?bank.find(x=>x.id===bid).w:'';h+='<button class="slot'+(w?' filled':'')+'" data-p="'+pos+'">'+(w||'_____')+'</button>';}
    });
    h+='</div><div class="wordbank" id="wb"></div>';
    stage.innerHTML=h;
    const wb=document.getElementById('wb');
    bank.forEach(b=>{const c=document.createElement('button');c.className='word';c.textContent=b.w;c.disabled=b.used;c.onclick=()=>{const e=nextEmpty();if(e<0)return;filled[e]=b.id;b.used=true;draw();};wb.appendChild(c);});
    stage.querySelectorAll('.slot').forEach(s=>s.onclick=()=>{const pos=+s.dataset.p;if(filled[pos]!=null){bank.find(x=>x.id===filled[pos]).used=false;delete filled[pos];draw();}});
    if(allFilled())footBtn('Check',check);else clearFoot();
  }
  function check(){
    let ok=true;
    slotPos.forEach((ti,p)=>{const ans=tokens[ti];const got=bank.find(x=>x.id===filled[p]).w;const good=norm(got)===norm(ans.blank)||(ans.alt||[]).some(a=>norm(a)===norm(got));if(!good)ok=false;});
    stage.querySelectorAll('.slot').forEach(s=>{const p=+s.dataset.p;const ans=tokens[slotPos[p]];const got=bank.find(x=>x.id===filled[p]).w;const good=norm(got)===norm(ans.blank)||(ans.alt||[]).some(a=>norm(a)===norm(got));s.classList.add(good?'sgood':'sbad');s.disabled=true;if(!good)s.textContent=ans.blank;});
    stage.querySelectorAll('#wb .word').forEach(c=>c.disabled=true);
    grade(ok,14);finishGraded(step,ok);clearFoot();
    if(R.hearts<=0&&!ok){setTimeout(()=>finishRun(false),700);return;}
    feedback(ok,ok?'Every blank correct — that’s the real text, locked in.':'Filled the right words in for you — read the full sentence once more.',nextStep);
  }
  draw();
}

/* ---------- footer button helpers ---------- */
function footBtn(label,fn,cls){
  clearFoot();
  const bar=document.createElement('div');bar.className='footbar';bar.id='footbar';
  bar.innerHTML='<div class="inner"><button class="btn '+(cls||'')+'" id="fbtn">'+label+'</button></div>';
  APP().appendChild(bar);document.getElementById('fbtn').onclick=fn;
}
function clearFoot(){const f=document.getElementById('footbar');if(f)f.remove();}

/* ============================ RESULTS ============================ */
function finishRun(timedOut){
  stopTimer();
  if(R.mode==='review'){commitRun(true);return resultsScreen(true);}
  if(R.mode==='boss'){
    const ok = !timedOut && R.hearts>0 && acc()>=0.6;
    if(ok){S.done['boss-'+R.unit.id]=true;recordResult('boss-'+R.unit.id);commitRun(true);}
    else{commitRun(false);}
    return resultsScreen(ok);
  }
  if(R.hearts>0){S.done[R.lesson.id]=true;recordResult(R.lesson.id);commitRun(true);resultsScreen(true);}
  else{commitRun(false);resultsScreen(false);}
}
function recordResult(id){
  const flawless=R.mistakes===0 && R.correct===R.graded;
  S.perfect[id]=S.perfect[id]||flawless;
  S.best[id]=Math.max(S.best[id]||0, R.graded?Math.round(R.correct/R.graded*100):100);
}
function acc(){return R.graded?R.correct/R.graded:0;}
function commitRun(success){
  if(success){
    R.xp+=20; // completion bonus
    if(R.mistakes===0){R.xp+=20;S.flawless=true;}
  }
  S.xp+=R.xp;
  save();checkBadges();
}
function resultsScreen(success){
  stopTimer();
  let h;
  if(success){
    const a=Math.round(acc()*100);
    h='<div class="center"><div class="big">🎉</div><h2>'+(R.mode==='boss'?'Boss defeated!':'Quest complete!')+'</h2>'
      +'<p>'+(R.mistakes===0?'Flawless run — perfect!':'Nice work. Keep the streak going!')+'</p>'
      +'<div class="statrow">'
      +'<div class="statbox xp"><div class="v">+'+R.xp+'</div><div class="l">XP</div></div>'
      +'<div class="statbox combo"><div class="v">'+R.maxCombo+'</div><div class="l">Max combo</div></div>'
      +'<div class="statbox acc"><div class="v">'+a+'%</div><div class="l">Accuracy</div></div>'
      +'</div>';
    h+='<button class="btn" id="homeBtn">Continue</button></div>';
  }else{
    h='<div class="center"><div class="big">💔</div><h2>Out of hearts</h2>'
      +'<p>'+(R.mode==='boss'?'The boss got you this time.':'Almost! Review and try again — you’ve got this.')+'</p>'
      +'<div class="statrow"><div class="statbox xp"><div class="v">+'+R.xp+'</div><div class="l">XP earned</div></div></div>';
    h+='<button class="btn blue" id="retryBtn">Try again</button><div style="height:12px"></div><button class="btn grey" id="homeBtn">Back to map</button></div>';
  }
  clearFoot();APP().innerHTML=h;
  const hb=document.getElementById('homeBtn');if(hb)hb.onclick=renderHome;
  const rb=document.getElementById('retryBtn');if(rb)rb.onclick=()=>{R.mode==='boss'?startBoss(R.unit.id):R.mode==='review'?startReview():startLesson(R.lesson.id);};
  if(success){burst();}
}
function burst(){
  const t=document.getElementById('toast');
  // lightweight celebratory toast already; add confetti emojis
  toast('🎊 +'+R.xp+' XP'+(levelOf(S.xp)>levelOf(S.xp-R.xp)?'  —  Level up!':''));
}

/* ============================ keyboard control ============================ */
function keyAction(e){
  if(e.metaKey||e.ctrlKey||e.altKey)return;
  const tag=(e.target&&e.target.tagName)||'';
  if(tag==='INPUT'||tag==='TEXTAREA')return; // let typing work (recall textarea)
  const k=e.key;
  if(k==='Escape'){const q=document.getElementById('quitBtn');if(q){q.click();e.preventDefault();}return;}
  if(k==='Backspace'){const b=document.getElementById('backBtn');if(b){b.click();e.preventDefault();}return;}
  // recall self-grade after reveal: 1=Nailed, 2=Partly, 3=Missed
  const grades=document.querySelectorAll('.gradebtns [data-g]');
  if(grades.length){const map={'1':'2','2':'1','3':'0'};if(map[k]){const b=document.querySelector('.gradebtns [data-g="'+map[k]+'"]');if(b){b.click();e.preventDefault();}}return;}
  // feedback Continue bar
  const cont=document.getElementById('contBtn');
  if(cont){if(k==='Enter'||k===' '){cont.click();e.preventDefault();}return;}
  // MCQ options 1..N (only before answering)
  const opts=document.querySelectorAll('.opts .opt');
  if(opts.length){
    if(!document.querySelector('.opt.dim,.opt.correct,.opt.wrong')){const n=parseInt(k,10);if(n>=1&&n<=opts.length){opts[n-1].click();e.preventDefault();}}
    return;
  }
  // sort buckets: 1/← and 2/→
  const buckets=document.querySelectorAll('.bucketrow [data-b]');
  if(buckets.length){if(k==='1'||k==='ArrowLeft'){buckets[0].click();e.preventDefault();}else if(k==='2'||k==='ArrowRight'){buckets[1].click();e.preventDefault();}return;}
  // build: number toggles, Enter checks
  const bopts=document.querySelectorAll('#bg .bopt');
  if(bopts.length){
    const n=parseInt(k,10);
    if(n>=1&&n<=bopts.length){if(!bopts[n-1].disabled){bopts[n-1].click();e.preventDefault();}return;}
    if(k==='Enter'||k===' '){const fb=document.getElementById('fbtn');if(fb){fb.click();e.preventDefault();}return;}
  }
  // vecviz frame stepping with ← →
  const vzP=document.getElementById('vzPrev'),vzN=document.getElementById('vzNext');
  if(vzP&&vzN){if(k==='ArrowLeft'){if(!vzP.disabled)vzP.click();e.preventDefault();return;}if(k==='ArrowRight'){if(!vzN.disabled)vzN.click();e.preventDefault();return;}}
  // generic footer (Got it / Reveal / Check / Next) — but never auto-Undo
  const fb=document.getElementById('fbtn');
  if(fb&&(k==='Enter'||k===' ')&&!/undo/i.test(fb.textContent)){fb.click();e.preventDefault();}
}
document.addEventListener('keydown',keyAction);

/* ============================ boot ============================ */
renderHome();
</script>

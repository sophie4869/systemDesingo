<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>systemDesingo — Distributed Systems</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&amp;display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --green:#58CC02;--green-d:#46a302;--green-bg:#D7FFB8;
  --blue:#1CB0F6;--blue-d:#1899D6;--blue-bg:#DDF4FF;
  --red:#FF4B4B;--red-d:#E63946;--red-bg:#FFDFE0;
  --yellow:#FFC800;--yellow-d:#E6A800;
  --purple:#CE82FF;--purple-d:#A560E8;--purple-bg:#F3E5FF;
  --orange:#FF9600;
  --ink:#3C3C3C;--muted:#777;--faint:#AFAFAF;
  --bg:#FFFFFF;--panel:#F7F7F7;--line:#E5E5E5;--line-d:#CFCFCF;
  --r:16px;
}
html,body{height:100%;font-family:'Nunito',system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:17px;font-weight:700;line-height:1.45;overscroll-behavior:none}
#app{max-width:560px;margin:0 auto;min-height:100vh;padding-bottom:40px}
.hidden{display:none!important}
button{font-family:inherit;font-weight:800;cursor:pointer;border:none;background:none;color:inherit}

/* 3D press buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px 18px;font-size:16px;font-weight:800;letter-spacing:.4px;border-radius:var(--r);color:#fff;background:var(--green);box-shadow:0 4px 0 var(--green-d);transition:transform .04s,box-shadow .04s;text-transform:uppercase}
.btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--green-d)}
.btn.blue{background:var(--blue);box-shadow:0 4px 0 var(--blue-d)}
.btn.blue:active{box-shadow:0 1px 0 var(--blue-d)}
.btn.grey{background:#fff;color:var(--muted);border:2px solid var(--line);box-shadow:0 4px 0 var(--line);}
.btn.grey:active{box-shadow:0 1px 0 var(--line)}
.btn.red{background:var(--red);box-shadow:0 4px 0 var(--red-d)}
.btn.ghost{background:transparent;color:var(--blue);box-shadow:none;text-transform:none}
.btn:disabled{opacity:.5;box-shadow:none;transform:none;cursor:default}

/* Top bar */
.stickyhead{position:sticky;top:0;z-index:20;background:var(--bg)}
.topbar{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--bg)}
.jumpbar{display:flex;gap:8px;overflow-x:auto;padding:9px 14px;border-bottom:2px solid var(--line);scrollbar-width:none}
.jumpbar::-webkit-scrollbar{display:none}
.jchip{flex:0 0 auto;display:flex;align-items:center;gap:6px;padding:8px 13px;border-radius:20px;background:#fff;border:2px solid var(--line);border-bottom-width:3px;font-size:13px;font-weight:800;color:var(--ink);white-space:nowrap;position:relative}
.jchip .ji{font-size:16px}
.jchip:active{transform:translateY(2px)}
.jchip.done{background:var(--c);border-color:var(--c);color:#fff}
.jchip.lk{opacity:.5}
.jchip.done::after{content:"✓";margin-left:1px;font-size:12px;font-weight:900}
.stat{display:flex;align-items:center;gap:5px;font-size:16px;font-weight:800}
.stat .ic{font-size:19px}
.stat.fire{color:var(--orange)} .stat.xp{color:var(--yellow-d)} .stat.heart{color:var(--red)} .stat.gem{color:var(--blue)}
.topbar .spacer{flex:1}

/* Home */
.hero{padding:22px 18px 6px}
.hero h1{font-size:27px;font-weight:900;letter-spacing:-.5px}
.hero p{font-size:15px;color:var(--muted);font-weight:700;margin-top:2px}
.levelcard{margin:14px 18px;background:var(--panel);border:2px solid var(--line);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;gap:14px}
.ring{--p:0;width:58px;height:58px;border-radius:50%;flex-shrink:0;background:conic-gradient(var(--green) calc(var(--p)*1%),var(--line) 0);display:flex;align-items:center;justify-content:center}
.ring span{width:44px;height:44px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;color:var(--green-d)}
.levelcard .lc-meta{flex:1}
.levelcard .lc-title{font-size:17px;font-weight:900}
.levelcard .lc-sub{font-size:13px;color:var(--muted);font-weight:700}
.actions{display:flex;gap:10px;margin:0 18px 4px}
.act{flex:1;padding:12px;border:2px solid var(--line);border-bottom-width:4px;border-radius:14px;background:#fff;font-weight:800;font-size:13px;color:var(--muted)}
.act:active{transform:translateY(2px)}
.act.hot{border-color:var(--red);color:var(--red-d);background:var(--red-bg)}

.unit{margin:8px 0 4px;scroll-margin-top:118px}
.unit-head{margin:18px 18px 6px;border-radius:var(--r);padding:14px 18px;color:#fff;box-shadow:0 4px 0 rgba(0,0,0,.12)}
.unit-head .u-k{font-size:12px;font-weight:800;letter-spacing:1px;text-transform:uppercase;opacity:.85}
.unit-head .u-t{font-size:20px;font-weight:900;display:flex;align-items:center;gap:8px}
.unit-head .u-b{font-size:13px;font-weight:700;opacity:.92;margin-top:2px}
.path{display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px 0 4px}
.node{position:relative;width:74px;height:66px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff;box-shadow:0 5px 0 rgba(0,0,0,.18);transition:transform .05s}
.node:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.18)}
.node.locked{background:#E0E0E0!important;box-shadow:0 5px 0 #C8C8C8;color:#fff;cursor:default}
.node.perfect::after{content:"✓";position:absolute;right:-2px;top:-2px;background:var(--yellow);color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;border:3px solid var(--bg)}
.node.good::after{content:"✓";position:absolute;right:-2px;top:-2px;background:var(--green);color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;border:3px solid var(--bg)}
.node.partial{opacity:.8}
.node.partial::after{content:"↻";position:absolute;right:-3px;top:-3px;background:var(--orange);color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;border:3px solid var(--bg)}
.node-label .pct{color:var(--orange);font-weight:800;font-size:11px}
.node.boss{width:84px;height:76px;font-size:34px}
.node-label{font-size:13px;font-weight:800;color:var(--muted);margin-top:-2px}
.node-wrap{display:flex;flex-direction:column;align-items:center;gap:1px}
.node-wrap.off1{margin-left:90px}.node-wrap.off2{margin-right:90px}

/* Badges shelf */
.shelf{margin:18px;background:var(--panel);border:2px solid var(--line);border-radius:var(--r);padding:14px 16px}
.shelf h3{font-size:15px;font-weight:900;margin-bottom:10px}
.badges{display:flex;flex-wrap:wrap;gap:10px}
.badge{width:60px;text-align:center}
.badge .bi{width:54px;height:54px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;background:var(--yellow);box-shadow:0 3px 0 var(--yellow-d)}
.badge.lock .bi{background:#ECECEC;box-shadow:0 3px 0 #DADADA;filter:grayscale(1);opacity:.6}
.badge small{display:block;font-size:10px;font-weight:800;color:var(--muted);margin-top:3px;line-height:1.1}

/* Lesson screen */
.lesson{padding:0}
.lhead{display:flex;align-items:center;gap:12px;padding:14px 18px}
.lhead .close{font-size:26px;color:var(--faint);font-weight:900;width:30px}
.lback{font-size:22px;color:var(--muted);font-weight:900;width:24px;background:none;border:none;cursor:pointer;padding:0}
.lback:hover{color:var(--blue)}
.rev-list{font-size:15px;font-weight:700;color:var(--ink);line-height:1.7;background:var(--panel);border:2px solid var(--line);border-radius:12px;padding:11px 14px}
.rev-list>div{padding:3px 0}
.rev-list b{color:var(--blue-d)}
.rev-note{margin-top:10px;font-size:13px;color:var(--muted);font-weight:700;background:var(--green-bg);border-radius:10px;padding:9px 12px}
.rev-fill{font-size:16px;font-weight:700;line-height:1.9;color:var(--ink);background:var(--panel);border:2px solid var(--line);border-radius:12px;padding:12px 14px}
.rev-fill b{color:var(--green-d)}
.pbar{flex:1;height:16px;background:var(--line);border-radius:10px;overflow:hidden}
.pbar > i{display:block;height:100%;background:var(--green);border-radius:10px;transition:width .35s}
.lhearts{color:var(--red);font-weight:900;display:flex;align-items:center;gap:3px}
.timer{font-weight:900;color:var(--ink);display:flex;align-items:center;gap:4px}
.timer.low{color:var(--red)}
.combo{position:fixed;left:50%;top:64px;transform:translateX(-50%);background:var(--purple);color:#fff;font-weight:900;padding:5px 14px;border-radius:20px;font-size:14px;box-shadow:0 3px 0 var(--purple-d);opacity:0;transition:opacity .2s,transform .2s;z-index:30}
.combo.show{opacity:1}

.stage{padding:8px 18px 120px}
.q-title{font-size:22px;font-weight:900;margin:8px 0 16px;line-height:1.3}
.q-sub{font-size:14px;color:var(--muted);font-weight:700;margin-bottom:14px}

/* Teach blocks */
.tldr{background:var(--blue-bg);border-radius:14px;padding:12px 14px;font-size:16px;font-weight:800;color:var(--blue-d);margin-bottom:12px;display:flex;gap:8px}
.tldr .tag{background:var(--blue);color:#fff;font-size:11px;padding:2px 7px;border-radius:6px;height:fit-content;letter-spacing:.5px}
.point{display:flex;gap:10px;align-items:flex-start;background:var(--panel);border:2px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:9px;font-size:15px;font-weight:700}
.point .pi{font-size:20px;line-height:1.2}
.point b{font-weight:900;color:var(--ink)}
.cause{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.cause .box{flex:1;min-width:120px;background:#fff;border:2px solid var(--line);border-radius:12px;padding:10px 12px;font-size:14px;font-weight:800;text-align:center}
.cause .arrow{font-size:22px;color:var(--green);font-weight:900}
.vs{display:flex;gap:10px;margin-bottom:10px}
.vs .col{flex:1;border-radius:12px;padding:11px 12px;font-size:14px;font-weight:700}
.vs .col.a{background:var(--green-bg);border:2px solid #B5E89A}
.vs .col.b{background:var(--blue-bg);border:2px solid #B3E3FF}
.vs .col h4{font-size:14px;font-weight:900;margin-bottom:4px}
.keyt{background:var(--purple-bg);border-left:5px solid var(--purple);border-radius:10px;padding:10px 13px;margin-bottom:9px;font-size:15px;font-weight:700}
.keyt b{color:var(--purple-d);font-weight:900}
.callout{border-radius:12px;padding:11px 13px;margin-bottom:9px;font-size:14px;font-weight:700;display:flex;gap:8px}
.callout.warn{background:#FFF3D6;color:#8A6100}
.callout.note{background:var(--green-bg);color:#3a6b13}
.callout.mem{background:#FFE9F4;color:#A8327D}

/* vecviz — version-vector walkthrough */
.vv-legend{font-size:13px;font-weight:800;color:var(--muted);margin-bottom:10px}
.vv-tag{display:inline-flex;width:20px;height:20px;align-items:center;justify-content:center;border-radius:6px;color:#fff;font-weight:900;font-size:12px;vertical-align:middle}
.vv-tag.na,.vv-node.na{background:var(--green)}
.vv-tag.nb,.vv-node.nb{background:var(--blue)}
.vv-tag.nc,.vv-node.nc{background:var(--purple-d)}
.vv-cap{font-size:15px;font-weight:700;color:var(--ink);background:var(--panel);border:2px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:12px;min-height:44px;display:flex;align-items:center}
.vv-grid{display:flex;flex-direction:column;gap:9px;margin-bottom:11px}
.vv-row{display:flex;align-items:center;gap:11px}
.vv-node{width:36px;height:36px;flex-shrink:0;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:17px}
.vv-vec{font-family:ui-monospace,Menlo,monospace;font-size:24px;font-weight:800;color:var(--faint);display:flex;align-items:center}
.vv-cell{display:inline-flex;min-width:26px;justify-content:center;color:var(--ink);border-radius:7px;padding:1px 3px}
.vv-cell.hot{background:var(--yellow);color:#7a5c00;animation:vvpulse .45s ease}
@keyframes vvpulse{0%{transform:scale(1.5)}60%{transform:scale(1.05)}100%{transform:scale(1)}}
.vv-comma{color:var(--faint)}
.vv-tagmsg{margin-left:auto;font-size:12px;font-weight:900;padding:4px 9px;border-radius:8px;text-transform:uppercase;letter-spacing:.3px}
.vv-tagmsg.out{background:var(--blue-bg);color:var(--blue-d)}
.vv-tagmsg.in{background:var(--purple-bg);color:var(--purple-d)}
.vv-msg{background:var(--blue-bg);border:2px solid #B3E3FF;border-radius:12px;padding:9px 13px;font-size:14px;font-weight:700;color:var(--blue-d);margin-bottom:10px}
.vv-verdict{border-radius:12px;padding:10px 13px;font-size:14px;font-weight:700;margin-bottom:10px}
.vv-verdict.conc{background:#FFF3D6;color:#8A6100}
.vv-verdict.hb{background:var(--green-bg);color:#3a6b13}
.vv-rule{font-size:12.5px;font-weight:700;color:var(--muted);background:var(--panel);border:2px dashed var(--line-d);border-radius:10px;padding:8px 11px;margin-bottom:6px}
.vv-nav{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:14px}
.vv-btn{flex:0 0 auto;padding:10px 15px;font-size:14px;font-weight:900;border-radius:11px;background:#fff;color:var(--blue-d);border:2px solid var(--line);border-bottom-width:4px;cursor:pointer}
.vv-btn:active{transform:translateY(2px);border-bottom-width:2px}
.vv-btn:disabled{opacity:.4;cursor:default;transform:none}
.vv-dots{display:flex;gap:7px;align-items:center}
.vv-dot{width:9px;height:9px;border-radius:50%;background:var(--line-d);transition:all .15s}
.vv-dot.seen{background:var(--blue)}
.vv-dot.on{background:var(--blue);transform:scale(1.45);box-shadow:0 0 0 3px var(--blue-bg)}

/* Options (mcq) */
.opts{display:flex;flex-direction:column;gap:10px;counter-reset:kopt}
.opt{width:100%;text-align:left;padding:14px 16px;border:2px solid var(--line);border-bottom-width:4px;border-radius:14px;background:#fff;font-size:16px;font-weight:800;color:var(--ink);transition:all .1s}
.opt::before{counter-increment:kopt;content:counter(kopt);display:inline-flex;width:20px;height:20px;align-items:center;justify-content:center;border:1.5px solid #CFCFCF;border-radius:6px;font-size:11px;color:var(--muted);margin-right:9px;vertical-align:middle}
.bucketrow{counter-reset:kbk}
.bucketrow .btn::before{counter-increment:kbk;content:counter(kbk);display:inline-flex;width:18px;height:18px;align-items:center;justify-content:center;border:1.5px solid rgba(255,255,255,.55);border-radius:5px;font-size:10px;margin-right:7px;vertical-align:middle}
.buildgrid{counter-reset:kbd}
.bopt::before{counter-increment:kbd;content:counter(kbd);display:inline-flex;width:18px;height:18px;align-items:center;justify-content:center;border:1.5px solid #CFCFCF;border-radius:5px;font-size:10px;color:var(--muted);margin-right:7px;vertical-align:middle}
.opt:active{transform:translateY(2px)}
.opt.sel{border-color:var(--blue);background:var(--blue-bg);color:var(--blue-d)}
.opt.correct{border-color:var(--green);background:var(--green-bg);color:var(--green-d)}
.opt.wrong{border-color:var(--red);background:var(--red-bg);color:var(--red-d)}
.opt.dim{opacity:.5}

/* sort */
.sortcard{background:#fff;border:2px solid var(--line);border-bottom-width:5px;border-radius:18px;padding:26px 18px;font-size:18px;font-weight:900;text-align:center;margin-bottom:16px;min-height:90px;display:flex;align-items:center;justify-content:center}
.sortcard.flash-g{border-color:var(--green);background:var(--green-bg)}
.sortcard.flash-r{border-color:var(--red);background:var(--red-bg);animation:shake .3s}
.bucketrow{display:flex;gap:10px}
.bucketrow .btn{font-size:14px}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-7px)}75%{transform:translateX(7px)}}

/* match */
.matchgrid{display:flex;gap:10px}
.matchcol{flex:1;display:flex;flex-direction:column;gap:9px}
.mitem{padding:13px 12px;border:2px solid var(--line);border-bottom-width:4px;border-radius:13px;background:#fff;font-size:14px;font-weight:800;text-align:left;min-height:54px}
.mitem.sel{border-color:var(--blue);background:var(--blue-bg)}
.mitem.done{border-color:var(--green);background:var(--green-bg);color:var(--green-d);opacity:.7}
.mitem.bad{border-color:var(--red);background:var(--red-bg);animation:shake .3s}

/* order */
.orderzone{min-height:54px;border:2px dashed var(--line-d);border-radius:13px;padding:8px;margin-bottom:12px;display:flex;flex-direction:column;gap:7px}
.bank{display:flex;flex-direction:column;gap:8px}
.chip{padding:12px 13px;border:2px solid var(--line);border-bottom-width:4px;border-radius:12px;background:#fff;font-weight:800;font-size:14px;text-align:left}
.chip.placed{background:var(--blue-bg);border-color:var(--blue);color:var(--blue-d)}
.chip .num{display:inline-block;width:22px;height:22px;line-height:22px;text-align:center;background:var(--blue);color:#fff;border-radius:50%;font-size:12px;margin-right:8px}
.chip.ok{background:var(--green-bg);border-color:var(--green)}
.chip.no{background:var(--red-bg);border-color:var(--red)}

/* build (multi-select) */
.buildgrid{display:flex;flex-wrap:wrap;gap:9px}
.bopt{padding:11px 14px;border:2px solid var(--line);border-bottom-width:4px;border-radius:13px;background:#fff;font-weight:800;font-size:14px}
.bopt.on{border-color:var(--blue);background:var(--blue-bg);color:var(--blue-d)}
.bopt.good{border-color:var(--green);background:var(--green-bg)}
.bopt.miss{border-color:var(--red);background:var(--red-bg)}

/* recall */
.recall textarea{width:100%;min-height:96px;border:2px solid var(--line);border-radius:14px;padding:12px;font-family:inherit;font-size:15px;font-weight:700;color:var(--ink);resize:vertical}
.recall textarea:focus{outline:none;border-color:var(--blue)}
.model{background:var(--green-bg);border-radius:14px;padding:13px 15px;margin-top:12px}
.model h4{font-size:13px;font-weight:900;color:#3a6b13;text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px}
.model li{font-size:15px;font-weight:700;margin:0 0 6px 18px;color:#2f5a10}
.gradebtns{display:flex;gap:8px;margin-top:12px}
.gradebtns .btn{font-size:13px;padding:12px 8px}

/* cloze (fill-the-blank) */
.cloze{font-size:18px;font-weight:700;line-height:2.2;color:var(--ink);background:var(--panel);border:2px solid var(--line);border-radius:14px;padding:15px 17px;margin-bottom:14px}
.slot{display:inline-flex;align-items:center;justify-content:center;min-width:72px;padding:3px 11px;margin:0 3px;border:2px dashed var(--blue);border-radius:9px;background:var(--blue-bg);color:var(--blue-d);font-weight:800;font-size:16px;vertical-align:middle;line-height:1.2}
.slot.filled{border-style:solid}
.slot.sgood{border-style:solid;border-color:var(--green);background:var(--green-bg);color:var(--green-d)}
.slot.sbad{border-style:solid;border-color:var(--red);background:var(--red-bg);color:var(--red-d)}
.wordbank{display:flex;flex-wrap:wrap;gap:9px;justify-content:center}
.word{padding:11px 16px;border:2px solid var(--line);border-bottom-width:4px;border-radius:13px;background:#fff;font-weight:800;font-size:15px;color:var(--ink)}
.word:active{transform:translateY(2px)}
.word:disabled{opacity:.35}

/* footer action bar */
.footbar{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:2px solid var(--line);padding:14px 18px;z-index:15}
.footbar .inner{max-width:560px;margin:0 auto}
.feedback{position:fixed;bottom:0;left:0;right:0;z-index:16;padding:16px 18px 18px;border-top-left-radius:18px;border-top-right-radius:18px}
.feedback .inner{max-width:560px;margin:0 auto}
.feedback.good{background:var(--green-bg)}
.feedback.bad{background:var(--red-bg)}
.feedback h4{font-size:18px;font-weight:900;display:flex;align-items:center;gap:8px;margin-bottom:4px}
.feedback.good h4{color:var(--green-d)} .feedback.bad h4{color:var(--red-d)}
.feedback p{font-size:14px;font-weight:700;margin-bottom:12px}
.feedback.good p{color:#3a6b13} .feedback.bad p{color:#9b2c2c}

/* results / fail */
.center{text-align:center;padding:50px 24px}
.center .big{font-size:64px;margin-bottom:10px}
.center h2{font-size:26px;font-weight:900;margin-bottom:8px}
.center p{font-size:16px;color:var(--muted);font-weight:700;margin-bottom:22px}
.statrow{display:flex;gap:12px;justify-content:center;margin-bottom:24px}
.statbox{background:var(--panel);border:2px solid var(--line);border-radius:14px;padding:12px 18px;min-width:90px}
.statbox .v{font-size:24px;font-weight:900}
.statbox .l{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.statbox.xp .v{color:var(--yellow-d)} .statbox.combo .v{color:var(--purple-d)} .statbox.acc .v{color:var(--green-d)}

/* toast */
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%) translateY(-120px);background:var(--ink);color:#fff;padding:12px 18px;border-radius:14px;font-weight:800;font-size:14px;z-index:50;display:flex;gap:8px;align-items:center;transition:transform .35s;box-shadow:0 6px 20px rgba(0,0,0,.25)}
.toast.show{transform:translateX(-50%) translateY(0)}
.confetti{font-size:30px;animation:pop .5s ease}
@keyframes pop{0%{transform:scale(0)}60%{transform:scale(1.3)}100%{transform:scale(1)}}
.flash-correct{animation:flashg .4s} @keyframes flashg{0%{background:var(--green-bg)}100%{background:transparent}}

/* small helpers */
.tip{font-size:13px;color:var(--faint);font-weight:700;text-align:center;margin-top:10px}
.muted{color:var(--muted)}
</style>

<div id="app"></div>

<script>
/* =========================================================================
   SysQuest — gamified distributed-systems interview prep
   ========================================================================= */

/* ---------------- persistence ---------------- */
const SAVE_KEY='dsq_v2_save';
function load(){try{return JSON.parse(localStorage.getItem(SAVE_KEY))||{};}catch(e){return{};}}
function save(){try{localStorage.setItem(SAVE_KEY,JSON.stringify(S));}catch(e){}}
var S=Object.assign({xp:0,done:{},badges:{},streak:0,lastDay:null,recallNailed:0,unlockAll:false,mistakes:{},perfect:{},best:{}},load());
if(!S.mistakes)S.mistakes={};
if(!S.perfect)S.perfect={};
if(!S.best)S.best={};

/* streak update on open */
(function(){
  const today=new Date().toISOString().slice(0,10);
  if(S.lastDay!==today){
    const y=new Date(Date.now()-864e5).toISOString().slice(0,10);
    S.streak=(S.lastDay===y)?(S.streak+1):1;
    S.lastDay=today;save();
  }
})();

const HEARTS=5;
const levelOf=xp=>Math.floor(xp/100)+1;

{

  {id:'repl-2',title:'Quorum math',steps:[

{
 id:'raft',title:'Consensus (Raft)',icon:'🗳️',color:'#CE82FF',colorD:'#A560E8',

  {id:'raft-1',title:'Why consensus',steps:[
   {t:'teach',h:'The job',body:[
     {k:'tldr',t:'Consensus = many nodes agree on ONE value, despite failures.'},
     {k:'point',i:'👑',t:'Powers <b>leader election</b>, <b>distributed locks</b>, and <b>replicated logs</b>.'}
   ]},
   {t:'teach',h:'The hard limit',body:[
     {k:'keyt',term:'FLP impossibility',def:'in a pure async network with 1 faulty node, no algorithm always agrees.'},
     {k:'point',i:'❓',t:'You can’t tell a <b>crashed</b> node from a <b>slow</b> one.'},
     {k:'note',c:'note',t:'Real systems dodge FLP with timeouts (partial synchrony) — that’s what Raft does.'}
   ]},
   {t:'mcq',q:'How do Raft/Paxos get around FLP?',o:['quantum clocks','timeouts / partial synchrony','more nodes','ignoring failures'],a:1,why:'Assuming the network is eventually timely lets them make progress.'},
   {t:'recall',q:'In one line: what does FLP say, and how do real systems cope?',model:['FLP: pure-async consensus can’t guarantee termination with even one fault.','You can’t distinguish crashed from slow.','Fix: add timeouts/partial synchrony (Raft, Paxos).']}
  ]},
  {id:'raft-2',title:'Raft elections',steps:[
   {t:'teach',h:'Terms & heartbeats',body:[
     {k:'point',i:'🕒',t:'<b>Terms</b> = ever-increasing numbers; each starts with an election.'},
     {k:'point',i:'💓',t:'Leader sends <b>heartbeats</b>. No heartbeat → a follower suspects failure.'},
     {k:'point',i:'🎲',t:'<b>Randomised timeout</b> (150–300ms) avoids everyone running at once.'}
   ]},
   {t:'teach',h:'Winning an election',body:[
     {k:'cause',a:'Timeout fires → become candidate, vote self, ask others',b:'Win with a STRICT MAJORITY'},
     {k:'keyt',term:'Up-to-date check',def:'voters refuse a candidate whose log is behind → winner has all committed entries.'}
   ]},
   {t:'order',q:'Put a Raft election in order.',items:['Heartbeats stop','Follower’s random timer fires','It becomes a candidate & votes for itself','Others grant votes','Majority reached → new leader']},
   {t:'mcq',q:'A candidate becomes leader when it gets…',o:['the most recent log','votes from ALL nodes','a strict majority','the lowest id'],a:2,why:'Majority (quorum) wins; plus its log must be up-to-date.'},
   {t:'cloze',q:'Unmask the Raft election.',distract:['leader','minority'],text:[
     'A follower waits for ',{blank:'heartbeats'},'. After a randomised ',{blank:'timeout'},
     ', it becomes a ',{blank:'candidate'},', votes for itself, and wins with a strict ',
     {blank:'majority'},' — but only if its ',{blank:'log'},' is up-to-date.'
   ]},
   {t:'recall',q:'Walk me through a Raft leader election (the interview classic).',model:['Followers expect heartbeats; if none arrives before a randomised timeout, one becomes a candidate in a new term.','It votes for itself and requests votes; nodes won’t vote for a less up-to-date log.','With a strict majority it becomes leader and starts sending heartbeats.']}

   ]},
   {t:'teach',h:'The stale-leader trap',body:[
     {k:'callout',c:'warn',t:'An old leader partitioned away may still answer reads — returning STALE data.'},

   ]},
   {t:'mcq',q:'Why can routing reads to "the leader" still be unsafe?',o:['leaders are slow','a stale partitioned leader serves old data','leaders can’t read','followers are faster'],a:1,why:'Use leases or the read-index trick to confirm current leadership.'},
   {t:'build',q:'Pick valid ways to serve LINEARIZABLE reads in Raft.',options:['Read from any follower','Leader lease','Read index (heartbeat quorum)','Random replica'],correct:[1,2]},
   {t:'recall',q:'How does Raft keep reads linearizable?',model:['Reads go through the leader, but a partitioned old leader could be stale.','Read-index: record commit index, confirm leadership with a heartbeat majority, wait until applied, then serve.','Or a leader lease (time-bounded) if clocks are trustworthy.']}
  ]}
 ],

{
 id:'txn',title:'Transactions',icon:'🔐',color:'#FF9600',colorD:'#E07F00',

 lessons:[
  {id:'txn-1',title:'Atomic commit',steps:[
   {t:'teach',h:'Two-phase commit (2PC)',body:[
     {k:'tldr',t:'Get many nodes to commit together — or none at all.'},
     {k:'cause',a:'Phase 1: coordinator asks "ready?" — all vote',b:'Phase 2: all yes → commit, else abort'},
     {k:'callout',c:'warn',t:'If the coordinator dies after "ready" but before deciding, participants are stuck holding locks — the blocking problem.'}
   ]},
   {t:'mcq',q:'Why is 2PC called a blocking protocol?',o:['it locks the whole DB','a coordinator crash leaves participants in-doubt holding locks','phase 2 is slow','votes are sequential'],a:1,why:'In-doubt participants can’t unilaterally decide, so they wait (holding locks) until the coordinator recovers.'},
   {t:'teach',h:'Saga: the microservices answer',body:[
     {k:'point',i:'🧩',t:'Split one big txn into local txns, each with a <b>compensating</b> undo.'},
     {k:'vs',a:{h:'Choreography',t:'services react to each other’s events. Decentralised, harder to trace.'},b:{h:'Orchestration',t:'a central coordinator drives steps. Clearer, single control point.'}},
     {k:'callout',c:'warn',t:'No atomic rollback — compensation is a semantic undo that can itself fail. Every step must be idempotent.'}
   ]},
   {t:'mcq',q:'In a Saga, step 3 of 5 fails. What happens?',o:['atomic rollback of all','compensating txns undo steps 1–2','wait for step 3','retry forever'],a:1,why:'Sagas undo completed steps in reverse with compensations — there’s no atomic rollback.'},
   {t:'recall',q:'Explain the 2PC blocking problem in 2 sentences.',model:['After voting "ready", a participant must wait for the coordinator’s decision and can’t abort on its own.','If the coordinator crashes then, participants block (holding locks) until it recovers. That’s the coordinator SPOF.']}
  ]},
  {id:'txn-2',title:'Isolation & retries',steps:[
   {t:'teach',h:'Isolation levels',body:[
     {k:'point',i:'🩹',t:'<b>Read committed</b>: no dirty reads (only committed data).'},
     {k:'point',i:'🔁',t:'<b>Repeatable read</b>: re-reading a row gives the same value.'},
     {k:'point',i:'🔒',t:'<b>Serializable</b>: as if txns ran one at a time.'},
     {k:'note',t:'Snapshot Isolation (MVCC) is cheap but allows write skew; SSI detects and aborts it.'}
   ]},
   {t:'cloze',q:'Fill the isolation blanks.',distract:['phantom','linearizable'],text:[
     'Snapshot Isolation prevents ',{blank:'dirty'},' and ',{blank:'non-repeatable'},' reads but still allows ',
     {blank:'write skew',alt:['write-skew']},'. ',{blank:'SSI'},' detects conflicts and aborts a txn to fix it.'
   ]},
   {t:'mcq',q:'Which level prevents dirty reads but allows non-repeatable reads?',o:['read uncommitted','read committed','repeatable read','serializable'],a:1,why:'Read committed shows only committed data, but a row can change between two reads.'},
   {t:'build',q:'Pick ways to make a write safely retryable.',options:['Idempotency key','Conditional (compare-and-set) write','Naturally idempotent PUT','New random ID each retry','Fire-and-forget'],correct:[0,1,2]},
   {t:'recall',q:'Why is "at-least-once + idempotent consumer" equal to exactly-once?',model:['Networks duplicate and clients retry, so you’ll get repeats (at-least-once).','An idempotent consumer makes repeats harmless — applying twice = applying once.','So the observable effect is exactly-once, far cheaper than true exactly-once delivery.']}
  ]}
 ],

 id:'cache',title:'Caching',icon:'⚡',color:'#F4B400',colorD:'#C98A00',
 blurb:'Serve hot data fast — and survive expiry storms.',
 lessons:[
  {id:'cache-1',title:'Patterns',steps:[
   {t:'teach',h:'Cache-aside',body:[
     {k:'tldr',t:'App checks cache; on miss, read DB and populate. TTL is your only consistency knob.'},
     {k:'callout',c:'warn',t:'On writes, DELETE the key (don’t update it) — update races can cache a stale value forever.'}
   ]},
   {t:'teach',h:'Write strategies',body:[
     {k:'vs',a:{h:'Write-through',t:'write cache + DB together. Always warm, but slower + write pollution.'},b:{h:'Write-behind',t:'write cache now, flush DB later. Fast, but a crash loses data.'}}
   ]},
   {t:'sort',q:'Consistent or fast-but-risky?',buckets:['Consistent','Fast/risky'],items:[
     {text:'write-through',b:0},{text:'write-behind',b:1}
   ]},
   {t:'mcq',q:'Biggest risk of write-behind caching?',o:['high latency','data loss if cache crashes before flush','too consistent','no hits'],a:1,why:'It acks before persisting, so an untimely crash drops un-flushed writes.'},
   {t:'recall',q:'On a write, why delete the cache key instead of updating it?',model:['Concurrent update-then-set can interleave and leave a stale value cached indefinitely.','Deleting forces the next read to repopulate cleanly from the source of truth.']}
  ]},
  {id:'cache-2',title:'Failure modes',steps:[
   {t:'teach',h:'Cache stampede',body:[
     {k:'cause',a:'A hot key expires',b:'Thousands of misses hit the DB at once → it falls over'},
     {k:'point',i:'🔒',t:'Fix 1: a mutex so only one request rebuilds the value.'},
     {k:'point',i:'🎲',t:'Fix 2: jittered TTLs so keys don’t all expire together.'},
     {k:'point',i:'♻️',t:'Fix 3: stale-while-revalidate — serve old, refresh in background.'}
   ]},
   {t:'teach',h:'Bloom filters',body:[
     {k:'tldr',t:'A tiny probabilistic set: answers "definitely NOT here" or "maybe here".'},
     {k:'point',i:'✅',t:'<b>No false negatives</b> — a "no" is certain; a "yes" might be wrong.'},
     {k:'point',i:'⚡',t:'Used to skip pointless disk/cache lookups (e.g. LSM-tree reads, "have we seen this key?").'}
   ]},
   {t:'cloze',q:'Fill the stampede blanks.',distract:['eviction','sharding'],text:[
     'When a popular key ',{blank:'expires'},', many requests miss at once and hammer the ',
     {blank:'database',alt:['DB','db']},'. Fixes: a ',{blank:'mutex',alt:['lock']},' so one request rebuilds it, ',
     {blank:'jittered',alt:['jitter']},' TTLs, or ',{blank:'stale-while-revalidate'},'.'
   ]},
   {t:'mcq',q:'A Bloom filter can tell you with certainty that an item is…',o:['present','definitely NOT present','recently used','large'],a:1,why:'No false negatives: "no" is certain, "yes" is "maybe". Great to skip pointless disk reads.'},
   {t:'recall',q:'Name 2 ways to prevent a cache stampede.',model:['Mutex/lock so only the first miss rebuilds; others wait.','Jittered TTLs to spread expirations; or stale-while-revalidate to serve stale while refreshing.']}
  ]}

{
 id:'time',title:'Time & Ordering',icon:'⏱️',color:'#CE82FF',colorD:'#A560E8',
 blurb:'Clocks lie. Order events without trusting them.',
 lessons:[
  {id:'time-1',title:'Logical clocks',steps:[
   {t:'teach',h:'Lamport clocks',body:[
     {k:'tldr',t:'A counter per process. Local/send: +1. Receive: max(local, msg)+1.'},
     {k:'callout',c:'warn',t:'A→B implies clock(A)<clock(B), but NOT the reverse. Can’t detect concurrency.'}
   ]},
   {t:'teach',h:'Vector clocks',body:[
     {k:'point',i:'🧮',t:'One counter per process. Compare element-wise.'},
     {k:'point',i:'🔗',t:'V(A) ≤ V(B) and not equal → A happened-before B.'},
     {k:'point',i:'∥',t:'Neither dominates → concurrent. Now you CAN tell.'}
   ]},
   {t:'vecviz',h:'Vector clocks — step through it',nodes:['A','B','C'],
    rule:'Local event or send: bump your own slot. Receive: bump your slot, then take element-wise max with the message.',
    frames:[
     {cap:'Start — every node’s clock is [0,0,0].',v:[[0,0,0],[0,0,0],[0,0,0]]},
     {cap:'A does a local event → A bumps its own slot.',v:[[1,0,0],[0,0,0],[0,0,0]],hi:[[0,0]]},
     {cap:'B does a local event, with no knowledge of A.',v:[[1,0,0],[0,1,0],[0,0,0]],hi:[[1,1]],
      verdict:{cls:'conc',t:'∥ Compare A=[1,0,0] vs B=[0,1,0]: neither is ≤ the other → these events are <b>concurrent</b>.'}},
     {cap:'A sends message m1 to C (A bumps its slot first; m1 carries A’s clock).',v:[[2,0,0],[0,1,0],[0,0,0]],hi:[[0,0]],msg:{from:0,to:2,label:'[2,0,0]'}},
     {cap:'C receives m1: bump own slot, then max with [2,0,0].',v:[[2,0,0],[0,1,0],[2,0,1]],hi:[[2,0],[2,2]],
      verdict:{cls:'hb',t:'→ V(A’s send)=[2,0,0] ≤ V(C)=[2,0,1] → A’s send <b>happened-before</b> C’s receive.'}},
     {cap:'B sends message m2 to C (B bumps its slot; m2 carries B’s clock).',v:[[2,0,0],[0,2,0],[2,0,1]],hi:[[1,1]],msg:{from:1,to:2,label:'[0,2,0]'}},
     {cap:'C receives m2: bump own slot, then max with [0,2,0].',v:[[2,0,0],[0,2,0],[2,2,2]],hi:[[2,1],[2,2]],
      verdict:{cls:'hb',t:'C’s clock [2,2,2] now dominates both A and B — C has causally seen everything so far.'}}
    ]},
   {t:'cloze',q:'Fill the clock blanks.',distract:['physical','atomic'],text:[
     'Lamport clocks give a ',{blank:'partial'},' order but can’t spot ',{blank:'concurrent'},
     ' events. ',{blank:'Vector',alt:['vector']},' clocks compare ',{blank:'element-wise',alt:['elementwise']},
     ' to reveal the full happened-before relation.'
   ]},
   {t:'mcq',q:'V(A) < V(B) means…',o:['A has fewer events','A causally happened-before B','wall clock earlier','they’re concurrent'],a:1,why:'Every entry ≤ and at least one strictly less → A → B.'},
   {t:'recall',q:'Why do vector clocks beat Lamport clocks?',model:['Lamport gives ordering but can’t distinguish concurrent from causally-ordered events.','Vector clocks track one counter per process, so element-wise comparison reveals concurrency.']}
  ]},
  {id:'time-2',title:'Physical time',steps:[
   {t:'teach',h:'TrueTime & HLC',body:[
     {k:'keyt',term:'TrueTime (Spanner)',def:'returns an interval [earliest,latest]; wait out the uncertainty (commit wait) for global order.'},
     {k:'keyt',term:'HLC',def:'hybrid logical clock — physical time + a logical counter; respects causality, no special hardware.'}
   ]},
   {t:'mcq',q:'Spanner’s commit wait exists to…',o:['save power','ensure no later txn gets a smaller timestamp','reduce storage','batch writes'],a:1,why:'Waiting out the clock uncertainty preserves external consistency globally.'},
   {t:'teach',h:'Failure detection',body:[
     {k:'point',i:'❓',t:'You can’t tell crashed from slow (FLP). All detectors are imperfect.'},
     {k:'point',i:'🗣️',t:'Phi-accrual gives a tunable suspicion level instead of a binary alive/dead.'}
   ]},
   {t:'teach',h:'Gossip protocol',body:[
     {k:'tldr',t:'No central registry: each node tells a few RANDOM peers, and news spreads like a rumour.'},
     {k:'point',i:'📈',t:'Reaches all N nodes in ~<b>O(log N)</b> rounds — decentralised, no single point of failure.'},
     {k:'vs',a:{h:'Anti-entropy',t:'compare full state + reconcile (Merkle diff). Thorough, always converges.'},b:{h:'Rumour-mongering',t:'gossip a fresh change for a while, then stop. Fast + cheap.'}},
     {k:'note',t:'Carries membership / failure suspicion. Used by Cassandra, DynamoDB, Consul (SWIM). Tradeoff: eventually-consistent membership — not a substitute for consensus.'}
   ]},
   {t:'mcq',q:'How does a gossip protocol spread state across the cluster?',o:['a leader pushes to everyone','each node tells random peers; spreads in ~O(log N) rounds','every node broadcasts to all each second','only via ZooKeeper'],a:1,why:'Decentralised epidemic spread — random peer exchange, O(log N) convergence, no coordinator or SPOF.'},
   {t:'recall',q:'What does TrueTime do differently from a normal clock?',model:['It exposes uncertainty as an interval [earliest, latest] instead of a single point.','Spanner waits out that interval (commit wait) so timestamps never disagree on order — external consistency.']}
  ]}
 ],
 boss:{title:'Time Boss',time:70,q:[
   {q:'Lamport clocks give only a…',o:['total real-time order','partial order','vector','lease'],a:1},
   {q:'Vector clocks can detect…',o:['clock drift','concurrency','partitions','leaders'],a:1},
   {q:'V(A) ≤ V(B), not equal, means…',o:['concurrent','A → B','B → A','unrelated'],a:1},
   {q:'TrueTime returns…',o:['a single time','an interval','a vector','a counter'],a:1},
   {q:'HLC’s advantage is…',o:['no clocks','physical-time-close + causal, no special HW','infinite precision','no drift'],a:1},
   {q:'FLP says you can’t distinguish…',o:['fast vs slow nodes','crashed vs slow','leader vs follower','read vs write'],a:1}
 ]}
},
{
 id:'msg',title:'Messaging & Streaming',icon:'📨',color:'#58CC02',colorD:'#46a302',
 blurb:'Decouple services and absorb spikes with queues & logs.',
 lessons:[
  {id:'msg-1',title:'Queues vs logs',steps:[
   {t:'teach',h:'Two shapes',body:[
     {k:'vs',a:{h:'Queue (SQS/Rabbit)',t:'message goes to ONE consumer, then gone. No replay.'},b:{h:'Log (Kafka)',t:'append-only + retained; many consumers, replay by offset.'}},
     {k:'point',i:'🔢',t:'Kafka splits a topic into <b>partitions</b>. Ordering is guaranteed <b>only within a partition</b>, not across — so pick a partition key (e.g. user_id) to keep one key’s events in order.'}
   ]},
   {t:'sort',q:'Queue or log?',buckets:['Queue','Log'],items:[

   {t:'teach',h:'Delivery semantics',body:[
     {k:'point',i:'1️⃣',t:'<b>At-most-once</b>: may lose, never duplicate.'},
     {k:'point',i:'🔁',t:'<b>At-least-once</b>: never lose, may duplicate → need idempotency.'},
     {k:'point',i:'🎯',t:'<b>Exactly-once</b>: hard; usually = at-least-once + idempotent processing.'}
   ]},
   {t:'cloze',q:'Fill the delivery blanks.',distract:['ordered','synchronous'],text:[
     'The pragmatic default is ',{blank:'at-least-once'},' delivery, which can ',{blank:'duplicate'},

   ]},
   {t:'mcq',q:'Kafka guarantees ordering…',o:['globally','within a partition only','never','per consumer'],a:1,why:'Order holds within a partition; pick the partition key to keep a key’s events ordered.'},
   {t:'recall',q:'How do systems achieve "exactly-once" in practice?',model:['Use at-least-once delivery plus idempotent processing (or transactional offset+write).','Repeats become harmless, so the observable effect is exactly-once — much cheaper than true EO delivery.']}
  ]},
  {id:'msg-2',title:'Reliability',steps:[
   {t:'teach',h:'Outbox & CDC',body:[
     {k:'cause',a:'Writing DB + publishing event separately',b:'A crash between them = lost/phantom events (dual-write problem)'},
     {k:'point',i:'📦',t:'<b>Outbox</b>: write business row + outbox row in one txn; a relay publishes it.'},
     {k:'point',i:'🔌',t:'<b>CDC</b> (Debezium) tails the WAL to emit the change stream.'}
   ]},
   {t:'mcq',q:'The transactional outbox solves…',o:['cache misses','the dual-write problem','leader election','hot keys'],a:1,why:'One local txn writes both the data and the event; a relay/CDC publishes reliably.'},
   {t:'teach',h:'Backpressure & DLQs',body:[
     {k:'point',i:'🌊',t:'Pull-based consumers (Kafka) get backpressure for free; bound your buffers.'},
     {k:'point',i:'☠️',t:'Poison messages → a dead-letter queue after N retries, so the pipeline isn’t blocked.'}
   ]},
   {t:'recall',q:'What is the dual-write problem and how does the outbox fix it?',model:['Writing to the DB and a broker separately has no atomicity — a crash leaves them inconsistent.','The outbox writes the row + an event in ONE DB txn; a relay (or CDC) then publishes, at-least-once.']}
  ]}
 ],

 ]}

 id:'lb',title:'Load Balancing',icon:'🔀',color:'#1CB0F6',colorD:'#1899D6',

  {id:'lb-1',title:'L4 vs L7',steps:[
   {t:'teach',h:'Two layers',body:[
     {k:'vs',a:{h:'L4 (transport)',t:'routes by IP/port, no payload peek. Fast, connection-level.'},b:{h:'L7 (application)',t:'reads HTTP — route by path/header, TLS, retries. Pricier.'}}
   ]},
   {t:'sort',q:'L4 or L7?',buckets:['L4','L7'],items:[

   ]},
   {t:'teach',h:'Algorithms',body:[
     {k:'point',i:'🔄',t:'Round-robin / weighted; least-connections.'},
     {k:'point',i:'🎯',t:'<b>Power of two choices</b>: sample 2 random, pick the lighter — near-optimal, O(1).'},
     {k:'point',i:'🧷',t:'Consistent hashing for affinity (same key → same backend).'}
   ]},
   {t:'mcq',q:'Why does "power of two choices" beat strict least-connections?',o:['it’s simpler','avoids herding everyone onto one "best" node','uses less memory','needs no health checks'],a:1,why:'Sampling two avoids the stampede onto a single least-loaded node.'},
   {t:'recall',q:'When do you need an L7 load balancer over L4?',model:['When routing depends on HTTP content (path, header, cookie), or you want TLS termination, retries, rewrites.','L4 is faster but can only route by IP/port and pins a whole connection.']}
  ]},
  {id:'lb-2',title:'Health & global',steps:[
   {t:'teach',h:'Health checks',body:[
     {k:'point',i:'🩺',t:'Active probes /healthz; passive ejects hosts on repeated 5xx.'},
     {k:'callout',c:'warn',t:'Deep checks + a shared dependency blip can eject ALL hosts at once — "fail open" to avoid that.'}
   ]},
   {t:'teach',h:'Going global & stateless',body:[
     {k:'point',i:'🌍',t:'GeoDNS or anycast routes users to the nearest/healthy region.'},
     {k:'note',t:'Prefer stateless servers (state in Redis/JWT) so any node serves any request — no sticky sessions.'}
   ]},
   {t:'recall',q:'Why prefer stateless servers over sticky sessions?',model:['Stateless = any instance can serve any request, so scaling and failover are trivial.','Sticky sessions pin users to a node, breaking even load and losing state on failover. Externalise state instead.']}
  ]}
 ],

   {q:'Anycast helps with…',o:['storage','fast regional failover/routing','hashing','locks'],a:1},
   {q:'Sticky sessions hurt because…',o:['too fast','break even load + lose state on failover','no TLS','too cheap'],a:1},
   {q:'A health-check death spiral is mitigated by…',o:['deeper checks','fail-open thresholds','more retries','sticky sessions'],a:1}
 ]}

 id:'rl',title:'Rate Limiting',icon:'🚦',color:'#FF4B4B',colorD:'#E63946',
 blurb:'Protect services from overload and abuse.',
 lessons:[
  {id:'rl-1',title:'Algorithms',steps:[
   {t:'teach',h:'Bucket families',body:[
     {k:'vs',a:{h:'Token bucket',t:'tokens refill at rate R, capacity B. Allows bursts up to B.'},b:{h:'Leaky bucket',t:'constant drain. Smooths output, no bursts.'}}
   ]},
   {t:'mcq',q:'You must allow short bursts but cap the average. Which?',o:['leaky bucket','token bucket','fixed window','none'],a:1,why:'Token bucket permits a burst up to capacity, then enforces the refill rate.'},
   {t:'teach',h:'Window counters',body:[
     {k:'point',i:'🪟',t:'<b>Fixed window</b>: simple, but boundary bursts (2× at the edge).'},
     {k:'point',i:'🌊',t:'<b>Sliding window counter</b>: weight previous window — smooth, O(1).'}
   ]},
   {t:'sort',q:'Bursty-friendly or smoothing?',buckets:['Allows bursts','Smooths/strict'],items:[
     {text:'token bucket',b:0},{text:'leaky bucket',b:1}
   ]},
   {t:'recall',q:'Token bucket vs leaky bucket — when each?',model:['Token bucket: allow bursts up to B, average bounded by R — good for APIs.','Leaky bucket: constant outflow, no bursts — good when the downstream needs smooth traffic.']}
  ]},
  {id:'rl-2',title:'Distributed',steps:[
   {t:'teach',h:'Across a fleet',body:[
     {k:'cause',a:'Per-instance counters',b:'N instances × R = N×R effective limit (wrong!)'},
     {k:'point',i:'🧰',t:'Use a shared store (Redis INCR/Lua) or distribute quota slices per node.'},
     {k:'point',i:'📨',t:'Respond 429 + Retry-After; limit at the edge/gateway.'}
   ]},
   {t:'cloze',q:'Fill the distributed-limit blanks.',distract:['cache','shard'],text:[
     'Per-instance counters give an effective limit of ',{blank:'N×R',alt:['NxR','N*R']},'. Use a shared ',
     {blank:'Redis',alt:['redis']},' counter or per-node ',{blank:'quota'},', and return ',{blank:'429'},' with Retry-After.'
   ]},
   {t:'recall',q:'Why are per-instance counters wrong for a global limit?',model:['Each of N instances independently allows R, so total ≈ N×R, not R.','Fix with a shared counter (Redis) or by handing each node a slice of the global quota.']}
  ]}
 ],
 boss:{title:'Rate Limiting Boss',time:60,q:[
   {q:'Token bucket allows…',o:['no bursts','bursts up to capacity','only smoothing','infinite rate'],a:1},
   {q:'Leaky bucket gives…',o:['bursts','constant outflow','no limit','random drops'],a:1},
   {q:'Fixed windows suffer…',o:['boundary bursts','no limit','high memory','drift'],a:0},
   {q:'A global limit across nodes needs…',o:['per-node counters','a shared store or quota','no coordination','DNS'],a:1},
   {q:'On limit, return…',o:['200','429 + Retry-After','500','301'],a:1},
   {q:'Best place to rate-limit is…',o:['the database','the edge/gateway','the cache','the client only'],a:1}
 ]}

     {k:'point',i:'💾',t:'Storage ≈ writes/day × bytes × retention × replication (×3).'},

     {k:'point',i:'🏢',t:'Round trip within a datacenter ≈ <b>0.5 ms</b>.'},
     {k:'point',i:'🌍',t:'Cross-continent round trip ≈ <b>150 ms</b> — dwarfs the rest, so cache/CDN near users.'}
   ]},
   {t:'order',q:'Order these latencies FASTEST → SLOWEST.',items:['Memory read (~100ns)','SSD read (~16µs)','Datacenter round trip (~0.5ms)','Cross-continent round trip (~150ms)']},
   {t:'mcq',q:'Roughly, 1 day in seconds is…',o:['~3,600','~86,400','~1,000,000','~604,800'],a:1,why:'86,400 ≈ 10^5 — the handiest estimation constant.'},
   {t:'recall',q:'Give the 3-step recipe for capacity estimation.',model:['Traffic: DAU × actions ÷ 86,400 → QPS; peak = 2–10×.','Storage: writes/day × bytes × retention × replication.','Cache: 80/20 — size the hot working set, not total reads.']}
  ]},
  {id:'scale-2',title:'Scale out',steps:[
   {t:'teach',h:'Vertical vs horizontal',body:[
     {k:'vs',a:{h:'Vertical',t:'bigger box. Simple, but a ceiling + SPOF.'},b:{h:'Horizontal',t:'more boxes. Unbounded + fault-tolerant, but adds coordination.'}},
     {k:'note',t:'Make app servers stateless → the DB becomes the bottleneck (hence replicas, sharding, caching).'}
   ]},
   {t:'teach',h:'Storage engines',body:[
     {k:'vs',a:{h:'LSM-tree',t:'sequential writes + compaction. Write-optimized (Cassandra, RocksDB).'},b:{h:'B-tree',t:'update-in-place. Read/range-optimized (Postgres, MySQL).'}}

   ]},
   {t:'mcq',q:'For a write-heavy time-series workload, pick…',o:['B-tree','LSM-tree','in-memory hash','none'],a:1,why:'LSM buffers in memory and flushes sequentially — high write throughput.'},
   {t:'recall',q:'Why does making app servers stateless matter for scaling?',model:['Any instance can serve any request, so you just add instances behind a load balancer.','State moves to DB/cache/token, and the database becomes the scaling bottleneck to address with replicas/sharding.']}

 id:'rel',title:'Reliability',icon:'🛡️',color:'#0EA5A0',colorD:'#0E8C7F',

   ]},
   {t:'mcq',q:'An OPEN circuit breaker…',o:['passes calls','fails fast without calling','queues calls','retries forever'],a:1,why:'Failing fast frees threads and lets the dependency recover.'},

     {k:'callout',c:'warn',t:'Retry at ONE layer only — 3 layers × 3 retries = 27× amplification in an incident.'}
   ]},

   {t:'teach',h:'Multi-region & DR',body:[
     {k:'vs',a:{h:'Active-passive',t:'standby takes over on failure. Simple; failover delay.'},b:{h:'Active-active',t:'all regions serve; needs conflict resolution.'}},

  ]}

 ]}

 id:'conc',title:'Concurrency Control',icon:'🧵',color:'#6366F1',colorD:'#4F46E5',
 blurb:'The anomaly zoo — and how databases stop it.',
 lessons:[
  {id:'conc-1',title:'Anomaly zoo',steps:[
   {t:'teach',h:'Read phenomena',body:[
     {k:'point',i:'🩸',t:'<b>Dirty read</b>: you read another txn’s uncommitted write.'},
     {k:'point',i:'🔁',t:'<b>Non-repeatable read</b> (read skew): a row changes value mid-txn.'},
     {k:'point',i:'👻',t:'<b>Phantom</b>: a query’s result set gains/loses rows mid-txn.'}
   ]},
   {t:'teach',h:'The sneaky write anomalies',body:[
     {k:'keyt',term:'Lost update',def:'two read-modify-write cycles; one silently clobbers the other. Same object.'},
     {k:'keyt',term:'Write skew',def:'two txns read an overlapping set, write DIFFERENT rows, together breaking an invariant.'},
     {k:'mnemonic',t:'Same object → lost update. Different objects, shared assumption → write skew.'}
   ]},
   {t:'sort',q:'Same object or different objects?',buckets:['Same object','Different objects'],items:[
     {text:'Lost update',b:0},{text:'Write skew',b:1}
   ]},
   {t:'cloze',q:'Fill the anomaly blanks.',distract:['dirty','phantom'],text:[
     'A ',{blank:'lost update',alt:['lost-update']},' is two writes to the SAME object; ',{blank:'write skew',alt:['write-skew']},
     ' is two writes to DIFFERENT objects that jointly break a rule. The fix for both is ',{blank:'serializable',alt:['serializability']},' isolation (or SSI).'
   ]},
   {t:'mcq',q:'Two on-call doctors each clock off because each sees the other still on. That’s…',o:['a dirty read','a phantom','write skew','a lost update'],a:2,why:'Disjoint writes that together break an invariant = write skew. Needs serializable/SSI.'},
   {t:'recall',q:'Explain lost update vs write skew.',model:['Lost update: two read-modify-write cycles on the SAME object — one overwrites the other. Fix with atomic op / SELECT FOR UPDATE / compare-and-set.','Write skew: two txns read an overlapping set and write DIFFERENT rows that jointly violate a constraint. Fix with serializable/SSI.']}
  ]},
  {id:'conc-2',title:'Mechanisms',steps:[
   {t:'teach',h:'Locking the pessimistic way',body:[
     {k:'point',i:'🔒',t:'<b>2PL</b>: grow (acquire locks) then shrink (release at commit). Shared reads coexist; exclusive writes don’t.'},
     {k:'point',i:'👻',t:'Predicate / index-range locks block phantoms.'},
     {k:'callout',c:'warn',t:'2PL invites deadlocks — cycles of txns each waiting on the other’s lock.'},
     {k:'point',i:'🔁',t:'Handle deadlocks by <b>detection</b> (find a wait cycle → abort a victim) or <b>prevention</b> (consistent lock ordering, lock timeouts, wait-die / wound-wait).'}
   ]},
   {t:'teach',h:'Optimistic & versioned',body:[
     {k:'keyt',term:'OCC',def:'no locks; at commit, check if your read set changed — abort & retry if so. Great at low contention.'},
     {k:'keyt',term:'MVCC',def:'keep multiple row versions; readers see a snapshot and never block writers. Powers Snapshot Isolation.'},
     {k:'keyt',term:'SSI',def:'optimistic serializable — tracks rw-conflicts and aborts dangerous ones (PostgreSQL Serializable).'}
   ]},
   {t:'cloze',q:'Fill the mechanism blanks.',distract:['serializable','sharding'],text:[
     '2PL is ',{blank:'pessimistic'},' (lock up front); OCC is ',{blank:'optimistic'},' (validate at ',{blank:'commit'},
     '). ',{blank:'MVCC'},' keeps multiple versions so readers don’t block writers.'
   ]},
   {t:'mcq',q:'You expect LOW contention. Which control fits best?',o:['2PL (pessimistic)','OCC (optimistic)','a global lock','serial execution'],a:1,why:'OCC avoids lock overhead and rarely has to retry when conflicts are rare.'},
   {t:'build',q:'Pick valid ways to handle deadlocks.',options:['Consistent lock ordering','Lock timeouts','Wait-die / wound-wait','Acquire even more locks','Detect a cycle & abort a victim'],correct:[0,1,2,4]},
   {t:'recall',q:'When would you choose OCC over 2PL?',model:['OCC when contention is low — most txns commit without conflict, so skipping locks is a net win.','2PL (pessimistic) when contention is high, so you avoid wasteful aborts/retries.']}
  ]}
 ],
 boss:{title:'Concurrency Boss',time:70,q:[
   {q:'Dirty read =',o:['stale snapshot','reading uncommitted data','a phantom','a deadlock'],a:1},
   {q:'Write skew is stopped by…',o:['read committed','serializable / SSI','no locks','TTL'],a:1},
   {q:'Lost update is two writes to…',o:['different objects','the same object','an index','a queue'],a:1},
   {q:'2PL is…',o:['optimistic','pessimistic','lock-free','async'],a:1},
   {q:'MVCC lets readers…',o:['block writers','see a snapshot without blocking','skip commits','avoid versions'],a:1},
   {q:'OCC fits best when contention is…',o:['high','low','unknown','irrelevant'],a:1}
 ]}
},

 id:'model',title:'Data Models & Encoding',icon:'🗃️',color:'#0891B2',colorD:'#0E7490',
 blurb:'Relational, document, graph — and schema evolution.',
 lessons:[
  {id:'model-1',title:'Pick a model',steps:[

   {t:'mcq',q:'Highly connected data with multi-hop queries (social graph, fraud rings) suits…',o:['document','graph','key-value','column'],a:1,why:'Graph DBs make multi-hop traversals cheap; the same in SQL means many recursive joins.'},
   {t:'teach',h:'Normalize vs denormalize',body:[
     {k:'cause',a:'Denormalize (duplicate data)',b:'Faster reads, but harder writes + consistency'},
     {k:'note',t:'Normalize for write integrity; denormalize for read speed. Most systems do both, per access pattern.'}
   ]},
   {t:'recall',q:'When document model over relational?',model:['Document fits self-contained, one-to-many records read together (locality) with a flexible schema.','Relational wins for many-to-many relationships, joins, and ad-hoc queries across entities.']}

     {k:'note',t:'A schema registry lets producers and consumers evolve independently.'}
   ]},
   {t:'teach',h:'Compatibility',body:[
     {k:'keyt',term:'Backward compatible',def:'NEW code can read OLD data. (add fields with defaults)'},
     {k:'keyt',term:'Forward compatible',def:'OLD code can read NEW data. (ignore unknown fields)'}
   ]},
   {t:'cloze',q:'Fill the evolution blanks.',distract:['eventual','strong'],text:[

     ' = old code reads NEW data. Binary formats like ',{blank:'Avro',alt:['Protobuf','protobuf','avro']},' give compact encoding plus safe schema evolution.'
   ]},
   {t:'mcq',q:'Adding a new OPTIONAL field with a default keeps you…',o:['only backward compatible','backward AND forward compatible','incompatible','strongly consistent'],a:1,why:'New readers use the default for old data (backward); old readers ignore the new field (forward).'},
   {t:'recall',q:'Define backward vs forward compatibility.',model:['Backward: new code can read data written by old code (you can upgrade readers first).','Forward: old code can read data written by new code (you can upgrade writers first). Rolling upgrades need both.']}
  ]}
 ],

   {q:'Multi-hop connected data suits a…',o:['document DB','graph DB','cache','queue'],a:1},
   {q:'Document model is best for…',o:['many-to-many joins','self-contained records','graph traversal','transactions'],a:1},
   {q:'Denormalization trades…',o:['nothing','faster reads for harder writes','storage for CPU','reads for nothing'],a:1},
   {q:'Avro/Protobuf give…',o:['human-readable text','compact binary + schema','no typing','no evolution'],a:1},
   {q:'New code reads old data =',o:['forward compat','backward compat','no compat','strong consistency'],a:1},
   {q:'A schema registry enables…',o:['faster disks','independent producer/consumer evolution','encryption','sharding'],a:1}
 ]}

   ]},
   {t:'teach',h:'Correctness',body:[

   ]},

   {t:'recall',q:'Why prefer event time over processing time?',model:['Event time reflects when things actually happened, so results are correct regardless of delays or replays.','Processing time depends on when the system happened to see the event — it drifts with lag and reprocessing.']}

 id:'trouble',title:'Distributed Trouble',icon:'⚠️',color:'#BE185D',colorD:'#9D174D',
 blurb:'Networks drop, clocks drift, processes pause.',
 lessons:[
  {id:'trouble-1',title:'Networks & clocks',steps:[
   {t:'teach',h:'Unreliable networks',body:[
     {k:'tldr',t:'You can’t tell a lost request from a slow one — a timeout is just a guess.'},
     {k:'point',i:'⏳',t:'Too short = false failures; too long = slow detection. There’s no perfect timeout.'}
   ]},
   {t:'teach',h:'Unreliable clocks',body:[
     {k:'vs',a:{h:'Time-of-day clock',t:'wall-clock; can jump backward on NTP sync. Don’t measure durations with it.'},b:{h:'Monotonic clock',t:'only goes forward; use it for elapsed time / timeouts.'}},
     {k:'callout',c:'warn',t:'Clock skew breaks Last-Write-Wins — a laggy clock can silently drop the newer write.'}
   ]},
   {t:'cloze',q:'Fill the clock blanks.',distract:['vector','logical'],text:[
     'Measure durations with the ',{blank:'monotonic'},' clock, never the ',{blank:'time-of-day',alt:['time of day','wall-clock','wall clock']},
     ' clock which can jump on NTP sync. Clock ',{blank:'skew'},' makes ',{blank:'LWW',alt:['last-write-wins']},' silently drop writes.'
   ]},
   {t:'mcq',q:'To measure how long an operation took, use…',o:['the time-of-day clock','the monotonic clock','a vector clock','NTP directly'],a:1,why:'Monotonic clocks never jump backward; time-of-day can be reset by NTP mid-measurement.'},
   {t:'recall',q:'Time-of-day vs monotonic clock — when each?',model:['Time-of-day: for timestamps/calendar time, but it can jump (NTP) — bad for durations.','Monotonic: always increases — use it for elapsed time, timeouts, and benchmarks.']}
  ]},
  {id:'trouble-2',title:'Pauses & truth',steps:[
   {t:'teach',h:'Process pauses',body:[
     {k:'cause',a:'GC stop-the-world / VM migration / paging',b:'A node freezes, then resumes thinking no time passed'},
     {k:'callout',c:'warn',t:'A paused lock holder can wake up after its lease expired and corrupt data — TTL alone won’t save you.'}
   ]},
   {t:'teach',h:'Truth is decided by majority',body:[
     {k:'point',i:'🗳️',t:'A node can’t trust its own view; a quorum/majority decides what’s true.'},
     {k:'point',i:'🎟️',t:'<b>Fencing tokens</b>: every lock grant gets an increasing number; storage rejects an older token.'}
   ]},
   {t:'mcq',q:'A GC-paused client resumes holding a now-expired lock. What makes writes safe?',o:['a longer TTL','fencing tokens','a faster network','retries'],a:1,why:'Storage rejects writes carrying a token lower than the highest it has seen — the stale holder is fenced out.'},
   {t:'build',q:'Pick real causes of an unexpected multi-second pause.',options:['GC stop-the-world','VM live migration','Memory paging/swapping','A tight CPU loop','SIGSTOP'],correct:[0,1,2,4]},
   {t:'recall',q:'Why is a TTL lock unsafe without fencing tokens?',model:['A paused client’s clock doesn’t advance — it can wake after the lease expired, unaware it’s stale.','Fencing tokens (monotonic per grant) let storage reject the old holder’s writes, preventing corruption.']}
  ]}
 ],
 boss:{title:'Trouble Boss',time:70,q:[
   {q:'A network timeout is…',o:['exact','a guess','always right','unnecessary'],a:1},

   {q:'Clock skew can break…',o:['hashing','last-write-wins','TCP','compression'],a:1},
   {q:'A GC pause can make a node…',o:['faster','hold a stale lock','skip writes','rebalance'],a:1},
   {q:'Stale lock holders are stopped by…',o:['longer TTL','fencing tokens','retries','bigger heap'],a:1},
   {q:'In a distributed system, truth is decided by…',o:['one node','a quorum/majority','the client','the clock'],a:1}
 ]}
},

     {k:'point',i:'⚡',t:'<b>Cache vs read replica</b>: hot keys / sub-ms → cache; scale all reads → replica.'},
     {k:'point',i:'⏱️',t:'<b>Sync vs async</b>: caller needs the result now → sync; slow work / spikes / fan-out → async.'},

/* ---------------- toast ---------------- */
let toastT=null;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2600);
}

/* ---------------- helpers ---------------- */
const APP=()=>document.getElementById('app');
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function lessonById(id){for(const u of UNITS)for(const l of u.lessons)if(l.id===id)return{u,l};return null;}
const GOOD_PCT=80; // best score at/above this counts as a ✓ pass (no retry nudge)
function tierOf(id){if(!S.done[id])return null;if(S.perfect[id])return 'perfect';return (S.best[id]||0)>=GOOD_PCT?'good':'partial';}
function unitProgress(u){const total=u.lessons.length+1;let d=0;u.lessons.forEach(l=>{if(S.done[l.id])d++;});if(S.done['boss-'+u.id])d++;return{d,total};}
function unitUnlocked(ui){if(S.unlockAll||ui===0)return true;const prev=UNITS[ui-1];return !!S.done['boss-'+prev.id];}
function lessonUnlocked(u,li){if(S.unlockAll||li===0)return true;return !!S.done[u.lessons[li-1].id];}
function bossUnlocked(u){if(S.unlockAll)return true;return u.lessons.every(l=>S.done[l.id]);}

/* ============================ HOME ============================ */
function renderHome(){
  const lvl=levelOf(S.xp), prog=xpInLevel(S.xp);
  let h='';
  h+='<div class="stickyhead">';
  h+='<div class="topbar">'
    +'<div class="stat fire"><span class="ic">🔥</span>'+S.streak+'</div>'
    +'<div class="stat xp"><span class="ic">⚡</span>'+S.xp+'</div>'
    +'<div class="spacer"></div>'
    +'<div class="stat gem"><span class="ic">🏅</span>'+Object.keys(S.badges).length+'</div>'
    +'</div>';
  const SHORT={cap:'CAP',repl:'Repl',raft:'Raft',txn:'Txn',part:'Shard',cache:'Cache',time:'Time',msg:'Msg',lb:'LB',rl:'Rate',scale:'Scale',rel:'Reliab.',pat:'Patterns',fw:'Method',data:'Data/ML',conc:'Concur',model:'Models',batch:'Streams',trouble:'Trouble',decide:'Decide',mock:'Mocks'};
  h+='<div class="jumpbar">';
  UNITS.forEach((u,ui)=>{const bd=S.done['boss-'+u.id];const open=unitUnlocked(ui);
    h+='<button class="jchip'+(bd?' done':'')+(open?'':' lk')+'" data-jump="unit-'+u.id+'" style="--c:'+u.color+'" title="'+u.title+'"><span class="ji">'+u.icon+'</span>'+(SHORT[u.id]||u.title)+'</button>';});
  h+='</div></div>';
  h+='<div class="hero"><h1>systemDesingo 🦉</h1><p>Master distributed systems for your interview — one quick quest at a time.</p></div>';
  h+='<div class="levelcard"><div class="ring" style="--p:'+prog+'"><span>'+lvl+'</span></div>'
    +'<div class="lc-meta"><div class="lc-title">Level '+lvl+'</div><div class="lc-sub">'+prog+'/100 XP to level '+(lvl+1)+'</div></div></div>';
  const nMist=Object.keys(S.mistakes).length;
  h+='<div class="actions">'
    +'<button class="act'+(nMist?' hot':'')+'" id="reviewBtn">🩹 Review mistakes'+(nMist?' ('+nMist+')':'')+'</button>'
    +'<button class="act" id="unlockBtn">'+(S.unlockAll?'🔓 Free-roam: ON':'🔒 Free-roam: OFF')+'</button>'
    +'</div>';

  UNITS.forEach((u,ui)=>{
    const unlocked=unitUnlocked(ui);
    const {d,total}=unitProgress(u);
    h+='<div class="unit" id="unit-'+u.id+'">';
    h+='<div class="unit-head" style="background:'+u.color+'">'
      +'<div class="u-k">Unit '+(ui+1)+' · '+d+'/'+total+'</div>'
      +'<div class="u-t">'+u.icon+' '+u.title+(unlocked?'':' 🔒')+'</div>'
      +'<div class="u-b">'+u.blurb+'</div></div>';
    h+='<div class="path">';
    u.lessons.forEach((l,li)=>{
      const open=unlocked&&lessonUnlocked(u,li);
      const done=S.done[l.id];
      const tier=tierOf(l.id);
      const perfect=tier==='perfect';
      const cls=done?('done '+tier):(open?'':'locked');
      const off=li%2===1?'off1':(li%2===0&&li>0?'off2':'');
      const title=(done&&!perfect)?(' title="Best '+(S.best[l.id]||0)+(tier==='good'?'% — passed; revisit to perfect it':'% — revisit to perfect it')+'"'):'';
      h+='<div class="node-wrap '+off+'">'
        +'<button class="node '+cls+'" '+(open?('data-lesson="'+l.id+'"'):'')+title+' style="'+(open||done?('background:'+u.color):'')+'">'+(done?'':'★')+(open||done?'':'🔒')+'</button>'
        +'<div class="node-label">'+l.title+(done&&!perfect?' <span class="pct">'+(S.best[l.id]||0)+'%</span>':'')+'</div></div>';
    });
    // boss node
    const bopen=unlocked&&bossUnlocked(u);
    const bdone=S.done['boss-'+u.id];
    const btier=tierOf('boss-'+u.id);
    const bperfect=btier==='perfect';
    h+='<div class="node-wrap">'
      +'<button class="node boss '+(bdone?('done '+btier):(bopen?'':'locked'))+'" '+(bopen?('data-boss="'+u.id+'"'):'')+((bdone&&!bperfect)?(' title="Best '+(S.best['boss-'+u.id]||0)+'% — revisit"'):'')+' style="'+(bopen||bdone?'background:'+u.colorD:'')+'">'+(bopen||bdone?'👑':'🔒')+'</button>'
      +'<div class="node-label">'+u.boss.title+(bdone&&!bperfect?' <span class="pct">'+(S.best['boss-'+u.id]||0)+'%</span>':'')+'</div></div>';
    h+='</div></div>';
  });

  // coming soon
  if(SOON.length)h+='<div class="unit"><div class="unit-head" style="background:#BDBDBD"><div class="u-k">Coming soon</div><div class="u-t">🚧 More units</div><div class="u-b">'+SOON.join(' · ')+'</div></div></div>';

  // badges shelf
  h+='<div class="shelf"><h3>🏅 Badges</h3><div class="badges">';
  BADGES.forEach(b=>{const got=S.badges[b.id];h+='<div class="badge '+(got?'':'lock')+'"><div class="bi">'+b.icon+'</div><small>'+b.name+'</small></div>';});
  h+='</div></div>';

  h+='<div class="tip">Progress saves automatically on this device. &nbsp;⌨ Keys: <b>1–4</b> answer · <b>Enter</b> continue · <b>Esc</b> quit</div>';

  APP().innerHTML=h;
  APP().querySelectorAll('[data-lesson]').forEach(n=>n.onclick=()=>startLesson(n.dataset.lesson));
  APP().querySelectorAll('[data-boss]').forEach(n=>n.onclick=()=>startBoss(n.dataset.boss));
  document.getElementById('reviewBtn').onclick=startReview;
  document.getElementById('unlockBtn').onclick=()=>{S.unlockAll=!S.unlockAll;save();renderHome();};
  APP().querySelectorAll('[data-jump]').forEach(b=>b.onclick=()=>{const el=document.getElementById(b.dataset.jump);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});});
  try{window.scrollTo(0,0);}catch(e){}
}

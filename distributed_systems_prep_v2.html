{
 id:'fw',title:'Interview Framework',icon:'🎯',color:'#58CC02',colorD:'#46a302',
 blurb:'Structure beats panic. Drive the conversation.',
 lessons:[
  {id:'fw-1',title:'The flow',steps:[
   {t:'teach',h:'A repeatable structure',body:[
     {k:'tldr',t:'Five phases: requirements (top-3 functional + quantified NFRs) → entities + API → high-level design → deep dives → wrap-up. Drill the order below.'},
     {k:'point',i:'🔑',t:'API tip: keep the contract resource-oriented and paginate feeds with a <b>cursor (keyset)</b>, not offset.'},
     {k:'point',i:'🧮',t:'Back-of-envelope math <b>only when a number changes the design</b> — not as ritual.'}
   ]},
   {t:'order',q:'Order the interview steps.',items:['Clarify requirements','Define core entities + API','High-level design','Deep dives','Wrap up: bottlenecks & SPOFs']},
   {t:'mcq',q:'Per the delivery framework, do upfront capacity math when…',o:['always, in detail','only when a number changes the design','never','at the end'],a:1,why:'Estimate only when it drives a decision (e.g. does the heap fit on one node?).'},
   {t:'teach',h:'Common mistakes',body:[
     {k:'tldr',t:'Four ways candidates lose the room — each with what it sounds like.'},
     {k:'point',i:'🏗️',t:'<b>Designing before clarifying</b> — "I’ll use Kafka + Cassandra" before asking what the system does or its scale.'},
     {k:'point',i:'🎈',t:'<b>Over-engineering for 1K users</b> — reaching for sharding, multi-region, and a queue for an app with a thousand users.'},
     {k:'point',i:'🫥',t:'<b>Hand-waving the hard part</b> — "…and then the feed appears," skipping the fan-out / ranking the question is really testing.'},
     {k:'point',i:'💥',t:'<b>Ignoring failure</b> — never saying what happens when the cache, a node, or the leader dies.'}
   ]},
   {t:'recall',q:'Name the non-functional requirements you should always probe.',model:['Consistency vs availability, scale (DAU/QPS/read:write), latency targets.','Durability, security/compliance, fault tolerance — quantify the top 3–5 that matter here.']}
  ]},
  {id:'fw-2',title:'Requirements & NFRs',steps:[
   {t:'teach',h:'Functional vs non-functional',body:[
     {k:'tldr',t:'Functional = WHAT it does (the top ~3 features). Non-functional = HOW WELL it must do them — scale, latency, consistency, durability. The architecture is mostly a response to the NFRs, so always quantify the 3–5 that matter here.'},
     {k:'point',i:'✅',t:'<b>Functional (FR)</b>: user-facing actions — "post a tweet", "search products", "book a seat". Pick the top ~3; don’t enumerate every feature.'},
     {k:'point',i:'📐',t:'<b>Non-functional (NFR)</b>: scale, latency, consistency vs availability, durability, security/compliance, fault tolerance.'},
     {k:'callout',c:'warn',t:'"Make it scalable and fast" is not an NFR — it’s a wish. A real NFR carries a <b>number</b>: 100M DAU, 50k QPS peak, p99 &lt; 200ms, 99.99% uptime, zero data loss.'}
   ]},
   {t:'sort',q:'Functional or non-functional?',buckets:['Functional','Non-functional'],items:[
     {text:'users can post a tweet',b:0},{text:'feed loads in < 200ms',b:1},{text:'follow another user',b:0},{text:'handle 100M daily users',b:1},{text:'search posts by keyword',b:0},{text:'survive a data-center outage',b:1}
   ]},
   {t:'mcq',q:'A candidate says "the system should be highly scalable." Why is that weak?',o:['scalability never matters','it isn’t quantified — no DAU/QPS/latency number to design against','you should never mention scale','it’s actually a functional requirement'],a:1,why:'An NFR only guides design once it has a number. "Scalable" → 100M DAU, 50k QPS peak, p99 < 200ms — those figures decide sharding, caching, and replication.'},
   {t:'match',q:'NFR → how you pin it down with the interviewer.',pairs:[['Scale','DAU, peak QPS, read:write ratio'],['Latency','a p99 target in ms'],['Availability','how many 9s / tolerable downtime'],['Consistency','can a read be stale, or must it be exact?'],['Durability','is losing this data ever acceptable?']]},
   {t:'mcq',q:'For a payments system, which NFR dominates?',o:['lowest possible latency above all','correctness / strong consistency — never double-charge or lose money','maximum availability even if inconsistent','a polished UI'],a:1,why:'Money systems put correctness and consistency above availability — better to reject a charge than double-charge. Contrast a social feed, where availability + eventual consistency win. The dominant NFR flips by product.'},
   {t:'build',q:'Pick what makes a NON-functional requirement useful in an interview.',options:['A concrete number (DAU, QPS, p99)','The word "scalable"','States the consistency vs availability choice','"It should be fast"','Names a tolerable failure / downtime'],correct:[0,2,4]},
   {t:'cloze',q:'Fill the requirements checklist.',distract:['features','colours'],text:[
     'List the top ~3 ',{blank:'functional',alt:['FR','functional requirements']},' requirements (what it does), then quantify the ',{blank:'non-functional',alt:['NFR','non-functional requirements']},' ones — scale, ',{blank:'latency',alt:['p99','latency target']},', consistency vs availability, durability. Each needs a ',{blank:'number',alt:['metric','figure']},', not an adjective.'
   ]},
   {t:'recall',q:'Walk the requirements phase: what do you nail down before drawing any boxes?',model:['Top ~3 functional requirements — the core user actions, not an exhaustive list.','The NFRs that shape the design, each quantified: scale (DAU/QPS/read:write), latency (p99), consistency vs availability, durability, security/compliance.','Restate the scope back to the interviewer so you’re provably solving the right problem.']}
  ]}
 ],
 boss:{title:'Framework Boss',time:60,q:[
   {q:'"Highly scalable" becomes a real NFR once you…',o:['add more servers','attach numbers (DAU, QPS, p99)','draw a diagram','pick NoSQL'],a:1},
   {q:'For a payments system the dominant NFR is…',o:['lowest latency','correctness / strong consistency','max availability','UI polish'],a:1},
   {q:'Prioritise how many functional requirements?',o:['all of them','the top ~3','none','10+'],a:1},
   {q:'Current user should come from…',o:['request body','the auth token','a path param','user-typed input'],a:1},
   {q:'Capacity math is worth doing when…',o:['always','it changes the design','never','only at start'],a:1},
   {q:'Pagination for feeds should be…',o:['offset','cursor/keyset','none','random'],a:1},
   {q:'The deep-dive phase is where you…',o:['draw boxes','harden vs NFRs & failure','clarify scope','estimate'],a:1},
   {q:'A common failure is…',o:['clarifying too much','designing before clarifying','listening','simple designs'],a:1}
 ]}
},
{
 id:'decide',title:'Design Decisions',icon:'🧭',color:'#0EA5E9',colorD:'#0284C7',
 blurb:'One scenario, two paths — pick fast and justify.',
 lessons:[
  {id:'decide-1',title:'Pick a side',steps:[
   {t:'teach',h:'The recurring forks',body:[
     {k:'tldr',t:'Most designs come down to a few binary forks — SQL/NoSQL, queue/log, cache/replica, sync/async. Memorize the deciding QUESTION, not a default answer. Drill all four below.'},
     {k:'point',i:'🗣️',t:'Say the deciding question out loud, then commit + justify — interviewers grade the <b>why</b>.'}
   ]},
   {t:'sort',q:'SQL or NoSQL?',buckets:['SQL','NoSQL'],items:[
     {text:'transactions + joins (orders, payments)',b:0},{text:'huge scale, simple access, flexible schema',b:1},{text:'strong consistency on money',b:0},{text:'write-heavy event firehose',b:1}
   ]},
   {t:'match',q:'Queue, Pub/Sub, or Log — match the need.',pairs:[['Distribute work: one consumer per message','Queue (SQS/RabbitMQ)'],['Broadcast each event to every subscriber','Pub/Sub (SNS/Redis)'],['Durable, replayable, ordered event stream','Log (Kafka)']]},
   {t:'sort',q:'Cache or read replica?',buckets:['Cache','Read replica'],items:[
     {text:'hot keys, sub-ms reads',b:0},{text:'scale ALL reads incl. cold',b:1},{text:'offload the primary / analytics',b:1},{text:'cut repeated lookups',b:0}
   ]},
   {t:'sort',q:'Sync or async?',buckets:['Sync','Async'],items:[
     {text:'caller needs the result now',b:0},{text:'slow / heavy work',b:1},{text:'spikes to absorb, fan-out',b:1},{text:'short work, clear back-pressure',b:0}
   ]},
   {t:'recall',q:'CP vs AP — what is the deciding question?',model:['"Is a wrong/stale answer acceptable here?"','No (money, inventory, locks) → CP. Yes (feeds, counts, search) → AP for availability + latency.']}
  ]},
  {id:'decide-2',title:'Which datastore?',steps:[
   {t:'teach',h:'Match data to store',body:[
     {k:'tldr',t:'Pick by <b>access pattern + consistency need</b>, never by brand:<br>· relational (ACID/joins; Spanner/CockroachDB scale it globally)<br>· key-value (cache/sessions)<br>· wide-column (write-heavy at scale; Cassandra, Bigtable)<br>· time-series (metrics, append-by-time; InfluxDB, Timescale)<br>· search (full-text)<br>· graph (multi-hop)<br>· columnar/OLAP (big aggregates over few columns, ≠ wide-column point access)<br>Drill the fit below.'}
   ]},
   {t:'match',q:'Match the workload to its datastore.',pairs:[['ACID txns + joins','Relational (Postgres / Spanner)'],['Write-heavy at huge scale','Wide-column (Cassandra / Bigtable)'],['Metrics & events over time','Time-series (InfluxDB / Timescale)'],['Analytics: scan billions of rows, few columns','Columnar / OLAP (ClickHouse)'],['Full-text search','Elasticsearch'],['Multi-hop relationships','Graph (Neo4j)'],['Cache / sessions','Key-value (Redis)']]},
   {t:'mcq',q:'Dashboards aggregating billions of rows over just a few columns. Which store?',o:['relational (Postgres)','columnar / OLAP (ClickHouse, BigQuery)','key-value (Redis)','graph (Neo4j)'],a:1,why:'Columnar engines read only the needed columns and compress them well — built for big aggregates, unlike row stores or point-lookup KV/graph engines.'},
   {t:'teach',h:'Why columnar compresses so well',body:[
     {k:'tldr',t:'A row store keeps a whole row together; a columnar store keeps each column together. Because one column is a single type — and often repetitive — it compresses far harder, so a scan reads far fewer bytes off disk.'},
     {k:'callout',c:'mem',t:'Don’t confuse with <b>wide-column</b> (Cassandra): that’s row-oriented per partition, tuned for fast point lookups/writes. <b>Columnar/OLAP</b> stores each column separately for big scans — the opposite optimization.'}
   ]},
   {t:'htmlviz',h:'How the encodings look',
    html:`<style>
.enc{display:grid;gap:12px}
.enc-row{display:grid;gap:8px;padding:11px;border:2px solid var(--color-border-primary);border-radius:14px;background:var(--color-background-secondary)}
.enc-h{font-size:12.5px;font-weight:900;color:var(--color-text-primary)}
.enc-flow{display:flex;align-items:flex-start;flex-wrap:wrap;gap:10px}
.enc-grp{display:grid;gap:4px}
.enc-lbl{font-size:9.5px;font-weight:800;color:var(--color-text-secondary);text-transform:uppercase;letter-spacing:.04em}
.enc-col{display:flex;flex-wrap:wrap;gap:3px;align-items:center;max-width:260px}
.enc-cell{font-family:ui-monospace,monospace;font-size:11px;font-weight:800;padding:3px 7px;border-radius:6px;border:1px solid var(--color-border-tertiary);color:var(--color-text-secondary)}
.enc-pair{font-family:ui-monospace,monospace;font-size:11.5px;font-weight:900;padding:4px 9px;border-radius:7px;border:1.5px solid}
.enc-arr{align-self:center;font-size:16px;font-weight:900;color:var(--color-text-tertiary)}
.enc-cap{font-size:12.5px;color:var(--color-text-secondary);line-height:1.5;padding:9px 12px;background:var(--color-background-primary);border-radius:10px}
.enc-cap b{color:var(--color-text-primary)}
.enc-cap code,.enc-cell code{font-family:ui-monospace,monospace}
.c0{background:var(--color-background-info);color:var(--color-text-info);border-color:var(--color-border-info)}
.c1{background:var(--color-background-success);color:var(--color-text-success);border-color:var(--color-border-success)}
.c2{background:var(--color-background-warning);color:var(--color-text-warning);border-color:var(--color-border-warning)}
@media(max-width:520px){.enc-flow{flex-direction:column}.enc-arr{transform:rotate(90deg)}}
</style>
<div class="enc">
  <div class="enc-row">
    <div class="enc-h">🏃 Run-length encoding — best on a sorted / repetitive column</div>
    <div class="enc-flow">
      <div class="enc-grp"><div class="enc-lbl">raw column (9 rows)</div><div class="enc-col"><span class="enc-cell c0">US</span><span class="enc-cell c0">US</span><span class="enc-cell c0">US</span><span class="enc-cell c0">US</span><span class="enc-cell c1">FR</span><span class="enc-cell c1">FR</span><span class="enc-cell c1">FR</span><span class="enc-cell c2">DE</span><span class="enc-cell c2">DE</span></div></div>
      <div class="enc-arr">→</div>
      <div class="enc-grp"><div class="enc-lbl">stored as</div><div class="enc-col"><span class="enc-pair c0">US ×4</span><span class="enc-pair c1">FR ×3</span><span class="enc-pair c2">DE ×2</span></div></div>
    </div>
    <div class="enc-cap">9 values → <b>3 (value, count) pairs</b>. A million-row run of <code>"US"</code> collapses to a single pair.</div>
  </div>
  <div class="enc-row">
    <div class="enc-h">📖 Dictionary encoding — best on low-cardinality strings</div>
    <div class="enc-flow">
      <div class="enc-grp"><div class="enc-lbl">raw column</div><div class="enc-col"><span class="enc-cell c0">active</span><span class="enc-cell c1">pending</span><span class="enc-cell c0">active</span><span class="enc-cell c2">closed</span><span class="enc-cell c0">active</span><span class="enc-cell c1">pending</span></div></div>
      <div class="enc-arr">→</div>
      <div class="enc-grp"><div class="enc-lbl">int codes + dictionary</div><div class="enc-col"><span class="enc-cell c0">0</span><span class="enc-cell c1">1</span><span class="enc-cell c0">0</span><span class="enc-cell c2">2</span><span class="enc-cell c0">0</span><span class="enc-cell c1">1</span></div><div class="enc-col" style="margin-top:2px"><span class="enc-pair c0">0=active</span><span class="enc-pair c1">1=pending</span><span class="enc-pair c2">2=closed</span></div></div>
    </div>
    <div class="enc-cap">Each string is stored <b>once</b> in the dictionary; the column becomes tiny <b>int codes</b> — smaller on disk and fast to scan &amp; aggregate.</div>
  </div>
</div>`},
   {t:'mcq',q:'Why does columnar storage compress far better than row storage?',o:['it silently drops old data','each column is one often-repetitive type → run-length & dictionary encoding crush it','it just uses stronger gzip','the rows are encrypted'],a:1,why:'Storing a column together means a single type and lots of repetition: RLE collapses runs into value×count, and dictionary encoding maps low-cardinality strings to small int codes — so scans read far fewer bytes.'},
   {t:'sort',q:'Strong or eventual consistency?',buckets:['Strong','Eventual'],items:[
     {text:'account balance',b:0},{text:'like / view counts',b:1},{text:'inventory',b:0},{text:'search index',b:1}
   ]},
   {t:'cloze',q:'Fill the datastore decision rule.',distract:['cache','queue'],text:[
     'Need transactions or joins → ',{blank:'SQL',alt:['relational']},'. Write-heavy at huge scale → ',
     {blank:'wide-column',alt:['wide column','Cassandra']},'. Full-text search → ',{blank:'Elasticsearch',alt:['search']},
     '. In the interview the ',{blank:'justification',alt:['reasoning','why']},' is graded, not the pick.'
   ]},
   {t:'mcq',q:'Feed delivery for a celebrity with 50M followers — fanout on write or read?',o:['pure fanout-on-write','fanout-on-read / hybrid for celebrities','neither','sharding'],a:1,why:'Pushing one post to 50M timelines is too expensive; pull/merge celebrity posts at read time (hybrid).'},
   {t:'recall',q:'How do you choose a database in an interview?',model:['State the access pattern and consistency need first ("read-heavy key lookups, eventual is fine").','Then name the store and justify: "so a wide-column KV like Cassandra fits." The justification is what’s graded.']}
  ]},
  {id:'decide-3',title:'Signal → strategy',steps:[
   {t:'teach',h:'Train the reflex',body:[
     {k:'tldr',t:'Interviews reward a fast, justified jump from a constraint to a strategy. Learn the trigger → tool reflexes.'},
     {k:'point',i:'🌍',t:'Users worldwide + static/media → <b>CDN / edge cache</b>.'},
     {k:'point',i:'📖',t:'Read-heavy, staleness OK → <b>replicas + cache</b>.'},
     {k:'point',i:'🔥',t:'Hot key → <b>dedicated cache / fanout-on-read</b>.'},
     {k:'point',i:'🌊',t:'Spiky or slow work → <b>queue (async buffer)</b>.'},
     {k:'point',i:'🔒',t:'Wrong/stale answer unacceptable → <b>CP / strong consistency</b>.'}
   ]},
   {t:'match',q:'Signal → first-reach strategy.',pairs:[['Users across continents, static assets','CDN / edge cache'],['Read:write ≈ 100:1, staleness OK','Cache + read replicas'],['10× launch-day traffic spike','Queue + autoscale (async)'],['Must never double-charge on retry','Idempotency key'],['Celebrity key — 90% of reads','Fanout-on-read / dedicated cache']]},
   {t:'sort',q:'Strong consistency (CP) or availability-first (AP)?',buckets:['CP (strong)','AP (available)'],items:[
     {text:'payment / account balance',b:0},{text:'social feed',b:1},{text:'inventory decrement',b:0},{text:'view counts',b:1}
   ]},
   {t:'mcq',q:'Global users, media-heavy, reads dominate. First reach for…',o:['a bigger DB','a CDN / edge cache','more shards','a message queue'],a:1,why:'Geographically distributed, read-heavy static/media → cache at the edge near users (CDN).'},
   {t:'mcq',q:'A burst of writes you can process within minutes, not seconds. Best fit?',o:['synchronous write path','a queue to buffer + async workers','a bigger cache','a distributed lock'],a:1,why:'Decouple the spike: enqueue and process asynchronously so the front-end stays responsive.'},
   {t:'mcq',q:'Reads dominate 100:1 and brief staleness is fine. Cheapest scale move?',o:['shard the writes','cache + read replicas','switch to NoSQL','add a queue'],a:1,why:'Read-heavy + staleness-tolerant → serve from cache and read replicas before anything more invasive.'},
   {t:'cloze',q:'Fill the reflexes.',distract:['shard','lock'],text:[
     'Worldwide static content → ',{blank:'CDN',alt:['edge','edge cache']},'. Read-heavy with tolerable staleness → ',{blank:'cache',alt:['caching']},
     ' + replicas. Spiky/slow work → a ',{blank:'queue',alt:['message queue']},'. Money/inventory → ',{blank:'CP',alt:['strong']},' (strong consistency).'
   ]}
  ]},
  {id:'decide-4',title:'Failover & fail modes',steps:[
   {t:'teach',h:'Two forks under failure',body:[
     {k:'tldr',t:'Two decisions surface the moment you discuss failure: <b>active-active vs active-passive</b> (how many regions take writes) and <b>fail-open vs fail-closed</b> (what to do when a check is down). Each has one deciding question — drill both below.'},
     {k:'point',i:'🌐',t:'<b>Active-passive:</b> one region writes, a standby promotes on failover — simple, no conflicts. <b>Active-active:</b> every region writes — low latency near users, but you must resolve conflicts and risk split-brain.'},
     {k:'point',i:'🚦',t:'<b>Fail-open:</b> dependency down → allow the request (availability). <b>Fail-closed:</b> down → block it (safety). Stakes decide which.'}
   ]},
   {t:'sort',q:'Active-active or active-passive?',buckets:['Active-active','Active-passive'],items:[
     {text:'lowest write latency for users on every continent',b:0},
     {text:'simplest failover, one writer, no conflicts',b:1},
     {text:'avoid conflict resolution entirely',b:1},
     {text:'must serve writes near users worldwide',b:0}
   ]},
   {t:'mcq',q:'You go active-active across 3 regions. The hardest problem you just signed up for?',o:['picking a load balancer','conflict resolution + split-brain when regions diverge','choosing a cache TTL','DNS propagation'],a:1,why:'Multiple regions accepting writes can update the same key concurrently. You need conflict resolution (LWW, CRDTs, or home-region-per-key) and must prevent split-brain. Active-passive sidesteps all of this with a single writer.'},
   {t:'mcq',q:'A user always edits from Europe. Cheapest way to avoid cross-region write conflicts for their data?',o:['replicate synchronously everywhere','home-region per user/key — route their writes to one region','disable replication','use a bigger instance'],a:1,why:'Pin each user/key to a home region so their writes never race another region — you get locality without global conflict resolution, and it also respects data-residency rules.'},
   {t:'sort',q:'Fail-open or fail-closed?',buckets:['Fail-open','Fail-closed'],items:[
     {text:'rate limiter down on a free consumer app',b:0},
     {text:'auth / login service down',b:1},
     {text:'payment fraud check down',b:1},
     {text:'recommendation service down',b:0}
   ]},
   {t:'mcq',q:'Your rate limiter is down and the endpoint is a paid billing API. Fail-open or fail-closed?',o:['fail-open — never block paying users','fail-closed — protect the system and money','depends on the cache','always fail-open'],a:1,why:'On a paid/admin/security endpoint, letting unlimited traffic through risks abuse or cost blowup — fail closed. On a free consumer read path you’d usually fail open to keep it available. Same component, opposite choice by stakes.'},
   {t:'recall',q:'Fail-open vs fail-closed — what is the deciding question?',model:['"If this check is unavailable, is it safer to let the request through or block it?"','Block → fail-closed (auth, payments, security). Let through → fail-open (rate limit on consumer reads, recommendations). The stakes decide.']}
  ]},
  {id:'decide-5',title:'Keys, cost & schema traps',steps:[
   {t:'teach',h:'Pick the key, know the cost',body:[
     {k:'tldr',t:'Three fast reflexes graders reward: pick the <b>shard key</b> by access pattern, name the <b>cost-dominant component</b>, and check the <b>schema actually serves the reads</b>.'},
     {k:'point',i:'🔑',t:'Shard key = the field you query by most. Avoid <b>low-cardinality</b> keys (few values → few shards) and <b>monotonic</b> keys (timestamp / auto-id → one hot shard).'},
     {k:'callout',c:'mem',t:'A hot large group (a 500k-member chat, a celebrity) breaks an otherwise fine key — always name the mitigation: sub-shard, dedicated cache, or fanout-on-read.'}
   ]},
   {t:'match',q:'Pick the shard key.',pairs:[['Chat messages','conversation_id (sub-shard hot groups)'],['Feed timelines','user_id'],['URL shortener','the short code / hash'],['Metrics points','(series, time_bucket)']]},
   {t:'mcq',q:'Why is "shard by created_at timestamp" usually a bad key?',o:['timestamps aren’t unique','it’s monotonic — every new write hits the newest shard (hot spot)','it can’t be indexed','it wastes disk'],a:1,why:'A monotonically increasing key routes all new writes to the same latest shard — a write hot spot. Good keys are high-cardinality and evenly accessed. (Same reason auto-increment IDs make poor shard keys.)'},
   {t:'match',q:'Where does the cost concentrate?',pairs:[['Video streaming','egress / CDN bandwidth'],['Metrics & logs','ingest + retention / cardinality'],['ML serving','GPU utilization'],['Social feed','fanout / write amplification + cache memory']]},
   {t:'mcq',q:'A feed loads a deep page via OFFSET 1000000 LIMIT 20. Why does it crawl?',o:['LIMIT is too small','OFFSET scans and discards a million rows every query','the index is corrupt','too many columns'],a:1,why:'OFFSET must walk and throw away every preceding row, so deep pages get linearly slower — a scan trap. Cursor / keyset pagination (WHERE id < last_seen) uses the index to jump straight to the page, O(1) regardless of depth.'},
   {t:'sort',q:'Does the schema serve the read, or force a scan?',buckets:['Serves it','Scan trap'],items:[
     {text:'query by user_id, with an index on user_id',b:0},
     {text:'find orders by status, no index on status',b:1},
     {text:'deep pagination via OFFSET',b:1},
     {text:'cursor pagination on an indexed key',b:0}
   ]},
   {t:'recall',q:'How do you sanity-check a schema in an interview?',model:['Walk each read path: "does a primary key or secondary index serve this, or am I scanning?"','Then the writes: an idempotency key on the request, a clear status lifecycle (AVAILABLE→HELD→BOOKED), and an outbox row if you publish events.']}
  ]}
 ],
 boss:{title:'Decisions Boss',time:85,q:[
   {q:'Orders + payments need…',o:['NoSQL for scale','SQL (transactions/joins)','a cache','a queue'],a:1},
   {q:'You need replay + multiple subscribers →',o:['a queue (SQS)','a log (Kafka)','a cache','a cron'],a:1},
   {q:'Hot-key sub-ms reads →',o:['read replica','cache','bigger DB','sharding'],a:1},
   {q:'Slow heavy work with spikes →',o:['sync call','async + queue','a lock','a join'],a:1},

   {q:'Full-text search →',o:['Postgres LIKE','Elasticsearch','a graph DB','Redis'],a:1},
   {q:'Celebrity feed fanout →',o:['write to all 50M','read-time / hybrid','no fanout','a cron'],a:1},
   {q:'Global users + static media → first reach for…',o:['a CDN / edge cache','more shards','a queue','a lock'],a:0},
   {q:'A 10× write spike you can process later → use…',o:['a sync path','a queue + async workers','a bigger cache','2PC'],a:1},
   {q:'Active-active multi-region’s hardest cost?',o:['DNS setup','conflict resolution + split-brain','TLS certs','log volume'],a:1},
   {q:'Auth service is down — the safe default is…',o:['fail-open','fail-closed','retry forever','cache the token'],a:1},
   {q:'Shard key for chat messages?',o:['created_at timestamp','conversation_id (sub-shard hot groups)','random UUID','message status'],a:1},
   {q:'Cost-dominant component for video streaming?',o:['CPU','egress / CDN bandwidth','DB rows','app RAM'],a:1},
   {q:'Deep pagination at scale — use…',o:['OFFSET','cursor / keyset pagination','a bigger LIMIT','a join'],a:1}
 ]}

{
 id:'mock',title:'Mock Designs',icon:'🎤',color:'#7C3AED',colorD:'#6D28D9',
 blurb:'Full end-to-end design reps — the real 45-minute interview.',
 lessons:[
  {id:'mock-1',title:'URL shortener',steps:[
   {t:'teach',h:'1 · Requirements',body:[
     {k:'tldr',t:'Design Bitly (a URL shortener).'},
     {k:'spoiler',items:[
       {k:'reqs',i:'✅',label:'Functional',items:['create short link (collision-free unique code)','redirect','basic analytics']},
       {k:'reqs',i:'📐',label:'NFRs',items:['<b>read-heavy</b> (~100:1)','low-latency redirects','high availability']}
     ]}
   ]},
   {t:'recall',q:'2 · Entities + 3 · core API. Say them out loud.',model:['Entity: <code>urls(code PK, long_url, created_at, click_count)</code>','<code>POST /urls {long_url}</code> → <code>{code}</code>','<code>GET /{code}</code> → 301/302 redirect (the hot path)','<code>GET /urls/{code}</code> → analytics (clicks, created_at)']},
   {t:'teach',h:'Generating the short code',body:[
     {k:'tldr',t:'You need a short, unique, collision-free code per URL — the trick is turning a unique number into a short string.'},
     {k:'point',i:'🔢',t:'<b>Base62-encode a unique ID</b> (a counter or Snowflake id): 0-9a-zA-Z → ~7 chars covers 3.5 trillion codes, collision-free by construction. The usual answer.'},
     {k:'point',i:'🔼',t:'<b>Counter → Base62</b> gives sequential, index-friendly codes (inserts stay local since <code>code</code> is the PK). The catch: one counter is a write bottleneck, and the codes are <b>enumerable</b> (anyone can walk /1, /2, …). Fixes: hand each server an ID range, or use Snowflake; permute the ID if codes must be unguessable.'},
     {k:'point',i:'⚠️',t:'<b>Hash the URL + truncate</b> is short but collides — you must detect clashes and retry, and identical URLs collapse to one code.'},
     {k:'point',i:'🎲',t:'<b>Random string + retry on clash</b> works, but every insert needs a uniqueness check (an extra read).'},
     {k:'callout',c:'warn',t:'<b>UUID v4</b> is unique but 36 chars (not "short") — wrong tool for a URL shortener. (Random codes hurt PK-insert locality too, but that is true of <em>any</em> random scheme, not UUID specifically.)'}
   ]},
   {t:'htmlviz',h:'Three ways to mint the id',
    html:`<style>
.idgen{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.idgen .ig{border:2px solid var(--line);border-bottom-width:4px;border-radius:14px;padding:12px 13px;display:flex;flex-direction:column;gap:8px}
.idgen .ig.r{border-color:var(--red)}.idgen .ig.o{border-color:var(--orange)}.idgen .ig.g{border-color:var(--green)}
.idgen .ig h4{font-size:15px;font-weight:900;color:var(--ink);margin:0}
.idgen .tag{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-top:-4px}
.idgen .mech{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11.5px;line-height:1.5;background:var(--panel);border-radius:10px;padding:8px 10px;color:var(--ink)}
.idgen ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:4px}
.idgen li{font-size:12.5px;font-weight:700;line-height:1.35;color:var(--ink);display:flex;gap:6px}
.idgen li.p::before{content:'✓';color:var(--green-d);font-weight:900}
.idgen li.c::before{content:'✗';color:var(--red-d);font-weight:900}
.idgen .use{font-size:11.5px;font-weight:800;color:var(--muted);border-top:2px solid var(--line);padding-top:7px;margin-top:auto}
.idgen-cap{font-size:13px;color:var(--muted);font-weight:700;line-height:1.55;margin-top:10px;padding:10px 13px;background:var(--panel);border-radius:12px}
.idgen-cap b{color:var(--ink)}
@media(max-width:560px){.idgen{grid-template-columns:1fr}}
</style>
<div class="idgen">
  <div class="ig r">
    <h4>Counter</h4><div class="tag">INCR / auto-increment</div>
    <div class="mech">n = INCR(counter)<br>code = base62(n)</div>
    <ul>
      <li class="p">Simplest — one atomic op</li>
      <li class="p">Collision-free by construction</li>
      <li class="p">Short, sequential codes</li>
      <li class="c">Counter = coordination point</li>
      <li class="c">Codes enumerable / guessable</li>
    </ul>
    <div class="use">Use when: low write volume — most shorteners. The default.</div>
  </div>
  <div class="ig o">
    <h4>Range allocation</h4><div class="tag">block / ticket</div>
    <div class="mech">block = INCRBY(counter,1000)<br>serve 1000 ids locally, refill</div>
    <ul>
      <li class="p">~1000× fewer round-trips</li>
      <li class="p">Collision-free</li>
      <li class="p">Survives brief counter outages</li>
      <li class="c">Lost block on restart → id gaps</li>
      <li class="c">Still roughly sequential</li>
    </ul>
    <div class="use">Use when: higher write rate, fewer hops.</div>
  </div>
  <div class="ig g">
    <h4>Snowflake</h4><div class="tag">local, time-based</div>
    <div class="mech">id = [ time | worker | seq ]<br>generated on each node</div>
    <ul>
      <li class="p">Zero coordination</li>
      <li class="p">Time-ordered ids</li>
      <li class="p">Scales horizontally</li>
      <li class="c">Needs worker-id assignment</li>
      <li class="c">Longer codes; clock-skew care</li>
    </ul>
    <div class="use">Use when: very high or multi-region writes.</div>
  </div>
</div>
<div class="idgen-cap"><b>Left → right = less central coordination.</b> All three base62-encode a unique number; they differ only in <b>where the number comes from</b>. None needs a separate service — counter and range are a row you already have; Snowflake is local to each node.</div>`},
   {t:'mcq',q:'Best way to generate unique short codes?',o:['hash the URL and truncate (collisions)','base62-encode a unique counter/ID','a random string, retry on clash','a UUID v4'],a:1,why:'Base62 of a monotonic ID is collision-free and short (~7 chars covers 3.5 trillion). Hash-truncate risks collisions.'},

<div class="urlx-cap"><b>Redirect reads are the system.</b> Redis/cache-aside is the default; CDN/edge is a later optimization for globally hot, cacheable redirects. Keep analytics and writes off the hot path; choose 301 for browser caching, 302 when you need to count every click.</div>
</div>`},
   {t:'mcq',q:'You need per-click analytics. For the redirect, should you return 301 or 302?',o:['301 (permanent) — fastest, and best for analytics','302 (found / temporary) — every click hits your server','308 — the only correct status here','no real difference, pick either'],a:1,why:'301 gets cached by browsers and CDNs, so repeat clicks skip your server entirely — fast, but you lose per-click analytics. Since you need to count every click, use 302: it routes every click through you (more traffic, but accurate counts). Bitly returns 302 for exactly this reason. Without an analytics requirement, 301 would win.'},
   {t:'build',q:'4 · Pick the high-level components.',options:['ID/counter generator','KV store (code → URL)','Redis/cache-aside for hot redirects','Async analytics pipeline','A graph database','A relational DB with heavy joins'],correct:[0,1,2,3]},
   {t:'htmlviz',h:'4 · Architecture',html:'',setup:function(root){root.innerHTML=archDiagram({w:770,h:330,cap:'<b>Read (top):</b> client → redirect svc → Redis (hot codes) → KV store on a miss. <b>Write (bottom):</b> create API mints a base62 id (counter / Snowflake — no separate service) and writes the <code>code → URL</code> mapping to the KV store. <b>Clicks</b> fork to a queue → analytics, off the hot path. CDN/edge is optional for cacheable global hotspots, not the starting point.',nodes:[{x:20,y:136,w:120,t:'Client',c:'gray'},{x:178,y:44,w:150,t:'Redirect svc',s:'302 + cache-aside',c:'blue'},{x:370,y:44,w:130,t:'Redis cache',s:'hot codes',c:'teal'},{x:540,y:44,w:210,t:'KV store',s:'DynamoDB',c:'gray'},{x:20,y:232,w:200,t:'Create API',s:'POST /urls · base62 id',c:'blue'},{x:370,y:232,w:120,t:'Queue',s:'Kafka',c:'amber'},{x:540,y:232,w:210,t:'Analytics',s:'async',c:'gray'}],edges:[[0,1],[1,2],[2,3],[0,4],[4,3],[1,5],[5,6]]});}},
   {t:'mcq',q:'5 · Where is the main load / bottleneck?',o:['writing new links','the redirect reads (100:1) — cache hot codes','analytics','the ID generator'],a:1,why:'Reads dominate ~100:1; serve hot redirects from Redis/cache-aside and use read replicas before reaching for CDN. CDN/edge is useful only when the redirect result is cacheable and the analytics tradeoff is acceptable.'},
   {t:'teach',h:'Failure mode: cache stampede',body:[
     {k:'tldr',t:'A viral code expires or is evicted, and thousands of in-flight redirects all miss the cache at once — stampeding the KV store (a.k.a. thundering herd / dogpile).'},
     {k:'point',i:'🔒',t:'<b>Single-flight / request coalescing</b>: on a miss, only ONE request recomputes; the rest wait for and share its result.'},
     {k:'point',i:'⏳',t:'<b>Stale-while-revalidate</b>: keep serving the slightly-stale cached value while one request refreshes it in the background.'},
     {k:'point',i:'🎲',t:'<b>Jittered TTL / early refresh</b>: refresh hot keys a little before they expire so they never all lapse in lockstep.'}
   ]},
   {t:'mcq',q:'A viral short link expires from cache and thousands of redirects miss at the same instant. What is this, and the fix?',o:['Hot partition — add more shards','Cache stampede — coalesce misses (single-flight) and/or stale-while-revalidate','A DDoS — block the traffic','Cache poisoning — validate inputs'],a:1,why:'Simultaneous misses on one hot key all hit the origin — a cache stampede / thundering herd. Coalesce so only one request recomputes (single-flight), serve stale while revalidating, and jitter TTLs so hot keys don’t expire together. More shards don’t help — it’s one key, not skew.'},
   {t:'recall',q:'6 · Deep dive + a failure mode.',model:['Scale reads: Redis/cache-aside hot codes + read replicas. Partition the origin KV store by code only once the corpus or miss traffic needs it; add CDN/edge only for cacheable global hotspots.','301 (cached by browser, fewer analytics) vs 302 (every hit counted).','Failure: a viral link expires from cache → stampede; use single-flight + stale-while-revalidate.']}
  ]},
  {id:'mock-cache',title:'Distributed cache',steps:[
   {t:'teach',h:'1 · Requirements',body:[
     {k:'tldr',t:'Design a distributed cache like Redis / Memcached.'},
     {k:'spoiler',items:[
       {k:'reqs',i:'✅',label:'Functional',items:['get / set / delete by key','per-entry TTL expiration','multi-key reads / batch operations','explicit invalidation by key']},
       {k:'reqs',i:'📐',label:'NFRs',items:['single-digit-ms reads','high availability','horizontal scalability across cache nodes','bounded memory with eviction','stale data acceptable within policy']}
     ]}
   ]},
   {t:'recall',q:'2 · Entities + 3 · API.',model:['Entities: <code>cache_entry(key, value:bytes, ttl/expires_at, version?)</code> plus node membership / slot map.','Internal gRPC <code>CacheService</code>: <code>Get</code>, <code>MGet</code> (batch), <code>Set(entry, ttl_seconds)</code>, <code>Delete</code>. <code>value</code> is opaque <b>bytes</b> (the cache never parses it); a miss is a normal result (<code>found=false</code> / absent key), never an error.','No <code>idempotency_key</code> needed — Get is safe and Set/Delete are naturally idempotent. <code>version</code> gives compare-and-swap, and <b>only cache-aside</b> needs it: it rejects a stale populate-on-miss write. Prefer <code>ttl_seconds=0 → server default</code> over "no expiry" (an unset proto3 int is also 0).','Client library or cache proxy maps each key to the right node; the cache is not the source of truth.']},
   {t:'mcq',q:'Adding/removing cache nodes should avoid remapping almost every key. Use…',o:['hash(key) % node_count','consistent hashing / fixed slots with virtual nodes','one huge cache node','round-robin every request'],a:1,why:'Modulo depends on N, so changing N changes nearly every mapping. Consistent hashing or fixed slots move only a fraction of keys when membership changes; virtual nodes smooth load.'},
   {t:'build',q:'4 · High-level components.',options:['Client library / proxy','Consistent hash ring or fixed slot map','Cache nodes with TTL + LRU/LFU eviction','Replication or failover for important shards','Single relational DB as the cache backend','No expiration policy'],correct:[0,1,2,3]},
   {t:'htmlviz',h:'4 · Architecture',html:'',setup:function(root){root.innerHTML=archDiagram({w:800,h:330,cap:'A cache client/proxy routes each key through a consistent hash ring (or fixed slots) to the cache nodes; TTL + eviction bound memory and replication + stampede protection keep it available. <b>Whether it fronts an origin DB — and how — is a usage choice that depends on the problem:</b> cache-aside (read origin on miss, invalidate on write), read-through / write-through / write-back, or no origin at all when the cache IS the primary store. This view shows the common cache-aside case.',nodes:[{x:18,y:136,w:120,t:'App',c:'gray'},{x:165,y:136,w:165,t:'Cache client',s:'route key',c:'blue'},{x:370,y:40,w:185,t:'Hash ring / slots',s:'virtual nodes',c:'purple'},{x:595,y:40,w:170,t:'Cache nodes',s:'TTL + eviction',c:'green'},{x:595,y:232,w:170,t:'Origin DB',s:'source of truth',c:'gray'},{x:370,y:232,w:175,t:'Single-flight',s:'miss coalescing',c:'amber'}],edges:[[0,1],[1,2],[2,3],[3,4],[1,5],[5,4]]});}},
   {t:'htmlviz',h:'Routing: client library vs proxy',html:`<style>
.clp-cap{margin-top:10px;font-size:12.5px;color:var(--color-text-secondary);line-height:1.55;padding:10px 13px;background:var(--color-background-secondary);border-radius:var(--border-radius-md)}

<svg viewBox="0 0 680 332" style="width:100%;height:auto;display:block;max-width:660px;margin:0 auto" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="clpt clpd">
<title id="clpt">Client library vs proxy routing</title>
<desc id="clpd">Left: each app holds the routing map and talks directly to cache nodes in one hop. Right: thin apps send to a shared proxy that holds the map and forwards to cache nodes in two hops. Both learn membership from a config service or gossip.</desc>
<defs><marker id="clp-ar" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5F5E5A"/></marker></defs>
<text x="167" y="24" text-anchor="middle" font-size="15" font-weight="500" fill="var(--color-text-primary)">Client library</text>
<text x="513" y="24" text-anchor="middle" font-size="15" font-weight="500" fill="var(--color-text-primary)">Proxy tier</text>
<line x1="340" y1="38" x2="340" y2="226" stroke="#D3D1C7" stroke-width="1" stroke-dasharray="3 4"/>
<rect x="22" y="64" width="156" height="98" rx="9" fill="#F1EFE8" stroke="#5F5E5A" stroke-width="1.4"/>
<text x="34" y="84" font-size="13" font-weight="500" fill="var(--color-text-primary)">App</text>
<text x="34" y="100" font-size="11" font-weight="400" fill="#444441">(in every app)</text>

<svg viewBox="0 0 680 258" style="width:100%;height:auto;display:block;max-width:660px;margin:0 auto" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="srvt2 srvd2">
<title id="srvt2">Server-side routing: redirect vs forward</title>
<desc id="srvd2">Redirect: the client asks any node, gets bounced to the owner, and retries there. Forward: any node acts as coordinator, relays to the owner, and returns the result in one client hop.</desc>
<defs><marker id="srv-ar2" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#5F5E5A"/></marker></defs>

<text x="340" y="242" text-anchor="middle" font-size="11.5" fill="#444441">Hybrid: the cluster hands out the map; a smart client caches it and routes directly (Kafka, Redis Cluster).</text>
</svg>
<div class="srv-cap"><b>Redirect</b> (Redis <code>MOVED</code>, DNS LB, HTTP 302) — any node bounces you to the owner; you retry. The server never touches the data, but it costs a round trip. <b>Forward / coordinate</b> (Cassandra coordinator, proxy LB) — any node relays to the owner and returns the result: one client hop, but the coordinator sits in the data path. <b>Hybrid</b> — the cluster publishes the map and a smart client routes directly, refreshing on a stale-map error.</div>`},
   {t:'mcq',q:'5 · Main bottleneck / failure mode?',o:['the cache stores too little data','hot keys and stampedes overload one cache node or the origin DB','the API has too few verbs','consistent hashing is too slow'],a:1,why:'Distributed cache interviews usually probe skew and failure: one viral key can overload one node, and a popular key expiring can send every request to the origin. Add hot-key replication/local caching, single-flight, stale-while-revalidate, and jittered TTLs.'},
   {t:'mcq',q:'On a product write, the safest cache-aside move is…',o:['update the DB, then delete/invalidate the cache key','update the cache only','update the cache first, then maybe the DB','keep the stale cache until TTL always'],a:0,why:'The database is the source of truth. Write the DB, then invalidate the cache so the next read repopulates. Updating the cache directly can race and leave stale values cached.'},
   {t:'recall',q:'6 · Deep dive + failures.',model:['Routing: consistent hashing / fixed slots with virtual nodes; membership changes move only a fraction of keys. The routing logic lives in a <b>client library or a proxy</b>; the slot map comes from a <b>config service</b> (ZooKeeper/etcd) or <b>gossip</b>.','Memory: TTL + LRU/LFU eviction bound memory. <b>How the cache meets a backing store depends on the problem</b> — cache-aside (read origin on miss, invalidate on write), read-through / write-through / write-back, or <b>no origin at all</b> if the cache is the primary store. The cache engine itself is mode-agnostic; don’t assume a DB read.','<b>Failure — node down:</b> its keys miss and refill from the source, or a replica is promoted if the shard is replicated. Consistent hashing limits the blast radius to that node’s slice, not the whole keyspace.','<b>Failure — hot key:</b> one viral key overloads a single node. Replicate that key across nodes or add a small client-side / local cache so reads spread out.','<b>Failure — stampede (a hot key expires):</b> every request misses at once and stampedes the origin. Coalesce with <b>single-flight</b> (one rebuild, others wait), serve <b>stale-while-revalidate</b>, and <b>jitter TTLs</b> so keys don’t expire together. For a cold cache (nothing to coalesce) or a known spike, <b>cache-warm</b> hot keys ahead of time.']}
  ]},
  {id:'mock-news-agg',title:'News aggregator',steps:[
   {t:'teach',h:'1 · Requirements',body:[
     {k:'tldr',t:'Design a news aggregator like Google News.'},
     {k:'spoiler',items:[
       {k:'reqs',i:'✅',label:'Functional',items:['ingest articles from publishers','deduplicate syndicated / near-identical content','cluster articles into stories/topics','serve ranked feeds, topic pages, and search']},
       {k:'reqs',i:'📐',label:'NFRs',items:['fresh updates within minutes','high read traffic','quality/spam filtering','personalization without slow feed reads']}
     ]}
   ]},
   {t:'recall',q:'2 · Entities + 3 · API.',model:['Entities: <code>sources</code>, <code>articles</code>, <code>story_clusters</code>, <code>topics</code>, user follows/preferences, click/impression events.','<code>GET /feed?user=&amp;cursor</code>, <code>GET /topics/{id}</code>, <code>GET /search?q=...</code>.','Internal ingest APIs/jobs fetch RSS/sitemaps/publisher APIs, parse pages, and publish normalized article events.']},
   {t:'mcq',q:'The crawler should handle each publisher with…',o:['unlimited parallel fetches','per-domain politeness, backoff, and source freshness schedules','one global cron once a day','browser clients doing crawl work'],a:1,why:'Crawlers must avoid hammering publishers. Keep per-domain queues, obey robots/publisher terms where applicable, back off on errors, and schedule more frequent fetches only for high-value fast-changing sources.'},
   {t:'build',q:'4 · High-level components.',options:['Source scheduler + fetchers','Parser / extractor','Canonical URL + near-duplicate detector','Story clustering + topic classifier','Search index + feed/ranking service','One SQL query over raw HTML per feed read'],correct:[0,1,2,3,4]},
   {t:'htmlviz',h:'4 · Architecture',html:'',setup:function(root){root.innerHTML=archDiagram({w:820,h:330,cap:'Fetchers ingest publisher content with politeness. The pipeline extracts article text/metadata, dedupes canonical and near-identical copies, clusters related articles into stories, and indexes candidates. Feed reads hit ranked/cached story candidates; raw HTML stays in object storage for replay.',nodes:[{x:18,y:132,w:130,t:'Publishers',s:'RSS / APIs / pages',c:'gray'},{x:175,y:132,w:140,t:'Fetchers',s:'polite crawl',c:'blue'},{x:350,y:40,w:150,t:'Parser',s:'extract text',c:'green'},{x:350,y:224,w:170,t:'Raw store',s:'HTML replay',c:'gray'},{x:545,y:40,w:150,t:'Dedup + cluster',s:'stories',c:'purple'},{x:545,y:224,w:150,t:'Search index',s:'query',c:'amber'},{x:715,y:132,w:90,t:'Feed API',s:'ranked',c:'green'}],edges:[[0,1],[1,2],[1,3],[2,4],[4,5],[4,6],[5,6]]});}},
   {t:'mcq',q:'5 · Main hard problem?',o:['only storing article text','deduping/clustering fresh content while filtering spam and ranking quality','serving one static home page','choosing JSON vs XML'],a:1,why:'The differentiator is not just ingest. It is grouping duplicate/syndicated stories, ranking fresh but trustworthy content, and keeping reads fast with precomputed candidates.'},
   {t:'recall',q:'6 · Deep dive + failures.',model:['Ingest: source scheduler → fetchers with politeness → parser/extractor → raw store + normalized article event.','Dedup/cluster: canonical URL, content hash, near-duplicate similarity, story_cluster id; search index and topic classifier build read candidates.','Feed: precompute ranked candidate pools, personalize/rerank at read time, cache hot topics.','Failure: parser bug or ranking bug → replay raw HTML/events; source spam → quality classifier and source trust score.']}
  ]},
  {id:'mock-chess',title:'Online chess',steps:[
   {t:'teach',h:'1 · Requirements',body:[
     {k:'tldr',t:'Design an online chess platform.'},
     {k:'spoiler',items:[
       {k:'reqs',i:'✅',label:'Functional',items:['match players','play legal moves in real time','maintain clocks','support reconnects, spectators, resign/draw, and game history']},
       {k:'reqs',i:'📐',label:'NFRs',items:['low-latency moves','authoritative server state','no double moves / out-of-turn moves','durable completed games']}
     ]}
   ]},
   {t:'recall',q:'2 · Entities + 3 · API.',model:['Entities: <code>players</code>, <code>match_queue</code>, <code>games(game_id,status,fen,turn,clock_state)</code>, <code>moves(game_id,move_no,uci,san,client_move_id)</code>.','<code>POST /matchmaking/join</code>; WebSocket <code>move</code>, <code>state</code>, <code>clock</code>, <code>resign</code>; <code>GET /games/{id}</code>.','Each move includes expected move number and client_move_id for idempotent retry.']},
   {t:'mcq',q:'Who should validate legal moves and clocks?',o:['both browsers independently','the authoritative game service','the spectator client','the CDN'],a:1,why:'The server owns the game. Clients can pre-validate for UX, but the authoritative service validates legality, turn order, clocks, and final result.'},
   {t:'build',q:'4 · High-level components.',options:['Matchmaking queue','WebSocket gateway','Authoritative game service sharded by game_id','Move log + game snapshot store','Pub/Sub for players and spectators','Peer-to-peer move agreement only'],correct:[0,1,2,3,4]},
   {t:'htmlviz',h:'4 · Architecture',html:'',setup:function(root){root.innerHTML=archDiagram({w:815,h:330,cap:'Players connect through WebSocket gateways, but one authoritative game shard owns each game_id. It validates moves, updates server-side clocks, appends to the move log, persists snapshots, and publishes state to players and spectators. Reconnects read the latest snapshot plus move log.',nodes:[{x:18,y:40,w:125,t:'Player A',c:'gray'},{x:18,y:224,w:125,t:'Player B',c:'gray'},{x:175,y:132,w:150,t:'WS gateway',s:'connections',c:'blue'},{x:365,y:40,w:160,t:'Matchmaking',s:'queue',c:'amber'},{x:365,y:224,w:185,t:'Game shard',s:'validate + clocks',c:'green'},{x:590,y:40,w:190,t:'Move log',s:'durable events',c:'gray'},{x:590,y:224,w:190,t:'Pub/Sub',s:'spectators',c:'purple'}],edges:[[0,2],[1,2],[2,4],[3,4],[4,5],[4,6],[6,2]]});}},
   {t:'mcq',q:'5 · Critical consistency rule?',o:['any server can accept any move at any time','one authoritative sequencer per game, fenced on failover','clients vote on the final board','spectators write the state'],a:1,why:'A game is a small strongly consistent state machine. Route game_id to one owner; on failover, use persisted move log and fencing so two owners do not accept moves concurrently.'},
   {t:'recall',q:'6 · Deep dive + failures.',model:['Game state is a per-game state machine: validate expected move_no, legal move, turn, and server clock before append.','Idempotency: duplicate client_move_id returns the committed move; stale expected move_no is rejected.','Reconnect: fetch snapshot + moves since N, then resume WebSocket subscription.','Failure: game shard dies → recover from move log/snapshot with a new fenced owner; clock is server-derived, not client trusted.']}
  ]},

   {t:'mcq',q:'Large image bytes should flow through…',o:['the app server process','direct-to-object-storage presigned upload','a SQL BLOB column','a WebSocket message'],a:1,why:'App servers issue permission and store metadata. Clients upload bytes directly to object storage so the app tier is not a bandwidth bottleneck.'},
   {t:'build',q:'4 · High-level components.',options:['Upload API + presigned URLs','Object storage for originals/variants','Storage event / queue','Image processing workers','Moderation / virus scan','CDN with versioned URLs','Database as the image byte store'],correct:[0,1,2,3,4,5]},
   {t:'htmlviz',h:'4 · Architecture',html:'',setup:function(root){root.innerHTML=archDiagram({w:820,h:330,cap:'The API creates metadata and a presigned upload URL. The client uploads directly to object storage. A storage event enqueues processors that validate, strip metadata, generate variants, run moderation, and publish immutable CDN URLs when ready.',nodes:[{x:18,y:132,w:120,t:'Client',c:'gray'},{x:165,y:40,w:155,t:'Upload API',s:'metadata + URL',c:'blue'},{x:165,y:224,w:155,t:'Object store',s:'original bytes',c:'gray'},{x:360,y:224,w:125,t:'Queue',s:'events',c:'amber'},{x:520,y:224,w:155,t:'Processors',s:'variants + scan',c:'purple'},{x:520,y:40,w:155,t:'Asset DB',s:'status',c:'green'},{x:705,y:132,w:95,t:'CDN',s:'serve',c:'green'}],edges:[[0,1],[1,2],[2,3],[3,4],[4,5],[4,6],[1,5],[0,6]]});}},
   {t:'mcq',q:'5 · Common failure gap?',o:['the image has too many pixels','DB says uploaded but object bytes never arrived, or object exists without a DB-ready asset','CDN is too colorful','there are too many thumbnails only'],a:1,why:'Metadata and object storage are separate systems. Use upload status, storage events, reconciliation jobs, and cleanup of orphaned objects or stale pending rows.'},
   {t:'recall',q:'6 · Deep dive + failures.',model:['Direct upload: create PENDING asset + presigned URL; client uploads to object store; event triggers processors.','Processing: validate MIME/content, strip EXIF, generate immutable variants, moderate/quarantine, then mark READY.','Delivery: CDN over versioned object keys; deletion revokes DB visibility and eventually purges storage/CDN.','Failure: storage event lost → reconciliation scans pending rows/object prefixes; retry-safe create via idempotency key.']}
  ]},

   {t:'mcq',q:'The cost-dominant bottleneck is usually…',o:['the REST JSON parser','GPU inference capacity and memory','the user table','CSS rendering'],a:1,why:'LLM serving is dominated by GPU memory/compute, KV cache, batching efficiency, and queueing. Ordinary web handlers are not the hard part.'},
   {t:'build',q:'4 · High-level components.',options:['API gateway with auth/quotas','Request scheduler / priority queues','Model registry + rollout controller','GPU worker pool','Continuous batching + KV cache management','Streaming response gateway','One CPU process per request only'],correct:[0,1,2,3,4,5]},
   {t:'htmlviz',h:'4 · Architecture',html:'',setup:function(root){root.innerHTML=archDiagram({w:835,h:335,cap:'Requests enter through an API gateway, then a scheduler batches compatible prompts by model/version, priority, and context shape. GPU workers stream tokens back through the gateway. A model registry controls canaries/rollback; admission control protects GPU memory and tail latency.',nodes:[{x:18,y:132,w:120,t:'Client',s:'stream',c:'gray'},{x:165,y:132,w:145,t:'API gateway',s:'auth + quota',c:'blue'},{x:345,y:40,w:170,t:'Scheduler',s:'batch + priority',c:'purple'},{x:345,y:224,w:170,t:'Model registry',s:'versions',c:'gray'},{x:550,y:40,w:145,t:'GPU pool',s:'inference',c:'green'},{x:550,y:224,w:145,t:'Safety/logs',s:'policy',c:'red'},{x:715,y:132,w:100,t:'SSE stream',s:'tokens',c:'amber'}],edges:[[0,1],[1,2],[2,4],[4,6],[6,1],[3,2],[1,5],[4,5]]});}},
   {t:'mcq',q:'5 · How do you keep utilization high without destroying latency?',o:['only run one request per GPU','continuous batching with admission control and queue deadlines','turn off streaming','ignore context length'],a:1,why:'Continuous batching improves throughput by sharing GPU work across active requests. Admission control and deadlines keep long prompts or low-priority work from wrecking tail latency.'},
   {t:'recall',q:'6 · Deep dive + failures.',model:['Scheduler groups by model/version and compatible shapes; continuous batching + KV cache management drive GPU utilization.','Admission control: context length limits, tenant quotas, priority queues, queue timeout, and backpressure when GPU memory is full.','Streaming: send token deltas; if a worker dies mid-stream, return a retryable error unless deterministic resume state is explicitly stored.','Rollout: model registry supports canary, shadow evals, metrics, and fast rollback; logs must respect privacy/redaction policy.']}
  ]},

   {t:'build',q:'4 · High-level components.',options:['Fanout-on-write workers','Timeline cache (Redis)','Follow-graph store (sharded table)','Object store + CDN for media','A global lock service'],correct:[0,1,2,3]},
   {t:'htmlviz',h:'4 · Architecture',html:'',setup:function(root){root.innerHTML=archDiagram({w:760,h:340,cap:'<b>Post:</b> API writes the tweet to the <b>posts store</b> (source of truth) and triggers <b>fanout-on-write</b> workers, which read the <b>follow-graph</b> and push post-ids into each follower’s <b>timeline cache</b>. <b>Follow/unfollow</b> are API writes to the follow-graph. <b>Read:</b> pull post-ids from the cache, hydrate from the posts store; media via object store + CDN. Celebrities: fan-out on read.',nodes:[{x:18,y:140,w:110,t:'Client',c:'gray'},{x:150,y:140,w:120,t:'API',c:'blue'},{x:330,y:30,w:170,t:'Fanout workers',s:'on write',c:'purple'},{x:545,y:30,w:190,t:'Timeline cache',s:'Redis, per-user',c:'green'},{x:330,y:250,w:170,t:'Follow-graph',s:'sharded',c:'gray'},{x:545,y:250,w:190,t:'Object store + CDN',s:'media',c:'gray'},{x:545,y:140,w:190,t:'Posts store',s:'source of truth',c:'amber'}],edges:[[0,1],[1,6],[1,2],[2,4],[2,3],[1,3],[1,4],[1,5]]});}},

   {t:'recall',q:'6 · Deep dive + failure.',model:['Hybrid fanout: push for normal users, pull/merge celebrity tweets at read time.','Time-sortable IDs (Snowflake) give ordering for free.','Failure: replication lag → read-your-writes for your own posts; viral spikes → cache + read-time merge.']}

  {id:'mock-4',title:'Ticket booking',steps:[
   {t:'teach',h:'1 · Requirements',body:[
     {k:'tldr',t:'Design a ticket-booking system (Ticketmaster).'},
     {k:'spoiler',items:[
       {k:'reqs',i:'✅',label:'Functional',items:['browse events/seats','hold a seat','book it &amp; pay','NO double-booking']},
       {k:'reqs',i:'📐',label:'NFRs',items:['strong consistency on seats','extreme contention at on-sale','payment integrity']}
     ]}
   ]},
   {t:'recall',q:'2 · Entities + 3 · API.',model:['seats = static inventory: seats(seat_id, event_id, section, row) — never mutated during on-sale, so it is not a contention point.','tickets = the hold/booking lifecycle + transaction: tickets(ticket_id, seat_id UNIQUE, user_id, price, status[HELD|BOOKED], hold_expires_at, version, created_at). UNIQUE(seat_id) is the double-booking guard.','<code>hold(seat)</code>','<code>confirm(seat)</code>','<code>release(seat)</code>']},
   {t:'mcq',q:'Prevent double-booking — first tool?',o:['a distributed lock service','an atomic conditional update / optimistic concurrency (DB)','2PC across services','sharding the seats table'],a:1,why:'Start with what the DB enforces: hold = INSERT a ticket where UNIQUE(seat_id) rejects a concurrent 2nd holder (or an UPDATE … WHERE compare-and-set). Reach for distributed locks only if data spans systems.'},
   {t:'mcq',nu:true,q:'Where do price & payment_status belong?',o:['extra columns on the seats row','a separate tickets/orders table','in Redis','on the events row'],a:1,why:'Split static inventory (what seat is this?) from the transaction (who holds/owns it, price, payment). A failed payment changes the ticket, not the seat. The whole HELD→BOOKED lifecycle lives on tickets, with UNIQUE(seat_id) as the double-booking guard.'},
   {t:'htmlviz',h:'Seat booking — hold lifecycle',
    html:`<style>
.sbv{display:grid;gap:10px}

<div class="sbv">
  <div class="sbv-flow"><div class="sbv-state good"><div class="sbv-t">AVAILABLE</div><div class="sbv-s">no ticket row</div></div><div class="sbv-arr">INSERT (UNIQUE seat_id)</div><div class="sbv-state warn"><div class="sbv-t">HELD</div><div class="sbv-s">ticket row · TTL + version</div></div><div class="sbv-arr">confirm</div><div class="sbv-state info"><div class="sbv-t">BOOKED</div><div class="sbv-s">status=BOOKED</div></div></div>
  <div class="sbv-cap"><b>The hold is one INSERT, guarded by UNIQUE(seat_id):</b> a concurrent 2nd hold for the same seat is rejected by the DB. Confirm is a conditional CAS: still held by you, not expired, expected version.</div>
  <div class="sbv-cap">If payment stalls or the client vanishes, the hold needs cleanup — a background job deletes expired HELD rows (or an ON CONFLICT upsert steals one), else the unique slot blocks re-booking.</div>
</div>`},
   {t:'build',q:'4 · High-level components.',options:['Relational DB (ACID)','Seat hold with TTL','Payment via saga','Virtual waiting room / queue for spikes','A cache as the source of truth'],correct:[0,1,2,3]},
   {t:'htmlviz',h:'4 · Architecture',html:'',setup:function(root){root.innerHTML=archDiagram({w:735,h:306,cap:'A virtual waiting room sheds the on-sale spike. The booking service holds a seat with a TTL — UNIQUE(seat_id) in the ACID DB blocks double-booking — and payment runs as a saga that compensates on failure.',nodes:[{x:18,y:132,w:130,t:'Client',c:'gray'},{x:175,y:132,w:175,t:'Waiting room',s:'queue (spike)',c:'amber'},{x:390,y:40,w:160,t:'Booking svc',s:'hold w/ TTL',c:'blue'},{x:580,y:40,w:150,t:'Relational DB',s:'UNIQUE(seat)',c:'gray'},{x:390,y:224,w:170,t:'Payment saga',s:'compensate',c:'purple'}],edges:[[0,1],[1,2],[2,3],[2,4]]});}},
   {t:'mcq',q:'5 · Bottleneck?',o:['browsing seats','contention on popular seats / hot DB rows at on-sale','payment','email confirmation'],a:1,why:'Everyone grabs the same seats at 10:00 — hot rows. Shed load with a waiting-room queue.'},
   {t:'mcq',nu:true,q:'At on-sale, one hot seat draws 10k simultaneous hold attempts. The risk?',o:['the DB deadlocks','retry storms — losers fail fast and re-hammer the row','seats double-book','holds never expire'],a:1,why:'The hold stays correct (UNIQUE rejects the duplicate, or CAS affects 0 rows), but the thousands of losers retry, pounding the hot row. Absorb the spike with a waiting-room queue or a Redis lock that serializes access, and keep the DB constraint as the final safety net — two systems to sync, but the raw spike never reaches the DB.'},
   {t:'recall',q:'6 · Deep dive + failure.',model:['seats is static inventory; the HELD→BOOKED lifecycle + UNIQUE(seat_id) guard live on tickets. Hold = INSERT (UNIQUE rejects a 2nd holder); confirm = conditional CAS (still HELD by you, unexpired, expected version).','Expired holds need cleanup — a background job deletes lapsed HELD rows (or an ON CONFLICT upsert steals one), else the unique slot stays blocked. Waiting-room queue to shed the on-sale spike; payment as a saga (compensate on failure).','Failure: held seat never confirmed → cleanup frees the seat for re-booking.']}
  ]},

   {t:'htmlviz',h:'4 · Architecture',html:'',setup:function(root){root.innerHTML=archDiagram({w:725,h:306,cap:'Agents → Kafka (absorbs spiky writes) → Flink aggregates → time-series DB. Rollup jobs downsample raw into coarse tiers; old data ages out to cheap object storage. Queries route to the coarsest tier that answers.',nodes:[{x:18,y:132,w:120,t:'Agents',c:'amber'},{x:160,y:132,w:150,t:'Kafka',s:'ingest buffer',c:'gray'},{x:350,y:40,w:165,t:'Stream proc',s:'Flink, aggregate',c:'purple'},{x:550,y:40,w:155,t:'Time-series DB',s:'tiered',c:'green'},{x:350,y:224,w:165,t:'Rollup jobs',s:'downsample',c:'blue'},{x:550,y:224,w:160,t:'Object store',s:'cold data',c:'gray'}],edges:[[0,1],[1,2],[2,3],[3,4],[3,5]]});}},

/* ---------------- toast ---------------- */
let toastT=null;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(toastT);toastT=setTimeout(()=>el.classList.remove('show'),2600);
}

/* ---------------- helpers ---------------- */
const APP=()=>document.getElementById('app');
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function lessonById(id){for(const u of UNITS)for(const l of u.lessons)if(l.id===id)return{u,l};return null;}
const GOOD_PCT=80; // best score at/above this counts as a ✓ pass (no retry nudge)
function tierOf(id){if(!S.done[id])return null;if(S.perfect[id])return 'perfect';return (S.best[id]||0)>=GOOD_PCT?'good':'partial';}
function unitProgress(u){const total=u.lessons.length+1;let d=0;u.lessons.forEach(l=>{if(S.done[l.id])d++;});if(S.done['boss-'+u.id])d++;return{d,total};}
function unitUnlocked(ui){if(S.unlockAll||ui===0)return true;const prev=UNITS[ui-1];return !!S.done['boss-'+prev.id];}
function lessonUnlocked(u,li){if(S.unlockAll||li===0)return true;return !!S.done[u.lessons[li-1].id];}
function bossUnlocked(u){if(S.unlockAll)return true;return u.lessons.every(l=>S.done[l.id]);}

/* Revisit dot: a completed lesson that still contains a graded question you've never answered
   (e.g. quizzes added after you finished it). One-time seed below marks everything in your
   already-completed lessons as answered so the back-catalog doesn't all light up — except steps
   flagged nu:true, which are treated as "added this release" and so still flag. */
function seedAnswered(){
  if(S.answeredSeeded)return;
  UNITS.forEach(u=>u.lessons.forEach(l=>{
    if(!S.done[l.id])return;
    l.steps.forEach(s=>{if(isQuizStep(s.t)&&!s.nu)S.answered[sigOf(s)]=1;});
  }));
  S.answeredSeeded=1;save();
}
function lessonNeedsRevisit(l){
  if(!S.done[l.id])return false;
  return l.steps.some(s=>isQuizStep(s.t)&&!S.answered[sigOf(s)]);
}

/* ============================ HOME ============================ */
function renderHome(scrollToNext){
  const lvl=levelOf(S.xp), prog=xpInLevel(S.xp);
  let frontierSet=false; // tag the first playable (unlocked, not-done) node so we can scroll to it
  let h='';
  h+='<div class="stickyhead">';
  h+='<div class="topbar">'
    +'<div class="stat fire"><span class="ic">🔥</span>'+S.streak+'</div>'
    +'<div class="stat xp"><span class="ic">⚡</span>'+S.xp+'</div>'
    +'<div class="spacer"></div>'
    +'<div class="stat gem"><span class="ic">🏅</span>'+Object.keys(S.badges).length+'</div>'
    +'</div>';
  const SHORT={cap:'CAP',repl:'Repl',raft:'Consensus',txn:'Txn',part:'Shard',cache:'Cache',time:'Time',msg:'Msg',lb:'LB',rl:'Rate',scale:'Scale',rel:'Reliab.',pat:'Patterns',fw:'Method',data:'Data/ML',conc:'Concur',model:'Models',batch:'Streams',trouble:'Trouble',decide:'Decide',mock:'Mocks'};
  // which unit holds the next playable stage → the jumpbar scrolls to it
  let curUnit=null;
  for(let cu=0;cu<UNITS.length&&!curUnit;cu++){const U=UNITS[cu];if(!unitUnlocked(cu))continue;
    for(let cl=0;cl<U.lessons.length;cl++){if(lessonUnlocked(U,cl)&&!S.done[U.lessons[cl].id]){curUnit=U.id;break;}}
    if(!curUnit&&bossUnlocked(U)&&!S.done['boss-'+U.id])curUnit=U.id;}
  if(!curUnit&&UNITS.length)curUnit=UNITS[UNITS.length-1].id;
  h+='<div class="jumpbar">';
  UNITS.forEach((u,ui)=>{const bd=S.done['boss-'+u.id];const open=unitUnlocked(ui);
    h+='<button class="jchip'+(bd?' done':'')+(open?'':' lk')+'"'+(u.id===curUnit?' id="jump-current"':'')+' data-jump="unit-'+u.id+'" style="--c:'+u.color+'" title="'+u.title+'"><span class="ji">'+u.icon+'</span>'+(SHORT[u.id]||u.title)+'</button>';});
  h+='</div></div>';
  h+='<div class="hero"><h1>systemDesingo 🦉</h1><p>Master distributed systems for your interview — one quick quest at a time.</p></div>';
  h+='<div class="levelcard"><div class="ring" style="--p:'+prog+'"><span>'+lvl+'</span></div>'
    +'<div class="lc-meta"><div class="lc-title">Level '+lvl+'</div><div class="lc-sub">'+prog+'/100 XP to level '+(lvl+1)+'</div></div></div>';
  const allMist=Object.values(S.mistakes);
  const nMist=(S.reviewSkipRecall?allMist.filter(s=>s.t!=='recall'):allMist).length;
  const nRecall=UNITS.reduce((a,u)=>a+u.lessons.reduce((b,l)=>b+l.steps.filter(s=>s.t==='recall').length,0),0);
  h+='<div class="actions">'
    +'<button class="act'+(nMist?' hot':'')+'" id="reviewBtn">🩹 Review mistakes'+(nMist?' ('+nMist+')':'')+'</button>'
    +'<button class="act" id="recallBtn">🗣️ Explain-it drills'+(nRecall?' ('+nRecall+')':'')+'</button>'
    +'<button class="act" id="unlockBtn">'+(S.unlockAll?'🔓 Free-roam: ON':'🔒 Free-roam: OFF')+'</button>'
    +'</div>'
    +'<label class="optrow"><input type="checkbox" id="skipRecall"'+(S.reviewSkipRecall?' checked':'')+'> Skip 🗣️ explain-it questions when reviewing mistakes</label>';

  UNITS.forEach((u,ui)=>{
    const unlocked=unitUnlocked(ui);
    const {d,total}=unitProgress(u);
    h+='<div class="unit" id="unit-'+u.id+'">';
    const uRecall=u.lessons.reduce((b,l)=>b+l.steps.filter(s=>s.t==='recall').length,0);
    h+='<div class="unit-head" style="background:'+u.color+'">'
      +(unlocked&&uRecall?'<button class="udrill" data-unitrecall="'+u.id+'" title="Drill this unit\'s explain-it questions">🗣️ drill</button>':'')
      +'<div class="u-k">Unit '+(ui+1)+' · '+d+'/'+total+'</div>'
      +'<div class="u-t">'+u.icon+' '+u.title+(unlocked?'':' 🔒')+'</div>'
      +'<div class="u-b">'+u.blurb+'</div></div>';
    h+='<div class="path">';
    u.lessons.forEach((l,li)=>{
      const open=unlocked&&lessonUnlocked(u,li);
      const done=S.done[l.id];
      const tier=tierOf(l.id);
      const perfect=tier==='perfect';
      const cls=done?('done '+tier):(open?'':'locked');
      const off=li%2===1?'off1':(li%2===0&&li>0?'off2':'');
      const title=(done&&!perfect)?(' title="Best '+(S.best[l.id]||0)+(tier==='good'?'% — passed; revisit to perfect it':'% — revisit to perfect it')+'"'):'';
      const frontier=open&&!done&&!frontierSet;if(frontier)frontierSet=true;
      const revisit=lessonNeedsRevisit(l);
      h+='<div class="node-wrap '+off+'">'
        +'<button class="node '+cls+'" '+(frontier?'id="next-stage" ':'')+(open?('data-lesson="'+l.id+'"'):'')+title+' style="'+(open||done?('background:'+u.color):'')+'">'+(done?'':'★')+(open||done?'':'🔒')+'</button>'
        +'<div class="node-label"'+(revisit?' title="New questions added since you finished this — revisit"':'')+'>'+(revisit?'<span class="revisit-dot"></span>':'')+l.title+(done&&!perfect?' <span class="pct">'+(S.best[l.id]||0)+'%</span>':'')+'</div></div>';
    });
    // boss node
    const bopen=unlocked&&bossUnlocked(u);
    const bdone=S.done['boss-'+u.id];
    const btier=tierOf('boss-'+u.id);
    const bperfect=btier==='perfect';
    const bfrontier=bopen&&!bdone&&!frontierSet;if(bfrontier)frontierSet=true;
    h+='<div class="node-wrap">'
      +'<button class="node boss '+(bdone?('done '+btier):(bopen?'':'locked'))+'" '+(bfrontier?'id="next-stage" ':'')+(bopen?('data-boss="'+u.id+'"'):'')+((bdone&&!bperfect)?(' title="Best '+(S.best['boss-'+u.id]||0)+'% — revisit"'):'')+' style="'+(bopen||bdone?'background:'+u.colorD:'')+'">'+(bopen||bdone?'👑':'🔒')+'</button>'
      +'<div class="node-label">'+u.boss.title+(bdone&&!bperfect?' <span class="pct">'+(S.best['boss-'+u.id]||0)+'%</span>':'')+'</div></div>';
    h+='</div></div>';
  });

  // coming soon
  if(SOON.length)h+='<div class="unit"><div class="unit-head" style="background:#BDBDBD"><div class="u-k">Coming soon</div><div class="u-t">🚧 More units</div><div class="u-b">'+SOON.join(' · ')+'</div></div></div>';

  // badges shelf
  h+='<div class="shelf"><h3>🏅 Badges</h3><div class="badges">';
  BADGES.forEach(b=>{const got=S.badges[b.id];h+='<div class="badge '+(got?'':'lock')+'"><div class="bi">'+b.icon+'</div><small>'+b.name+'</small></div>';});
  h+='</div></div>';

  h+='<div class="tip">Progress saves automatically on this device. &nbsp;⌨ Keys: <b>1–4</b> answer · <b>Enter</b> continue · <b>Esc</b> quit</div>';

  APP().innerHTML=h;
  APP().querySelectorAll('[data-lesson]').forEach(n=>n.onclick=()=>startLesson(n.dataset.lesson));
  APP().querySelectorAll('[data-boss]').forEach(n=>n.onclick=()=>startBoss(n.dataset.boss));
  document.getElementById('reviewBtn').onclick=startReview;
  document.getElementById('recallBtn').onclick=startRecallReview;
  APP().querySelectorAll('[data-unitrecall]').forEach(b=>b.onclick=()=>startUnitRecall(b.dataset.unitrecall));
  const sr=document.getElementById('skipRecall');if(sr)sr.onchange=()=>{S.reviewSkipRecall=sr.checked;save();renderHome();};
  document.getElementById('unlockBtn').onclick=()=>{S.unlockAll=!S.unlockAll;save();renderHome();};
  if(scrollToNext){requestAnimationFrame(function(){
    const ns=document.getElementById('next-stage');if(ns)ns.scrollIntoView({behavior:'smooth',block:'center'});
    const jb=APP().querySelector('.jumpbar'),jc=document.getElementById('jump-current');
    if(jb&&jc){const jbr=jb.getBoundingClientRect(),jcr=jc.getBoundingClientRect();jb.scrollTo({left:jb.scrollLeft+(jcr.left-jbr.left)-jb.clientWidth*0.25,behavior:'smooth'});}
  });}
  APP().querySelectorAll('[data-jump]').forEach(b=>b.onclick=()=>{const el=document.getElementById(b.dataset.jump);if(el)el.scrollIntoView({behavior:'smooth',block:'start'});});
  try{window.scrollTo(0,0);}catch(e){}
}

/* ============================ LESSON RUNNER ============================ */
var R=null; // active run state
function isQuizStep(t){return t==='mcq'||t==='sort'||t==='match'||t==='order'||t==='build'||t==='cloze'||t==='recall';}
function startLesson(id){
  const {u,l}=lessonById(id);
  const quizN=l.steps.filter(s=>isQuizStep(s.t)).length;
  const t=Math.max(60,quizN*25); // clock only ticks on quiz steps; learning steps are untimed
  R={mode:'lesson',unit:u,lesson:l,steps:l.steps,idx:0,frontier:0,hearts:HEARTS,combo:0,maxCombo:0,xp:0,correct:0,graded:0,mistakes:0,time:t,timeLeft:t};
  renderStep(); // renderStep starts/pauses the timer per step
}
/* run the countdown only on a fresh quiz step (or in boss mode); pause it on learning/review steps */
function manageTimer(){
  if(R.timeLeft==null){return;}
  const step=R.steps[R.idx];
  const active=(R.mode==='boss')||(R.idx>=R.frontier&&step&&isQuizStep(step.t));
  if(active){startTimer();}else{stopTimer();}
}
function startBoss(uid){
  const u=UNITS.find(x=>x.id===uid);
  const steps=shuffle(u.boss.q).map(q=>({t:'mcq',q:q.q,o:q.o,a:q.a,boss:true}));
  R={mode:'boss',unit:u,bossTitle:u.boss.title,steps,idx:0,frontier:0,hearts:HEARTS,combo:0,maxCombo:0,xp:0,correct:0,graded:0,mistakes:0,time:u.boss.time,timeLeft:u.boss.time};
  startTimer();
  renderStep();
}
function startReview(){
  let pool=Object.values(S.mistakes);
  if(S.reviewSkipRecall)pool=pool.filter(s=>s.t!=='recall');
  const steps=shuffle(pool).slice(0,15);
  if(!steps.length){toast(S.reviewSkipRecall?'No non-explain-it mistakes to review 🎉':'No mistakes to review — nice! 🎉');return;}
  R={mode:'review',source:'mistakes',unit:{id:'review'},steps,idx:0,frontier:0,hearts:99,combo:0,maxCombo:0,xp:0,correct:0,graded:0,mistakes:0};
  renderStep();
}
function startRecallReview(){
  const steps=shuffle(UNITS.flatMap(u=>u.lessons.flatMap(l=>l.steps)).filter(s=>s.t==='recall'));
  if(!steps.length){toast('No explain-it questions found.');return;}
  R={mode:'review',source:'recall',unit:{id:'recall'},steps,idx:0,frontier:0,hearts:99,combo:0,maxCombo:0,xp:0,correct:0,graded:0,mistakes:0};
  renderStep();
}
function startUnitRecall(uid){
  const u=UNITS.find(x=>x.id===uid);
  const steps=shuffle(u.lessons.flatMap(l=>l.steps).filter(s=>s.t==='recall'));
  if(!steps.length){toast('No explain-it questions in this unit.');return;}
  R={mode:'review',source:'unitrecall',unit:u,steps,idx:0,frontier:0,hearts:99,combo:0,maxCombo:0,xp:0,correct:0,graded:0,mistakes:0};
  renderStep();
}

let timerH=null;
function startTimer(){
  stopTimer();
  timerH=setInterval(()=>{
    R.timeLeft--;
    const el=document.getElementById('timerTxt');
    if(el){el.textContent=R.timeLeft+'s';el.parentElement.classList.toggle('low',R.timeLeft<=15);}
    if(R.timeLeft<=0){stopTimer();finishRun(true);}
  },1000);
}
function stopTimer(){if(timerH){clearInterval(timerH);timerH=null;}}

function topbarHTML(){
  const pct=Math.round(R.idx/R.steps.length*100);
  const curStep=R.steps[R.idx];
  const canSkip=(R.idx>=R.frontier)&&curStep&&isQuizStep(curStep.t);
  let right='';
  if(R.timeLeft!=null){
    const step=R.steps[R.idx];
    const active=(R.mode==='boss')||(R.idx>=R.frontier&&step&&isQuizStep(step.t));
    right=active
      ?'<div class="timer"><span>⏱️</span><span id="timerTxt">'+R.timeLeft+'s</span></div>'
      :'<div class="timer paused" title="Timer pauses while you learn — runs during quiz steps"><span>⏸</span><span>'+R.timeLeft+'s</span></div>';
  }
  const back=(R.idx>0&&R.mode!=='boss')?'<button class="lback" id="backBtn" title="Previous">←</button>':'';
  return '<div class="lhead">'
    +'<button class="close" id="quitBtn">×</button>'
    +back
    +'<div class="pbar"><i style="width:'+pct+'%"></i></div>'
    +'<div class="lhearts">❤️ '+R.hearts+'</div>'
    +right
    +(canSkip?'<button class="lskip" id="skipBtn" title="Skip this question — it won’t count toward your score">Skip →</button>':'')
    +'</div>';
}

function renderStep(){
  if(R.idx>=R.steps.length){finishRun(false);return;}
  const step=R.steps[R.idx];
  let h=topbarHTML()+'<div class="stage" id="stage"></div>';
  h+='<div class="combo" id="combo"></div>';
  APP().innerHTML=h;
  document.getElementById('quitBtn').onclick=()=>{stopTimer();if(R.mode!=='boss'){renderHome(true);return;}if(confirm('Quit the timed boss? Your attempt will be lost.'))renderHome(true);else startTimer();};
  const bb=document.getElementById('backBtn');if(bb)bb.onclick=backStep;
  const sk=document.getElementById('skipBtn');if(sk)sk.onclick=skipStep;
  const stage=document.getElementById('stage');
  if(R.idx<R.frontier){renderReview(stage,step);}
  else{({teach:stTeach,mcq:stMcq,sort:stSort,match:stMatch,order:stOrder,build:stBuild,recall:stRecall,cloze:stCloze,vecviz:stVecViz,htmlviz:stHtmlViz}[step.t])(stage,step);}
  manageTimer();
  try{window.scrollTo(0,0);}catch(e){}
}
function backStep(){if(R.idx>0){R.idx--;renderStep();}}
function skipStep(){
  const step=R.steps[R.idx];
  // Skipping still means you've SEEN the question — mark it answered so the lesson keeps
  // your historical record for it instead of flagging it as never-answered ("missing").
  if(step&&isQuizStep(step.t)){S.answered[sigOf(step)]=1;save();}
  toast('⏭ Skipped — not scored');nextStep();
}
function renderReview(stage,step){
  if(step.t==='vecviz'){stVecViz(stage,step);return;}
  if(step.t==='htmlviz'){stHtmlViz(stage,step);return;}
  let h='<div class="q-sub">↩ Review (already answered)</div>';
  if(step.t==='teach'){h+='<div class="q-title">'+step.h+'</div>';step.body.forEach(b=>h+=blockHTML(b));}
  else if(step.t==='mcq'){h+='<div class="q-title">'+step.q+'</div><div class="opts">';step.o.forEach((o,i)=>{h+='<div class="opt '+(i===step.a?'correct':'dim')+'">'+o+'</div>';});h+='</div>';if(step.why)h+='<div class="rev-note">✅ '+step.why+'</div>';}
  else if(step.t==='sort'){h+='<div class="q-title">'+step.q+'</div><div class="rev-list">'+step.items.map(it=>'<div>'+it.text+' → <b>'+step.buckets[it.b]+'</b></div>').join('')+'</div>';}
  else if(step.t==='match'){h+='<div class="q-title">'+step.q+'</div><div class="rev-list">'+step.pairs.map(p=>'<div>'+p[0]+' &nbsp;↔&nbsp; <b>'+p[1]+'</b></div>').join('')+'</div>';}
  else if(step.t==='order'){h+='<div class="q-title">'+step.q+'</div><div class="rev-list">'+step.items.map((t,n)=>'<div><b>'+(n+1)+'.</b> '+t+'</div>').join('')+'</div>';}
  else if(step.t==='build'){h+='<div class="q-title">'+step.q+'</div><div class="rev-list">'+step.correct.map(i=>'<div>✓ '+step.options[i]+'</div>').join('')+'</div>';}
  else if(step.t==='cloze'){h+='<div class="q-title">'+(step.q||'')+'</div><div class="rev-fill">'+step.text.map(t=>typeof t==='string'?t:'<b>'+t.blank+'</b>').join('')+'</div>';}
  else if(step.t==='recall'){h+='<div class="q-title">'+step.q+'</div><div class="model"><h4>Model answer</h4><ul>'+step.model.map(x=>'<li>'+x+'</li>').join('')+'</ul></div>';}
  stage.innerHTML=h;
  footBtn('Next →',nextStep);
}

function showCombo(){
  if(R.combo>=2){const c=document.getElementById('combo');if(c){c.textContent='🔥 '+R.combo+' combo!';c.classList.add('show');setTimeout(()=>c.classList.remove('show'),900);}}
}

function nextStep(){R.idx++;if(R.idx>R.frontier)R.frontier=R.idx;renderStep();}

/* ---------- step: htmlviz (embedded HTML/CSS widget with a scoped setup fn) ---------- */
function stHtmlViz(stage,step){
  stage.innerHTML='<div class="q-sub">🎬 Visualize</div><div class="q-title">'+step.h+'</div><div class="htmlviz">'+step.html+'</div>';
  const root=stage.querySelector('.htmlviz');
  if(step.setup){try{step.setup(root,vizStepper);}catch(e){}}
  footBtn('Got it',()=>nextStep());
}
/* reusable prev/next stepper for htmlviz widgets. Panels (class panelClass) are pre-rendered in the html; this toggles visibility + dots + label. */
function vizStepper(root,n,opts){
  opts=opts||{};let cur=0;
  const dots=root.querySelector('.hv-dots');
  if(dots)for(let i=0;i<n;i++){const d=document.createElement('span');d.className='hv-dot';dots.appendChild(d);}
  const panels=root.querySelectorAll('.'+opts.panelClass);
  const prev=root.querySelector('.hv-prev'),next=root.querySelector('.hv-next'),lbl=root.querySelector('.hv-lbl');
  function show(){
    panels.forEach((p,i)=>{p.style.display=i===cur?'':'none';});
    root.querySelectorAll('.hv-dot').forEach((d,i)=>d.classList.toggle('on',i===cur));
    if(lbl&&opts.labels)lbl.textContent=opts.labels[cur];
    if(prev)prev.disabled=cur===0;
    if(next)next.disabled=cur===n-1;
  }
  if(prev)prev.addEventListener('click',()=>{if(cur>0){cur--;show();}});
  if(next)next.addEventListener('click',()=>{if(cur<n-1){cur++;show();}});
  show();
}

/* feedback bar + advance */
function feedback(ok,msg,onNext){
  const bar=document.createElement('div');
  bar.className='feedback '+(ok?'good':'bad');
  bar.innerHTML='<div class="inner"><h4>'+(ok?'✅ Nice!':'❌ Not quite')+'</h4><p>'+msg+'</p><button class="btn '+(ok?'':'red')+'" id="contBtn">Continue</button></div>';
  APP().appendChild(bar);
  let done=false;
  const go=()=>{if(done)return;done=true;clearTimeout(tm);bar.remove();onNext();};
  document.getElementById('contBtn').onclick=go;
  // auto-advance on a correct answer; wrong answers wait so you can read the explanation
  const tm=ok?setTimeout(go,3500):null;
}

/* heart / xp / combo bookkeeping for graded steps */
function grade(ok,gain){
  R.graded++;
  if(ok){R.correct++;R.combo++;R.maxCombo=Math.max(R.maxCombo,R.combo);const bonus=Math.max(0,R.combo-1)*2;R.xp+=gain+bonus;showCombo();}
  else{R.combo=0;R.hearts--;R.mistakes++;}
  const heartEl=document.querySelector('.lhearts');if(heartEl)heartEl.textContent='❤️ '+R.hearts;
}

/* mistake bank — records graded steps you miss, removes them once mastered */
function sigOf(step){return step.q?(step.t+'|'+step.q):(step.t+'|'+JSON.stringify(step.text||step.items||step.pairs||step.options||''));}
function finishGraded(step,perfect){
  const sig=sigOf(step);
  S.answered[sig]=1;  // you've now actually answered this question → clears any revisit dot
  if(perfect){if(S.mistakes[sig])delete S.mistakes[sig];}
  else{const c=Object.assign({},step);delete c.__d;S.mistakes[sig]=c;}
  save();
}

/* ---------- step: teach ---------- */
function blockHTML(b){
  if(b.k==='tldr')return '<div class="tldr"><span class="tag">TL;DR</span><span>'+b.t+'</span></div>';
  if(b.k==='point')return '<div class="point"><span class="pi">'+b.i+'</span><span>'+b.t+'</span></div>';
  if(b.k==='cause')return '<div class="cause"><div class="box">'+b.a+'</div><div class="arrow">→</div><div class="box">'+b.b+'</div></div>';
  if(b.k==='vs')return '<div class="vs"><div class="col a"><h4>'+b.a.h+'</h4>'+b.a.t+'</div><div class="col b"><h4>'+b.b.h+'</h4>'+b.b.t+'</div></div>';
  if(b.k==='keyt')return '<div class="keyt"><b>'+b.term+'</b> — '+b.def+'</div>';
  if(b.k==='callout')return '<div class="callout '+b.c+'"><span>'+(b.c==='warn'?'⚠️':b.c==='mem'?'🧠':'💡')+'</span><span>'+b.t+'</span></div>';
  if(b.k==='note')return '<div class="callout note"><span>💡</span><span>'+b.t+'</span></div>';
  if(b.k==='mnemonic')return '<div class="callout mem"><span>🧠</span><span>'+b.t+'</span></div>';
  return '';
}
function stTeach(stage,step){

/* ---------- step: vecviz (interactive version-vector walkthrough) ---------- */
/* ---- ported timeline clock viz (Lamport + vector), shared by htmlviz steps ---- */
const CLK_EVENTS=[
  {p:0,type:'local',col:1},
  {p:0,type:'send',msg:'m1',col:2},
  {p:1,type:'recv',msg:'m1',col:3},
  {p:1,type:'send',msg:'m2',col:4},
  {p:2,type:'recv',msg:'m2',col:5},
  {p:0,type:'local',col:6}
];
function computeClocks(){
  const L=[],V=[],lc=[0,0,0],vc=[[0,0,0],[0,0,0],[0,0,0]],msgL={},msgV={};
  CLK_EVENTS.forEach((e,idx)=>{
    if(e.type==='recv'){
      lc[e.p]=Math.max(lc[e.p],msgL[e.msg])+1;
      for(let i=0;i<3;i++)vc[e.p][i]=Math.max(vc[e.p][i],msgV[e.msg][i]);
      vc[e.p][e.p]++;
    }else{
      lc[e.p]++;vc[e.p][e.p]++;
      if(e.type==='send'){msgL[e.msg]=lc[e.p];msgV[e.msg]=vc[e.p].slice();}
    }
    L[idx]=lc[e.p];V[idx]=vc[e.p].slice();
  });
  return {L,V};
}
function makeClockViz(mount,mode,uid){
  const {L,V}=computeClocks();
  const names=['A','B','C'],laneY=[46,104,162],W=460,H=196;
  const colX=c=>72+(c-1)*64;
  const sendByMsg={};CLK_EVENTS.forEach((e,i)=>{if(e.type==='send')sendByMsg[e.msg]=i;});
  const msgs=[];CLK_EVENTS.forEach((e,i)=>{if(e.type==='recv')msgs.push({from:sendByMsg[e.msg],to:i});});
  const stamp=i=>mode==='lamport'?String(L[i]):'['+V[i].join(',')+']';
  const evtName=i=>names[CLK_EVENTS[i].p]+' '+stamp(i);
  function relation(a,b){let ale=true,ble=true,lt=false,gt=false;for(let k=0;k<3;k++){if(V[a][k]>V[b][k]){ale=false;gt=true;}if(V[a][k]<V[b][k]){ble=false;lt=true;}}if(ale&&lt)return'before';if(ble&&gt)return'after';return'concurrent';}
  let revealed=0,sel=[],caption='Press <b>Step</b> to advance the simulation event by event.',timer=null;
  function stepCaption(i){
    const e=CLK_EVENTS[i],nm=names[e.p];
    if(e.type==='local')return nm+' has a <b>local event</b> → '+(mode==='lamport'?('increment counter to <b>'+L[i]+'</b>'):('bump slot '+nm+' → <b>'+stamp(i)+'</b>'))+'.';
    if(e.type==='send')return nm+' <b>sends '+e.msg+'</b> → increment and attach '+(mode==='lamport'?('counter <b>'+L[i]+'</b>'):('vector <b>'+stamp(i)+'</b>'))+'.';
    return nm+' <b>receives '+e.msg+'</b> → '+(mode==='lamport'?('max(local, '+L[sendByMsg[e.msg]]+')+1 = <b>'+L[i]+'</b>'):('element-wise max with '+stamp(sendByMsg[e.msg])+', then bump slot '+nm+' = <b>'+stamp(i)+'</b>'))+'.';
  }
  function render(){
    let s='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">';
    s+='<defs><marker id="cvarr'+uid+'" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path class="cv-arrow" d="M0,0 L8,3 L0,6 Z"/></marker></defs>';
    for(let p=0;p<3;p++){s+='<line class="cv-lane" x1="50" y1="'+laneY[p]+'" x2="'+(W-12)+'" y2="'+laneY[p]+'"/><text class="cv-label" x="22" y="'+(laneY[p]+5)+'">'+names[p]+'</text>';}
    msgs.forEach(m=>{if(m.from<revealed&&m.to<revealed){const e1=CLK_EVENTS[m.from],e2=CLK_EVENTS[m.to];s+='<line class="cv-msg" x1="'+colX(e1.col)+'" y1="'+laneY[e1.p]+'" x2="'+colX(e2.col)+'" y2="'+laneY[e2.p]+'" marker-end="url(#cvarr'+uid+')"/>';}});
    for(let i=0;i<revealed;i++){const e=CLK_EVENTS[i],x=colX(e.col),y=laneY[e.p];s+='<text class="cv-stamp" x="'+x+'" y="'+(y-12)+'" text-anchor="middle">'+stamp(i)+'</text><circle class="cv-dot'+(sel.includes(i)?' sel':'')+'" data-i="'+i+'" cx="'+x+'" cy="'+y+'" r="7"/>';}
    s+='</svg>';
    s+='<div class="cv-controls"><button data-act="back"'+(revealed===0?' disabled':'')+'>◀ Back</button><button data-act="step"'+(revealed>=CLK_EVENTS.length?' disabled':'')+'>Step ▶</button><button data-act="play">Play</button><button data-act="reset">Reset</button><span class="cv-hint">'+(revealed<CLK_EVENTS.length?('Event '+revealed+' / '+CLK_EVENTS.length):'All revealed — tap two events to compare')+'</span></div>';
    s+='<div class="cv-cap">'+caption+'</div>';
    mount.innerHTML=s;
    mount.querySelectorAll('.cv-dot').forEach(d=>d.addEventListener('click',()=>onDot(+d.dataset.i)));
    mount.querySelectorAll('.cv-controls button').forEach(b=>b.addEventListener('click',()=>onAct(b.dataset.act)));
  }
  function onAct(a){
    if(timer){clearInterval(timer);timer=null;}
    if(a==='step'){if(revealed<CLK_EVENTS.length){caption=stepCaption(revealed);revealed++;}render();}
    else if(a==='back'){if(revealed>0){revealed--;sel=[];caption=revealed>0?stepCaption(revealed-1):'Press <b>Step</b> to advance the simulation event by event.';}render();}
    else if(a==='reset'){revealed=0;sel=[];caption='Press <b>Step</b> to advance the simulation event by event.';render();}
    else if(a==='play'){revealed=0;sel=[];caption='Playing…';render();timer=setInterval(()=>{if(revealed<CLK_EVENTS.length){caption=stepCaption(revealed);revealed++;render();}else{clearInterval(timer);timer=null;caption='Done. Tap two events to test their causal relationship.';render();}},850);}
  }
  function onDot(i){
    if(sel.includes(i))sel=sel.filter(x=>x!==i);else{sel.push(i);if(sel.length>2)sel.shift();}
    if(sel.length===2){const[a,b]=sel,r=relation(a,b);
      if(r==='concurrent')caption='<b>'+evtName(a)+'</b> ∥ <b>'+evtName(b)+'</b> — <b>concurrent</b> (neither vector dominates).'+(mode==='lamport'?' Their Lamport numbers ('+L[a]+', '+L[b]+') look ordered, but Lamport can’t prove this — only vector clocks can.':'');
      else{const[x,y]=r==='before'?[a,b]:[b,a];caption='<b>'+evtName(x)+'</b> → <b>'+evtName(y)+'</b> — causally <b>happened-before</b> (its vector is ≤ the other, strictly less in ≥1 slot).';}
    }else if(sel.length===1)caption='Selected <b>'+evtName(sel[0])+'</b>. Tap one more to compare.';
    else caption='Tap two events to compare their causal relationship.';
    render();
  }
  mount.addEventListener('click',e=>e.stopPropagation());
  render();
}

function stVecViz(stage,step){
  const nodes=step.nodes,frames=step.frames,nc=['na','nb','nc'];
  let f=0;
  const legend='each clock = [ '+nodes.map((n,i)=>'<span class="vv-tag '+nc[i]+'">'+n+'</span>').join(' , ')+' ]';
  function draw(){
    const fr=frames[f];
    let h='<div class="q-sub">🎬 Watch it run · use ← → to step</div><div class="q-title">'+step.h+'</div>';
    h+='<div class="vv-legend">'+legend+'</div>';
    h+='<div class="vv-cap">'+fr.cap+'</div>';
    h+='<div class="vv-grid">';
    nodes.forEach((nm,r)=>{
      const sending=fr.msg&&fr.msg.from===r,receiving=fr.msg&&fr.msg.to===r;
      h+='<div class="vv-row">';
      h+='<div class="vv-node '+nc[r]+'">'+nm+'</div>';
      h+='<div class="vv-vec">[ ';
      fr.v[r].forEach((val,c)=>{
        const hot=(fr.hi||[]).some(p=>p[0]===r&&p[1]===c);
        h+='<span class="vv-cell'+(hot?' hot':'')+'">'+val+'</span>';
        h+=c<fr.v[r].length-1?'<span class="vv-comma">, </span>':'';
      });
      h+=' ]</div>';
      if(sending)h+='<div class="vv-tagmsg out">sends ✉️</div>';
      else if(receiving)h+='<div class="vv-tagmsg in">📥 incoming…</div>';
      h+='</div>';
    });
    h+='</div>';
    if(fr.msg)h+='<div class="vv-msg">✉️ <b>'+nodes[fr.msg.from]+' → '+nodes[fr.msg.to]+'</b> &nbsp;carries clock '+fr.msg.label+'</div>';
    if(fr.verdict)h+='<div class="vv-verdict '+fr.verdict.cls+'">'+fr.verdict.t+'</div>';
    if(step.rule)h+='<div class="vv-rule">📏 '+step.rule+'</div>';
    h+='<div class="vv-nav"><button class="vv-btn" id="vzPrev"'+(f===0?' disabled':'')+'>← Prev</button>';

    h+='</div><button class="vv-btn" id="vzNext"'+(f===frames.length-1?' disabled':'')+'>Next →</button></div>';
    stage.innerHTML=h;
    const p=document.getElementById('vzPrev'),n=document.getElementById('vzNext');
    if(p)p.onclick=()=>{if(f>0){f--;draw();}};
    if(n)n.onclick=()=>{if(f<frames.length-1){f++;draw();}};
  }
  draw();
  footBtn('Got it',()=>nextStep());
}

/* ---------- step: mcq ---------- */
function stMcq(stage,step){
  // shuffle option order so the correct answer isn't always in the same slot
  const order=shuffle(step.o.map((_,i)=>i)), aIdx=order.indexOf(step.a);
  let h='<div class="q-sub">'+(step.boss?'⚡ Speed round':'🧩 Quick check')+'</div><div class="q-title">'+step.q+'</div><div class="opts">';
  order.forEach((orig,i)=>h+='<button class="opt" data-i="'+i+'">'+step.o[orig]+'</button>');
  h+='</div>';stage.innerHTML=h;
  let locked=false;
  stage.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{
    if(locked)return;locked=true;
    const i=+b.dataset.i, ok=i===aIdx;
    stage.querySelectorAll('.opt').forEach((x,j)=>{x.classList.add('dim');if(j===aIdx)x.classList.add('correct');});
    b.classList.remove('dim');b.classList.add(ok?'correct':'wrong');
    grade(ok,10);finishGraded(step,ok);
    if(R.hearts<=0&&!ok){setTimeout(()=>finishRun(false),650);return;}
    if(step.boss){setTimeout(()=>nextStep(),ok?550:900);}
    else feedback(ok,ok?(step.why||'Correct.'):(step.why||'Review and continue.'),nextStep);
  });
}

/* ---------- step: sort ---------- */
function stSort(stage,step){
  let qi=0,wrong=0;const items=shuffle(step.items);
  function draw(){
    if(qi>=items.length){finishGraded(step,wrong===0);nextStep();return;}
    const it=items[qi];
    let locked=false;
    stage.innerHTML='<div class="q-sub">👆 Sort it</div><div class="q-title">'+step.q+'</div>'
      +'<div class="sortcard" id="sc">'+it.text+'</div>'
      +'<div class="bucketrow"><button class="btn grey" data-b="0">'+step.buckets[0]+'</button><button class="btn blue" data-b="1">'+step.buckets[1]+'</button></div>';
    stage.querySelectorAll('[data-b]').forEach(btn=>btn.onclick=()=>{
      if(locked)return;locked=true;
      const b=+btn.dataset.b, ok=b===it.b;
      const sc=document.getElementById('sc');
      sc.classList.add(ok?'flash-g':'flash-r');
      grade(ok,6);if(!ok)wrong++;
      if(!ok)sc.textContent=it.text+'  →  '+step.buckets[it.b];
      if(R.hearts<=0&&!ok){setTimeout(()=>finishRun(false),700);return;}
      setTimeout(()=>{qi++;draw();},ok?420:950);
    });
  }
  draw();
}

/* ---------- step: match ---------- */
function stMatch(stage,step){
  const L=shuffle(step.pairs.map((p,i)=>({t:p[0],i})));
  const Rr=shuffle(step.pairs.map((p,i)=>({t:p[1],i})));
  let h='<div class="q-sub">🔗 Match pairs</div><div class="q-title">'+step.q+'</div><div class="matchgrid"><div class="matchcol" id="mL"></div><div class="matchcol" id="mR"></div></div>';
  stage.innerHTML=h;
  const cL=document.getElementById('mL'),cR=document.getElementById('mR');
  L.forEach(x=>{const b=document.createElement('button');b.className='mitem';b.textContent=x.t;b.dataset.i=x.i;b.dataset.side='L';cL.appendChild(b);});
  Rr.forEach(x=>{const b=document.createElement('button');b.className='mitem';b.textContent=x.t;b.dataset.i=x.i;b.dataset.side='R';cR.appendChild(b);});
  let selL=null,selR=null,left=step.pairs.length,wrong=0;
  function clearSel(){selL&&selL.classList.remove('sel');selR&&selR.classList.remove('sel');selL=selR=null;}
  function tryMatch(){
    if(!selL||!selR)return;
    if(selL.dataset.i===selR.dataset.i){
      [selL,selR].forEach(e=>{e.classList.remove('sel');e.classList.add('done');e.disabled=true;});
      grade(true,7);clearSel();left--;
      if(left===0){finishGraded(step,wrong===0);setTimeout(()=>nextStep(),450);}
    }else{
      const a=selL,b=selR;a.classList.add('bad');b.classList.add('bad');grade(false,0);wrong++;
      setTimeout(()=>{a.classList.remove('bad','sel');b.classList.remove('bad','sel');},350);clearSel();
      if(R.hearts<=0)setTimeout(()=>finishRun(false),500);
    }
  }
  stage.querySelectorAll('.mitem').forEach(b=>b.onclick=()=>{
    if(b.classList.contains('done'))return;
    if(b.dataset.side==='L'){selL&&selL.classList.remove('sel');selL=b;}
    else{selR&&selR.classList.remove('sel');selR=b;}
    b.classList.add('sel');tryMatch();
  });
}

/* ---------- step: order ---------- */
function stOrder(stage,step){
  const correct=step.items;
  const bank=shuffle(correct.map((t,i)=>({t,i})));
  let placed=[];
  function draw(){
    let h='<div class="q-sub">🔢 Put in order</div><div class="q-title">'+step.q+'</div>';
    h+='<div class="orderzone" id="zone">'+(placed.length?'':'<span class="muted" style="font-weight:700;font-size:13px">tap chips below in order…</span>')+'</div>';
    h+='<div class="bank" id="bank"></div>';
    stage.innerHTML=h;
    const zone=document.getElementById('zone');zone.innerHTML=placed.length?'':zone.innerHTML;
    placed.forEach((p,n)=>{const d=document.createElement('div');d.className='chip placed';d.innerHTML='<span class="num">'+(n+1)+'</span>'+p.t;zone.appendChild(d);});
    const bk=document.getElementById('bank');
    bank.forEach(b=>{if(placed.find(p=>p.id===b.i))return;const el=document.createElement('button');el.className='chip';el.textContent=b.t;el.onclick=()=>{placed.push({t:b.t,id:b.i});if(placed.length===correct.length)check();else draw();};bk.appendChild(el);});
    if(placed.length){footBtn('Undo last',()=>{placed.pop();draw();},'grey');}
  }
  function check(){
    let ok=placed.every((p,n)=>p.id===n);
    grade(ok,16);finishGraded(step,ok);
    let h='<div class="q-sub">🔢 Put in order</div><div class="q-title">'+step.q+'</div><div class="bank">';
    placed.forEach((p,n)=>{const right=p.id===n;h+='<div class="chip '+(right?'ok':'no')+'"><span class="num">'+(n+1)+'</span>'+p.t+(right?'  ✓':'  ✗')+'</div>';});
    h+='</div>';stage.innerHTML=h;
    clearFoot();
    if(R.hearts<=0&&!ok){setTimeout(()=>finishRun(false),700);return;}
    feedback(ok,ok?'Perfect order!':'Correct order: '+correct.join(' → '),nextStep);
  }
  draw();
}

/* ---------- step: build (multi-select) ---------- */
function stBuild(stage,step){
  const sel=new Set();
  let h='<div class="q-sub">🛠️ Build it</div><div class="q-title">'+step.q+'</div><div class="buildgrid" id="bg"></div>';
  stage.innerHTML=h;
  const bg=document.getElementById('bg');
  step.options.forEach((o,i)=>{const b=document.createElement('button');b.className='bopt';b.textContent=o;b.onclick=()=>{if(sel.has(i)){sel.delete(i);b.classList.remove('on');}else{sel.add(i);b.classList.add('on');}};bg.appendChild(b);});
  footBtn('Check',()=>{
    const correct=new Set(step.correct);
    const ok=sel.size===correct.size&&[...sel].every(i=>correct.has(i));
    bg.querySelectorAll('.bopt').forEach((b,i)=>{b.disabled=true;b.classList.remove('on');if(correct.has(i))b.classList.add('good');else if(sel.has(i))b.classList.add('miss');});
    grade(ok,16);finishGraded(step,ok);clearFoot();
    if(R.hearts<=0&&!ok){setTimeout(()=>finishRun(false),700);return;}
    feedback(ok,ok?'Exactly the right set!':'Green = correct picks.',nextStep);
  });
}

/* ---------- step: recall (output / explain) ---------- */
function stRecall(stage,step){
  let h='<div class="q-sub">🗣️ Explain it (out loud!)</div><div class="q-title">'+step.q+'</div>'
    +'<div class="recall"><textarea id="ra" placeholder="Optional: jot your answer or say it aloud, then reveal."></textarea></div>';
  stage.innerHTML=h;
  footBtn('Reveal model answer',()=>{
    stopTimer(); // self-graded from here — stop the clock while you read + judge
    const tEl=document.querySelector('.timer');if(tEl)tEl.classList.add('paused');
    const m=document.createElement('div');m.className='model';
    m.innerHTML='<h4>Model answer</h4><ul>'+step.model.map(x=>'<li>'+x+'</li>').join('')+'</ul>'
      +'<div class="gradebtns"><button class="btn" data-g="2">Nailed it</button><button class="btn blue" data-g="1">Partly</button><button class="btn grey" data-g="0">Missed</button></div>';
    document.getElementById('stage').appendChild(m);
    clearFoot();
    m.querySelectorAll('[data-g]').forEach(b=>b.onclick=()=>{
      const g=+b.dataset.g;
      // recall is self-graded → kept OUT of the accuracy % (graded/correct untouched), but still earns XP + tracks recallNailed
      R.xp+= (g===2?15:g===1?8:3);
      if(g===2){S.recallNailed=(S.recallNailed||0)+1;}
      else{R.mistakes++;} // a self-acknowledged miss means the run isn't flawless (no flawless bonus / gold)
      // Partly / Missed → log for review; Nailed it → clears it from the review queue
      finishGraded(step,g===2);
      nextStep();
    });
  });
}

/* ---------- step: cloze (masked fill-in) ---------- */
function stCloze(stage,step){
  const tokens=step.text;
  const slotPos=[];tokens.forEach((t,i)=>{if(typeof t!=='string')slotPos.push(i);});
  const answers=slotPos.map(i=>tokens[i].blank);
  const bank=shuffle(answers.concat(step.distract||[]).map((w,i)=>({w,used:false,id:i})));
  const filled={};
  const norm=s=>String(s).toLowerCase().replace(/[^a-z0-9+>]/g,'');
  function nextEmpty(){for(let p=0;p<slotPos.length;p++)if(filled[p]==null)return p;return -1;}
  function allFilled(){return slotPos.every((_,p)=>filled[p]!=null);}
  function draw(){
    let h='<div class="q-sub">🧩 Masked recall — fill the blanks</div>';
    if(step.q)h+='<div class="q-title" style="font-size:17px">'+step.q+'</div>';
    h+='<div class="cloze">';let p=0;
    tokens.forEach(t=>{
      if(typeof t==='string'){h+='<span>'+t+'</span>';}
      else{const pos=p++;const bid=filled[pos];const w=bid!=null?bank.find(x=>x.id===bid).w:'';h+='<button class="slot'+(w?' filled':'')+'" data-p="'+pos+'">'+(w||'_____')+'</button>';}
    });
    h+='</div><div class="wordbank" id="wb"></div>';
    stage.innerHTML=h;
    const wb=document.getElementById('wb');
    bank.forEach(b=>{const c=document.createElement('button');c.className='word';c.textContent=b.w;c.disabled=b.used;c.onclick=()=>{const e=nextEmpty();if(e<0)return;filled[e]=b.id;b.used=true;draw();};wb.appendChild(c);});
    stage.querySelectorAll('.slot').forEach(s=>s.onclick=()=>{const pos=+s.dataset.p;if(filled[pos]!=null){bank.find(x=>x.id===filled[pos]).used=false;delete filled[pos];draw();}});
    if(allFilled())footBtn('Check',check);else clearFoot();
  }
  function check(){
    let ok=true;
    slotPos.forEach((ti,p)=>{const ans=tokens[ti];const got=bank.find(x=>x.id===filled[p]).w;const good=norm(got)===norm(ans.blank)||(ans.alt||[]).some(a=>norm(a)===norm(got));if(!good)ok=false;});
    stage.querySelectorAll('.slot').forEach(s=>{const p=+s.dataset.p;const ans=tokens[slotPos[p]];const got=bank.find(x=>x.id===filled[p]).w;const good=norm(got)===norm(ans.blank)||(ans.alt||[]).some(a=>norm(a)===norm(got));s.classList.add(good?'sgood':'sbad');s.disabled=true;if(!good)s.textContent=ans.blank;});
    stage.querySelectorAll('#wb .word').forEach(c=>c.disabled=true);
    grade(ok,14);finishGraded(step,ok);clearFoot();
    if(R.hearts<=0&&!ok){setTimeout(()=>finishRun(false),700);return;}
    feedback(ok,ok?'Every blank correct — that’s the real text, locked in.':'Filled the right words in for you — read the full sentence once more.',nextStep);
  }
  draw();
}

/* ============================ RESULTS ============================ */
function finishRun(timedOut){
  stopTimer();
  if(R.mode==='review'){commitRun(true);return resultsScreen(true);}
  if(R.mode==='boss'){
    const ok = !timedOut && R.hearts>0 && acc()>=0.6;
    if(ok){S.done['boss-'+R.unit.id]=true;recordResult('boss-'+R.unit.id);commitRun(true);}
    else{commitRun(false);}
    return resultsScreen(ok);
  }
  if(R.hearts>0&&!timedOut){S.done[R.lesson.id]=true;recordResult(R.lesson.id);commitRun(true);resultsScreen(true);}
  else{commitRun(false);resultsScreen(false);}
}
function recordResult(id){
  const flawless=R.mistakes===0 && R.correct===R.graded;
  S.perfect[id]=S.perfect[id]||flawless;
  S.best[id]=Math.max(S.best[id]||0, R.graded?Math.round(R.correct/R.graded*100):100);
}
function acc(){return R.graded?R.correct/R.graded:0;}
function commitRun(success){
  if(success){
    R.xp+=20; // completion bonus
    if(R.mistakes===0){R.xp+=20;S.flawless=true;}
  }
  S.xp+=R.xp;
  save();checkBadges();
}
function resultsScreen(success){
  stopTimer();
  let h;
  if(success){
    const a=Math.round(acc()*100);
    h='<div class="center"><div class="big">🎉</div><h2>'+(R.mode==='boss'?'Boss defeated!':'Quest complete!')+'</h2>'
      +'<p>'+(R.mistakes===0?'Flawless run — perfect!':'Nice work. Keep the streak going!')+'</p>'
      +'<div class="statrow">'
      +'<div class="statbox xp"><div class="v">+'+R.xp+'</div><div class="l">XP</div></div>'
      +'<div class="statbox combo"><div class="v">'+R.maxCombo+'</div><div class="l">Max combo</div></div>'
      +'<div class="statbox acc"><div class="v">'+a+'%</div><div class="l">Accuracy</div></div>'
      +'</div>';
    h+='<button class="btn" id="homeBtn">Continue</button></div>';
  }else{
    h='<div class="center"><div class="big">💔</div><h2>Out of hearts</h2>'
      +'<p>'+(R.mode==='boss'?'The boss got you this time.':'Almost! Review and try again — you’ve got this.')+'</p>'
      +'<div class="statrow"><div class="statbox xp"><div class="v">+'+R.xp+'</div><div class="l">XP earned</div></div></div>';
    h+='<button class="btn blue" id="retryBtn">Try again</button><div style="height:12px"></div><button class="btn grey" id="homeBtn">Back to map</button></div>';
  }
  clearFoot();APP().innerHTML=h;
  const hb=document.getElementById('homeBtn');if(hb)hb.onclick=()=>renderHome(true);
  const rb=document.getElementById('retryBtn');if(rb)rb.onclick=()=>{R.mode==='boss'?startBoss(R.unit.id):R.mode==='review'?(R.source==='recall'?startRecallReview():R.source==='unitrecall'?startUnitRecall(R.unit.id):startReview()):startLesson(R.lesson.id);};
  if(success){burst();}
}
function burst(){
  const t=document.getElementById('toast');
  // lightweight celebratory toast already; add confetti emojis
  toast('🎊 +'+R.xp+' XP'+(levelOf(S.xp)>levelOf(S.xp-R.xp)?'  —  Level up!':''));
}

/* ============================ keyboard control ============================ */
function keyAction(e){
  if(e.metaKey||e.ctrlKey||e.altKey)return;
  const tag=(e.target&&e.target.tagName)||'';
  if(tag==='INPUT'||tag==='TEXTAREA')return; // let typing work (recall textarea)
  const k=e.key;
  if(k==='Escape'){const q=document.getElementById('quitBtn');if(q){q.click();e.preventDefault();}return;}
  if(k==='Backspace'){const b=document.getElementById('backBtn');if(b){b.click();e.preventDefault();}return;}
  // recall self-grade after reveal: 1=Nailed, 2=Partly, 3=Missed
  const grades=document.querySelectorAll('.gradebtns [data-g]');
  if(grades.length){const map={'1':'2','2':'1','3':'0'};if(map[k]){const b=document.querySelector('.gradebtns [data-g="'+map[k]+'"]');if(b){b.click();e.preventDefault();}}return;}
  // feedback Continue bar
  const cont=document.getElementById('contBtn');
  if(cont){if(k==='Enter'||k===' '){cont.click();e.preventDefault();}return;}
  // MCQ options 1..N (only before answering)
  const opts=document.querySelectorAll('.opts .opt');
  if(opts.length){
    if(!document.querySelector('.opt.dim,.opt.correct,.opt.wrong')){const n=parseInt(k,10);if(n>=1&&n<=opts.length){opts[n-1].click();e.preventDefault();}}
    return;
  }
  // sort buckets: 1/← and 2/→
  const buckets=document.querySelectorAll('.bucketrow [data-b]');
  if(buckets.length){if(k==='1'||k==='ArrowLeft'){buckets[0].click();e.preventDefault();}else if(k==='2'||k==='ArrowRight'){buckets[1].click();e.preventDefault();}return;}
  // build: number toggles, Enter checks
  const bopts=document.querySelectorAll('#bg .bopt');
  if(bopts.length){
    const n=parseInt(k,10);
    if(n>=1&&n<=bopts.length){if(!bopts[n-1].disabled){bopts[n-1].click();e.preventDefault();}return;}
    if(k==='Enter'||k===' '){const fb=document.getElementById('fbtn');if(fb){fb.click();e.preventDefault();}return;}
  }
  // vecviz frame stepping with ← →
  const vzP=document.getElementById('vzPrev'),vzN=document.getElementById('vzNext');
  if(vzP&&vzN){if(k==='ArrowLeft'){if(!vzP.disabled)vzP.click();e.preventDefault();return;}if(k==='ArrowRight'){if(!vzN.disabled)vzN.click();e.preventDefault();return;}}
  // generic footer (Got it / Reveal / Check / Next) — but never auto-Undo
  const fb=document.getElementById('fbtn');
  if(fb&&(k==='Enter'||k===' ')&&!/undo/i.test(fb.textContent)){fb.click();e.preventDefault();}
}
document.addEventListener('keydown',keyAction);

/* ============================ boot ============================ */
seedAnswered();
renderHome(true);
</script>

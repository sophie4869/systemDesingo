<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>systemDesingo — Distributed Systems</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&amp;display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --green:#58CC02;--green-d:#46a302;--green-bg:#D7FFB8;
  --blue:#1CB0F6;--blue-d:#1899D6;--blue-bg:#DDF4FF;
  --red:#FF4B4B;--red-d:#E63946;--red-bg:#FFDFE0;
  --yellow:#FFC800;--yellow-d:#E6A800;
  --purple:#CE82FF;--purple-d:#A560E8;--purple-bg:#F3E5FF;
  --orange:#FF9600;
  --ink:#3C3C3C;--muted:#777;--faint:#AFAFAF;
  --bg:#FFFFFF;--panel:#F7F7F7;--line:#E5E5E5;--line-d:#CFCFCF;
  --r:16px;
}
/* ---- embedded-visualization token shim (maps Claude canvas tokens to v2 palette) ---- */
:root{
  --color-background-primary:#FFFFFF;
  --color-background-secondary:var(--panel);
  --color-background-info:var(--blue-bg);
  --color-background-success:var(--green-bg);
  --color-background-warning:#FFF3D6;
  --color-background-danger:var(--red-bg);
  --color-text-primary:var(--ink);
  --color-text-secondary:var(--muted);
  --color-text-tertiary:var(--faint);
  --color-text-info:var(--blue-d);
  --color-text-success:#3a6b13;
  --color-text-warning:#8A6100;
  --color-text-danger:var(--red-d);
  --color-border-primary:var(--line-d);
  --color-border-secondary:var(--line-d);
  --color-border-tertiary:var(--line);
  --color-border-info:var(--blue);
  --color-border-success:#B5E89A;
  --color-border-warning:var(--yellow-d);
  --border-radius-lg:14px;
  --border-radius-md:12px;
  --border-radius-sm:10px;
  --font-mono:ui-monospace,Menlo,monospace;
}
.htmlviz{text-align:left;font-weight:500}
.htmlviz .hv-nav button{background:#fff;border:2px solid var(--line);border-bottom-width:3px;border-radius:10px;color:var(--blue-d);cursor:pointer;width:34px;height:32px;display:inline-flex;align-items:center;justify-content:center;font-size:16px;line-height:1;font-family:inherit}
.htmlviz .hv-nav button:active{transform:translateY(2px);border-bottom-width:2px}
.htmlviz .hv-nav button:disabled{opacity:.4;cursor:default}
.htmlviz .hv-nav{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.htmlviz .hv-dots{display:flex;gap:6px}
.htmlviz .hv-dot{width:8px;height:8px;border-radius:50%;background:var(--line-d);transition:all .15s}
.htmlviz .hv-dot.on{background:var(--blue);transform:scale(1.35)}
.htmlviz .hv-lbl{font-size:13px;color:var(--muted);font-weight:800;flex:1}
html,body{height:100%;font-family:'Nunito',system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:17px;font-weight:700;line-height:1.45;overscroll-behavior:none}
#app{max-width:560px;margin:0 auto;min-height:100vh;padding-bottom:40px}
.hidden{display:none!important}
button{font-family:inherit;font-weight:800;cursor:pointer;border:none;background:none;color:inherit}

/* 3D press buttons */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px 18px;font-size:16px;font-weight:800;letter-spacing:.4px;border-radius:var(--r);color:#fff;background:var(--green);box-shadow:0 4px 0 var(--green-d);transition:transform .04s,box-shadow .04s;text-transform:uppercase}
.btn:active{transform:translateY(3px);box-shadow:0 1px 0 var(--green-d)}
.btn.blue{background:var(--blue);box-shadow:0 4px 0 var(--blue-d)}
.btn.blue:active{box-shadow:0 1px 0 var(--blue-d)}
.btn.grey{background:#fff;color:var(--muted);border:2px solid var(--line);box-shadow:0 4px 0 var(--line);}
.btn.grey:active{box-shadow:0 1px 0 var(--line)}
.btn.red{background:var(--red);box-shadow:0 4px 0 var(--red-d)}
.btn.ghost{background:transparent;color:var(--blue);box-shadow:none;text-transform:none}
.btn:disabled{opacity:.5;box-shadow:none;transform:none;cursor:default}

/* Top bar */
.stickyhead{position:sticky;top:0;z-index:20;background:var(--bg)}
.topbar{display:flex;align-items:center;gap:14px;padding:14px 18px;background:var(--bg)}
.jumpbar{display:flex;gap:8px;overflow-x:auto;padding:9px 14px;border-bottom:2px solid var(--line);scrollbar-width:none}
.jumpbar::-webkit-scrollbar{display:none}
.jchip{flex:0 0 auto;display:flex;align-items:center;gap:6px;padding:8px 13px;border-radius:20px;background:#fff;border:2px solid var(--line);border-bottom-width:3px;font-size:13px;font-weight:800;color:var(--ink);white-space:nowrap;position:relative}
.jchip .ji{font-size:16px}
.jchip:active{transform:translateY(2px)}
.jchip.done{background:var(--c);border-color:var(--c);color:#fff}
.jchip.lk{opacity:.5}
.jchip.done::after{content:"✓";margin-left:1px;font-size:12px;font-weight:900}
.stat{display:flex;align-items:center;gap:5px;font-size:16px;font-weight:800}
.stat .ic{font-size:19px}
.stat.fire{color:var(--orange)} .stat.xp{color:var(--yellow-d)} .stat.heart{color:var(--red)} .stat.gem{color:var(--blue)}
.topbar .spacer{flex:1}

/* Home */
.hero{padding:22px 18px 6px}
.hero h1{font-size:27px;font-weight:900;letter-spacing:-.5px}
.hero p{font-size:15px;color:var(--muted);font-weight:700;margin-top:2px}
.levelcard{margin:14px 18px;background:var(--panel);border:2px solid var(--line);border-radius:var(--r);padding:14px 16px;display:flex;align-items:center;gap:14px}
.ring{--p:0;width:58px;height:58px;border-radius:50%;flex-shrink:0;background:conic-gradient(var(--green) calc(var(--p)*1%),var(--line) 0);display:flex;align-items:center;justify-content:center}
.ring span{width:44px;height:44px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:18px;color:var(--green-d)}
.levelcard .lc-meta{flex:1}
.levelcard .lc-title{font-size:17px;font-weight:900}
.levelcard .lc-sub{font-size:13px;color:var(--muted);font-weight:700}
.actions{display:flex;gap:10px;margin:0 18px 4px}
.act{flex:1;padding:12px;border:2px solid var(--line);border-bottom-width:4px;border-radius:14px;background:#fff;font-weight:800;font-size:13px;color:var(--muted)}
.act:active{transform:translateY(2px)}
.act.hot{border-color:var(--red);color:var(--red-d);background:var(--red-bg)}
.optrow{display:flex;align-items:center;gap:7px;margin:6px 18px 4px;font-size:12.5px;font-weight:700;color:var(--muted);cursor:pointer}
.speedrow{display:flex;gap:10px;align-items:stretch;margin:8px 18px 4px}
.speedbtn{flex:1;background:#F5ECFD;border-color:#A560E8;color:#7C3AED}
.toolrow{margin:14px 18px 0;gap:10px}
.toolbtn{flex:1;background:#EAF6FF;border-color:#1CB0F6;color:#1471B8}
.lenpicker{display:flex;gap:3px;align-items:center;background:#fff;border:2px solid var(--line);border-bottom-width:4px;border-radius:14px;padding:4px}
.lenpill{min-width:36px;padding:8px 0;border:none;border-radius:10px;background:transparent;font-weight:800;font-size:13px;color:var(--muted);cursor:pointer;font-family:inherit}
.lenpill.on{background:#A560E8;color:#fff}
.bonusline{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin:-10px 0 22px;font-size:13px;font-weight:800;color:var(--purple-d)}
.chapsummrow{margin:3px 18px 0}
.chapsumm{border:none;background:transparent;font-weight:800;font-size:12.5px;color:var(--muted);cursor:pointer;font-family:inherit;padding:2px 0}
.chapgrid{display:flex;flex-wrap:wrap;gap:6px;margin:4px 18px 4px}
.chapchip{padding:6px 11px;border:2px solid var(--line);border-radius:999px;background:#fff;font-weight:800;font-size:12px;color:var(--muted);cursor:pointer;font-family:inherit}
.chapchip.on{background:#F5ECFD;border-color:#A560E8;color:#7C3AED}
.optrow input{width:15px;height:15px;accent-color:var(--blue);cursor:pointer}

.unit{margin:8px 0 4px;scroll-margin-top:118px}
.unit-head{margin:18px 18px 6px;border-radius:var(--r);padding:14px 18px;color:#fff;box-shadow:0 4px 0 rgba(0,0,0,.12);position:relative}
.udrill{position:absolute;top:12px;right:13px;display:inline-flex;align-items:center;gap:5px;padding:6px 11px;border-radius:20px;background:rgba(255,255,255,.22);border:1.5px solid rgba(255,255,255,.55);color:#fff;font-weight:800;font-size:12px;cursor:pointer;font-family:inherit}
.udrill:active{transform:translateY(1px)}
.unit-head .u-k{font-size:12px;font-weight:800;letter-spacing:1px;text-transform:uppercase;opacity:.85}
.unit-head .u-t{font-size:20px;font-weight:900;display:flex;align-items:center;gap:8px}
.unit-head .u-b{font-size:13px;font-weight:700;opacity:.92;margin-top:2px}
.path{display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px 0 4px}
.node{position:relative;width:74px;height:66px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff;box-shadow:0 5px 0 rgba(0,0,0,.18);transition:transform .05s}
.node:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(0,0,0,.18)}
.node.locked{background:#E0E0E0!important;box-shadow:0 5px 0 #C8C8C8;color:#fff;cursor:default}
.node.perfect::after{content:"✓";position:absolute;right:-2px;top:-2px;background:var(--yellow);color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;border:3px solid var(--bg)}
.node.good::after{content:"✓";position:absolute;right:-2px;top:-2px;background:var(--green);color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;border:3px solid var(--bg)}
.node.partial{opacity:.8}
.node.partial::after{content:"↻";position:absolute;right:-3px;top:-3px;background:var(--orange);color:#fff;width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;border:3px solid var(--bg)}
.node-label .pct{color:var(--orange);font-weight:800;font-size:11px}
.node.boss{width:84px;height:76px;font-size:34px}
.node-label{font-size:13px;font-weight:800;color:var(--muted);margin-top:-2px}
.node-wrap{display:flex;flex-direction:column;align-items:center;gap:1px}
.node-wrap.off1{margin-left:90px}.node-wrap.off2{margin-right:90px}
.revisit-dot{display:inline-block;vertical-align:middle;width:9px;height:9px;border-radius:50%;background:var(--color-text-danger,#E53935);margin-right:5px;position:relative;top:-1px;animation:revisitPulse 1.6s ease-in-out infinite}
@keyframes revisitPulse{0%,100%{box-shadow:0 0 0 0 rgba(229,57,53,.5)}50%{box-shadow:0 0 0 4px rgba(229,57,53,0)}}

/* Badges shelf */
.shelf{margin:18px;background:var(--panel);border:2px solid var(--line);border-radius:var(--r);padding:14px 16px}
.shelf h3{font-size:15px;font-weight:900;margin-bottom:10px}
.badges{display:flex;flex-wrap:wrap;gap:10px}
.badge{width:60px;text-align:center}
.badge .bi{width:54px;height:54px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;background:var(--yellow);box-shadow:0 3px 0 var(--yellow-d)}
.badge.lock .bi{background:#ECECEC;box-shadow:0 3px 0 #DADADA;filter:grayscale(1);opacity:.6}
.badge small{display:block;font-size:10px;font-weight:800;color:var(--muted);margin-top:3px;line-height:1.1}

/* Lesson screen */
.lesson{padding:0}
.lhead{display:flex;align-items:center;gap:12px;padding:14px 18px}
.lhead .close{font-size:26px;color:var(--faint);font-weight:900;width:30px}
.lback{font-size:22px;color:var(--muted);font-weight:900;width:24px;background:none;border:none;cursor:pointer;padding:0}
.lback:hover{color:var(--blue)}
.rev-list{font-size:15px;font-weight:700;color:var(--ink);line-height:1.7;background:var(--panel);border:2px solid var(--line);border-radius:12px;padding:11px 14px}
.rev-list>div{padding:3px 0}
.rev-list b{color:var(--blue-d)}
.rev-note{margin-top:10px;font-size:13px;color:var(--muted);font-weight:700;background:var(--green-bg);border-radius:10px;padding:9px 12px}
.rev-fill{font-size:16px;font-weight:700;line-height:1.9;color:var(--ink);background:var(--panel);border:2px solid var(--line);border-radius:12px;padding:12px 14px}
.rev-fill b{color:var(--green-d)}
.pbar{flex:1;height:16px;background:var(--line);border-radius:10px;overflow:hidden}
.pbar > i{display:block;height:100%;background:var(--green);border-radius:10px;transition:width .35s}
.lhearts{color:var(--red);font-weight:900;display:flex;align-items:center;gap:3px}
.lskip{font:inherit;font-weight:800;font-size:12px;color:var(--color-text-tertiary);background:none;border:none;cursor:pointer;padding:4px 4px;white-space:nowrap}
.lskip:hover{color:var(--color-text-secondary)}
.lnew{color:var(--color-text-danger,#E53935)}
.lnew:hover{color:var(--color-text-danger,#E53935);text-decoration:underline}
.timer{font-weight:900;color:var(--ink);display:flex;align-items:center;gap:4px}
.timer.low{color:var(--red)}
.timer.paused{color:var(--faint);font-weight:700}
.combo{position:fixed;left:50%;top:64px;transform:translateX(-50%);background:var(--purple);color:#fff;font-weight:900;padding:5px 14px;border-radius:20px;font-size:14px;box-shadow:0 3px 0 var(--purple-d);opacity:0;transition:opacity .2s,transform .2s;z-index:30}
.combo.show{opacity:1}

.stage{padding:8px 18px 120px}
.q-title{font-size:22px;font-weight:900;margin:8px 0 16px;line-height:1.3}
.q-sub{font-size:14px;color:var(--muted);font-weight:700;margin-bottom:14px}

/* Teach blocks */
.tldr{background:var(--blue-bg);border-radius:14px;padding:12px 14px;font-size:16px;font-weight:800;color:var(--blue-d);margin-bottom:12px;display:flex;gap:8px}
.tldr .tag{background:var(--blue);color:#fff;font-size:11px;padding:2px 7px;border-radius:6px;height:fit-content;letter-spacing:.5px}
.point{display:flex;gap:10px;align-items:flex-start;background:var(--panel);border:2px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:9px;font-size:15px;font-weight:700}
.reqs{flex:1}
.reqs>b{display:block;font-weight:900;margin-bottom:4px}
.reqs ul{margin:0;padding-left:18px}
.reqs li{font-weight:700;margin:3px 0;list-style:disc}
.v2-spoiler{position:relative;border:2px dashed var(--line-d);border-radius:12px;padding:2px;margin-bottom:9px;cursor:pointer;min-height:56px}
.v2-spoiler>*{filter:blur(7px);user-select:none;pointer-events:none}
.v2-spoiler::after{content:'🔒 Recall the requirements & NFRs — tap to reveal';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;padding:0 14px;font-size:13.5px;font-weight:800;color:var(--muted);background:var(--panel);border-radius:10px}
.v2-spoiler:hover::after{color:var(--blue-d)}
.v2-spoiler.revealed{border-color:transparent;padding:0;cursor:default;min-height:0}
.v2-spoiler.revealed>*{filter:none;user-select:auto;pointer-events:auto}
.v2-spoiler.revealed::after{display:none}
.point .pi{font-size:20px;line-height:1.2}
.point b{font-weight:900;color:var(--ink)}
.cause{display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap}
.cause .box{flex:1;min-width:120px;background:#fff;border:2px solid var(--line);border-radius:12px;padding:10px 12px;font-size:14px;font-weight:800;text-align:center}
.cause .arrow{font-size:22px;color:var(--green);font-weight:900}
.vs{display:flex;gap:10px;margin-bottom:10px}
.vs .col{flex:1;border-radius:12px;padding:11px 12px;font-size:14px;font-weight:700}
.vs .col.a{background:var(--green-bg);border:2px solid #B5E89A}
.vs .col.b{background:var(--blue-bg);border:2px solid #B3E3FF}
.vs .col h4{font-size:14px;font-weight:900;margin-bottom:4px}
.keyt{background:var(--purple-bg);border-left:5px solid var(--purple);border-radius:10px;padding:10px 13px;margin-bottom:9px;font-size:15px;font-weight:700}
.keyt b{color:var(--purple-d);font-weight:900}
.dyn2{margin:4px 0 9px}
.dyn2-cols{display:flex;flex-direction:column;gap:10px}
.dyn2-col{width:100%;border:2px solid var(--line);border-radius:var(--border-radius-md);padding:11px}
.dyn2-col.c-main{background:var(--green-bg);border-color:var(--green)}
.dyn2-col.c-lsi{background:var(--purple-bg);border-color:var(--purple)}
.dyn2-col.c-gsi{background:#FFEFD6;border-color:var(--orange)}
.dyn2 .dx-head{text-align:center;font-weight:900;font-size:15px}
.dyn2 .dx-pk{text-align:center;font-size:11px;font-family:var(--font-mono);font-weight:800;margin:2px 0 9px}
.dyn2 .c-main .dx-head,.dyn2 .c-main .dx-pk,.dyn2 .c-main .dx-part td{color:var(--green-d)}
.dyn2 .c-lsi .dx-head,.dyn2 .c-lsi .dx-pk,.dyn2 .c-lsi .dx-part td{color:var(--purple-d)}
.dyn2 .c-gsi .dx-head,.dyn2 .c-gsi .dx-pk,.dyn2 .c-gsi .dx-part td{color:#C26A00}
.dyn2 .dx-tbl{width:100%;border-collapse:collapse;font-size:12px;font-family:var(--font-mono)}
.dyn2 .dx-tbl th{font-weight:800;color:var(--muted);padding:3px 6px;text-align:left;border-bottom:2px solid var(--line)}
.dyn2 .dx-tbl td{padding:3px 7px;background:#fff;border:1.5px solid var(--line);font-weight:700}
.dyn2 .dx-tbl .dx-part td{background:transparent;border:none;text-align:center;font-weight:900;padding-top:9px;font-family:'Nunito',system-ui,sans-serif}
.dyn2 .dx-q{text-align:center;font-size:12.5px;margin-top:9px;font-weight:800;color:var(--ink)}
.dyn2 .dx-cap{text-align:center;font-size:12px;color:var(--muted);font-weight:700;margin:11px 0}
.dyn2 .dx-why{border:2px solid var(--line);border-radius:var(--border-radius-md);padding:11px 15px;background:#fff}
.dyn2 .dx-why-h{text-align:center;font-weight:900;font-size:13.5px;margin-bottom:6px}
.dyn2 .dx-why p{font-size:12.5px;color:var(--muted);font-weight:700;text-align:center;margin:5px 0;line-height:1.5}
.callout{border-radius:12px;padding:11px 13px;margin-bottom:9px;font-size:14px;font-weight:700;display:flex;gap:8px}
.callout.warn{background:#FFF3D6;color:#8A6100}
.callout.note{background:var(--green-bg);color:#3a6b13}
.callout.mem{background:#FFE9F4;color:#A8327D}

/* vecviz — version-vector walkthrough */
.vv-legend{font-size:13px;font-weight:800;color:var(--muted);margin-bottom:10px}
.vv-tag{display:inline-flex;width:20px;height:20px;align-items:center;justify-content:center;border-radius:6px;color:#fff;font-weight:900;font-size:12px;vertical-align:middle}
.vv-tag.na,.vv-node.na{background:var(--green)}
.vv-tag.nb,.vv-node.nb{background:var(--blue)}
.vv-tag.nc,.vv-node.nc{background:var(--purple-d)}
.vv-cap{font-size:15px;font-weight:700;color:var(--ink);background:var(--panel);border:2px solid var(--line);border-radius:12px;padding:11px 13px;margin-bottom:12px;min-height:44px;display:flex;align-items:center}
.vv-grid{display:flex;flex-direction:column;gap:9px;margin-bottom:11px}
.vv-row{display:flex;align-items:center;gap:11px}
.vv-node{width:36px;height:36px;flex-shrink:0;border-radius:10px;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;font-size:17px}
.vv-vec{font-family:ui-monospace,Menlo,monospace;font-size:24px;font-weight:800;color:var(--faint);display:flex;align-items:center}
.vv-cell{display:inline-flex;min-width:26px;justify-content:center;color:var(--ink);border-radius:7px;padding:1px 3px}
.vv-cell.hot{background:var(--yellow);color:#7a5c00;animation:vvpulse .45s ease}
@keyframes vvpulse{0%{transform:scale(1.5)}60%{transform:scale(1.05)}100%{transform:scale(1)}}
.vv-comma{color:var(--faint)}
.vv-tagmsg{margin-left:auto;font-size:12px;font-weight:900;padding:4px 9px;border-radius:8px;text-transform:uppercase;letter-spacing:.3px}
.vv-tagmsg.out{background:var(--blue-bg);color:var(--blue-d)}
.vv-tagmsg.in{background:var(--purple-bg);color:var(--purple-d)}
.vv-msg{background:var(--blue-bg);border:2px solid #B3E3FF;border-radius:12px;padding:9px 13px;font-size:14px;font-weight:700;color:var(--blue-d);margin-bottom:10px}
.vv-verdict{border-radius:12px;padding:10px 13px;font-size:14px;font-weight:700;margin-bottom:10px}
.vv-verdict.conc{background:#FFF3D6;color:#8A6100}

.bopt::before{counter-increment:kbd;content:counter(kbd);display:inline-flex;width:18px;height:18px;align-items:center;justify-content:center;border:1.5px solid #CFCFCF;border-radius:5px;font-size:10px;color:var(--muted);margin-right:7px;vertical-align:middle}

.model{background:var(--green-bg);border-radius:14px;padding:13px 15px;margin-top:12px}

.slot.sgood{border-style:solid;border-color:var(--green);background:var(--green-bg);color:var(--green-d)}

.wordbank{display:flex;flex-wrap:wrap;gap:9px;justify-content:center}
.word{padding:11px 16px;border:2px solid var(--line);border-bottom-width:4px;border-radius:13px;background:#fff;font-weight:800;font-size:15px;color:var(--ink)}
.word:active{transform:translateY(2px)}
.word:disabled{opacity:.35}

/* footer action bar */
.footbar{position:fixed;bottom:0;left:0;right:0;background:var(--bg);border-top:2px solid var(--line);padding:14px 18px;z-index:15}

.feedback.bad{background:var(--red-bg)}

.feedback.good h4{color:var(--green-d)} .feedback.bad h4{color:var(--red-d)}
.feedback p{font-size:14px;font-weight:700;margin-bottom:12px}
.feedback.good p{color:#3a6b13} .feedback.bad p{color:#9b2c2c}

/* results / fail */
.center{text-align:center;padding:50px 24px}
.center .big{font-size:64px;margin-bottom:10px}
.center h2{font-size:26px;font-weight:900;margin-bottom:8px}
.center p{font-size:16px;color:var(--muted);font-weight:700;margin-bottom:22px}
.statrow{display:flex;gap:12px;justify-content:center;margin-bottom:24px}
.statbox{background:var(--panel);border:2px solid var(--line);border-radius:14px;padding:12px 18px;min-width:90px}
.statbox .v{font-size:24px;font-weight:900}

.statbox.xp .v{color:var(--yellow-d)} .statbox.combo .v{color:var(--purple-d)} .statbox.acc .v{color:var(--green-d)}

/* toast */
.toast{position:fixed;top:14px;left:50%;transform:translateX(-50%) translateY(-120px);background:var(--ink);color:#fff;padding:12px 18px;border-radius:14px;font-weight:800;font-size:14px;z-index:50;display:flex;gap:8px;align-items:center;transition:transform .35s;box-shadow:0 6px 20px rgba(0,0,0,.25)}
.toast.show{transform:translateX(-50%) translateY(0)}
.confetti{font-size:30px;animation:pop .5s ease}
@keyframes pop{0%{transform:scale(0)}60%{transform:scale(1.3)}100%{transform:scale(1)}}
.flash-correct{animation:flashg .4s} @keyframes flashg{0%{background:var(--green-bg)}100%{background:transparent}}

/* small helpers */
.tip{font-size:13px;color:var(--faint);font-weight:700;text-align:center;margin-top:10px}
.muted{color:var(--muted)}
</style>

<script>
/* =========================================================================
   SysQuest — gamified distributed-systems interview prep
   ========================================================================= */

/* ---------------- persistence ---------------- */
const SAVE_KEY='dsq_v2_save';
function load(){try{return JSON.parse(localStorage.getItem(SAVE_KEY))||{};}catch(e){return{};}}
function save(){try{localStorage.setItem(SAVE_KEY,JSON.stringify(S));}catch(e){}}
var S=Object.assign({xp:0,done:{},badges:{},streak:0,lastDay:null,recallNailed:0,unlockAll:false,mistakes:{},perfect:{},best:{}},load());
if(!S.mistakes)S.mistakes={};
if(!S.perfect)S.perfect={};
if(!S.best)S.best={};
if(!S.answered)S.answered={};  // sigs of graded questions you've actually answered (for the revisit dot)
if(!S.picks)S.picks={};        // sig -> the ORIGINAL option index you chose on an mcq (so review can show your pick vs the correct answer)

/* streak update on open */
(function(){
  const today=new Date().toISOString().slice(0,10);
  if(S.lastDay!==today){
    const y=new Date(Date.now()-864e5).toISOString().slice(0,10);
    S.streak=(S.lastDay===y)?(S.streak+1):1;
    S.lastDay=today;save();
  }
})();

const HEARTS=3;
const levelOf=xp=>Math.floor(xp/100)+1;
const xpInLevel=xp=>xp%100;

/* ---------------- content ----------------
   step types: teach, mcq, sort, match, order, build, recall
   ------------------------------------------------------------------ */
const UNITS=[
{
 id:'cap',title:'CAP & Consistency',icon:'⚖️',color:'#1CB0F6',colorD:'#1899D6',
 blurb:'When the network breaks, what do you give up?',
 lessons:[
  {id:'cap-1',title:'CAP in 60s',steps:[
   {t:'teach',h:'The whole game',body:[
     {k:'tldr',t:'In a distributed system the network WILL split. CAP is what you do when it does.'},
     {k:'cause',a:'Network partition happens',b:'You must pick: stay Consistent OR stay Available'},
     {k:'point',i:'🌐',t:'A <b>partition</b> = some nodes can’t talk to others. Not "if" — "when".'}
   ]},
   {t:'teach',h:'Meet C, A, P',body:[
     {k:'keyt',term:'C — Consistency',def:'every read gets the newest write (or an error). One source of truth.'},
     {k:'keyt',term:'A — Availability',def:'every request gets an answer — but it might be stale.'},
     {k:'keyt',term:'P — Partition tolerance',def:'the system keeps working through a network split.'}
   ]},
   {t:'mcq',q:'Partitions in a real network are…',o:['rare, ignore them','inevitable — so P is non-negotiable','only a cloud problem','fixable with retries'],a:1,why:'Networks fail. P is a given, so the real choice is C vs A during a split.'},
   {t:'teach',h:'So the choice is…',body:[
     {k:'tldr',t:'P is mandatory. During a partition you really choose CP or AP.'},
     {k:'vs',a:{h:'CP',t:'Refuse some requests to stay correct. (HBase, ZooKeeper, Spanner)'},b:{h:'AP',t:'Answer anyway, maybe stale. (Cassandra, Riak, the Dynamo paper)'}},
     {k:'callout',c:'note',t:'Nuance: the <b>Dynamo paper</b> is the canonical AP design, but <b>DynamoDB</b> the product is subtler — single-region writes are strongly serialized with optional strongly-consistent reads; global tables default to multi-region eventual consistency (MREC), with multi-region strong consistency (MRSC) available under constraints.'}
   ]},
   {t:'sort',q:'CP or AP? Sort fast.',buckets:['CP (consistent)','AP (available)'],items:[
     {text:'ZooKeeper',b:0},{text:'Cassandra',b:1},{text:'Spanner',b:0},{text:'Riak',b:1},{text:'HBase',b:0}
   ]},
   {t:'mcq',q:'Cassandra is…',o:['CP','AP','CA','none'],a:1,why:'Cassandra favours availability + partition tolerance, with tunable consistency.'},
   {t:'cloze',q:'You’re BERT — unmask the key terms.',distract:['latency','durability'],text:[
     'In CAP: ',{blank:'consistency'},' = every read sees the newest write. ',
     {blank:'availability'},' = every request still gets an answer (maybe stale). ',
     'Partitions are ',{blank:'inevitable'},', so during a split you really pick ',
     {blank:'CP',group:'cap'},' vs ',{blank:'AP',group:'cap'},'.'
   ]},
   {t:'recall',q:'Explain CAP to a friend in 3 sentences. Say it out loud, then check.',model:['Networks partition, so P is a given.','During a partition you choose: stay consistent (reject some requests) or stay available (serve possibly-stale data).','That’s CP vs AP — e.g. Spanner is CP, Cassandra is AP.']}
  ]},
  {id:'cap-2',title:'PACELC',steps:[
   {t:'teach',h:'CAP’s missing half',body:[
     {k:'tldr',t:'CAP only covers partitions. But what about normal time?'},
     {k:'cause',a:'Else (no partition)',b:'You still trade Latency vs Consistency'},
     {k:'point',i:'⏱️',t:'Staying consistent needs <b>coordination</b> — and coordination costs <b>time</b>.'}
   ]},
   {t:'teach',h:'The PACELC label',body:[
     {k:'keyt',term:'P → A or C',def:'during a Partition, pick Availability or Consistency.'},
     {k:'keyt',term:'E → L or C',def:'Else (normal), pick low Latency or Consistency.'},
     {k:'mnemonic',t:'Read it: "If Partition then A/C, Else L/C."'},
     {k:'point',i:'🏷️',t:'Examples: <b>Dynamo (paper)</b> / <b>Cassandra</b> = PA/EL, <b>Spanner</b> = PC/EC, <b>MongoDB</b> = PA/EC (single-primary fails over → PA; primary reads avoid replica lag, and <code>majority</code>/<code>linearizable</code> read concern give read-your-writes / true linearizable reads → EC).'},
     {k:'callout',c:'note',t:'<b>DynamoDB</b> the product is subtler than the Dynamo paper — single-region is closer to PC/EC (serialized writes, optional strong reads); global tables are PA/EL by default (MREC), though strong cross-region reads (MRSC) now exist with constraints.'}
   ]},
   {t:'match',q:'Match the system to its PACELC label.',pairs:[['Cassandra','PA/EL'],['Spanner','PC/EC'],['MongoDB','PA/EC']]},
   {t:'mcq',q:'How strongly consistent a MongoDB read is depends mostly on…',o:['the disk type','the read/write concern you pick','the shard count','the OS page cache'],a:1,why:'MongoDB is tunable. Default <code>local</code> reads can return writes that later roll back; <code>majority</code> read+write gives read-your-writes; <code>linearizable</code> read concern (with majority writes) gives true single-document linearizability — each step costs latency. Treat its PACELC label as "PA/EC by default, dialled by concern," not a fixed gotcha.'},
   {t:'recall',q:'Why is PACELC more useful than CAP in an interview? Say it, then check.',model:['CAP only describes behaviour during a (rare) partition.','PACELC also captures the everyday tradeoff: consistency vs latency when healthy.','It maps better to real choices like "QUORUM reads cost latency".']}
  ]},
  {id:'cap-3',title:'Consistency ladder',steps:[
   {t:'teach',h:'Not just on/off',body:[
     {k:'tldr',t:'Consistency is a ladder from cheap+weak to strong+slow.'},
     {k:'keyt',term:'Linearizable',def:'acts like ONE copy; once a write finishes, everyone sees it. Strongest, slowest.'},
     {k:'keyt',term:'Eventual',def:'replicas converge … eventually. Reads can be stale. Cheapest.'},
     {k:'point',i:'🎯',t:'<b>Sequential</b> consistency gives one agreed order of ops — but, unlike <b>linearizable</b>, it need NOT match real wall-clock time. That real-time constraint is the only difference between them.'}
   ]},
   {t:'teach',h:'Useful middle rungs',body:[
     {k:'point',i:'🔁',t:'<b>Read-your-writes</b>: you always see your own updates.'},
     {k:'point',i:'➡️',t:'<b>Monotonic reads</b>: reads never go backwards in time.'},
     {k:'point',i:'🔗',t:'<b>Causal</b>: cause is always seen before effect.'}
   ]},
   {t:'order',q:'Drag from WEAKEST to STRONGEST.',items:['Eventual','Read-your-writes','Causal','Linearizable']},
   {t:'mcq',q:'Linearizable vs sequential consistency — the difference?',o:['linearizable allows stale reads','linearizable adds a real-time ordering constraint','they’re identical','sequential is stronger'],a:1,why:'Both give a total order; linearizability also respects wall-clock real-time order.'},
   {t:'match',q:'Symptom / need → consistency model.',pairs:[['You always see your own updates','Read-your-writes'],['Reads never go backwards in time','Monotonic reads'],['Cause is shown before its effect','Causal'],['Acts like one copy, real-time order','Linearizable'],['Replicas converge eventually','Eventual']]},
   {t:'recall',q:'Name 2 features where EVENTUAL consistency is totally fine, and 1 where it is NOT.',model:['Fine: like counts, view counts, feeds, search indexes.','Not fine: account balance, inventory, "did my payment go through?".','Rule: spend strong consistency only where a wrong answer is unacceptable.']}
  ]}
 ],
 boss:{title:'CAP Boss',time:75,q:[
   {q:'P in CAP stands for…',o:['Performance','Partition tolerance','Persistence','Parallelism'],a:1},
   {q:'During a partition, an AP system will…',o:['reject requests','answer, possibly stale','crash','elect a leader'],a:1},
   {q:'Spanner is best described as…',o:['AP','CP / PC-EC','CA','eventual'],a:1},
   {q:'"Read-your-writes" guarantees…',o:['global real-time order','you see your own updates','no data loss','lower latency'],a:1},
   {q:'The cost of strong consistency is mainly…',o:['storage','latency + availability','CPU','none'],a:1},
   {q:'Eventual consistency is a fine fit for…',o:['bank balance','like counts','distributed locks','inventory'],a:1},
   {q:'PACELC’s "E" branch trades…',o:['A vs C','L vs C','C vs P','reads vs writes'],a:1}
 ]}
},
{
 id:'repl',title:'Replication & Quorums',icon:'📑',color:'#58CC02',colorD:'#46a302',
 blurb:'Copy data so failures don’t lose it — without chaos.',
 lessons:[
  {id:'repl-1',title:'Who can write?',steps:[
   {t:'teach',h:'Three shapes',body:[
     {k:'keyt',term:'Single-leader',def:'one writer, many read-replicas (e.g. PostgreSQL / MySQL primary + replicas). Simple, most common.'},
     {k:'keyt',term:'Multi-leader',def:'a leader per region. Fast writes — but conflicts.'},
     {k:'callout',c:'warn',t:'Those conflicts need resolution. <b>Last-Write-Wins (LWW)</b> is simple but, under clock skew, can silently drop the "losing" concurrent write. (Leaderless writes hit this too.)'},
     {k:'keyt',term:'Leaderless',def:'any replica takes writes; use quorums. (Dynamo, Cassandra)'}
   ]},
   {t:'teach',h:'Sync vs async (single-leader)',body:[
     {k:'vs',a:{h:'Sync',t:'Leader waits for follower ack. Durable, but slower.'},b:{h:'Async',t:'Leader replies now. Fast, but a crash can lose recent writes.'}},
     {k:'callout',c:'warn',t:'Async + leader crash = the un-replicated tail of writes is gone.'}
   ]},
   {t:'sort',q:'Which replication style fits the clue?',buckets:['Single-leader','Leaderless'],items:[
     {text:'PostgreSQL read replicas',b:0},{text:'Cassandra quorum writes',b:1},{text:'one writer, many readers',b:0},{text:'any node accepts writes',b:1}
   ]},
   {t:'match',q:'Requirement → replication mode.',pairs:[['Must not lose an acked write','Sync / semi-sync'],['Lowest write latency, can lose the tail on crash','Async'],['Leaderless, tune freshness per request','Quorum (W+R>N)']]},
   {t:'mcq',q:'A payments DB must not lose an acked write even if the primary dies. Replication?',o:['async','synchronous (or semi-sync)','none','LWW'],a:1,why:'Sync/semi-sync waits for a follower ack before confirming, so a committed write survives a primary crash — async would drop the un-replicated tail.'},
   {t:'mcq',q:'Biggest risk of ASYNC replication?',o:['high latency','data loss if leader crashes','too much storage','stale leader'],a:1,why:'Async confirms before followers ack, so a crash drops the un-replicated tail.'},
   {t:'recall',q:'Sync vs async replication — give the tradeoff in one breath.',model:['Sync = durable but doubles write latency (wait for a follower).','Async = fast but risks losing recent writes on a leader crash.','Semi-sync (one follower acks) is the common middle ground.']}
  ]},
  {id:'repl-2',title:'Quorum math',steps:[
   {t:'teach',h:'The magic inequality',body:[
     {k:'tldr',t:'W + R > N forces the read and write sets to overlap — so a read CAN see the latest write.'},
     {k:'point',i:'🔢',t:'<b>N</b> replicas, <b>W</b> ack a write, <b>R</b> answer a read.'},
     {k:'point',i:'🎯',t:'If W+R>N, the read set and write set <b>must overlap</b> on ≥1 node that has the latest write.'},
     {k:'callout',c:'warn',t:'It’s a guarantee only IF: the write hit a full quorum, same replica set (no sloppy quorum), no concurrent conflicting write, and reads reconcile by version/timestamp. Otherwise you can still read stale.'}
   ]},
   {t:'htmlviz',h:'Quorum overlap — when freshness is forced',
    html:`<style>
.qov{display:grid;gap:11px}
.qov-row{display:grid;grid-template-columns:86px 1fr;gap:10px;align-items:center}
.qov-lbl{font-size:12px;font-weight:900;color:var(--color-text-secondary)}
.qov-nodes{display:flex;gap:8px;flex-wrap:wrap}
.qov-node{width:48px;height:48px;border-radius:14px;background:var(--color-background-secondary);border:2px solid var(--color-border-tertiary);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;color:var(--color-text-tertiary)}
.qov-node.w{background:var(--color-background-success);border-color:var(--color-border-success);color:var(--color-text-success)}
.qov-node.r{background:var(--color-background-info);border-color:var(--color-border-info);color:var(--color-text-info)}
.qov-node.both{background:linear-gradient(135deg,var(--color-background-success) 0 50%,var(--color-background-info) 50%);border-color:var(--color-text-primary);color:var(--color-text-primary)}
.qov-node.hint{background:var(--color-background-warning);border-color:var(--color-border-warning);color:var(--color-text-warning)}
.qov-cap{font-size:12.5px;color:var(--color-text-secondary);line-height:1.55;padding:10px 13px;background:var(--color-background-secondary);border-radius:12px}
.qov-cap b{color:var(--color-text-primary)}
</style>
<div class="qov">
  <div class="qov-row"><div class="qov-lbl">Strict quorum<br>N=3 W=2 R=2</div><div class="qov-nodes"><span class="qov-node both">A</span><span class="qov-node w">B</span><span class="qov-node r">C</span></div></div>
  <div class="qov-cap"><b>A is in both sets.</b> Because W+R=4>N=3, the write set and read set cannot be disjoint. At least one read replica has the latest version.</div>
  <div class="qov-row"><div class="qov-lbl">Too weak<br>N=3 W=1 R=1</div><div class="qov-nodes"><span class="qov-node w">A</span><span class="qov-node">B</span><span class="qov-node r">C</span></div></div>
  <div class="qov-cap">W+R=2 is not greater than N. The write can land on A while the read hits C, so stale reads are possible.</div>
  <div class="qov-row"><div class="qov-lbl">Sloppy quorum</div><div class="qov-nodes"><span class="qov-node w">A</span><span class="qov-node hint">H</span><span class="qov-node r">B</span><span class="qov-node r">C</span></div></div>
  <div class="qov-cap"><b>H is a stand-in, not a home replica.</b> Availability improves during a partition, but the home read quorum may not overlap the real write holders until hinted handoff completes.</div>
</div>`},
   {t:'mcq',q:'N=3, W=2, R=2. One write replica failed. Can a read still see the latest value?',o:['Yes — W+R=4>3 forces overlap','No, quorum is broken','only with hinted handoff','only if all 3 reply'],a:0,why:'4>3 means every read quorum overlaps the write quorum on at least one node.'},
   {t:'teach',h:'Staying up under partitions',body:[
     {k:'keyt',term:'Sloppy quorum',def:'take writes on stand-in nodes during a partition (stay available).'},
     {k:'keyt',term:'Hinted handoff',def:'stand-in holds the write, hands it back when the home node returns.'},
     {k:'callout',c:'warn',t:'Sloppy quorum BREAKS the W+R>N overlap — reads can be stale until handoff finishes.'}
   ]},
   {t:'mcq',q:'A sloppy quorum trades away…',o:['durability','the W+R>N overlap guarantee','write speed','idempotency'],a:1,why:'It keeps you available but loses the strict freshness overlap.'},
   {t:'cloze',q:'Unmask the quorum rule.',distract:['diverge','N+1'],text:[
     'With ',{blank:'N'},' replicas, ',{blank:'W'},' must ack a write and ',{blank:'R'},' answer a read. If ',
     {blank:'W+R>N',alt:['W + R > N']},', the read and write sets must ',{blank:'overlap'},' on a fresh node.'
   ]},
   {t:'recall',q:'Why does W+R>N let a read see the latest write — and when can it still be stale?',model:['W nodes hold the latest write, R nodes answer the read; if W+R>N the two sets can’t be disjoint, so they share ≥1 node with the newest value.','Caveats: only if the write reached a full quorum, the same replica set (no sloppy quorum), no concurrent conflicting write, and the read reconciles by version/timestamp.','Break any of those and you can still read stale.']}
  ]},
  {id:'repl-3',title:'Staying in sync',steps:[
   {t:'teach',h:'Fixing drift',body:[
     {k:'keyt',term:'Read repair',def:'fix stale replicas when a read notices a mismatch.'},
     {k:'keyt',term:'Anti-entropy',def:'a background job that reconciles replicas constantly.'},
     {k:'point',i:'🔑',t:'Each leaf hashes the <b>key + value/version</b> in its range — not just the key (all replicas share the same keys, so that would never reveal a diff).'},
     {k:'point',i:'🌳',t:'<b>Merkle trees</b>: equal root hash → identical (O(1)); otherwise descend only mismatching branches — finding one divergent range is ~log-depth, and the work grows with the number of differing ranges (no full O(N) scan when few keys differ).'}
   ]},
   {t:'htmlviz',h:'Merkle anti-entropy — descend only the mismatch',
    html:`<style>
.mkv{display:grid;gap:11px}
.mkv-pair{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mkv-tree{background:var(--color-background-secondary);border:2px solid var(--color-border-tertiary);border-radius:14px;padding:12px}
.mkv-title{font-size:12px;font-weight:900;color:var(--color-text-primary);margin-bottom:9px}
.mkv-row{display:flex;justify-content:center;gap:7px;margin:6px 0;flex-wrap:wrap}
.mkv-h{font-family:var(--font-mono);font-size:11px;font-weight:800;border-radius:8px;padding:5px 8px;background:#fff;border:1.5px solid var(--color-border-tertiary);color:var(--color-text-secondary)}
.mkv-h.bad{background:var(--color-background-danger);border-color:var(--color-text-danger);color:var(--color-text-danger)}
.mkv-h.good{background:var(--color-background-success);border-color:var(--color-border-success);color:var(--color-text-success)}
.mkv-cap{font-size:12.5px;color:var(--color-text-secondary);line-height:1.55;padding:10px 13px;background:var(--color-background-secondary);border-radius:12px}
.mkv-cap b{color:var(--color-text-primary)}
@media(max-width:460px){.mkv-pair{grid-template-columns:1fr}}
</style>
<div class="mkv">
  <div class="mkv-pair">
    <div class="mkv-tree"><div class="mkv-title">Replica A</div><div class="mkv-row"><span class="mkv-h bad">root X</span></div><div class="mkv-row"><span class="mkv-h good">left A1</span><span class="mkv-h bad">right A2</span></div><div class="mkv-row"><span class="mkv-h good">k1</span><span class="mkv-h good">k2</span><span class="mkv-h bad">k3:v7</span><span class="mkv-h good">k4</span></div></div>
    <div class="mkv-tree"><div class="mkv-title">Replica B</div><div class="mkv-row"><span class="mkv-h bad">root Y</span></div><div class="mkv-row"><span class="mkv-h good">left A1</span><span class="mkv-h bad">right B2</span></div><div class="mkv-row"><span class="mkv-h good">k1</span><span class="mkv-h good">k2</span><span class="mkv-h bad">k3:v8</span><span class="mkv-h good">k4</span></div></div>
  </div>
  <div class="mkv-cap"><b>Equal hashes prune whole ranges.</b> The left subtree matches, so anti-entropy never scans k1-k2. It descends only into the mismatching right subtree, finds k3, and syncs that range.</div>
</div>`},
   {t:'build',q:'Pick the tools an AP store uses to converge replicas.',options:['Read repair','Two-phase commit','Anti-entropy','Merkle trees','A single global lock'],correct:[0,2,3]},
   {t:'recall',q:'How does a Merkle tree make anti-entropy cheap?',model:['Each leaf hashes the DATA in a key range — the keys AND their values/versions (hashing just the key is useless: all replicas hold the same keys). Parents hash their children up to a root.','It cheaply narrows the changed ranges: equal roots are O(1), descending to one divergent range is roughly logarithmic.','Many differences cost proportional work — but you never full-scan when only a few keys differ.']}
  ]},
  {id:'repl-4',title:'Replication-lag bugs',steps:[
   {t:'teach',h:'Async lag breaks reads',body:[
     {k:'tldr',t:'Async followers trail the leader — so a follower read can be stale, causing subtle bugs.'},
     {k:'cause',a:'Write to leader, then read from a lagging follower',b:'You don’t see your own write yet'}
   ]},
   {t:'htmlviz',h:'Replication lag — three read bugs',
    html:`<style>
.rlv{display:grid;gap:10px}
.rlv-line{display:grid;grid-template-columns:94px 1fr;gap:9px;align-items:center}
.rlv-name{font-size:12px;font-weight:900;color:var(--color-text-secondary);line-height:1.3}
.rlv-events{display:flex;gap:6px;flex-wrap:wrap}
.rlv-pill{border:2px solid var(--color-border-tertiary);background:var(--color-background-secondary);border-radius:10px;padding:7px 9px;font-size:12px;font-weight:800;color:var(--color-text-secondary)}
.rlv-pill.good{background:var(--color-background-success);border-color:var(--color-border-success);color:var(--color-text-success)}
.rlv-pill.bad{background:var(--color-background-danger);border-color:var(--color-text-danger);color:var(--color-text-danger)}
.rlv-pill.info{background:var(--color-background-info);border-color:var(--color-border-info);color:var(--color-text-info)}
.rlv-cap{font-size:12.5px;color:var(--color-text-secondary);line-height:1.55;padding:10px 13px;background:var(--color-background-secondary);border-radius:12px}
.rlv-cap b{color:var(--color-text-primary)}
</style>
<div class="rlv">
  <div class="rlv-line"><div class="rlv-name">Read-your-writes</div><div class="rlv-events"><span class="rlv-pill good">write profile v2 to leader</span><span class="rlv-pill bad">read follower v1</span><span class="rlv-pill info">fix: read leader / home region</span></div></div>
  <div class="rlv-line"><div class="rlv-name">Monotonic reads</div><div class="rlv-events"><span class="rlv-pill good">read F1: v5</span><span class="rlv-pill bad">read F2: v3</span><span class="rlv-pill info">fix: sticky replica/session</span></div></div>
  <div class="rlv-line"><div class="rlv-name">Consistent prefix</div><div class="rlv-events"><span class="rlv-pill bad">see reply first</span><span class="rlv-pill">see question later</span><span class="rlv-pill info">fix: preserve causal order</span></div></div>
  <div class="rlv-cap"><b>Async lag is not one bug.</b> It creates personal staleness, time going backward, and effect-before-cause reads. Each guarantee patches a different user-visible failure.</div>
</div>`},
   {t:'teach',h:'Three guarantees that patch it',body:[
     {k:'keyt',term:'Read-your-writes',def:'you always see your OWN latest write (read from leader / your region).'},
     {k:'keyt',term:'Monotonic reads',def:'reads never go backwards in time (stick to one replica).'},
     {k:'keyt',term:'Consistent prefix',def:'causally ordered writes are seen in that order — no effect before cause.'}
   ]},
   {t:'match',q:'Match the bug to the guarantee that fixes it.',pairs:[['"I posted but don’t see it"','Read-your-writes'],['Refresh shows an OLDER value','Monotonic reads'],['Reply appears before its question','Consistent prefix']]},
   {t:'cloze',q:'Fill the replication-lag blanks.',distract:['linearizable','quorum'],text:[
     {blank:'Read-your-writes',alt:['read your writes','read-your-write']},' = see your own writes. ',{blank:'Monotonic',alt:['monotonic']},' reads = time never goes backwards. ',
     {blank:'Consistent prefix',alt:['consistent-prefix','consistent']},' = causally ordered writes are seen in order.'
   ]},
   {t:'mcq',q:'You update your profile, reload, and the OLD value shows. Which guarantee was missing?',o:['monotonic reads','read-your-writes','consistent prefix','linearizability'],a:1,why:'Seeing your own just-written data requires read-your-writes (route your reads to the leader/your region).'},
   {t:'recall',q:'Name the three replication-lag read guarantees and what each fixes.',model:['Read-your-writes: you see your own updates (don’t read a lagging follower for your own data).','Monotonic reads: time never moves backward (pin a user to one replica).','Consistent prefix: causally related writes appear in order (no effect-before-cause).']}
  ]},
  {id:'repl-5',title:'Logs & gossip',steps:[
   {t:'teach',h:'How changes ship: the replication log',body:[
     {k:'point',i:'📝',t:'<b>Statement-based</b>: ship the SQL. Breaks on NOW()/RAND() — non-deterministic across replicas.'},
     {k:'point',i:'🧱',t:'<b>WAL shipping</b>: ship raw byte-level changes. Fast, but tied to the storage-engine version.'},
     {k:'point',i:'🪶',t:'<b>Logical (row-based)</b>: ship before/after row values. Engine-independent — what CDC reads.'}
   ]},
   {t:'teach',h:'Gossip protocol',body:[
     {k:'tldr',t:'No coordinator: each node periodically swaps state with a few RANDOM peers.'},
     {k:'point',i:'🦠',t:'Info spreads epidemically in ~<b>O(log N)</b> rounds — membership, failures, ring state.'},
     {k:'point',i:'🌍',t:'Used by <b>Dynamo, Cassandra, Consul</b> for decentralised membership (no single point of failure).'}
   ]},
   {t:'mcq',q:'Why is statement-based replication risky?',o:['it’s too big','non-deterministic functions (NOW/RAND) diverge across replicas','it can’t do inserts','it needs a leader'],a:1,why:'Replaying the same statement can yield different results, so replicas drift. Row-based logs avoid this.'},
   {t:'cloze',q:'Fill the gossip blanks.',distract:['leader','broadcast'],text:[
     'Gossip has no ',{blank:'coordinator',alt:['leader','central']},': each node swaps state with ',{blank:'random'},' peers, so info spreads in ~',{blank:'O(log N)',alt:['log n','logn','log(n)']},' rounds. Cassandra and Dynamo use it for ',{blank:'membership'},'.'
   ]},
   {t:'mcq',q:'How fast does gossip propagate across N nodes?',o:['O(N)','O(log N)','O(1)','O(N²)'],a:1,why:'Epidemic spread roughly doubles reach each round → logarithmic rounds, with no coordinator.'},
   {t:'recall',q:'What is a gossip protocol and where is it used?',model:['Each node periodically exchanges state with a few random peers; info spreads epidemically in ~O(log N) rounds.','Decentralised, no single point of failure — used for membership / failure detection in Dynamo, Cassandra, Consul.']}
  ]},
  {id:'repl-6',title:'Resolving conflicts',steps:[
   {t:'teach',h:'Concurrent writes = siblings',body:[
     {k:'cause',a:'Two clients write the same key concurrently (leaderless / multi-leader)',b:'Two conflicting versions ("siblings") now exist'},
     {k:'point',i:'🧭',t:'<b>Version vectors</b> detect whether two writes are concurrent or one supersedes the other.'}
   ]},
   {t:'teach',h:'How to resolve',body:[
     {k:'keyt',term:'LWW',def:'keep the highest timestamp. Simple, but silently drops the other write (clock skew!).'},
     {k:'keyt',term:'CRDT / merge',def:'data types that merge deterministically (counters, sets) — no lost writes.'},
     {k:'keyt',term:'App-level / siblings',def:'return both versions and let the app/user merge (e.g. shopping-cart union).'}
   ]},
   {t:'sort',q:'Lossy or safe conflict resolution?',buckets:['Lossy','Safe (no loss)'],items:[
     {text:'Last-Write-Wins',b:0},{text:'CRDT merge',b:1},{text:'return siblings to the app',b:1}
   ]},
   {t:'mcq',q:'What detects whether two writes are concurrent vs one-after-another?',o:['LWW timestamps','version vectors','a Bloom filter','a quorum'],a:1,why:'Version (vector) clocks capture causality, so you know if writes truly conflict or one supersedes.'},
   {t:'recall',q:'Give three ways to resolve a leaderless write conflict, weakest to safest.',model:['LWW (highest timestamp wins) — simple but lossy under clock skew.','CRDT / merge — deterministic merge, no lost writes for supported types.','Return siblings to the app to merge (e.g. union a shopping cart). Version vectors decide what actually conflicts.']}
  ]},
  {id:'repl-7',title:'Failover & split brain',steps:[
   {t:'teach',h:'Failover is dangerous',body:[
     {k:'cause',a:'Leader dies → promote a follower',b:'Async lag means the new leader may MISS recent writes (data loss)'},
     {k:'point',i:'🗳️',t:'<b>Who promotes?</b> A controller or the nodes themselves must elect a new leader — and agree on exactly one.'}
   ]},
   {t:'teach',h:'Split brain',body:[
     {k:'tldr',t:'The old leader returns (or a partition heals) and now TWO nodes accept writes as leader.'},
     {k:'callout',c:'warn',t:'Two leaders = conflicting writes / corruption. The classic failure of naive failover.'}
   ]},
   {t:'teach',h:'How to prevent it',body:[
     {k:'point',i:'✅',t:'<b>Majority election</b>: only a quorum side can elect — a partitioned minority can’t make a 2nd leader.'},
     {k:'point',i:'🎟️',t:'<b>Fencing tokens / epochs</b>: each new term gets a higher number; storage rejects an older term’s writes.'},
     {k:'point',i:'⏳',t:'<b>Leader lease</b>: leadership expires unless renewed — but only safe under bounded clock skew (a GC pause can fool it), so pair it with fencing.'},
     {k:'point',i:'🎲',t:'<b>Randomised election timeouts</b>: avoid split votes.'}
   ]},
   {t:'sort',q:'Causes split brain, or prevents it?',buckets:['Causes it','Prevents it'],items:[
     {text:'electing on the minority side',b:0},{text:'majority-quorum election',b:1},{text:'fencing tokens / epochs',b:1},{text:'two leaders both accept writes',b:0}
   ]},
   {t:'cloze',q:'Fill the split-brain blanks.',distract:['cache','replica'],text:[
     {blank:'Split brain',alt:['split-brain']},' = two nodes both think they’re leader. Prevent it with a ',{blank:'majority',alt:['quorum']},
     ' election (a minority can’t elect) and ',{blank:'fencing',alt:['fencing tokens','epoch']},' tokens so storage rejects the stale leader’s writes.'
   ]},
   {t:'mcq',q:'A partitioned old leader keeps serving writes while a new one is elected. What stops the damage?',o:['a longer timeout','fencing tokens + majority election','more replicas','a bigger cache'],a:1,why:'Only a majority can elect (so the minority old leader can’t commit), and fencing/epoch numbers make storage reject its stale writes.'},
   {t:'recall',q:'What is split brain and how do you prevent it?',model:['Split brain = two nodes both believe they’re leader and accept writes (returning old leader, or a healed partition) → conflicts/corruption.','Prevent it: require a MAJORITY quorum to elect (a minority can’t form a second leader), and use fencing tokens / epoch numbers so storage rejects an old leader’s writes.','A leader lease helps too (the old leader self-demotes when it lapses) but only under bounded clock skew — fencing is the real safety net.']}
  ]},
  {id:'repl-chain',title:'Chain replication',steps:[
   {t:'teach',h:'An ordered chain',body:[
     {k:'tldr',t:'Replicas form an ordered chain. Writes enter at the HEAD and flow one way; reads come from the TAIL.'},
     {k:'cause',a:'Write → HEAD → node → … → TAIL → ack',b:'Read ← TAIL only'},
     {k:'point',i:'🔗',t:'A write is acked only once the <b>TAIL</b> has it. The tail therefore only ever sees fully-propagated writes → reads from it are <b>linearizable</b>.'}
   ]},
   {t:'htmlviz',h:'Chain replication + CRAQ — where reads go',
    html:`<style>
.crv{display:grid;gap:10px}
.crv-chain{display:flex;align-items:center;gap:7px;flex-wrap:wrap;justify-content:center}
.crv-node{min-width:70px;border:2px solid var(--color-border-primary);border-radius:14px;background:var(--color-background-secondary);padding:10px;text-align:center}
.crv-node.head{background:var(--color-background-info);border-color:var(--color-border-info);color:var(--color-text-info)}
.crv-node.tail{background:var(--color-background-success);border-color:var(--color-border-success);color:var(--color-text-success)}
.crv-node.dirty{background:var(--color-background-warning);border-color:var(--color-border-warning);color:var(--color-text-warning)}
.crv-n{font-size:13px;font-weight:900}
.crv-s{font-size:10.5px;font-weight:800;margin-top:3px}
.crv-arr{font-size:20px;font-weight:900;color:var(--color-text-tertiary)}
.crv-cap{font-size:12.5px;color:var(--color-text-secondary);line-height:1.55;padding:10px 13px;background:var(--color-background-secondary);border-radius:12px}
.crv-cap b{color:var(--color-text-primary)}
</style>
<div class="crv">
  <div class="crv-chain"><div class="crv-node head"><div class="crv-n">HEAD</div><div class="crv-s">writes enter</div></div><div class="crv-arr">→</div><div class="crv-node dirty"><div class="crv-n">MIDDLE</div><div class="crv-s">may be dirty</div></div><div class="crv-arr">→</div><div class="crv-node tail"><div class="crv-n">TAIL</div><div class="crv-s">acked writes</div></div></div>
  <div class="crv-cap"><b>Plain chain:</b> writes flow head → tail and ack only at the tail; linearizable reads go to the tail because it only sees fully propagated writes.</div>
  <div class="crv-cap"><b>CRAQ:</b> clean nodes answer reads directly. Dirty nodes hold an uncommitted version, so they ask the tail for the committed value before replying.</div>
</div>`},
   {t:'teach',h:'Why bother',body:[
     {k:'point',i:'⚖️',t:'Load splits: the <b>head</b> absorbs write ingestion, the <b>tail</b> serves reads — more throughput than routing everything through one leader.'},
     {k:'point',i:'🛠️',t:'Clean recovery: head, middle, and tail each have a well-defined rule when a node dies.'},
     {k:'callout',c:'warn',t:'Downside: a node failure <b>stalls the whole chain</b> until a separate control plane reconfigures it.'}
   ]},
   {t:'teach',h:'CRAQ — scaling reads',body:[
     {k:'keyt',term:'CRAQ',def:'Chain Replication with Apportioned Queries — ANY node can serve reads. A clean node answers directly; a dirty node (holds an uncommitted version) asks the tail for the committed one.'},
     {k:'point',i:'📈',t:'Read throughput now spreads across all nodes — without giving up linearizability.'},
     {k:'note',t:'van Renesse & Schneider, 2004. Shows up in object stores / strongly-consistent KV layers.'}
   ]},
   {t:'mcq',q:'In plain chain replication, where do reads go to stay linearizable?',o:['the head','any replica','the tail','a random node'],a:2,why:'The tail only sees fully-propagated (committed) writes, so reading it is linearizable.'},
   {t:'mcq',q:'How does CRAQ scale reads beyond just the tail?',o:['it caches at the head','any node serves reads; a dirty node checks the tail for the committed version','it drops linearizability','it adds more tails'],a:1,why:'Clean nodes answer directly; only dirty nodes consult the tail — so all nodes share read load without losing linearizability.'},
   {t:'recall',q:'Explain chain replication and what CRAQ adds.',model:['Replicas form an ordered chain: writes enter at the head, propagate node-by-node, and ack only once the tail has them; reads come from the tail → linearizable.','It splits load (head ingests writes, tail serves reads) with clean per-node recovery — but a node failure stalls the chain until a control plane reconfigures it.','CRAQ lets any node serve reads (clean node answers directly, dirty node asks the tail for the committed version), so reads scale without losing linearizability.']}
  ]},
  {id:'repl-crdt',title:'CRDTs',steps:[
   {t:'teach',h:'Conflict-free replicated data types',body:[
     {k:'tldr',t:'Data types whose merge is automatic — replicas that saw the same updates converge to the same state, no coordinator needed.'},
     {k:'point',i:'🔢',t:'<b>G-Counter</b>: one counter per node; merge = element-wise max; value = sum. <b>PN-Counter</b> = two G-Counters (P for inc, N for dec).'},
     {k:'point',i:'🧺',t:'Also: <b>G-Set / OR-Set</b> for sets, <b>LWW-Register</b>, sequence CRDTs (RGA) for collaborative text.'},
     {k:'note',t:'Merge must be commutative, associative, and idempotent. Used by Figma, Yjs, Automerge, Riak.'}
   ]},

{
 id:'raft',title:'Consensus',icon:'🗳️',color:'#CE82FF',colorD:'#A560E8',
 blurb:'Get nodes to agree on one value — even when some crash. (Raft is one example.)',
 lessons:[
  {id:'raft-1',title:'Why consensus',steps:[
   {t:'teach',h:'The job',body:[
     {k:'tldr',t:'Consensus = many nodes agree on ONE value, despite failures.'},
     {k:'point',i:'👑',t:'Powers <b>leader election</b>, <b>distributed locks</b>, <b>replicated logs</b>, <b>config/membership</b>, and <b>atomic commit</b>.'},
     {k:'note',t:'You rarely build it yourself — you lean on a coordination service (ZooKeeper, etcd, Consul) that solves consensus for you.'}
   ]},
   {t:'teach',h:'One primitive, many jobs',body:[
     {k:'tldr',t:'Consensus is ONE primitive — agree on a value among a quorum despite failures — and a surprising number of distributed-systems problems are just that primitive in disguise.'},
     {k:'mnemonic',t:'<b>Leader election isn’t separate from consistency — it’s the same problem.</b> "Agree on who the leader is" and "agree on the next log entry" both reduce to "get a quorum to agree on one value." That’s why Raft bundles election + log replication into one protocol.'},
     {k:'point',i:'📋',t:'<b>Strong-consistency replication (SMR):</b> agree on the <b>order of operations</b> (the replicated log) → linearizability.'},
     {k:'point',i:'👑',t:'<b>Leader election:</b> agree on <b>which node leads</b> this term — e.g. electing the single leader of a shard.'},
     {k:'point',i:'🧩',t:'<b>Cluster membership:</b> agree on <b>who is in the group</b> (Raft joint consensus for adding/removing nodes).'},
     {k:'point',i:'🔒',t:'<b>Distributed locks / leases:</b> agree on <b>who holds the lock</b> (Chubby, ZooKeeper).'},
     {k:'point',i:'🗺️',t:'<b>Config / metadata store:</b> agree on a key’s value — this is where the <b>partition / slot map</b> lives (etcd and ZooKeeper <i>are</i> consensus systems), the very map that request routing reads.'},
     {k:'point',i:'🤝',t:'<b>Fault-tolerant atomic commit:</b> make the 2PC coordinator a consensus group so it can’t block — Spanner runs <b>2PC across Paxos groups</b> for cross-shard transactions.'},
     {k:'note',t:'It’s usually leader-based (Raft / Multi-Paxos / ZAB), and it’s exactly the thing <b>leaderless-quorum</b> systems (Dynamo / Cassandra) deliberately skip to buy availability — which is why they’re eventually consistent.'}
   ]},
   {t:'match',q:'Each job → the "one value" consensus agrees on.',pairs:[['Strong-consistency replication','the order of operations (the log)'],['Leader election','which node leads this term'],['Config / partition map','a key’s value'],['Distributed lock','who currently holds it']]},
   {t:'mcq',q:'Why does Raft bundle leader election and log replication into one protocol?',o:['election is only needed at startup','they’re the same primitive — agreeing on one value among a quorum','log replication is optional','to save bandwidth'],a:1,why:'"Agree on who leads" and "agree on the next log entry" both reduce to getting a quorum to agree on a single value, so one consensus mechanism serves both — election comes essentially for free.'},
   {t:'teach',h:'What "agree" really means',body:[
     {k:'point',i:'🤝',t:'<b>Agreement</b>: no two correct nodes decide different values.'},
     {k:'point',i:'✅',t:'<b>Validity / integrity</b>: the chosen value was actually proposed, and each node decides at most once.'},
     {k:'point',i:'🏁',t:'<b>Termination</b> (liveness): every correct node eventually decides — this is the hard part FLP attacks.'},
     {k:'note',t:'Consensus is equivalent to <b>total-order broadcast</b>: agreeing on a value = agreeing on the order of a log of messages.'}
   ]},
   {t:'sort',q:'Safety property, or the liveness one?',buckets:['Safety (always holds)','Liveness (eventually)'],items:[
     {text:'no two nodes decide differently',b:0},{text:'the value was proposed',b:0},{text:'every node eventually decides',b:1},{text:'decide at most once',b:0}
   ]},
   {t:'teach',h:'The hard limit',body:[
     {k:'keyt',term:'FLP impossibility',def:'in a pure async network with 1 faulty node, no algorithm can guarantee it ALWAYS agrees (terminates).'},
     {k:'point',i:'❓',t:'Root cause: you can’t tell a <b>crashed</b> node from a <b>slow</b> one.'},
     {k:'note',t:'Real systems keep safety always and dodge the liveness limit with timeouts (partial synchrony) — that’s what Raft & Paxos do.'}
   ]},
   {t:'mcq',q:'How do consensus algorithms (Paxos/Raft) get around FLP?',o:['quantum clocks','timeouts / partial synchrony','more nodes','ignoring failures'],a:1,why:'Assuming the network is eventually timely lets them make progress while never breaking safety.'},
   {t:'recall',q:'In one line: what does FLP say, and how do real systems cope?',model:['FLP: pure-async consensus can’t guarantee termination (liveness) with even one fault.','Root cause: you can’t distinguish crashed from slow.','Fix: keep safety always; add timeouts/partial synchrony for liveness (Raft, Paxos).']}
  ]},
  {id:'raft-fam',title:'The consensus landscape',steps:[
   {t:'teach',h:'One problem, many algorithms',body:[
     {k:'point',i:'📜',t:'<b>Paxos</b> (1998): the original, proven correct — but famously hard to understand and to build right.'},
     {k:'point',i:'🗳️',t:'<b>Raft</b>: same guarantees, designed for understandability — strong leader + terms + a replicated log.'},
     {k:'point',i:'🐘',t:'<b>ZAB</b> (ZooKeeper) and <b>Viewstamped Replication</b>: same family, slightly different mechanics.'},
     {k:'note',t:'They all share the recipe: a <b>leader</b> + a <b>majority quorum</b> + a <b>replicated log</b>. Learn one well (Raft) and the rest rhyme.'}
   ]},
   {t:'teach',h:'Consensus vs atomic commit (2PC)',body:[
     {k:'vs',a:{h:'2PC (atomic commit)',t:'EVERY participant must vote yes; one missing vote or a dead coordinator → blocks. Not fault-tolerant.'},b:{h:'Consensus',t:'only a MAJORITY needed → survives a minority crashing. Fault-tolerant.'}},
     {k:'callout',c:'warn',t:'Don’t confuse them: 2PC needs unanimity and can block; consensus needs a majority and keeps going.'}
   ]},
   {t:'teach',h:'Where you actually meet it',body:[
     {k:'tldr',t:'You usually consume consensus through a coordination service rather than coding it.'},
     {k:'point',i:'🛠️',t:'<b>ZooKeeper / etcd / Consul</b>: leader election, config, distributed locks, service discovery, membership.'},
     {k:'point',i:'⚖️',t:'Keep the consensus group SMALL (3 or 5 nodes) — every decision needs a majority round-trip, so more nodes = slower.'}
   ]},
   {t:'mcq',q:'Why is consensus fault-tolerant where 2PC blocks?',o:['it uses more nodes','it needs only a majority, not every vote','it skips durability','it has no leader'],a:1,why:'A majority quorum still forms when a minority (incl. a failed coordinator) is down; 2PC needs unanimity.'},
   {t:'match',q:'Consensus landscape → which one?',pairs:[['Original, proven, hard to build right','Paxos'],['Understandable: leader + terms + log','Raft'],['ZooKeeper’s consensus protocol','ZAB'],['Off-the-shelf locks / config / election','ZooKeeper / etcd']]},
   {t:'cloze',q:'Fill the landscape blanks.',distract:['sharding','caching'],text:[
     {blank:'Paxos',alt:['paxos','Raft','raft']},' and ',{blank:'Raft',alt:['raft','Paxos','paxos']},' solve the same problem; both rely on a ',
     {blank:'majority',alt:['quorum']},' quorum. In practice you use a coordination service like ',
     {blank:'ZooKeeper',alt:['etcd','Consul','zookeeper']},' instead of building it yourself.'
   ]},
   {t:'recall',q:'How does consensus differ from two-phase commit?',model:['2PC (atomic commit) needs EVERY participant to vote commit and a live coordinator — a single failure blocks it.','Consensus (Raft/Paxos) needs only a MAJORITY, so it tolerates a minority of failures and keeps making progress.','That’s why config/locks/leader-election ride on consensus services (ZooKeeper, etcd), not on raw 2PC.']}
  ]},
  {id:'raft-2',title:'Raft elections',steps:[
   {t:'teach',h:'Terms & heartbeats',body:[
     {k:'point',i:'🕒',t:'<b>Terms</b> = ever-increasing numbers; each starts with an election.'},
     {k:'point',i:'💓',t:'Leader sends <b>heartbeats</b>. The election timer is ALWAYS running — each heartbeat <b>resets</b> it. Miss enough → it elapses and the follower suspects failure.'},
     {k:'point',i:'🎲',t:'<b>Randomised timeout</b> (150–300ms) avoids everyone running at once.'}
   ]},
   {t:'teach',h:'Winning an election',body:[
     {k:'cause',a:'Timeout fires → become candidate, vote self, ask others',b:'Win with a STRICT MAJORITY'},
     {k:'keyt',term:'Up-to-date check',def:'voters refuse a candidate whose log is behind → winner has all committed entries.'}
   ]},
   {t:'order',q:'Put a Raft election in order.',items:['Heartbeats stop','It becomes a candidate & votes for itself','Others grant votes','Majority reached → new leader']},
   {t:'mcq',q:'A candidate becomes leader when it gets…',o:['the most recent log','votes from ALL nodes','a strict majority','the lowest id'],a:2,why:'Majority (quorum) wins; plus its log must be up-to-date.'},
   {t:'cloze',q:'Unmask the Raft election.',distract:['leader','minority'],text:[
     'A follower waits for ',{blank:'heartbeats'},'. After a randomised ',{blank:'timeout'},
     ', it becomes a ',{blank:'candidate'},', votes for itself, and wins with a strict ',
     {blank:'majority'},' — but only if its ',{blank:'log'},' is up-to-date.'
   ]},
   {t:'htmlviz',h:'Raft election — step through it',
    html:`<style>
.rft-cluster{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:2px}
.rft-node{flex:1;min-width:78px;border-radius:12px;padding:10px 6px;text-align:center;border:2px solid var(--color-border-tertiary);background:var(--color-background-secondary)}
.rft-node.cand{border-color:var(--color-border-warning);background:var(--color-background-warning)}

.rft-node.dead{border-color:var(--color-text-danger);background:var(--color-background-danger);opacity:.65}
.rft-role{display:block;font-size:9.5px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--color-text-tertiary)}
.rft-node.cand .rft-role{color:var(--color-text-warning)}
.rft-node.leader .rft-role{color:var(--color-text-success)}
.rft-node.dead .rft-role{color:var(--color-text-danger)}
.rft-id{display:block;font-size:20px;font-weight:900;color:var(--color-text-primary)}
.rft-term{display:block;font-size:11px;color:var(--color-text-tertiary);font-family:var(--font-mono)}
.rft-ex{margin-top:11px;font-size:13px;color:var(--color-text-secondary);line-height:1.6;padding:10px 13px;background:var(--color-background-secondary);border-radius:var(--border-radius-md)}
.rft-ex b{color:var(--color-text-primary);font-weight:800}
</style>
<div class="hv-nav"><button class="hv-prev">‹</button><span class="hv-dots"></span><button class="hv-next">›</button><span class="hv-lbl"></span></div>
<div class="rft-panel"><div class="rft-cluster"><div class="rft-node"><span class="rft-role">Follower</span><span class="rft-id">A</span><span class="rft-term">term 1</span></div><div class="rft-node"><span class="rft-role">Follower</span><span class="rft-id">B</span><span class="rft-term">term 1</span></div><div class="rft-node"><span class="rft-role">Follower</span><span class="rft-id">C</span><span class="rft-term">term 1</span></div></div><div class="rft-ex">Three followers at term 1. A stops hearing heartbeats — its randomised election timer expires first.</div></div>
<div class="rft-panel"><div class="rft-cluster"><div class="rft-node cand"><span class="rft-role">Candidate</span><span class="rft-id">A</span><span class="rft-term">term 2</span></div><div class="rft-node"><span class="rft-role">Follower</span><span class="rft-id">B</span><span class="rft-term">term 1</span></div><div class="rft-node"><span class="rft-role">Follower</span><span class="rft-id">C</span><span class="rft-term">term 1</span></div></div><div class="rft-ex">A <b>increments its term</b> (1→2) and becomes a candidate, voting for itself.</div></div>
<div class="rft-panel"><div class="rft-cluster"><div class="rft-node cand"><span class="rft-role">Candidate</span><span class="rft-id">A</span><span class="rft-term">term 2</span></div><div class="rft-node"><span class="rft-role">Voted A ✓</span><span class="rft-id">B</span><span class="rft-term">term 2</span></div><div class="rft-node"><span class="rft-role">Voted A ✓</span><span class="rft-id">C</span><span class="rft-term">term 2</span></div></div><div class="rft-ex">A sends <b>RequestVote(term=2)</b>. B and C check A's log is at least as up-to-date → both grant. <b>2 of 3 = majority.</b></div></div>
<div class="rft-panel"><div class="rft-cluster"><div class="rft-node leader"><span class="rft-role">Leader</span><span class="rft-id">A</span><span class="rft-term">term 2</span></div><div class="rft-node"><span class="rft-role">Follower</span><span class="rft-id">B</span><span class="rft-term">term 2</span></div><div class="rft-node"><span class="rft-role">Follower</span><span class="rft-id">C</span><span class="rft-term">term 2</span></div></div><div class="rft-ex">A wins the majority → <b>leader</b>. Its heartbeats reset B's and C's timers, so no one else starts an election.</div></div>
<div class="rft-panel"><div class="rft-cluster"><div class="rft-node dead"><span class="rft-role">Crashed</span><span class="rft-id">A</span><span class="rft-term">—</span></div><div class="rft-node leader"><span class="rft-role">Leader</span><span class="rft-id">B</span><span class="rft-term">term 3</span></div><div class="rft-node"><span class="rft-role">Follower</span><span class="rft-id">C</span><span class="rft-term">term 3</span></div></div><div class="rft-ex">A crashes. B times out first → candidate at <b>term 3</b>, wins C's vote, becomes the new leader. <b>Terms only ever increase.</b></div></div>`,
    setup:function(root,stepper){stepper(root,5,{panelClass:'rft-panel',labels:['Followers · term 1','A → candidate','RequestVote → majority','A is leader','A crashes → B takes over']});}},
   {t:'recall',q:'Walk me through a Raft leader election (the interview classic).',model:['Followers expect heartbeats; if none arrives before a randomised timeout, one becomes a candidate in a new term.','It votes for itself and requests votes; nodes won’t vote for a less up-to-date log.','With a strict majority it becomes leader and starts sending heartbeats.']}
  ]},
  {id:'raft-3',title:'Log & safe reads',steps:[
   {t:'teach',h:'Replicating the log',body:[
     {k:'cause',a:'Leader appends, sends AppendEntries',b:'Commit once a MAJORITY acks'},
     {k:'point',i:'🧱',t:'<b>prevLogIndex/term</b> must match — else the follower rejects and the leader walks back.'}
   ]},
   {t:'teach',h:'The stale-leader trap',body:[
     {k:'callout',c:'warn',t:'An old leader partitioned away may still answer reads — returning STALE data.'},
     {k:'vs',a:{h:'Lease read',t:'hold a time-bounded "I’m still leader" lease, then serve reads directly without checking. Fast — but trusts clocks (a pause/skew can make it stale).'},b:{h:'Read index',t:'before replying: note the current commit index, ping a heartbeat majority to confirm you’re STILL the leader, wait until that index is applied locally, then serve. Safe, no clocks.'}}

   {t:'mcq',q:'Why can routing reads to "the leader" still be unsafe?',o:['leaders are slow','a stale partitioned leader serves old data','leaders can’t read','followers are faster'],a:1,why:'Use leases or the read-index trick to confirm current leadership.'},

     {k:'point',i:'👑',t:'<b>Election Safety</b>: at most ONE leader per term — majority vote, and each node votes once per term.'},
     {k:'point',i:'➕',t:'<b>Leader Append-Only</b>: a leader never overwrites or deletes its own entries — it only appends.'},
     {k:'point',i:'🔗',t:'<b>Log Matching</b>: if two logs share an entry at the same index+term, they’re identical up through that index. Enforced by the prevLogIndex/term consistency check.'}
   ]},

  <div class="iv-ex">Both hold the SAME entry at index 4 (term 3). Raft guarantees every entry <b>before</b> it is identical too — so two logs can only differ in a <b>suffix</b>, never in the middle.</div>
</div>
<div class="iv-panel">
  <div class="iv-cap">Log Matching — how it’s enforced</div>
  <div class="iv-row"><span class="iv-name">Leader</span><span class="iv-log"><span class="iv-c t1">1</span><span class="iv-c t1">1</span><span class="iv-c t2">2</span><span class="iv-c t3">3</span><span class="iv-c t3 hot">3</span></span></div>

  <div class="iv-ex">To append index-5, the leader sends prevLogIndex=4, prevLogTerm=3. The follower’s index-4 is term <b>2</b>, not 3 → it <b>rejects</b>. The leader backs up and retries until prefixes agree, then overwrites the bad tail. That check is what makes Log Matching hold.</div>

</div>
<div class="iv-panel">
  <div class="iv-cap">Leader Completeness — the guarantee</div>
  <div class="iv-srv"><div class="iv-box deny"><div class="iv-sn">S1</div><div class="iv-sb">✗ deny</div></div><div class="iv-box deny"><div class="iv-sn">S2</div><div class="iv-sb">✗ deny</div></div><div class="iv-box deny"><div class="iv-sn">S3</div><div class="iv-sb">✗ deny</div></div><div class="iv-box"><div class="iv-sn">S4</div><div class="iv-sb">grant</div></div><div class="iv-box"><div class="iv-sn">S5</div><div class="iv-sb">candidate</div></div></div>
  <div class="iv-ex ok"><b>No.</b> A voter refuses any candidate whose log is <b>less up-to-date</b> than its own. The three servers holding X vote it down → S5 gets ≤2 votes, no majority. So every future leader must already contain X. <b>Committed = permanent.</b></div>
</div>`,

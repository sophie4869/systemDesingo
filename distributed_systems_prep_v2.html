{
 id:'sec',title:'Security & Abuse',icon:'🔒',color:'#E11D48',colorD:'#BE123C',
 blurb:'Authorization, data-access scoping, abuse defense, secrets, and privacy basics.',
 lessons:[
  {id:'sec-1',title:'Authorization & data access',steps:[
   {t:'teach',h:'Two different questions',body:[
     {k:'keyt',term:'Authentication (AuthN)',def:'WHO are you? Verify identity — password, token, or mTLS certificate. Happens once, at the edge.'},
     {k:'keyt',term:'Authorization (AuthZ)',def:'WHAT may you do? Check the caller’s rights against this specific action — on EVERY request.'},
     {k:'callout',c:'warn',t:'Authenticate once, authorize every time. A valid token is identity, not permission — always re-check the action against the caller’s rights.'}
   ]},
   {t:'teach',h:'Authorization models',body:[
     {k:'vs',a:{h:'RBAC',t:'permissions via roles (admin, editor). Simple and coarse; suffers role-explosion as rules get fine-grained.'},b:{h:'ABAC',t:'rules over attributes (dept=HR AND region=EU). Flexible, but harder to reason about and audit.'}},
     {k:'point',i:'🔗',t:'<b>ReBAC</b>: permissions from <b>relationships</b> ("owner of doc X", "member of team Y"). Google’s Zanzibar-style model — the right fit for sharing graphs.'}
   ]},
   {t:'teach',h:'Don’t trust the network',body:[
     {k:'point',i:'🤝',t:'Internal service-to-service calls authenticate too — <b>mTLS</b> (both sides present certs) or short-lived signed tokens. "It’s on the private network" is not authn.'},
     {k:'point',i:'🪪',t:'Derive the acting user from the <b>verified token</b> — never from a <code>user_id</code> in the request body or query string (trivially spoofed).'}
   ]},
   {t:'teach',h:'Scope every data access',body:[
     {k:'point',i:'🧾',t:'Every read/write must be scoped to the authorized user, org, workspace, project, or account from the verified token — not from a request parameter.'},
     {k:'point',i:'🚪',t:'Classic leak: user changes <code>/orders/123</code> to <code>/orders/124</code> and sees another user’s data. That is missing object-level authorization.'},
     {k:'point',i:'🛡️',t:'Use centralized authz checks and, where useful, database constraints or row-level security as defense in depth.'}
   ]},
   {t:'mcq',q:'A request with a valid login token asks to delete a DIFFERENT user’s account. You should…',o:['allow it — the token is valid','authorize the specific action against the caller’s permissions first','trust the user_id in the body','just rate-limit it'],a:1,why:'A valid token proves identity, not permission. Authorize every action against what THAT caller is allowed to do.'},
   {t:'mcq',q:'User A changes /orders/123 to /orders/124 and can read User B’s order. What broke?',o:['TLS','object-level authorization / data-access scoping','encryption at rest','load balancing'],a:1,why:'The endpoint authenticated the user, but failed to authorize access to that specific object.'},
   {t:'mcq',q:'Sharing-graph permissions like "owner of this doc" are best modeled with…',o:['RBAC roles','ABAC attributes','ReBAC (relationships, Zanzibar-style)','a single admin flag'],a:2,why:'Relationship-based access control expresses "X is owner/editor of object Y" directly — what RBAC roles struggle to capture.'},
   {t:'cloze',q:'Unmask the access-control terms.',distract:['encryption','replication'],text:[
     'AuthN answers ',{blank:'who'},' you are; AuthZ answers ',{blank:'what'},' you may do. Authenticate ',{blank:'once'},
     ', authorize every ',{blank:'request'},'. Scope data access from the ',{blank:'token'},', never the request body.'
   ]},
   {t:'recall',q:'Explain authentication vs authorization, then name the common data-access leak.',model:['Authentication = verifying WHO the caller is (token / cert / password).','Authorization = checking WHAT that caller may do, re-evaluated on every request and object.','Common leak: using caller-supplied IDs or missing object-level auth, so a user can read/write another user’s object by changing an ID.']}
  ]},
  {id:'sec-2',title:'Abuse & input defense',steps:[
   {t:'teach',h:'Keep bad input and bad actors out',body:[
     {k:'point',i:'🧹',t:'<b>Validate input, encode output</b> — the defense against injection (SQLi, XSS). Parameterize queries; never string-concatenate user input.'},
     {k:'point',i:'🤖',t:'Bot / credential-stuffing defense: rate-limit + lockout, CAPTCHA, device fingerprinting, anomaly detection. (Builds on the Rate Limiting unit.)'},
     {k:'callout',c:'warn',t:'Rate limits stop obvious volume spikes, not a slow, valid-looking attacker. Layer authz, anomaly detection, and WAF rules on top.'}
   ]},
   {t:'teach',h:'Authorized abuse still exists',body:[
     {k:'point',i:'💳',t:'A logged-in caller can still drain expensive resources, scrape data, spam invites, brute-force coupons, or hammer a public API.'},
     {k:'point',i:'🧯',t:'Add quotas around expensive actions, velocity checks around suspicious flows, and manual review or step-up challenges for high-risk behavior.'}
   ]},
   {t:'mcq',q:'Best defense against SQL injection?',o:['string-concatenate carefully','parameterized queries','bigger database','more replicas'],a:1,why:'Parameterized queries separate code from user data; escaping by hand is error-prone.'},
   {t:'sort',q:'Defense layer → does it stop a SLOW, valid-looking attacker?',buckets:['Stops it','Doesn’t (volume only)'],items:[
     {text:'Anomaly detection',b:0},{text:'Per-IP rate limit',b:1},{text:'Step-up challenge',b:0},{text:'Fixed-window request cap',b:1}
   ]},
   {t:'recall',q:'Name the layers of abuse and input defense.',model:['Input validation + output encoding; parameterized queries for SQL injection.','Rate limits, lockout, CAPTCHA/challenges, device fingerprinting, WAF, and anomaly detection for bots or credential stuffing.','Authorization, quotas, velocity checks, and step-up challenges for authenticated-but-abusive behavior.']}
  ]},
  {id:'sec-3',title:'Security & privacy basics',steps:[
   {t:'teach',h:'Protect data and secrets',body:[
     {k:'keyt',term:'In transit',def:'TLS everywhere — external and, for sensitive internal calls, mTLS or signed service tokens.'},
     {k:'keyt',term:'At rest',def:'disk- or field-level encryption so a stolen disk or leaked DB dump is less useful without the keys.'},
     {k:'point',i:'🚫',t:'No secrets in code, git, container images, or logs. Use a secrets manager / KMS-backed vault and inject at runtime.'}
   ]},
   {t:'teach',h:'PII, audit, and retention',body:[
     {k:'point',i:'🎭',t:'Minimize PII collection; tokenize or field-encrypt sensitive columns; scrub secrets and PII out of logs/traces.'},
     {k:'point',i:'📜',t:'Audit sensitive/admin actions in an append-only log: who did what, when, from where. Useful for abuse investigation and regulated domains.'},
     {k:'note',t:'Retention/delete rules matter most in payments, healthcare, finance, enterprise admin, and compliance-heavy prompts. Mention them briefly unless the prompt asks for them.'}
   ]},
   {t:'mcq',q:'Where should production secrets live?',o:['source code','git history','container image env files','a secrets manager / vault injected at runtime'],a:3,why:'Secrets should be centrally managed, access-controlled, rotated, and kept out of code/images/logs.'},
   {t:'mcq',q:'An audit log should be…',o:['editable so you can fix mistakes','append-only and tamper-evident','stored only in browser localStorage','optional for admin actions'],a:1,why:'Audit logs are evidence for forensics and compliance, so they should not be quietly rewritable.'},
   {t:'cloze',q:'Fill the security basics.',distract:['sharding','caching'],text:[
     'Use ',{blank:'TLS'},' in transit, encryption at ',{blank:'rest'},', a secrets ',{blank:'manager',alt:['vault']},
     ', PII ',{blank:'minimization',alt:['minimize']},', and append-only ',{blank:'audit'},' logs for sensitive actions.'
   ]},
   {t:'recall',q:'What security/privacy basics should you mention in a general system design interview?',model:['TLS in transit and encryption at rest for sensitive data.','Secrets manager/KMS; no secrets or PII in code, images, logs, or traces.','PII minimization/tokenization, retention/delete behavior when relevant, and append-only audit logs for sensitive/admin actions.']}
  ]}
 ],
 boss:{title:'Security Boss',time:90,q:[
   {q:'AuthN answers…',o:['what you may do','who you are','how fast','where data lives'],a:1},
   {q:'A valid token is…',o:['permission','identity, not permission','a role','an audit log'],a:1},
   {q:'Take the acting user from…',o:['the request body','the verified token','a query param','the URL'],a:1},
   {q:'"Owner of doc X" permissions →',o:['RBAC','ABAC','ReBAC','no model'],a:2},
   {q:'Internal service calls should use…',o:['no auth on private net','mTLS / signed tokens','IP allowlists only','shared passwords'],a:1},
   {q:'Changing /orders/123 to /orders/124 and seeing another user’s data means missing…',o:['object-level authorization','TLS','caching','compression'],a:0},
   {q:'SQL injection defense:',o:['string concat','parameterized queries','bigger DB','more replicas'],a:1},
   {q:'Production secrets should live in…',o:['git','logs','a secrets manager / vault','the frontend bundle'],a:2},
   {q:'An audit log is…',o:['editable','append-only & tamper-evident','optional','browser-only'],a:1}
 ]}
},
{
 id:'batch',title:'Batch & Stream',icon:'🌊',color:'#EA580C',colorD:'#C2410C',
 blurb:'MapReduce, dataflow, windows, and exactly-once.',
 lessons:[
  {id:'batch-1',title:'Batch processing',steps:[
   {t:'teach',h:'MapReduce',body:[
     {k:'cause',a:'Map (transform each record) → shuffle by key',b:'Reduce (aggregate per key) → output'},
     {k:'point',i:'🗺️',t:'<b>Map</b> emits key→value; <b>Reduce</b> folds all values for a key.'}
   ]},
   {t:'teach',h:'Beyond MapReduce',body:[
     {k:'vs',a:{h:'MapReduce',t:'materializes every intermediate step to disk. Robust but slow.'},b:{h:'Dataflow (Spark/Flink)',t:'keeps intermediates in memory, pipelines stages. Much faster.'}}
   ]},
   {t:'mcq',q:'Why do Spark/Flink beat classic MapReduce?',o:['they use SQL','they don’t materialize every intermediate step to disk','they avoid the shuffle','they need no cluster'],a:1,why:'Dataflow engines pipeline stages in memory instead of writing each step to disk.'},
   {t:'teach',h:'Distributed joins',body:[
     {k:'point',i:'📡',t:'<b>Broadcast-hash</b>: when one side is <b>small</b>, copy it to every node and build an in-memory hash table, then stream the big side past it. No shuffle of the big table — the fastest option when the small side fits in memory.'},
     {k:'point',i:'🔀',t:'<b>Partitioned-hash (shuffle)</b>: when <b>both sides are large</b>, shuffle both by the join key so matching rows land on the same node, then hash-join each partition locally. The general-purpose distributed join.'},
     {k:'point',i:'🪜',t:'<b>Sort-merge</b>: sort both sides by the join key, then walk them together in one pass. Wins when inputs are already sorted (or too big to hash) and handles range joins.'},
     {k:'callout',c:'mem',t:'Pick by size: <b>small + large → broadcast</b>; large + large → partitioned-hash; already-sorted / huge → sort-merge.'}
   ]},
   {t:'mcq',q:'You join a huge events table with a tiny lookup table. Best strategy?',o:['sort-merge','broadcast-hash the small table','partitioned-hash (shuffle both)','a cross join'],a:1,why:'Broadcasting the small table to every node avoids shuffling the huge one — each node hash-joins locally against the in-memory copy.'},
   {t:'recall',q:'Describe map and reduce in one line each.',model:['Map: transform each input record into key→value pairs (embarrassingly parallel).','Reduce: gather all values for a key (after a shuffle) and aggregate them into output.']}
  ]},
  {id:'batch-2',title:'Stream processing',steps:[
   {t:'teach',h:'Micro-batch vs true streaming',body:[
     {k:'vs',a:{h:'Micro-batch (Spark)',t:'buffer events into tiny batches (~seconds), run the batch engine on each. Simpler, reuses Spark; latency floored at the batch interval.'},b:{h:'True streaming (Flink)',t:'process each event as it arrives — lower latency, native event-time & windowing.'}},
     {k:'callout',c:'mem',t:'The common follow-up: reach for <b>Flink over Spark</b> when you need sub-second latency or rich event-time windowing; micro-batch is fine for seconds-scale.'}
   ]},
   {t:'mcq',q:'You need sub-second event-time windowing. Spark Structured Streaming or Flink?',o:['Spark — micro-batch is always faster','Flink — true per-event streaming, lower latency','either, no difference','neither does windowing'],a:1,why:'Spark micro-batches floor latency at the batch interval; Flink processes per-event with native event-time windows.'},
   {t:'teach',h:'Time & windows',body:[
     {k:'point',i:'⏰',t:'<b>Event time</b> (when it happened) vs <b>processing time</b> (when seen). Prefer event time.'},
     {k:'point',i:'🪟',t:'Windows: tumbling (fixed, non-overlap), hopping (overlap), session (by activity gap).'},
     {k:'point',i:'🌊',t:'<b>Watermarks</b> bound how long to wait for late events.'}
   ]},
   {t:'htmlviz',h:'Watermarks: when is a window done?',
    html:`<style>
      .wm-leg{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;font-weight:700;margin-top:6px}
      .wm-leg span{display:inline-flex;align-items:center;gap:5px;color:var(--color-text-secondary)}
      .wm-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
      .wm-cap{font-size:11.5px;color:var(--color-text-secondary);line-height:1.55;font-weight:600;margin-top:9px}
      .wm-cap b{color:var(--color-text-primary)}
    </style>
    <svg viewBox="0 0 460 168" style="width:100%;height:auto;font-family:inherit">
      <rect x="55" y="56" width="279" height="70" rx="7" fill="var(--color-background-success)" opacity="0.45"/>
      <rect x="334" y="56" width="93" height="70" rx="7" fill="var(--color-background-secondary)"/>
      <text x="63" y="72" font-size="9.5" font-weight="800" fill="var(--color-text-success)">complete — windows here can fire</text>
      <text x="340" y="72" font-size="9.5" font-weight="800" fill="var(--color-text-secondary)">still waiting…</text>
      <line x1="48" y1="120" x2="434" y2="120" stroke="var(--color-text-secondary)" stroke-width="1.4"/>
      <g font-size="9" fill="var(--color-text-secondary)" text-anchor="middle">
        <text x="55" y="138">0s</text><text x="148" y="138">3s</text><text x="241" y="138">6s</text><text x="334" y="138">9s</text><text x="427" y="138">12s</text>
        <text x="427" y="152" text-anchor="end" font-weight="700">event time →</text>
      </g>
      <!-- on-time events: x = 55 + t*31, number = arrival order -->
      <g text-anchor="middle">
        <circle cx="86" cy="120" r="6" fill="var(--color-text-info)"/><text x="86" y="106" font-size="9" font-weight="800" fill="var(--color-text-secondary)">1</text>
        <circle cx="179" cy="120" r="6" fill="var(--color-text-info)"/><text x="179" y="106" font-size="9" font-weight="800" fill="var(--color-text-secondary)">2</text>
        <circle cx="148" cy="120" r="6" fill="var(--color-text-info)"/><text x="148" y="106" font-size="9" font-weight="800" fill="var(--color-text-secondary)">3</text>
        <circle cx="303" cy="120" r="6" fill="var(--color-text-info)"/><text x="303" y="106" font-size="9" font-weight="800" fill="var(--color-text-secondary)">4</text>
        <circle cx="241" cy="120" r="6" fill="var(--color-text-info)"/><text x="241" y="106" font-size="9" font-weight="800" fill="var(--color-text-secondary)">5</text>
        <circle cx="117" cy="120" r="6" fill="var(--color-text-danger)"/><text x="117" y="106" font-size="9" font-weight="800" fill="var(--color-text-danger)">6</text>
        <text x="117" y="152" font-size="9" font-weight="800" fill="var(--color-text-danger)">late!</text>
      </g>
      <!-- watermark -->
      <line x1="334" y1="46" x2="334" y2="128" stroke="var(--color-text-warning)" stroke-width="2.2" stroke-dasharray="5 4"/>
      <text x="334" y="40" text-anchor="middle" font-size="10.5" font-weight="800" fill="var(--color-text-warning)">watermark = 9s</text>
    </svg>
    <div class="wm-leg">
      <span><i class="wm-dot" style="background:var(--color-text-info)"></i>on-time</span>
      <span><i class="wm-dot" style="background:var(--color-text-danger)"></i>late</span>
      <span>number = arrival order</span>
    </div>
    <div class="wm-cap">Events stream in <b>out of order</b> (see the arrival numbers). The <b>watermark</b> is the engine's promise: “I’ve seen everything with event-time ≤ 9s.” Any window ending ≤ 9s can now safely fire. Event #6 has event-time 2s but arrived <b>after</b> the watermark passed it → it's <b>late</b> (dropped, or sent to a side-output). Bigger lateness allowance = more correct, but more delay.</div>
    `},
   {t:'teach',h:'Handling late data',body:[
     {k:'point',i:'🪂',t:'<b>Allowed lateness</b>: keep a window open a little past the watermark so late events still <b>update</b> its result, then finalize.'},
     {k:'point',i:'📥',t:'<b>Side-output</b>: route anything later than that to a separate stream / dead-letter — fix it offline instead of dropping silently.'},
     {k:'callout',c:'note',t:'The default is to <b>drop</b> late events. The watermark sets the cutoff; allowed-lateness and side-outputs are how you avoid losing them.'}
   ]},
   {t:'teach',h:'Recovering stateful operators',body:[
     {k:'point',i:'📸',t:'A <b>checkpoint</b> is a consistent snapshot of every operator\'s state <b>plus the source offsets</b>, taken periodically.'},
     {k:'point',i:'🚧',t:'The engine injects a <b>barrier</b> into the stream; each operator snapshots as the barrier passes (Flink-style) — async, no global pause.'},
     {k:'point',i:'♻️',t:'On crash: <b>restore</b> the last snapshot, <b>rewind</b> the source to its offset, and <b>replay</b>. No state lost.'}
   ]},
   {t:'htmlviz',h:'Checkpoint → crash → replay',
    html:`<style>
      .ckp{display:grid;gap:12px;font-family:inherit}
      .ckp-row{border:1.5px solid var(--color-border-primary);border-radius:12px;background:var(--color-background-secondary);padding:11px 12px}
      .ckp-h{font-weight:800;color:var(--color-text-primary);font-size:12.5px;margin-bottom:9px}
      .ckp-flow{display:flex;align-items:stretch;gap:5px;flex-wrap:wrap}
      .ckp-node{flex:1;min-width:62px;text-align:center;border:1.5px solid var(--bd);background:var(--bg);color:var(--c);border-radius:10px;padding:8px 5px;font-weight:800;font-size:11.5px;display:flex;flex-direction:column;justify-content:center}
      .ckp-node small{display:block;font-weight:600;font-size:9px;opacity:.85;margin-top:2px}
      .ckp-arr{align-self:center;color:var(--color-text-secondary);font-weight:800;flex:0 0 auto;font-size:13px}
      .ckp-blue{--c:#4f46e5;--bg:#eef2ff;--bd:#c7d2fe}
      .ckp-amber{--c:#b45309;--bg:#fffbeb;--bd:#fde68a}
      .ckp-green{--c:#059669;--bg:#ecfdf5;--bd:#a7f3d0}
      .ckp-red{--c:#dc2626;--bg:#fef2f2;--bd:#fecaca}
      .ckp-note{font-size:10.5px;color:var(--color-text-secondary);font-weight:600;margin-top:8px;line-height:1.5}
      .ckp-note b{color:var(--color-text-primary)}
    </style>
    <div class="ckp">
      <div class="ckp-row">
        <div class="ckp-h">📸 Checkpoint — every few seconds</div>
        <div class="ckp-flow">
          <div class="ckp-node ckp-blue">Source<small>offset 1200</small></div>
          <div class="ckp-arr">▸</div>
          <div class="ckp-node ckp-amber">Operator<small>state snapshot</small></div>
          <div class="ckp-arr">▸</div>
          <div class="ckp-node ckp-blue">Sink</div>
        </div>
        <div class="ckp-note">A <b>barrier</b> flows downstream with the data; as it passes each operator, that operator saves its <b>state + the source offset</b> — no stop-the-world.</div>
      </div>
      <div class="ckp-row">
        <div class="ckp-h">💥 Crash → recover</div>
        <div class="ckp-flow">
          <div class="ckp-node ckp-red">Crash</div>
          <div class="ckp-arr">▸</div>
          <div class="ckp-node ckp-amber">Restore<small>last snapshot</small></div>
          <div class="ckp-arr">▸</div>
          <div class="ckp-node ckp-blue">Rewind source<small>offset 1200</small></div>
          <div class="ckp-arr">▸</div>
          <div class="ckp-node ckp-green">Replay → sink<small>idempotent / txn</small></div>
        </div>
        <div class="ckp-note">Restore state, <b>rewind the source</b> to the checkpoint's offset, and replay. Replays re-emit records — so the <b>sink must be idempotent or transactional</b> to apply each effect once.</div>
      </div>
    </div>`},
   {t:'teach',h:'Exactly-once = “effectively once”',body:[
     {k:'point',i:'⚠️',t:'Recovery <b>replays</b> from the last checkpoint, so a naive sink would write some records <b>twice</b>.'},
     {k:'point',i:'✅',t:'Fix the output: an <b>idempotent</b> sink (dedupe by key) or a <b>transactional</b> sink (2-phase commit — output commits only when the checkpoint does).'},
     {k:'callout',c:'mem',t:'It\'s exactly-once <b>processing</b>, not delivery — the wire still duplicates; you just apply each effect once.'}
   ]},
   {t:'mcq',q:'After a crash, how does a stream job avoid losing or double-counting state?',o:['start from scratch','restore the last checkpoint, rewind the source to its offset, and replay','ignore the failed records','switch to processing time'],a:1,why:'The checkpoint pairs operator state with source offsets, so restoring state and replaying from that offset reprocesses exactly the un-checkpointed tail — an idempotent/transactional sink makes the replayed effects apply once.'},
   {t:'cloze',q:'Fill the streaming blanks.',distract:['offset','partition'],text:[
     'Group by ',{blank:'event time',alt:['event-time']},', not processing time. ',{blank:'Watermarks',alt:['watermark']},
     ' bound lateness, and ',{blank:'tumbling'},' windows are fixed and non-overlapping. Checkpoints give ',{blank:'exactly-once'},' processing.'
   ]},
   {t:'match',q:'Match the window to its shape.',pairs:[['Tumbling','Fixed, non-overlapping'],['Hopping','Fixed, overlapping'],['Session','Bounded by an activity gap']]},
   {t:'mcq',q:'Which window groups events by gaps of inactivity?',o:['tumbling','hopping','session','global'],a:2,why:'A session window closes after a period of no events for that key.'},
   {t:'recall',q:'Why prefer event time over processing time?',model:['Event time reflects when things actually happened, so results are correct regardless of delays or replays.','Processing time depends on when the system happened to see the event — it drifts with lag and reprocessing.']}
  ]},
  {id:'batch-3',title:'Lambda & Kappa',steps:[
   {t:'htmlviz',h:'Lambda vs Kappa',
    html:`<style>
      .lk{display:grid;gap:12px;font-family:inherit}
      .lk-card{border:1.5px solid var(--color-border-primary);background:var(--color-background-secondary);border-radius:12px;padding:11px 12px}
      .lk-h{font-weight:800;font-size:12.5px;margin-bottom:9px;display:flex;align-items:center;gap:7px}
      .lk-badge{font-size:9.5px;font-weight:800;padding:2px 8px;border-radius:999px}
      .lk-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
      .lk-node{text-align:center;border:1.5px solid var(--bd);background:var(--bg);color:var(--c);border-radius:9px;padding:7px 9px;font-weight:800;font-size:11.5px}
      .lk-node small{display:block;font-weight:600;font-size:9px;opacity:.85;margin-top:1px}
      .lk-arr{color:var(--color-text-secondary);font-weight:800;flex:0 0 auto;font-size:13px}
      .lk-branch{display:grid;gap:6px}
      .lk-blue{--c:#4f46e5;--bg:#eef2ff;--bd:#c7d2fe}
      .lk-green{--c:#059669;--bg:#ecfdf5;--bd:#a7f3d0}
      .lk-amber{--c:#b45309;--bg:#fffbeb;--bd:#fde68a}
      .lk-note{font-size:10.5px;color:var(--color-text-secondary);font-weight:600;margin-top:8px;line-height:1.5}
      .lk-note b{color:var(--color-text-primary)}
      .lk-tip{font-size:11px;color:var(--color-text-success);font-weight:700;background:var(--color-background-success);border-radius:10px;padding:9px 12px;line-height:1.5}
    </style>
    <div class="lk">
      <div class="lk-card">
        <div class="lk-h" style="color:#4f46e5">Lambda <span class="lk-badge" style="background:#eef2ff;color:#4f46e5">two pipelines</span></div>
        <div class="lk-row">
          <div class="lk-node lk-blue">events</div>
          <div class="lk-arr">▸</div>
          <div class="lk-node lk-blue">Kafka</div>
          <div class="lk-arr">▸</div>
          <div class="lk-branch">
            <div class="lk-node lk-green">speed: Flink<small>real-time · approximate</small></div>
            <div class="lk-node lk-amber">batch: Spark / S3<small>periodic · exact, corrects</small></div>
          </div>
          <div class="lk-arr">▸</div>
          <div class="lk-node lk-blue">serving<small>merge both</small></div>
          <div class="lk-arr">▸</div>
          <div class="lk-node lk-blue">query</div>
        </div>
        <div class="lk-note">Two parallel paths — a <b>batch</b> layer (accurate, reprocessable) and a <b>speed</b> layer (fresh, approximate); serving merges them. Powerful, but you maintain <b>two codebases</b> that can drift.</div>
      </div>
      <div class="lk-card">
        <div class="lk-h" style="color:#059669">Kappa <span class="lk-badge" style="background:#ecfdf5;color:#059669">stream only</span></div>
        <div class="lk-row">
          <div class="lk-node lk-blue">events</div>
          <div class="lk-arr">▸</div>
          <div class="lk-node lk-blue">Kafka<small>long retention</small></div>
          <div class="lk-arr">▸</div>
          <div class="lk-node lk-green">Flink<small>replayable</small></div>
          <div class="lk-arr">▸</div>
          <div class="lk-node lk-blue">serving</div>
          <div class="lk-arr">▸</div>
          <div class="lk-node lk-blue">query</div>
        </div>
        <div class="lk-note">One streaming path. <b>Reprocess</b> = reset the offset to 0 and replay the whole log through the <b>same</b> processor — one codebase, simpler ops. Needs a durable, long-retention log.</div>
      </div>
      <div class="lk-tip">💡 Kappa is the modern default when your processor can replay; Lambda lingers where batch tools are much cheaper / more accurate for the bulk path.</div>
    </div>`},
   {t:'mcq',q:'Kappa architecture differs from Lambda by…',o:['using two code paths','using one streaming path and replaying to reprocess','dropping streaming','requiring a warehouse'],a:1,why:'Kappa keeps a single streaming codebase and reprocesses by replaying the log; Lambda maintains separate batch + speed layers.'},
   {t:'cloze',q:'Fill the Lambda/Kappa blanks.',distract:['shard','quorum'],text:[
     {blank:'Lambda',alt:['lambda']},' runs batch + speed layers; ',{blank:'Kappa',alt:['kappa']},' uses one stream and ',{blank:'replays',alt:['replay']},' to reprocess.'
   ]},
   {t:'recall',q:'Lambda vs Kappa — when would you pick each?',model:['Lambda: a batch layer (accurate, reprocessable) plus a speed layer (fresh, approximate), merged at serving — but two codebases that can drift.','Kappa: one streaming pipeline; reprocess by replaying the log — simpler, and the default when your stream processor can replay.']}
  ]}
 ],

   {q:'Prefer which clock for stream windows?',o:['processing time','event time','wall clock','NTP'],a:1},
   {q:'A tumbling window is…',o:['overlapping','fixed + non-overlapping','gap-based','infinite'],a:1},
   {q:'Watermarks handle…',o:['hot keys','late events','encryption','sharding'],a:1},
   {q:'Exactly-once stream processing needs…',o:['no state','checkpoints + idempotent sinks','UDP','a single node'],a:1},
   {q:'Kappa architecture uses…',o:['batch + speed layers','one streaming path, replay to reprocess','no streaming','a warehouse only'],a:1},
   {q:'Lambda maintains…',o:['one codebase','separate batch + speed layers','only streaming','no batch layer'],a:1}
 ]}
},
{
 id:'data',title:'Data & ML Infra',icon:'🤖',color:'#1CB0F6',colorD:'#1899D6',
 blurb:'Pipelines, storage tiers, and serving models at scale.',
 lessons:[
  {id:'data-1',title:'Pipelines & storage',steps:[
   {t:'teach',h:'ETL vs ELT',body:[
     {k:'vs',a:{h:'ETL',t:'transform <b>before</b> load — clean, join, aggregate, then load structured results. Good when transforms are expensive or data must be sanitised first.'},b:{h:'ELT',t:'load raw <b>first</b>, transform in-warehouse with SQL. The modern default — cheap columnar storage, and you can re-run transforms without re-ingesting.'}},
     {k:'point',i:'🏛️',t:'<b>Where it lands</b>: a <b>warehouse</b> = structured, SQL, analytics-tuned (Snowflake/BigQuery); a <b>data lake</b> = cheap raw files in object storage, schema-on-read.'}
   ]},
   {t:'sort',q:'ETL or ELT?',buckets:['ETL — transform first','ELT — load raw first'],items:[
     {text:'sanitise PII before storing',b:0},{text:'cheap columnar warehouse',b:1},{text:'re-run transforms on raw data',b:1},{text:'expensive transform, run once',b:0}
   ]},
   {t:'teach',h:'Storage tiers',body:[
     {k:'point',i:'💽',t:'<b>Block</b> (EBS): one VM, low-latency DB volumes.'},
     {k:'point',i:'📂',t:'<b>File</b> (EFS/NFS): shared POSIX across many workers.'},
     {k:'point',i:'🪣',t:'<b>Object</b> (S3): HTTP, 11 nines, immutable — media, data lakes, checkpoints.'}
   ]},
   {t:'mcq',q:'Where do you store ML training data and model checkpoints?',o:['block volume','object storage (S3/GCS)','the app server','a queue'],a:1,why:'Object storage is cheap, durable, and globally accessible — ideal for datasets & checkpoints.'},
   {t:'teach',h:'Lifecycle tiering',body:[
     {k:'point',i:'🔥',t:'<b>Hot</b>: recent, frequently-read — fast store (SSD / in-memory / standard object).'},
     {k:'point',i:'🌤️',t:'<b>Warm</b>: occasional access — cheaper, slower (infrequent-access tiers).'},
     {k:'point',i:'🧊',t:'<b>Cold</b>: rarely read, kept for compliance — cheapest, slow retrieval (Glacier / archive).'},
     {k:'note',t:'Lifecycle policies age data hot → warm → cold automatically; time-series and logs are the classic case.'}
   ]},
   {t:'mcq',q:'Rarely-read compliance data you must keep for years belongs in…',o:['a hot SSD tier','a cold / archive tier (Glacier)','an in-memory cache','a message queue'],a:1,why:'Archive tiers are cheapest for data that is almost never read; lifecycle policies move it there automatically.'},
   {t:'recall',q:'Why is ELT the modern default over ETL?',model:['Cheap columnar warehouses make it fine to load raw data first.','Transform on-demand with SQL in the warehouse, and re-run transforms without re-ingesting from source.']}
  ]},
  {id:'data-2',title:'Serving ML',steps:[
   {t:'teach',h:'Feature stores & serving',body:[
     {k:'keyt',term:'Feature store',def:'one feature definition, materialised two ways — an <b>offline</b> store for training and an <b>online</b> store for inference. Serving the SAME values in both places prevents <b>train/serve skew</b>.'},
     {k:'point',i:'⚡',t:'Online serving: low-latency KV (Redis/DynamoDB); batch features precomputed.'}
   ]},
   {t:'htmlviz',h:'Feature store — one definition, two stores',
    html:`<style>
.fsv{display:grid;gap:10px}
.fsv-top{display:grid;grid-template-columns:1fr 32px 1.1fr;gap:8px;align-items:center}
.fsv-split{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fsv-box{border:2px solid var(--color-border-primary);border-radius:14px;background:var(--color-background-secondary);padding:10px;text-align:center}
.fsv-box.good{background:var(--color-background-success);border-color:var(--color-border-success);color:var(--color-text-success)}
.fsv-box.info{background:var(--color-background-info);border-color:var(--color-border-info);color:var(--color-text-info)}
.fsv-box.warn{background:var(--color-background-warning);border-color:var(--color-border-warning);color:var(--color-text-warning)}
.fsv-t{font-size:13px;font-weight:900;color:var(--color-text-primary)}
.fsv-s{font-size:11px;font-weight:800;line-height:1.35;margin-top:4px}
.fsv-arr{text-align:center;font-size:22px;font-weight:900;color:var(--color-text-tertiary)}
.fsv-cap{font-size:12.5px;color:var(--color-text-secondary);line-height:1.55;padding:10px 13px;background:var(--color-background-secondary);border-radius:12px}
.fsv-cap b{color:var(--color-text-primary)}
.fsv-pit{border:2px solid var(--color-border-warning);background:var(--color-background-warning);border-radius:14px;padding:10px;display:grid;gap:8px;color:var(--color-text-warning)}
.fsv-line{position:relative;height:30px;background:var(--color-background-primary);border-radius:999px;border:1px solid var(--color-border-warning);margin-top:20px}
.fsv-dot{position:absolute;top:7px;width:16px;height:16px;border-radius:50%;background:var(--color-text-success)}
.fsv-dot.pick{box-shadow:0 0 0 2px var(--color-background-primary),0 0 0 4px var(--color-text-success)}
.fsv-dot.future{background:transparent;border:2px dashed var(--color-text-danger);opacity:.85}
.fsv-cut{position:absolute;top:-5px;bottom:-5px;border-left:3px dashed var(--color-text-warning)}
.fsv-tlbl{position:absolute;top:-17px;transform:translateX(-50%);font-size:10px;font-weight:900;white-space:nowrap;color:var(--color-text-warning)}
.fsv-reg{display:flex;justify-content:space-between;font-size:9.5px;font-weight:800;margin-top:3px}

.fsv-reg .i{color:var(--color-text-danger)}
@media(max-width:460px){.fsv-top,.fsv-split{grid-template-columns:1fr}.fsv-arr{transform:rotate(90deg)}}
</style>
<div class="fsv">
  <div class="fsv-top"><div class="fsv-box"><div class="fsv-t">Sources</div><div class="fsv-s">DB events, streams, logs</div></div><div class="fsv-arr">→</div><div class="fsv-box warn"><div class="fsv-t">Shared feature definitions</div><div class="fsv-s">one transformation contract</div></div></div>
  <div class="fsv-split"><div class="fsv-box good"><div class="fsv-t">Offline store</div><div class="fsv-s">history + point-in-time joins for training</div></div><div class="fsv-box info"><div class="fsv-t">Online store</div><div class="fsv-s">latest values, sub-10ms inference lookups</div></div></div>
  <div class="fsv-pit"><div class="fsv-t">Point-in-time training lookup</div><div class="fsv-line"><span class="fsv-tlbl" style="left:60%">label time T</span><span class="fsv-dot" style="left:12%"></span><span class="fsv-dot pick" style="left:40%"></span><span class="fsv-cut" style="left:60%"></span><span class="fsv-dot future" style="left:80%"></span></div><div class="fsv-reg"><span class="u">● used — latest event_time ≤ T</span><span class="i">○ ignored — event_time &gt; T</span></div><div class="fsv-s">For each training row, read <b>feature X for user Y as of T</b>: take the <b>latest value with event_time ≤ T</b> (the ringed dot) and skip later ones — otherwise offline metrics leak data production won't have.</div></div>
  <div class="fsv-cap"><b>Same logic, two materializations.</b> The offline path preserves historical correctness; the online path serves fresh low-latency features so training and production do not drift apart.</div>
</div>`},
   {t:'mcq',q:'A feature store mainly prevents…',o:['data loss','train/serve skew','hot keys','latency'],a:1,why:'Same feature definitions/values offline and online keep training and inference consistent.'},
   {t:'recall',q:'What problem does a feature store solve?',model:['Training and inference can compute features differently → train/serve skew → bad predictions.','A feature store serves consistent features for both: an offline store for training, a low-latency online store for inference.']}
  ]},
  {id:'data-serve',title:'Model serving',steps:[
   {t:'teach',h:'Serving a model is a serving problem',body:[
     {k:'point',i:'📦',t:'Treat the model as a <b>black box</b>: input tensor in → output tensor out. Loaded weights are <b>read-only</b>, so any replica serves any request — scale out behind a load balancer.'},
     {k:'point',i:'🚦',t:'Ship new versions safely with a <b>canary</b> (route X% of traffic, watch metrics) or a <b>blue/green</b> swap — exactly like deploying any stateless service.'}
   ]},
   {t:'teach',h:'Squeeze the GPU',body:[
     {k:'point',i:'🎚️',t:'<b>Dynamic batching</b>: hold incoming requests for a few ms (or until a max batch size), then run them as <b>one</b> GPU forward pass. A GPU runs a batch in nearly the same time as a single request, so throughput multiplies for a few ms of added latency.'},
     {k:'point',i:'🧠',t:'<b>Cache predictions</b> keyed by a hash of the input — a big win for repeated queries (popular items, autocomplete).'},
     {k:'callout',c:'warn',t:'Model too big for one GPU? In order of complexity: <b>quantization</b> (int8/fp16, ~2–4× smaller) → split it with <b>model parallelism</b> — <b>tensor</b> (split a layer\'s matrices) then <b>pipeline</b> (layers across GPUs).'}
   ]},
   {t:'htmlviz',h:'Dynamic batching — one pass, many requests',
    html:`<style>

</style>
<div class="dbz">
  <div class="dbz-row">

  </div>
</div>
<div class="dbz-cap"><b>Why it works:</b> a GPU has thousands of cores, and a pass is dominated by loading the model weights — one request leaves most cores idle. Running 3 (or 32) inputs in a single pass takes nearly the same time, so throughput multiplies. <b>Dynamic</b> = batch whatever arrived in a short window (or up to a max size): under load batches fill instantly; when idle you wait at most the window. The knob is <b>max batch size vs max wait</b> — throughput against tail latency.</div>`},
   {t:'mcq',q:'Why batch requests together on a GPU?',o:['lower memory use','much higher GPU throughput','to avoid caching','for consistency'],a:1,why:'A GPU processes many examples per forward pass far more efficiently than one at a time; dynamic batching trades a few ms of latency for big throughput gains.'},
   {t:'mcq',q:'A model is too large for one GPU. Cheapest first option?',o:['tensor parallelism','quantization (int8/fp16)','pipeline parallelism','a bigger cache'],a:1,why:'Quantization shrinks the model ~2–4× with the least system complexity; reach for tensor/pipeline parallelism only when it still will not fit.'},
   {t:'match',q:'Serving technique → what it buys.',pairs:[['Dynamic batching','GPU throughput'],['Prediction cache','skip recompute for repeats'],['Quantization','fit a bigger model in memory'],['Canary deploy','validate a new model on X% of traffic']]},
   {t:'recall',q:'How do you serve a model at low latency and high throughput?',model:['<b>Throughput — scale out:</b> loaded weights are read-only, so any replica serves any request; put stateless replicas behind a load balancer and add replicas for more QPS.','<b>Throughput — per GPU:</b> dynamic batching runs many requests in one forward pass.','<b>Latency:</b> cache predictions by input hash (skip recompute for repeats), keep the model warm in memory, and quantize so each pass is faster.','If the model exceeds one GPU: quantize first, then tensor / pipeline parallelism. Treat the model as a black box — the rest is ordinary distributed serving.']}
  ]},
  {id:'data-3',title:'Training & experiments',steps:[
   {t:'teach',h:'The training pipeline',body:[
     {k:'point',i:'🛠️',t:'Stages: ingest → feature engineering → train → evaluate → register → deploy. Orchestrated (Airflow/Kubeflow) and re-runnable.'},
     {k:'point',i:'♻️',t:'<b>Reproducibility</b> needs versioning of three things: <b>data</b>, <b>code</b>, and <b>model artifacts</b>.'},
     {k:'note',t:'A model registry stores versioned artifacts + metadata and gates promotion (staging → prod), enabling rollback.'}
   ]},
   {t:'teach',h:'Experiment tracking',body:[
     {k:'keyt',term:'Experiment tracking',def:'log each run’s params, dataset version, code commit, and metrics (MLflow/W&B) so results are comparable and reproducible.'},
     {k:'point',i:'🧪',t:'Validate online with A/B tests or shadow/canary deploys before full rollout; watch for data/concept drift and retrain.'}
   ]},
   {t:'teach',h:'Distributed training',body:[
     {k:'vs',a:{h:'Data parallelism',t:'every worker holds a full model copy and trains on a different data shard; gradients are merged via <b>AllReduce</b>. The default.'},b:{h:'Model parallelism',t:'split the model itself across GPUs when it will not fit — <b>tensor</b> (split a layer\'s matrices) or <b>pipeline</b> (layers on different GPUs). More communication, harder; for very large models.'}},
     {k:'point',i:'💾',t:'<b>Checkpoint</b> model state to object storage every few minutes; on a crash or preemption, resume from the last checkpoint instead of step 0 — write-ahead logging for training.'}
   ]},
   {t:'mcq',q:'Default way to train across many machines when the model fits on one GPU?',o:['model parallelism','data parallelism — shard data, AllReduce gradients','pipeline parallelism','single GPU only'],a:1,why:'Data parallelism replicates the model and shards the data, averaging gradients with AllReduce. Model parallelism is only needed when the model itself is too big for one device.'},
   {t:'mcq',q:'A 72-hour training job loses a worker to preemption. Avoid restarting from scratch by…',o:['adding workers','periodic checkpoints to object storage → resume','using a bigger GPU','retrying the whole job'],a:1,why:'Durable checkpoints let a restarted worker resume from the last saved step — the same durable-snapshot idea as a WAL.'},
   {t:'mcq',q:'Reproducible training requires versioning…',o:['only the code','data, code, AND model artifacts','only the model','only hyperparameters'],a:1,why:'A run is reproducible only if the exact data, code, and resulting artifact are all pinned and recorded.'},
   {t:'recall',q:'What does experiment tracking give you, and why version data + code + model?',model:['Experiment tracking logs each run’s params, dataset version, code commit, and metrics so runs are comparable and reproducible.','Versioning data + code + model artifacts lets you reproduce a result, compare candidates fairly, and roll back a bad model.','Promote via a registry (staging → prod) and validate online with shadow/canary or A/B before full rollout.']}
  ]}
 ],
 boss:{title:'Data & ML Boss',time:75,q:[

{
 id:'pat',title:'Design Patterns',icon:'🧠',color:'#A560E8',colorD:'#7C3AED',
 blurb:'Recognise the shape, reuse the playbook.',
 lessons:[
  {id:'pat-1',title:'Spot the pattern',steps:[
   {t:'teach',h:'Core playbooks',body:[
     {k:'point',i:'📡',t:'<b>Real-time updates</b>: polling → SSE → WebSocket; pub/sub server-side.'},
     {k:'point',i:'⏳',t:'<b>Long-running tasks</b>: enqueue job, return id, workers process.'},
     {k:'point',i:'🔒',t:'<b>Contention</b>: DB transaction / optimistic CAS before distributed locks.'}
   ]},
   {t:'match',q:'Match the problem to its pattern.',pairs:[['Live chat updates','Real-time push'],['Video transcoding','Long-running task'],['Last concert seat','Contention control']]},
   {t:'teach',h:'More playbooks',body:[
     {k:'point',i:'📖',t:'<b>Scaling reads</b>: index → replicas → cache/CDN.'},
     {k:'point',i:'✍️',t:'<b>Scaling writes</b>: shard by a good key; batch; buffer bursts.'},
     {k:'point',i:'🎞️',t:'<b>Large blobs</b>: presigned URL direct to S3, serve via CDN — keep the bytes off the app tier.'},
     {k:'point',i:'📍',t:'<b>Proximity</b>: geospatial index — a shared geohash prefix = closeness, so "near me" is a 1D prefix scan.'}
   ]},
   {t:'mcq',q:'Large file uploads should…',o:['stream through app servers','use presigned URLs direct to blob storage','go in the DB','be base64'],a:1,why:'Keep gigabytes off the app tier; serve via CDN.'},
   {t:'teach',h:'Three more to recognise',body:[
     {k:'point',i:'🔎',t:'<b>Full-text search</b>: build an <b>inverted index</b> (term → doc ids) or use a search engine (Elasticsearch) — never a SQL LIKE %x% scan over every row.'},
     {k:'point',i:'🔁',t:'<b>Safe retries / dedupe</b>: an <b>idempotency key</b> per request — the server stores the result and returns it on a retry, turning at-least-once into an exactly-once effect.'},
     {k:'point',i:'🪜',t:'<b>Multi-step workflow</b> across services: an orchestrated <b>saga</b> with compensating actions instead of distributed 2PC; make every step idempotent.'}
   ]},
   {t:'match',q:'Problem → pattern, round 2.',pairs:[['Search posts by keyword','Inverted index / search engine'],['Retry a charge safely','Idempotency key'],['Order → pay → ship across services','Orchestrated saga']]},
   {t:'mcq',q:'Keyword search over millions of documents is fastest with…',o:['a SQL LIKE %term% scan','an inverted index (term → doc ids)','a B-tree on the row id','a full table scan'],a:1,why:'An inverted index maps each term to the docs containing it, so a keyword lookup touches only matches instead of every row; search engines (Elasticsearch) build and serve these.'},
   {t:'recall',q:'For a feed, when fanout-on-write vs fanout-on-read?',model:['Fanout-on-write (push): precompute timelines — cheap reads, expensive for celebrities.','Fanout-on-read (pull): assemble at read time — cheap writes, costly reads.','Hybrid: push for normal users, pull/merge for celebrities.']}
  ]},
  {id:'pat-2',title:'Name that pattern',steps:[
   {t:'teach',h:'Read the scenario, reach for the shape',body:[
     {k:'tldr',t:'Interviews rarely name the pattern — they describe a symptom. Train the reflex: scenario → playbook, then justify.'},
     {k:'point',i:'🎯',t:'The tell is in the verb: "see live" → real-time push; "takes minutes" → async job; "last one wins" → contention; "find near me" → geospatial.'}
   ]},
   {t:'mcq',q:'A dashboard must show new events the moment they happen, server→client only. Cheapest fit before reaching for WebSocket?',o:['poll every 100ms','Server-Sent Events (SSE)','WebSocket from the start','a second database'],a:1,why:'SSE is one-way server push over plain HTTP — perfect for live feeds/notifications. Reserve WebSocket for when the client also needs to push (chat, presence).'},
   {t:'mcq',q:'An endpoint kicks off a 5-minute video transcode. Best API shape?',o:['block the request until it finishes','enqueue a job, return a job id immediately; client polls or gets notified','run it inside a DB trigger','stream the result synchronously'],a:1,why:'Long work goes async: accept → return id → workers process → report status. Never hold an HTTP connection open for minutes.'},
   {t:'mcq',q:'Reads are 100× writes and the same hot keys are fetched constantly. First cheap win?',o:['shard the database','add a cache in front of the hot keys','rewrite the service','two-phase commit'],a:1,why:'Scale reads index → replicas → cache/CDN. Repeated hot keys are the textbook case for a cache.'},
   {t:'mcq',q:'A write firehose of 1M events/sec overwhelms one node. Reach for…',o:['a bigger single box (vertical only)','shard by a good partition key; batch / buffer bursts','a global lock','synchronous replication'],a:1,why:'Scale writes by sharding on a high-cardinality key so load spreads; batch and buffer to absorb spikes.'},
   {t:'match',q:'Symptom → playbook.',pairs:[['Typeahead over 50M products','Inverted index / search engine'],['Charge a card; client retried the call','Idempotency key'],['Find drivers within 2km','Geospatial index'],['Export a 4K video file','Presigned URL + CDN']]},
   {t:'sort',q:'Is this scaling READS or WRITES?',buckets:['Scale reads','Scale writes'],items:[
     {text:'add an index, then replicas, then cache',b:0},{text:'shard by a good key',b:1},{text:'serve static assets via CDN',b:0},{text:'buffer bursts in a queue',b:1}
   ]},
   {t:'cloze',q:'Fill the playbook blanks.',distract:['polling','sharding'],text:[
     'Live server→client updates: start ',{blank:'SSE',alt:['Server-Sent Events']},', upgrade to WebSocket only when the client must push too. Work that takes minutes → return a ',
     {blank:'job id',alt:['job-id','jobid']},' and process it ',{blank:'async',alt:['asynchronously']},'. Find-near-me needs a ',{blank:'geospatial index',alt:['geospatial','geohash']},'.'
   ]},
   {t:'recall',q:'A scenario says "show it live, the instant it changes." Walk the real-time ladder.',model:['Start with polling — simplest, fine for low-frequency or many idle clients.','Server→client stream only → SSE (one-way over HTTP).','Bidirectional / low-latency (chat, presence, games) → WebSocket; fan out server-side via pub/sub.']}
  ]},
  {id:'pat-3',title:'Don’t reach for the heavy tool',steps:[
   {t:'teach',h:'Escalate from cheap to heavy',body:[
     {k:'tldr',t:'Half of pattern-spotting is NOT over-engineering. Name the cheap tool first; justify the heavy one only when the cheap one provably fails.'},
     {k:'point',i:'🪜',t:'Contention: DB transaction / optimistic CAS → distributed lock only across nodes. Multi-service workflow: saga + compensation, not 2PC.'},
     {k:'callout',c:'warn',t:'Search is NOT SQL LIKE %x% (full scan). Dedup is NOT a new random id per retry (defeats itself). Blobs do NOT stream through the app tier.'}
   ]},
   {t:'mcq',q:'Two users race for the last seat in one database. Reach for a distributed lock first?',o:['yes, always lock','no — a DB transaction or optimistic CAS handles single-DB contention','use 2PC','ignore it and hope'],a:1,why:'Single-DB contention is solved by a transaction or compare-and-set. Distributed locks/2PC are for coordination ACROSS nodes — heavier and failure-prone.'},
   {t:'mcq',q:'At-least-once delivery means a charge can fire twice. The fix?',o:['hope the network is exactly-once','an idempotency key — server stores the result and replays it on retry','retry with a fresh random id each time','fire-and-forget'],a:1,why:'A stable idempotency key turns at-least-once into an exactly-once effect. A new random id per retry makes every attempt look new → duplicate charges.'},
   {t:'mcq',q:'Order → pay → ship spans three services. Coordinate them with…',o:['one giant distributed 2PC','an orchestrated saga with compensating actions','a single cross-service transaction','a global lock'],a:1,why:'2PC blocks and is fragile across services. A saga runs each step locally and compensates (refund, restock) on failure; make every step idempotent.'},
   {t:'build',q:'Pick what actually makes a retry SAFE.',options:['A stable idempotency key','A new random id per attempt','Server stores the result per key','Fire-and-forget','Make the operation idempotent'],correct:[0,2,4]},
   {t:'match',q:'Over-engineered tool → the right cheaper one.',pairs:[['Distributed lock for single-DB contention','DB transaction / CAS'],['2PC across microservices','Saga + compensation'],['SQL LIKE scan for search','Inverted index'],['Streaming a blob through the app tier','Presigned URL to storage']]},
   {t:'sort',q:'Safe retry, or breaks dedup?',buckets:['Safe','Breaks dedup'],items:[
     {text:'stable idempotency key',b:0},{text:'new random id each retry',b:1},{text:'server caches the result per key',b:0},{text:'fire-and-forget, no ack',b:1}
   ]},
   {t:'recall',q:'Give the escalation order for contention, and why start cheap.',model:['Single row/DB: a transaction or optimistic CAS (version check) — no extra infra.','Across nodes/resources: a distributed lock (with a fencing token + lease).','Last resort, multi-service atomicity: prefer a saga over 2PC. Start cheap because each step up adds latency, failure modes, and SPOFs.']}
  ]},
  {id:'pat-4',title:'Fan-out',steps:[
   {t:'teach',h:'One event → millions of recipients',body:[
     {k:'tldr',t:'The core challenge is write amplification: one post by a popular account can mean millions of inbox writes. The design choice is WHERE you pay — on write or on read.'},
     {k:'point',i:'✍️',t:'<b>Fan-out on write (push)</b>: on post, write into every follower’s inbox. Reads are O(1) (inbox pre-built) — but a celebrity’s post explodes into millions of writes.'},
     {k:'point',i:'📖',t:'<b>Fan-out on read (pull)</b>: store the post once; assemble each feed at read time. Writes are O(1) — but reads get slow and grow with how many accounts you follow.'},
     {k:'point',i:'🔀',t:'<b>Hybrid (the standard answer)</b>: push for normal users, pull for celebrities. At read time, merge the pre-populated inbox with freshly-pulled celebrity posts.'}
   ]},
   {t:'htmlviz',h:'Fan-out — push the many, pull the few',
    html:`<style>

<div class="nfz">
  <div class="nfz-sec"><div class="nfz-h">Push <span class="nfz-tag good">normal · ~500 followers</span></div><div class="nfz-flow"><div class="nfz-box good"><div class="nfz-t">User posts</div></div><div class="nfz-arr">→</div><div class="nfz-box"><div class="nfz-t">Queue</div><div class="nfz-s">one job per follower</div></div><div class="nfz-arr">→</div><div class="nfz-box"><div class="nfz-t">Workers</div><div class="nfz-s">write each inbox</div></div><div class="nfz-arr">→</div><div class="nfz-box good"><div class="nfz-t">Read = O(1)</div><div class="nfz-s">inbox pre-built</div></div></div></div>
  <div class="nfz-sec"><div class="nfz-h">Pull <span class="nfz-tag warn">celebrity · 10M followers</span></div><div class="nfz-flow"><div class="nfz-box warn"><div class="nfz-t">User posts</div></div><div class="nfz-arr">→</div><div class="nfz-box"><div class="nfz-t">Store 1 event</div><div class="nfz-s">O(1) write</div></div><div class="nfz-arr">→</div><div class="nfz-box warn"><div class="nfz-t">Read merges live</div><div class="nfz-s">sort accounts followed (slow)</div></div></div></div>
  <div class="nfz-sec"><div class="nfz-h">Hybrid <span class="nfz-tag info">production standard</span></div><div class="nfz-flow"><div class="nfz-box good"><div class="nfz-t">followers &lt; threshold</div><div class="nfz-s">push to inboxes</div></div><div class="nfz-box warn"><div class="nfz-t">celebrity</div><div class="nfz-s">pull on read</div></div></div><div class="nfz-note">read → inbox = <b>pre-built rows + celebrity events</b> merged</div></div>
  <div class="nfz-cap"><b>Push the many, pull the few.</b> Pre-populate normal inboxes for O(1) reads; celebrities store once and merge at read time — so the celebrity write explosion never happens.</div>
</div>`},
   {t:'mcq',q:'A user with 10M followers posts. Pure fan-out-on-write means…',o:['O(1) total work','~10M inbox writes from one post','cheaper reads for everyone','no extra cost'],a:1,why:'Push writes one row per follower — fine for hundreds, catastrophic for celebrities. Pull/hybrid avoids the write explosion.'},
   {t:'sort',q:'Which fan-out strategy fits?',buckets:['Fan-out on write (push)','Fan-out on read (pull)'],items:[
     {text:'normal user, ~500 followers',b:0},{text:'celebrity, 10M followers',b:1},{text:'reads must be O(1)',b:0},{text:'writes must stay cheap',b:1}
   ]},
   {t:'mcq',q:'Why does hybrid fan-out win in production?',o:['it never writes any inbox','push keeps normal reads O(1) while pull avoids the celebrity write explosion','it removes the need for a cache','it makes every write strongly consistent'],a:1,why:'Pay write cost where it is cheap (normal users) and read cost where it is cheap (few celebrities), merging both at read time.'},
   {t:'match',q:'Fan-out / notification term → what it does.',pairs:[['Fan-out on write','Pre-populate every follower inbox'],['Fan-out on read','Store once, build the feed at read time'],['Hybrid','Push normal users, pull celebrities'],['Celebrity post','Where pure push explodes']]},
   {t:'recall',q:'Walk fan-out on write vs read, and when you go hybrid.',model:['Write (push): write each follower’s inbox on post → O(1) reads, but a celebrity post explodes into millions of writes.','Read (pull): store the post once, assemble feeds at read time → O(1) writes, but slow reads that grow with accounts followed.','Hybrid: push for normal users, pull for celebrities, merge at read time.']}
  ]},
  {id:'pat-notif',title:'Notification delivery',steps:[
   {t:'teach',h:'One event → many channels',body:[
     {k:'tldr',t:'A notification system routes one event (a like, a payment, a mention) to recipients across channels without spamming them. Separate concern from fan-out: fan-out decides WHO sees it in-feed; delivery decides HOW it reaches them off-app.'},
     {k:'point',i:'📱',t:'<b>Channels</b>: mobile push via APNs (iOS) / FCM (Android) from stored device tokens; email (batch, respect provider limits); SMS (expensive — critical only); in-app via WebSocket/SSE.'},
     {k:'point',i:'🧩',t:'<b>Shape</b>: a notification service batches device tokens and hands off to APNs/FCM — it never blocks the posting request; delivery runs async off a queue.'}
   ]},
   {t:'htmlviz',h:'Notification delivery — reliable, not spammy',
    html:`<style>

<div class="ndz">
  <div class="ndz-sec"><div class="ndz-h">Delivery path</div><div class="ndz-flow"><div class="ndz-box info"><div class="ndz-t">Notification svc</div><div class="ndz-s">batch device tokens</div></div><div class="ndz-arr">→</div><div class="ndz-box"><div class="ndz-t">APNs / FCM</div><div class="ndz-s">iOS · Android</div></div><div class="ndz-arr">→</div><div class="ndz-box good"><div class="ndz-t">Device</div><div class="ndz-s">one clean push</div></div></div></div>
  <div class="ndz-sec"><div class="ndz-h">Two guards before the send</div><div class="ndz-flow"><div class="ndz-box"><div class="ndz-t">Dedup</div><div class="ndz-s">stored notification_id → skip repeats</div></div><div class="ndz-box"><div class="ndz-t">Coalesce</div><div class="ndz-s">"5 liked your post" &gt; 5 pushes</div></div></div><div class="ndz-note">delivery is at-least-once (async workers · APNs retries) → <b>dedup + coalesce</b> before the push</div></div>
  <div class="ndz-cap"><b>Reliable, not spammy.</b> Because delivery is at-least-once, the same notification can fire twice — dedup on a stored id, and collapse bursts into one push. Channels: push (APNs/FCM), email, SMS for critical only, in-app over WebSocket/SSE.</div>
</div>`},
   {t:'mcq',q:'At-least-once push delivery can send the same notification twice. Prevent it with…',o:['fire-and-forget','a stored notification_id checked before sending','more workers','SMS instead of push'],a:1,why:'Dedup on a stored id turns at-least-once into a single user-visible push.'},
   {t:'mcq',q:'"5 people liked your post" should reach the user as…',o:['5 separate pushes','one coalesced push','no push at all','an email only'],a:1,why:'Coalesce bursts into a single notification — better UX and far fewer sends.'},
   {t:'mcq',q:'Why does the notification service hand off to APNs / FCM instead of pushing to phones itself?',o:['they are the OS-owned gateways that actually reach iOS / Android devices','they are cheaper databases','they store the social graph','they replace the queue'],a:0,why:'Apple (APNs) and Google (FCM) own the push channel to their devices; your service batches device tokens and delegates the last hop to them.'},
   {t:'match',q:'Notification term → what it does.',pairs:[['Dedup','Skip a duplicate via stored notification_id'],['Coalesce','Collapse a burst into one push'],['APNs / FCM','OS push gateways (iOS / Android)'],['Device token','Addresses a specific install for push']]},
   {t:'recall',q:'Why is notification delivery at-least-once, and what two guards keep it user-friendly?',model:['Async workers and APNs/FCM retries can deliver the same event more than once → at-least-once, not exactly-once.','Dedup: store a sent notification_id and skip it on a repeat (the idempotency idea applied to delivery).','Coalesce: collapse a burst of events into a single push so the user gets one tap, not twenty.']}
  ]},
  {id:'pat-5',title:'Scaling reads & writes',steps:[
   {t:'teach',h:'Reads copy · writes split',body:[
     {k:'tldr',t:'One mental model: reads are the easy half (copy the data or precompute it ahead of time, accept staleness); writes are the hard half (one source of truth — split it or shape the stream).'},
     {k:'vs',a:{h:'Scale READS — copy & precompute',t:'index → replicas → cache → CDN; denormalize/precompute. Cost: staleness.'},b:{h:'Scale WRITES — one authority',t:'shard, batch/queue, LSM. Cost: complexity.'}},
     {k:'note',t:'<b>Which side is denormalize / precompute?</b> It scales <b>reads</b>, not writes — you do the work ahead of time so reads are cheap. The cost lands on the write path (more copies to keep in sync), so it <b>costs</b> writes but <b>counts as</b> read scaling.'}
   ]},
   {t:'htmlviz',h:'Reads scale by copying · writes scale by splitting',
    html:`<style>
.srw{display:grid;gap:10px}
.srw-cols{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.srw-col{display:grid;gap:7px;align-content:start;padding:11px;border:2px solid var(--color-border-primary);border-radius:14px;background:var(--color-background-secondary)}
.srw-col.r{border-color:var(--color-border-info)}
.srw-col.w{border-color:var(--color-border-warning)}
.srw-ch{font-size:12.5px;font-weight:900;color:var(--color-text-primary);display:flex;align-items:baseline;flex-wrap:wrap;gap:7px}
.srw-cs{font-size:10px;font-weight:800;color:var(--color-text-secondary)}
.srw-step{border:1.5px solid var(--color-border-tertiary);border-radius:10px;background:var(--color-background-primary);padding:7px 9px}
.srw-st{font-size:11.5px;font-weight:800;color:var(--color-text-primary);line-height:1.25}
.srw-sd{font-size:10px;font-weight:600;color:var(--color-text-secondary);line-height:1.3;margin-top:2px}
.srw-cap{font-size:12.5px;color:var(--color-text-secondary);line-height:1.55;padding:10px 13px;background:var(--color-background-secondary);border-radius:12px}
.srw-cap b{color:var(--color-text-primary)}
@media(max-width:460px){.srw-cols{grid-template-columns:1fr}}
</style>
<div class="srw">
  <div class="srw-cols">
    <div class="srw-col r">
      <div class="srw-ch">📖 Scale READS <span class="srw-cs">cheap → heavy</span></div>
      <div class="srw-step"><div class="srw-st">1 · Index</div><div class="srw-sd">scan → lookup; fix the query first</div></div>
      <div class="srw-step"><div class="srw-st">2 · Read replicas</div><div class="srw-sd">route reads to followers; cost = lag</div></div>
      <div class="srw-step"><div class="srw-st">3 · Cache</div><div class="srw-sd">hot keys in memory, sub-ms</div></div>
      <div class="srw-step"><div class="srw-st">4 · CDN / edge</div><div class="srw-sd">static near users; kills cross-region RTT</div></div>
      <div class="srw-step"><div class="srw-st">5 · Precompute / denormalize</div><div class="srw-sd">do read work at write time; cost = heavier writes</div></div>
    </div>
    <div class="srw-col w">
      <div class="srw-ch">✍️ Scale WRITES <span class="srw-cs">one source of truth</span></div>
      <div class="srw-step"><div class="srw-st">Shard by key</div><div class="srw-sd">spread writes; high-cardinality key</div></div>
      <div class="srw-step"><div class="srw-st">Batch + queue</div><div class="srw-sd">absorb bursts, smooth the rate</div></div>
      <div class="srw-step"><div class="srw-st">LSM-tree store</div><div class="srw-sd">random writes → sequential</div></div>
    </div>
  </div>
  <div class="srw-cap"><b>Reads are easy — copy or precompute the data</b> (replicas, caches, CDN, denormalized/materialized views) and accept some staleness. <b>Writes are hard — there is one authority</b>, so you either split it (shard) or smooth the stream (batch/queue, write-optimized store).</div>
</div>`},
   {t:'order',q:'Climb the read-scaling ladder: cheapest → heaviest.',items:['Add an index','Read replicas','Cache hot keys','CDN / edge']},
   {t:'mcq',q:'A query on one table is slow. First move?',o:['add read replicas','add an index for that query','put it behind a CDN','shard the table'],a:1,why:'Most slow reads are a missing index — turn the scan into a lookup before adding hardware or replicas.'},
   {t:'mcq',q:'Read replicas multiply read throughput. The main cost?',o:['writes get slower for everyone','replication lag → possibly stale reads','replicas can’t serve reads','guaranteed data loss'],a:1,why:'Followers lag the leader, so a read can be stale; route a user’s own reads to a fresh source (read-your-writes).'},
   {t:'mcq',q:'A cache gives sub-ms reads. Its main hazard?',o:['it slows every write','invalidation + stampedes on hot keys','it can only store numbers','it forces strong consistency'],a:1,why:'Stale entries and thundering-herd on a hot key — mitigate with TTLs, stale-while-revalidate, or a mutex / single-flight.'},
   {t:'build',q:'Pick the tactics that scale WRITES (not reads).',options:['Shard by a good key','Add read replicas','Batch + queue writes','Add a cache','Denormalize / precompute','LSM-tree storage'],correct:[0,2,5]},
   {t:'cloze',q:'Unmask the write-scaling toolkit.',distract:['cache','denormalize'],text:[
     'You can’t copy your way out of writes, so either split the authority — ',{blank:'shard',alt:['shard by key','partition']},' on a high-cardinality key — or shape the stream: ',
     {blank:'batch',alt:['batch + queue','buffer']},' bursts behind a queue, and use an ',{blank:'LSM',alt:['LSM-tree']},'-tree engine for high ingest.'
   ]},
   {t:'mcq',q:'Why can’t you scale writes just by copying the data?',o:['copies cost too much disk','every write must reach the single source of truth','reads block all writes','replicas are read-only by law'],a:1,why:'You can copy data for reads, but each write must hit the authority — so you split it (shard) or shape the stream (batch/queue, write-optimized store).'},
   {t:'sort',q:'Scales READS or WRITES?',buckets:['Scale reads','Scale writes'],items:[
     {text:'add an index',b:0},{text:'denormalize / precompute',b:0},{text:'cache hot keys',b:0},{text:'shard by a good key',b:1},{text:'batch + queue writes',b:1},{text:'LSM-tree storage engine',b:1}
   ]},
   {t:'cloze',q:'Fill the scaling rule.',distract:['lock','index'],text:[
     'Scale reads by ',{blank:'copying',alt:['copy']},' the data — replicas, ',{blank:'cache',alt:['caches']},', CDN — at the cost of staleness. Scale writes by ',
     {blank:'sharding',alt:['shard','partitioning']},' on a good key, or by ',{blank:'batching',alt:['batch','buffering']},' / shaping the write stream.'
   ]},
   {t:'recall',q:'Why are reads easier to scale than writes?',model:['Reads: data can be copied freely → add replicas, caches, and CDNs and serve from the nearest copy; you can also precompute/denormalize the read shape ahead of time. Cost: staleness (and heavier writes for the precompute).','Writes: there is one source of truth every write must reach → you can’t copy your way out.','So writes scale by splitting the authority (shard by key) or shaping the stream (batch/buffer, write-optimized store).']}
  ]},
  {id:'pat-6',title:'Proximity & geospatial',steps:[
   {t:'teach',h:'"Find things near me"',body:[
     {k:'tldr',t:'Proximity search (Uber, Yelp) needs a geospatial index — divide the map into cells so you ignore the 99.9% that’s far before measuring precisely.'},
     {k:'point',i:'🧭',t:'<b>The geohash trick</b>: encode (lat, lng) so a <em>shared prefix = physical closeness</em> → 2D "near me" becomes a 1-D <b>prefix range scan</b> on a plain index, no special engine.'},
     {k:'point',i:'🔍',t:'<b>Longer prefix = smaller, more precise cell.</b>'}
   ]},
   {t:'htmlviz',h:'Geohash — prefix = proximity, scan the ring, then measure',
    html:`<style>
.gpv{display:grid;gap:10px}
.gpv-legend{display:grid;grid-template-columns:1fr 1fr;gap:6px 12px;font-size:11px;font-weight:700;color:var(--color-text-secondary)}
.gpv-li{display:flex;align-items:center;gap:7px;line-height:1.3}
.gpv-sw{flex:0 0 auto;width:13px;height:13px;border-radius:4px;border:2px solid}
.gpv-sw.ring{background:var(--color-background-info);border-color:var(--color-border-info)}
.gpv-dot{flex:0 0 auto;width:12px;height:12px;border-radius:50%}
.gpv-dot.kept{background:var(--color-text-success)}
.gpv-dot.drop{background:var(--color-text-secondary)}
.gpv-dot.far{background:var(--color-text-tertiary);opacity:.5}
.gpv-cap{font-size:12.5px;color:var(--color-text-secondary);line-height:1.55;padding:10px 13px;background:var(--color-background-secondary);border-radius:12px}
.gpv-cap b{color:var(--color-text-primary)}
.gpv-cap code{font-family:ui-monospace,monospace;font-size:11.5px;color:var(--color-text-primary)}
@media(max-width:460px){.gpv-legend{grid-template-columns:1fr}}
</style>
<div class="gpv">
  <svg viewBox="0 0 300 300" width="100%" style="max-width:330px;display:block;margin:0 auto;height:auto" xmlns="http://www.w3.org/2000/svg">
    <rect x="12" y="12" width="275" height="275" rx="6" fill="var(--color-background-secondary)" stroke="var(--color-border-tertiary)"/>
    <rect x="67" y="67" width="165" height="165" fill="var(--color-background-info)" stroke="var(--color-border-info)" stroke-width="2"/>
    <rect x="122" y="122" width="55" height="55" fill="var(--color-background-success)" stroke="var(--color-border-success)" stroke-width="2"/>
    <g stroke="var(--color-border-tertiary)" stroke-width="1" opacity=".55"><path d="M67 12V287 M122 12V287 M177 12V287 M232 12V287"/><path d="M12 67H287 M12 122H287 M12 177H287 M12 232H287"/></g>
    <circle cx="150" cy="150" r="70" fill="none" stroke="var(--color-text-info)" stroke-width="1.6" stroke-dasharray="5 4"/>
    <g fill="var(--color-text-tertiary)" opacity=".5"><circle cx="38" cy="40" r="3"/><circle cx="262" cy="42" r="3"/><circle cx="40" cy="262" r="3"/><circle cx="150" cy="38" r="3"/></g>
    <g fill="var(--color-text-secondary)"><circle cx="92" cy="98" r="3.2"/><circle cx="208" cy="202" r="3.2"/><circle cx="98" cy="210" r="3.2"/></g>
    <g fill="var(--color-text-success)"><circle cx="134" cy="165" r="3.4"/><circle cx="167" cy="163" r="3.4"/></g>
    <circle cx="150" cy="150" r="4.2" fill="var(--color-text-info)" stroke="var(--color-background-primary)" stroke-width="1.5"/>
    <g font-family="ui-monospace,monospace" font-size="9" font-weight="700" text-anchor="middle">
      <text x="150" y="131" fill="var(--color-text-success)">9q8yy</text>
      <text x="150" y="93" fill="var(--color-text-info)">9q8yz</text>
      <text x="94" y="151" fill="var(--color-text-info)">9q8yw</text>
      <text x="205" y="151" fill="var(--color-text-info)">9q8yx</text>
      <text x="150" y="208" fill="var(--color-text-info)">9q8yv</text>
    </g>
  </svg>
  <div class="gpv-legend">
    <div class="gpv-li"><span class="gpv-sw ring"></span>your cell + 8 neighbors — scanned (1-D prefix range)</div>
    <div class="gpv-li"><span class="gpv-dot kept"></span>inside the radius — kept</div>
    <div class="gpv-li"><span class="gpv-dot drop"></span>in the ring but too far — dropped at exact step</div>
    <div class="gpv-li"><span class="gpv-dot far"></span>far — never fetched</div>
  </div>
  <div class="gpv-cap"><b>Shared prefix = physical closeness.</b> Cells near each other share a geohash prefix (the inner nine all start <code>9q8y…</code>), so "near me" becomes a prefix range scan over your cell + its 8 neighbors. Exact distance then keeps only points inside the radius — the 8-neighbor ring catches points just over your cell’s edge.</div>
</div>`},
   {t:'mcq',q:'Why does a shared geohash prefix make proximity search cheap?',o:['it compresses the coordinates','nearby points share a prefix → 2D proximity becomes a 1-D range scan','it encrypts the location','it returns exact nearest neighbors directly'],a:1,why:'A shared prefix means physical closeness, so an ordinary range scan over a prefix (B-tree / sorted set) gathers nearby points — no special index engine.'},
   {t:'mcq',q:'After the prefix range scan, why still compute exact distance?',o:['the scan is just a coarse filter — it returns a candidate set, not exact neighbors','geohash is usually wrong','to sort the strings alphabetically','distance is free anyway'],a:0,why:'Coarse filter, then precise: the cell scan cheaply discards the far 99.9%, leaving a tiny set to measure exactly and rank by true distance.'},
   {t:'mcq',q:'Why scan the 8 neighboring cells, not just your own?',o:['for redundancy','a point just over your cell’s edge can be closer than ones inside your cell','to balance load','geohash mandates it'],a:1,why:'Cell boundaries are arbitrary — the nearest point may sit just across the edge, so you always include the surrounding ring.'},
   {t:'htmlviz',h:'Three ways to cut the map',
    html:`<style>
.giz{display:grid;gap:10px}

<div class="giz">

    <figure class="giz-fig">
      <div class="giz-ft">Geohash · uniform grid</div>
      <svg viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">

        <g stroke="var(--color-border-tertiary)" stroke-width="1"><path d="M37.5 1V149 M75 1V149 M112.5 1V149"/><path d="M1 37.5H149 M1 75H149 M1 112.5H149"/></g>
        <g fill="var(--color-text-info)"><circle cx="12" cy="16" r="2.6"/><circle cx="26" cy="12" r="2.6"/><circle cx="16" cy="30" r="2.6"/><circle cx="30" cy="28" r="2.6"/><circle cx="20" cy="22" r="2.6"/><circle cx="33" cy="35" r="2.6"/><circle cx="112" cy="26" r="2.6"/><circle cx="126" cy="98" r="2.6"/><circle cx="40" cy="122" r="2.6"/><circle cx="104" cy="128" r="2.6"/></g>
      </svg>
      <div class="giz-fs"><b>Geohash</b>: a fixed, uniform grid — dead simple, lives in any sorted store. But a dense city overloads one cell while the ocean wastes them.</div>
    </figure>
    <figure class="giz-fig">
      <div class="giz-ft">Quadtree · adaptive</div>
      <svg viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="148" height="148" rx="4" fill="var(--color-background-primary)" stroke="var(--color-border-tertiary)"/>
        <rect x="1.5" y="1.5" width="17.25" height="17.25" fill="var(--color-background-info)" opacity=".5"/>
        <g stroke="var(--color-border-tertiary)" stroke-width="1"><path d="M75 1V149 M1 75H149"/><path d="M37.5 1V75 M1 37.5H75"/><path d="M18.75 1V37.5 M1 18.75H37.5"/></g>
        <g fill="var(--color-text-info)"><circle cx="12" cy="16" r="2.6"/><circle cx="26" cy="12" r="2.6"/><circle cx="16" cy="30" r="2.6"/><circle cx="30" cy="28" r="2.6"/><circle cx="20" cy="22" r="2.6"/><circle cx="33" cy="35" r="2.6"/><circle cx="112" cy="26" r="2.6"/><circle cx="126" cy="98" r="2.6"/><circle cx="40" cy="122" r="2.6"/><circle cx="104" cy="128" r="2.6"/></g>
      </svg>
      <div class="giz-fs"><b>Quadtree</b>: recursively splits a cell into four only where points are dense — adapts to skew (cities vs ocean). Fan-out 4 (vs a B-tree's hundreds) makes it deep and pointer-heavy, so it lives in memory and must be rebuilt.</div>
    </figure>
    <figure class="giz-fig">
      <div class="giz-ft">S2 / H3 · hexagons</div>
      <svg viewBox="0 0 150 150" xmlns="http://www.w3.org/2000/svg">

        <g stroke="var(--color-border-info)" stroke-width="1.1" fill="var(--color-background-secondary)">
          <use href="#hx" x="20" y="30"/><use href="#hx" x="54.6" y="30"/><use href="#hx" x="89.2" y="30"/><use href="#hx" x="123.8" y="30"/>
          <use href="#hx" x="37.3" y="60"/><use href="#hx" x="71.9" y="60"/><use href="#hx" x="106.5" y="60"/>
          <use href="#hx" x="20" y="90"/><use href="#hx" x="89.2" y="90"/><use href="#hx" x="123.8" y="90"/>
          <use href="#hx" x="37.3" y="120"/><use href="#hx" x="71.9" y="120"/><use href="#hx" x="106.5" y="120"/>
        </g>
        <g stroke="var(--color-border-info)" stroke-width="1.1" fill="var(--color-background-info)">
          <use href="#hx" x="20" y="90"/><use href="#hx" x="89.2" y="90"/><use href="#hx" x="37.3" y="60"/><use href="#hx" x="71.9" y="60"/><use href="#hx" x="37.3" y="120"/><use href="#hx" x="71.9" y="120"/>
        </g>

        <circle cx="54.6" cy="90" r="2.8" fill="var(--color-text-success)"/>
      </svg>
      <div class="giz-fs"><b>S2 / H3</b>: hierarchical cells; H3's hexagons make all six neighbors (blue) equidistant — no corner-vs-edge ambiguity, why Uber uses it for matching.</div>
    </figure>
  </div>
</div>`},
   {t:'htmlviz',h:'R-tree — index shapes, not just points',
    html:`<style>

        <rect x="68" y="96" width="9" height="7" rx="1.5"/><rect x="82" y="100" width="8" height="7" rx="1.5"/>
        <rect x="104" y="84" width="10" height="9" rx="1.5"/><rect x="118" y="90" width="9" height="9" rx="1.5"/>
      </g>
      <g font-family="ui-monospace,monospace" font-size="9" font-weight="700">
        <text x="11" y="19" fill="var(--color-text-info)">R1</text><text x="123" y="132" fill="var(--color-text-warning)">R2</text>
      </g>
    </svg>
  </figure>
  <div class="rtv-cap"><b>Cells drop points in; R-tree wraps shapes.</b> Geohash / quadtree / S2 / H3 assign each <b>point</b> to a cell. An R-tree wraps objects in nested <b>bounding boxes</b> (dashed leaves → parents R1/R2) that may <b>overlap</b>, so it indexes things with <b>extent</b> — polygons, roads, delivery zones — and search descends only into boxes that intersect your query. It's the index behind relational spatial DBs (PostGIS / GiST).</div>
</div>`},
   {t:'mcq',q:'You must index delivery-zone polygons and ask "which zone contains this point?" Best fit?',o:['a geohash prefix scan','an R-tree (bounding-box index, e.g. PostGIS)','a hash index on zone name','a plain B-tree on latitude'],a:1,why:'Cell systems (geohash/S2/H3) index points into cells; an R-tree indexes shapes by their bounding boxes, so it directly handles containment/overlap of objects with extent.'},
   {t:'match',q:'Geospatial index → its trait.',pairs:[['Geohash','fixed grid, dead simple, any sorted store'],['Quadtree','subdivides only dense areas (city vs ocean)'],['S2 / H3','hierarchical cells; H3 hexagons = equal-distance neighbors'],['R-tree','bounding-box tree; indexes shapes with extent (PostGIS)']]},

   ]},
   {t:'recall',q:'Walk the "find restaurants near me" query end to end.',model:['Geohash the user’s (lat,lng); take that cell + its 8 neighbors as a set of prefix ranges.','Range-scan a B-tree / Redis sorted set for candidates in those cells (coarse filter — drops the far 99.9%).','Compute exact distance on the few hundred candidates, sort, keep within the radius. Right-size: skip the index below ~100k items and just scan.']}
  ]}

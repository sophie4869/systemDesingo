   {t:'mcq',q:'In a Saga, step 3 of 5 fails. What happens?',o:['atomic rollback of all','compensating txns undo steps 1–2','wait for step 3','retry forever'],a:1,why:'Sagas undo completed steps in reverse with compensations — there’s no atomic rollback.'},
   {t:'recall',q:'Explain the 2PC blocking problem in 2 sentences.',model:['After voting "ready", a participant must wait for the coordinator’s decision and can’t abort on its own.','If the coordinator crashes then, participants block (holding locks) until it recovers. That’s the coordinator SPOF.']},
   {t:'teach',h:'Variant: TCC',body:[
     {k:'note',t:'<b>TCC (Try-Confirm-Cancel)</b> is a more structured saga: <b>Try</b> reserves resources (app-level holds, not DB locks), then <b>Confirm</b> commits or <b>Cancel</b> releases — handy when you want to check feasibility up front.'}
   ]}
  ]},
  {id:'txn-2',title:'Isolation & retries',steps:[
   {t:'teach',h:'Isolation levels',body:[
     {k:'tldr',t:'Higher levels kill more anomalies at more cost — know what each one stops.'},
     {k:'point',i:'🩹',t:'<b>Read committed</b>: only committed data (no dirty reads/writes).'},
     {k:'point',i:'🔁',t:'<b>Repeatable read</b>: re-reading a row gives the same value.'},
     {k:'point',i:'📸',t:'<b>Snapshot (MVCC)</b>: consistent snapshot as of txn start; readers never block writers. Gap: <b>write skew</b>.'},
     {k:'point',i:'🔒',t:'<b>Serializable</b>: as if one-at-a-time — the only level that stops write skew & phantoms. <b>SSI</b> = optimistic version (PostgreSQL).'}
   ]},
   {t:'cloze',q:'Fill the isolation blanks.',distract:['phantom','linearizable'],text:[
     'Snapshot Isolation prevents ',{blank:'dirty'},' and ',{blank:'non-repeatable'},' reads but still allows ',
     {blank:'write skew',alt:['write-skew']},'. ',{blank:'SSI'},' detects conflicts and aborts a txn to fix it.'
   ]},
   {t:'mcq',q:'Which level prevents dirty reads but allows non-repeatable reads?',o:['read uncommitted','read committed','repeatable read','serializable'],a:1,why:'Read committed shows only committed data, but a row can change between two reads.'},
   {t:'match',q:'Anomaly → the fix that stops it.',pairs:[['Dirty read','Read Committed'],['Non-repeatable read','Snapshot Isolation'],['Lost update','Compare-and-set / row lock'],['Write skew','Serializable / SSI']]},
   {t:'teach',h:'Making a write safe to retry',body:[
     {k:'tldr',t:'A network can drop the <i>ack</i>, not the write — so the client retries and the write lands twice. Safe-retry = the second attempt has no extra effect.'},
     {k:'keyt',term:'Idempotency key',def:'client attaches a unique key per logical operation; the server records it and ignores a repeat with the same key. Applying twice = applying once.'},
     {k:'keyt',term:'Conditional (compare-and-set) write',def:'"update only if version=N". The first retry that lands succeeds and bumps the version; later duplicates fail the precondition → no-op.'},
     {k:'keyt',term:'Naturally idempotent op',def:'<code>PUT x=5</code> (set to an absolute value) is safe to repeat. <code>x += 1</code> (increment) is NOT — each retry adds again.'},
     {k:'callout',c:'warn',t:'Anti-patterns: a <b>new random ID each retry</b> defeats dedup (every attempt looks new → duplicates). <b>Fire-and-forget</b> has no ack at all — you can’t even tell if a retry is needed, so it’s neither safe nor reliable.'}
   ]},
   {t:'build',q:'Pick ways to make a write safely retryable.',options:['Idempotency key','Conditional (compare-and-set) write','Naturally idempotent PUT','New random ID each retry','Fire-and-forget'],correct:[0,1,2]},
   {t:'teach',h:'Delivery semantics & exactly-once',body:[
     {k:'point',i:'1️⃣',t:'<b>At-most-once</b>: may lose, never duplicate (fire-and-forget).'},
     {k:'point',i:'🔁',t:'<b>At-least-once</b>: never lose, may duplicate → the pragmatic default, but consumers must be idempotent.'},
     {k:'point',i:'🎯',t:'<b>Exactly-once</b>: each effect happens once. True exactly-once <i>delivery</i> over a network is impossible (two-generals).'},
     {k:'callout',c:'note',t:'The trick: <b>at-least-once delivery + idempotent consumer = exactly-once effect</b>. Repeats still arrive, but applying twice = applying once, so the observable result is exactly-once — far cheaper than chasing true EO delivery.'}
   ]},
   {t:'recall',q:'Why is "at-least-once + idempotent consumer" equal to exactly-once?',model:['Networks duplicate and clients retry, so you’ll get repeats (at-least-once).','An idempotent consumer makes repeats harmless — applying twice = applying once.','So the observable effect is exactly-once, far cheaper than true exactly-once delivery.']}
  ]}
 ],

 ]}

{
 id:'conc',title:'Concurrency Control',icon:'🧵',color:'#6366F1',colorD:'#4F46E5',
 blurb:'The anomaly zoo — and how databases stop it.',
 lessons:[
  {id:'conc-1',title:'Anomaly zoo',steps:[
   {t:'teach',h:'Read phenomena',body:[
     {k:'point',i:'🩸',t:'<b>Dirty read</b>: you read another txn’s uncommitted write — if it rolls back, you acted on data that never existed. <i>You see a $0 balance mid-transfer: the debit committed, the credit hasn’t yet.</i> (fix: read committed)'},
     {k:'point',i:'🔁',t:'<b>Non-repeatable read</b> (read skew): a row changes value between two reads in one txn. <i>A backup reads A=$500, a transfer moves $100 to B, then it reads B=$600 → totals $1100.</i> (fix: snapshot isolation)'},
     {k:'point',i:'👻',t:'<b>Phantom</b>: a query’s result set gains/loses rows mid-txn — often the root of write skew. <i>Two users both ask “any booking for room 42 @2pm?” (none), both insert → double-booked.</i> (fix: predicate/index-range locks)'}
   ]},
   {t:'teach',h:'The sneaky write anomalies',body:[
     {k:'keyt',term:'Dirty write',def:'overwrite another txn’s UNCOMMITTED write — two txns interleave writes to one row. e.g. Alice buys a car: listing → Alice, but the invoice goes to Bob. (fix: read committed)'},
     {k:'keyt',term:'Lost update',def:'two read-modify-write cycles on the SAME object; one silently clobbers the other. e.g. counter=42, two requests both read 42 and write 43 → 43, not 44. (fix: CAS / SELECT FOR UPDATE)'},
     {k:'keyt',term:'Write skew',def:'two txns read an overlapping set, write DIFFERENT rows, together breaking an invariant. e.g. two on-call doctors each see the other on call, both clock off → zero on call. (fix: serializable / SSI)'},
     {k:'mnemonic',t:'Dirty = uncommitted. Same object → lost update. Different objects, shared assumption → write skew.'}
   ]},

   ]},

<div class="phv-panel">
  <div class="phv-cols">
    <div class="phv-col"><div class="phv-ct">Txn A (Alice)</div><div class="phv-sql"><span class="kw">SELECT COUNT(*)</span> FROM bookings\n<span class="kw">WHERE</span> room=<span class="hl">42</span> <span class="kw">AND</span> time=<span class="hl">'2pm'</span>;\n\n<span class="hl">→ 0 (slot free)</span></div></div>

{
 id:'part',title:'Partitioning',icon:'🧩',color:'#14B8A6',colorD:'#0E8C7F',
 blurb:'Split data across nodes to scale — without hot spots.',
 lessons:[
  {id:'part-1',title:'How to split',steps:[
   {t:'teach',h:'Range vs hash',body:[
     {k:'vs',a:{h:'Range',t:'contiguous key ranges. Great for range scans — but timestamp keys = hot partition.'},b:{h:'Hash',t:'even spread, no range scans (scatter-gather).'}},
     {k:'callout',c:'warn',t:'Sharding by current timestamp sends all writes to one partition — a classic hot shard.'}
   ]},
   {t:'sort',q:'Range or hash partitioning?',buckets:['Range','Hash'],items:[
     {text:'fast time-range scans',b:0},{text:'even write spread',b:1},{text:'sorted keys per node',b:0},{text:'no natural range queries',b:1}
   ]},
	   {t:'teach',h:'Consistent hashing',body:[
	     {k:'tldr',t:'Place nodes + keys on a ring; a key goes to the next node clockwise.'},
	     {k:'point',i:'➕',t:'Add/remove a node → only ~1/N of keys move (not everything).'},
	     {k:'point',i:'⚖️',t:'<b>Virtual nodes</b> spread each machine around the ring for even load.'}
	   ]},
	   {t:'htmlviz',h:'Consistent hashing — play with the ring',
    html:`<style>
.chr-wrap{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-start}
.chr-svg{width:220px;height:220px;flex:0 0 auto}
.chr-side{flex:1;min-width:158px}
.chr-controls{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.chr-controls button{font:inherit;font-weight:800;font-size:12px;padding:6px 10px;border-radius:8px;border:1.5px solid var(--color-border-primary);background:var(--color-background-secondary);color:var(--color-text-primary);cursor:pointer}
.chr-controls button:hover{filter:brightness(.97)}
.chr-controls button.on{background:var(--color-text-info);color:#fff;border-color:var(--color-text-info)}
.chr-stat{font-size:12.5px;color:var(--color-text-secondary);line-height:1.6;margin-bottom:9px}
.chr-stat b{color:var(--color-text-primary)}
.chr-load{display:flex;flex-direction:column;gap:5px}
.chr-lrow{display:flex;align-items:center;gap:7px;font-size:11.5px;color:var(--color-text-secondary)}
.chr-cdot{width:11px;height:11px;border-radius:50%;flex:0 0 auto}
.chr-bar{height:9px;border-radius:5px;flex:0 0 auto;transition:width .3s}
.chr-ex{margin-top:11px;font-size:12.5px;color:var(--color-text-secondary);line-height:1.55;padding:10px 13px;background:var(--color-background-secondary);border-radius:var(--border-radius-md)}
.chr-ex b{color:var(--color-text-primary);font-weight:800}
</style>
<div class="chr-wrap">
  <svg class="chr-svg" viewBox="0 0 230 230"></svg>
  <div class="chr-side">
    <div class="chr-controls">
      <button class="chr-add" type="button">+ node</button>
      <button class="chr-del" type="button">- node</button>
      <button class="chr-vn" type="button">virtual nodes</button>
    </div>
    <div class="chr-stat"></div>
    <div class="chr-load"></div>
  </div>
</div>
<div class="chr-ex">Each key (outer dot) is owned by the <b>first node clockwise</b>. <b>Add / remove a node</b> and watch how few keys change colour — only the arc beside the change moves (~1/N), where <code>hash%N</code> would recolour nearly all of them. Toggle <b>virtual nodes</b> to give each machine several ring positions and smooth the load bars.</div>`,
    setup:function(root){
      var cx=115,cy=115,R=80;
      var PAL=['#14B8A6','#6366F1','#F59E0B','#EF4444','#8B5CF6','#EC4899'];
      var BASE={A:50,B:170,C:290,D:110,E:230,F:350},LBL=['A','B','C','D','E','F'];
      var KEYS=[8,22,38,55,78,95,118,142,168,188,205,228,255,278,300,318,338,352];
      var n=3,vnodes=false,prev=null;
      var svg=root.querySelector('.chr-svg'),statEl=root.querySelector('.chr-stat'),loadEl=root.querySelector('.chr-load'),vnBtn=root.querySelector('.chr-vn');
      function nodes(){var a=[];for(var i=0;i<n;i++)a.push({label:LBL[i],color:PAL[i]});return a;}
      function posOf(nd){return vnodes?[0,1,2].map(function(j){return (BASE[nd.label]+j*137)%360;}):[BASE[nd.label]];}
      function xy(a,rad){var t=(a-90)*Math.PI/180;return [cx+rad*Math.cos(t),cy+rad*Math.sin(t)];}
      function render(){
        var nd=nodes(),positions=[];
        nd.forEach(function(node,ni){posOf(node).forEach(function(a,vi){positions.push({a:a,ni:ni,vi:vi});});});
        var owners=KEYS.map(function(k){var best=0,bd=1e9;positions.forEach(function(p){var d=((p.a-k)%360+360)%360;if(d<bd){bd=d;best=p.ni;}});return best;});
        var sorted=positions.slice().sort(function(a,b){return a.a-b.a;});
        function arc(a1,a2,rad){var p1=xy(a1,rad),p2=xy(a2,rad),delta=((a2-a1)%360+360)%360,lg=delta>180?1:0;return 'M'+p1[0]+' '+p1[1]+' A '+rad+' '+rad+' 0 '+lg+' 1 '+p2[0]+' '+p2[1];}
        var s='<circle cx="'+cx+'" cy="'+cy+'" r="'+R+'" fill="none" stroke="var(--color-border-tertiary)" stroke-width="1"/>';
        sorted.forEach(function(p,i){var prev=sorted[(i-1+sorted.length)%sorted.length];s+='<path d="'+arc(prev.a,p.a,R)+'" fill="none" stroke="'+nd[p.ni].color+'" stroke-width="6" opacity="0.85"/>';});
        positions.forEach(function(p){
          var node=nd[p.ni],d=xy(p.a,R),label=vnodes?node.label+(p.vi+1):node.label,rad=vnodes?8.5:11,fs=vnodes?7.5:12,dy=vnodes?2.7:4;
          s+='<circle cx="'+d[0]+'" cy="'+d[1]+'" r="'+rad+'" fill="'+node.color+'" stroke="#fff" stroke-width="2"/><text x="'+d[0]+'" y="'+(d[1]+dy)+'" text-anchor="middle" font-size="'+fs+'" font-weight="800" fill="#fff">'+label+'</text>';
        });
        KEYS.forEach(function(k,i){var d=xy(k,R+14);s+='<circle cx="'+d[0]+'" cy="'+d[1]+'" r="4.5" fill="'+nd[owners[i]].color+'"/>';});
        svg.innerHTML=s;
        var moveTxt='';
        if(prev){var moved=0;for(var i=0;i<owners.length;i++)if(nd[owners[i]].label!==prev[i])moved++;var pct=Math.round(moved/owners.length*100);moveTxt=' &middot; <b style="color:'+(moved?'var(--color-text-info)':'var(--color-text-success)')+'">'+moved+'/'+owners.length+' keys moved ('+pct+'%)</b>';}
        prev=owners.map(function(o){return nd[o].label;});
        statEl.innerHTML='<b>'+n+'</b> nodes &middot; <b>'+KEYS.length+'</b> keys'+(vnodes?' &middot; 3 vnodes each':'')+moveTxt;
        var counts=nd.map(function(){return 0;});owners.forEach(function(o){counts[o]++;});
        var mx=Math.max.apply(null,counts)||1;
        loadEl.innerHTML=nd.map(function(node,ni){var w=Math.round(counts[ni]/mx*80)+12;return '<div class="chr-lrow"><span class="chr-cdot" style="background:'+node.color+'"></span>Node '+node.label+'<span class="chr-bar" style="width:'+w+'px;background:'+node.color+'"></span>'+counts[ni]+'</div>';}).join('');
      }
      root.querySelector('.chr-add').onclick=function(){if(n<6){n++;render();}};
      root.querySelector('.chr-del').onclick=function(){if(n>2){n--;render();}};
      vnBtn.onclick=function(){vnodes=!vnodes;vnBtn.classList.toggle('on',vnodes);prev=null;render();};
      render();
    }},

   {t:'teach',h:'Choosing a good partition key',body:[

   {t:'sort',nu:true,q:'Good shard key, or hot-spot / few-shards risk?',buckets:['Good key','Risky key'],items:[

  {id:'part-2',title:'Indexes & routing',steps:[
   {t:'teach',h:'Secondary indexes',body:[
     {k:'vs',a:{h:'Local (per-shard)',t:'write is local + fast; read = scatter-gather all shards. (MongoDB)'},b:{h:'Global (by term)',t:'read hits one shard; write updates many, often async. (DynamoDB GSI)'}},
     {k:'note',t:'<b>In DynamoDB specifically:</b> <b>Main table</b> — stored & ordered by partition key + sort key. <b>LSI</b> — same partition key, different sort key, stored <i>within the same partition</i> (shares its storage). <b>GSI</b> — a fully separate copy repartitioned by a different key; essentially a new table behind the scenes, which is why it updates async.'},
     {k:'html',h:'<div class="dyn2"><div class="dyn2-cols">'+
       '<div class="dyn2-col c-main"><div class="dx-head">Main table</div><div class="dx-pk">PK: follower_id</div>'+
       '<table class="dx-tbl"><thead><tr><th>follower_id</th><th>followee_id</th></tr></thead><tbody>'+
       '<tr class="dx-part"><td colspan="2">Partition: alice</td></tr><tr><td>alice</td><td>bob</td></tr><tr><td>alice</td><td>carol</td></tr><tr><td>alice</td><td>dan</td></tr>'+
       '<tr class="dx-part"><td colspan="2">Partition: bob</td></tr><tr><td>bob</td><td>alice</td></tr><tr><td>bob</td><td>carol</td></tr></tbody></table>'+
       '<div class="dx-q">✓ who does alice follow?</div></div>'+
       '<div class="dyn2-col c-lsi"><div class="dx-head">LSI</div><div class="dx-pk">PK: follower_id · sort: created_at</div>'+
       '<table class="dx-tbl"><thead><tr><th>follower_id</th><th>created_at</th></tr></thead><tbody>'+
       '<tr class="dx-part"><td colspan="2">Partition: alice — same</td></tr><tr><td>alice</td><td>2024-01-01</td></tr><tr><td>alice</td><td>2024-03-10</td></tr><tr><td>alice</td><td>2024-07-22</td></tr>'+
       '<tr class="dx-part"><td colspan="2">Partition: bob — same</td></tr><tr><td>bob</td><td>2024-02-14</td></tr><tr><td>bob</td><td>2024-05-30</td></tr></tbody></table>'+
       '<div class="dx-q">✓ who did alice follow most recently?</div></div>'+
       '<div class="dyn2-col c-gsi"><div class="dx-head">GSI</div><div class="dx-pk">PK: followee_id</div>'+
       '<table class="dx-tbl"><thead><tr><th>followee_id</th><th>follower_id</th></tr></thead><tbody>'+
       '<tr class="dx-part"><td colspan="2">Partition: carol — new</td></tr><tr><td>carol</td><td>alice</td></tr><tr><td>carol</td><td>bob</td></tr>'+
       '<tr class="dx-part"><td colspan="2">Partition: alice — new</td></tr><tr><td>alice</td><td>bob</td></tr>'+
       '<tr class="dx-part"><td colspan="2">Partition: bob — new</td></tr><tr><td>bob</td><td>alice</td></tr></tbody></table>'+
       '<div class="dx-q">✓ who follows carol?</div></div></div>'+
       '<div class="dx-cap">LSI = same partitions, re-sorted · GSI = full copy, repartitioned by followee_id</div>'+
       '<div class="dx-why"><div class="dx-why-h">Why followee_id works as a GSI partition key</div>'+
       '<p>High cardinality — every user can be a followee, so rows spread evenly across many partitions.</p>'+
       '<p>The main table cannot answer "who follows carol?" without a scatter-gather — carol followers are spread across many follower partitions. The GSI groups them under one partition key.</p></div></div>'}
   ]},
   {t:'mcq',q:'A DynamoDB Global Secondary Index is…',o:['local, scatter-gather','global, often async (can be stale)','always strongly consistent','impossible'],a:1,why:'Global indexes are partitioned by the indexed term and updated asynchronously.'},
   {t:'teach',h:'Request routing — client library vs proxy',body:[
     {k:'tldr',t:'Something must turn a <b>key</b> into <b>"which node owns it"</b> as membership changes. Two separate questions: <b>where</b> the routing logic runs, and <b>how</b> it learns the live topology.'},
     {k:'point',i:'🧭',t:'<b>Where it runs.</b> Either a <b>smart client library</b> linked into the app (it holds the ring/slot map and talks to the owning node directly), or a <b>proxy tier</b> the app points at (the proxy holds the map and forwards). A lightweight third option: <b>any-node redirect</b> — hit any node and get bounced to the owner (Redis Cluster <code>MOVED</code>).'},
     {k:'vs',a:{h:'Client library',t:'The map lives <b>in the app</b> → <b>one hop</b>, no extra infra (e.g. a Redis Cluster client). Cost: every app/language needs the smart client, and a topology change means redeploying clients.'},b:{h:'Proxy tier',t:'Thin clients point at a <b>proxy</b> (Twemproxy, mcrouter, Envoy) that routes. Clients stay dumb + language-agnostic and routing/failover changes in <b>one place</b>. Cost: an extra hop + a tier you must scale and keep available.'}},
     {k:'point',i:'🗺️',t:'<b>How it learns topology.</b> The partition/slot map — who is alive, who owns what — lives in a <b>config service</b> (ZooKeeper / etcd / Consul) that clients or the proxy <b>watch</b> for changes, or spreads by <b>gossip</b> between nodes (Redis Cluster). A hand-edited static list is the rigid simple version.'},
     {k:'note',t:'The same routing happens <b>twice</b>: first pick the <b>shard</b> (partition the key), then within a replicated shard pick the <b>leader</b> for writes or a <b>follower</b> for reads. Its sibling problem is <b>service discovery</b> — finding healthy <i>instances</i> rather than data — via DNS, Consul, Eureka, or Kubernetes Services.'}
   ]},
   {t:'mcq',q:'Your nodes re-shard often and you have apps in 5 languages. Where should routing live?',o:['A smart client library in each app','A proxy tier the apps point at','hash(key) % node_count in each app','One large node, no routing'],a:1,why:'A proxy centralizes routing + failover, so membership changes happen in one place and the thin clients stay language-agnostic — you avoid shipping and redeploying a smart client across 5 stacks. The price is an extra network hop and a proxy tier you must keep highly available.'},
   {t:'teach',h:'Server-side routing & the hybrid',body:[
     {k:'tldr',t:'Routing doesn’t have to live in the client or a proxy — the <b>cluster itself</b> can route. A client hits <i>any</i> node, which either <b>redirects</b> or <b>forwards</b>.'},
     {k:'point',i:'↩️',t:'<b>Redirect</b> — the node replies "not me, go to N3"; the client reconnects and retries. The server stays <b>off the data path</b> (cheap for it) but you pay an <b>extra round trip</b>. Redis Cluster <code>MOVED</code>, HTTP 302, DNS-based load balancing, the HDFS NameNode handing back DataNode addresses.'},
     {k:'point',i:'➡️',t:'<b>Forward / coordinate</b> — the receiving node relays to the owner and returns the result (it acts as a <b>coordinator</b>). <b>One client hop</b>, but the coordinator sits <b>in the data path</b> and bears the relay cost. Cassandra / Dynamo coordinator nodes; a proxy load balancer.'},
     {k:'callout',c:'mem',t:'<b>Same split as load balancing:</b> redirect = "go there yourself" (DNS / 302 / <code>MOVED</code>, off the data path); forward = "I’ll relay it" (proxy LB / coordinator, in the data path).'},
     {k:'point',i:'🔀',t:'<b>The common hybrid:</b> the cluster <b>hands out the map</b>, a smart client <b>caches it and routes directly</b>, and a stale-map error bounces it to refresh. Best of both — no proxy tier, no per-request redirect tax. Kafka (fetch partition→leader metadata, then connect direct; <code>NOT_LEADER</code> → refetch) and Redis Cluster smart clients.'}
   ]},

<title id="srvt">Server-side routing: redirect vs forward</title>
<desc id="srvd">Redirect: the client asks any node, gets bounced to the owner, and retries there — the first node stays off the data path. Forward: any node acts as coordinator, relays to the owner, and returns the result in one client hop.</desc>

<div class="srv-cap"><b>Redirect</b> (Redis <code>MOVED</code>, DNS LB, HTTP 302) — any node bounces you to the owner; you retry. The server never touches the data, but it costs a round trip. <b>Forward / coordinate</b> (Cassandra coordinator, proxy LB) — any node relays to the owner and returns the result: one client hop, but the coordinator sits in the data path. <b>Hybrid</b> — the cluster publishes the map and a smart client routes directly, refreshing on a stale-map error.</div>`},
   {t:'mcq',q:'Redis Cluster MOVED vs a Cassandra coordinator — the key difference?',o:['MOVED is always faster','Redirect keeps the server off the data path (client retries); a coordinator forwards and is in the data path','They’re identical','Coordinators can’t replicate'],a:1,why:'Redirect (MOVED) bounces the client to the owner and the first node never touches the data — so it costs an extra round trip. A coordinator forwards to the owner and relays the response, so it’s one client hop but the coordinator sits in the data path.'},
   {t:'recall',q:'Name the ways a request can reach the right node for a key.',model:['<b>Client library</b> — smart client holds the map, talks direct (1 hop; every app/language needs the client).','<b>Proxy tier</b> — a middle tier routes (extra hop; thin clients, centralized routing/failover, connection fan-in).','<b>Server-side redirect</b> — any node bounces you to the owner; client retries (server off the data path; +1 round trip; Redis <code>MOVED</code>).','<b>Server-side forward / coordinate</b> — any node relays to the owner (1 client hop; coordinator in the data path; Cassandra).','<b>Hybrid</b> — the cluster hands out the map, a smart client caches + routes directly, refreshing on a stale-map error (Kafka, Redis Cluster).','Topology source either way: a config service (ZooKeeper/etcd) that’s watched, or gossip.']}
  ]}
 ],

 id:'model',title:'Encoding & APIs',icon:'🔌',color:'#0EA5E9',colorD:'#0284C7',
 blurb:'Wire formats, schema evolution, API protocols, and auth.',
 lessons:[
  {id:'model-2',title:'Encoding & evolution',steps:[
   {t:'teach',h:'Wire formats',body:[
     {k:'vs',a:{h:'JSON/XML',t:'human-readable, verbose, weak typing. Easy but big.'},b:{h:'Avro / Protobuf / Thrift',t:'compact binary + a schema; fast and small.'}},
     {k:'note',t:'A schema registry lets producers and consumers evolve independently.'}
   ]},
   {t:'teach',h:'Compatibility',body:[
     {k:'keyt',term:'Backward compatible',def:'NEW code can read OLD data. (add fields with defaults)'},
     {k:'keyt',term:'Forward compatible',def:'OLD code can read NEW data. (ignore unknown fields)'}
   ]},
   {t:'match',q:'Encoding / compatibility → which?',pairs:[['Human-readable, verbose','JSON / XML'],['Compact binary + schema','Avro / Protobuf'],['New code reads OLD data','Backward compatible'],['Old code reads NEW data','Forward compatible']]},
   {t:'cloze',q:'Fill the evolution blanks.',distract:['eventual','strong'],text:[
     {blank:'Backward',alt:['backward']},' compatibility = new code reads OLD data; ',{blank:'Forward',alt:['forward']},
     ' = old code reads NEW data. Binary formats like ',{blank:'Avro',alt:['Protobuf','protobuf','avro']},' give compact encoding plus safe schema evolution.'
   ]},
   {t:'mcq',q:'Adding a new OPTIONAL field with a default keeps you…',o:['only backward compatible','backward AND forward compatible','incompatible','strongly consistent'],a:1,why:'New readers use the default for old data (backward); old readers ignore the new field (forward).'},
   {t:'recall',q:'Define backward vs forward compatibility.',model:['Backward: new code can read data written by old code (you can upgrade readers first).','Forward: old code can read data written by new code (you can upgrade writers first). Rolling upgrades need both.']}
  ]},
  {id:'model-4',title:'API design',steps:[
   {t:'teach',h:'REST vs gRPC vs GraphQL',body:[
     {k:'point',i:'🌐',t:'<b>REST/JSON</b>: simple, cacheable, universal. Default for public/external APIs. Can over/under-fetch.'},
     {k:'point',i:'⚡',t:'<b>gRPC</b> (HTTP/2 + protobuf): compact, fast, streaming, typed contracts. Great <b>internal</b> service-to-service.'},
     {k:'point',i:'🔮',t:'<b>GraphQL</b>: client picks exactly the fields → no over-fetch, one round trip for nested data. Cost: server complexity, caching is harder.'}
   ]},
   {t:'teach',h:'Pagination',body:[
     {k:'vs',a:{h:'Offset pagination',t:'LIMIT/OFFSET — simple, but slow deep in the list and items shift as data changes.'},b:{h:'Cursor (keyset)',t:'page by "after id/timestamp X" — stable + fast at scale. Use for feeds.'}},
     {k:'point',i:'📜',t:'Return an opaque <b>next_cursor</b> in each page; the client passes it back. It encodes the last (sort_key, id) seen — never expose raw DB offsets.'}
   ]},
   {t:'sort',q:'Which API style fits?',buckets:['gRPC','GraphQL'],items:[
     {text:'internal microservice RPC','b':0},{text:'mobile client avoiding over-fetch','b':1},{text:'low-latency streaming between services','b':0},{text:'one call for deeply nested data','b':1}
   ]},
   {t:'mcq',q:'Feeds should paginate with…',o:['offset/LIMIT','cursor (keyset)','random sampling','no pagination'],a:1,why:'Cursor/keyset pagination is stable when data shifts and stays fast deep in the list, unlike OFFSET.'},
   {t:'cloze',q:'Fill the API blanks.',distract:['SOAP','UDP'],text:[
     {blank:'REST',alt:['rest']},' is the universal default; ',{blank:'gRPC',alt:['grpc']},' (protobuf/HTTP2) suits fast internal RPC; ',{blank:'GraphQL',alt:['graphql']},
     ' lets clients pick fields to avoid over-fetching. Page feeds with a ',{blank:'cursor',alt:['keyset','cursor (keyset)']},', not an offset.'
   ]},
   {t:'recall',q:'When would you pick REST vs gRPC vs GraphQL?',model:['REST/JSON: public/external APIs — simple, cacheable, universal (can over/under-fetch).','gRPC: internal service-to-service — compact protobuf over HTTP/2, typed, supports streaming.','GraphQL: client-driven field selection to avoid over-fetch and collapse nested round-trips — at the cost of server/caching complexity.']}
  ]},
  {id:'model-5',title:'Auth',steps:[
   {t:'teach',h:'Authn vs Authz',body:[
     {k:'point',i:'🪪',t:'<b>Authentication</b> = who you are (prove identity). <b>Authorization</b> = what you may do (scopes/roles). Validate <em>and</em> scope <b>every</b> request — both, every time.'},
     {k:'note',t:'Always derive the current user from the <b>verified token</b>, never from the request body. A <b>user_id</b> in the payload is attacker-controlled — identity must come from a signed JWT or a session lookup.'}
   ]},
   {t:'teach',h:'The four auth methods',body:[
     {k:'tldr',t:'Pick by statefulness and who’s calling: <b>Session</b> (opaque token in Redis — revocable, server-rendered) · <b>JWT</b> (signed claims — stateless, short TTL + refresh) · <b>API key</b> (server-to-server/B2B — store only a hash) · <b>OAuth 2.0 / OIDC</b> (delegated, scoped third-party access). Drill the fit below.'}
   ]},
   {t:'match',q:'Auth method → when to use it.',pairs:[
     ['Server-rendered web app, instant logout/revoke','Session token (Redis)'],
     ['Stateless microservices, no per-request DB lookup','JWT'],
     ['Server-to-server / B2B integration','API key (store hash)'],
     ['Let a third-party app act for a user','OAuth 2.0']
   ]},
   {t:'mcq',q:'A JWT can\'t be revoked before it expires. The standard fix?',o:['store it in Redis','short TTL + a refresh token','make it longer-lived','sign it twice'],a:1,why:'Keep access tokens short-lived (5–15 min) so a leaked one expires fast; a longer-lived refresh token mints new ones and can itself be revoked.'},
   {t:'mcq',q:'The current user should come from…',o:['the request body','the verified auth token','a path param','client-typed input'],a:1,why:'Identity must come from something the server verified (a signed JWT or a session lookup) — never a field the client controls.'},
   {t:'recall',q:'Session vs JWT vs API key vs OAuth — one line each.',model:['Session: opaque token in Redis/DB, looked up each request — instantly revocable, stateful.','JWT: signed self-contained claims — stateless, no lookup, but not revocable before expiry (short TTL + refresh).','API key: long-lived secret for server-to-server / B2B — store only a hash.','OAuth 2.0: delegated, scoped access for third-party apps without sharing the password.']}
  ]}
 ],
 boss:{title:'Encoding & APIs Boss',time:80,q:[
   {q:'Avro/Protobuf give…',o:['human-readable text','compact binary + schema','no typing','no evolution'],a:1},
   {q:'New code reads old data =',o:['forward compat','backward compat','no compat','strong consistency'],a:1},
   {q:'A schema registry enables…',o:['faster disks','independent producer/consumer evolution','encryption','sharding'],a:1},
   {q:'Best for fast internal service-to-service RPC?',o:['REST/JSON','gRPC','GraphQL','SOAP'],a:1},
   {q:'Feeds should paginate with…',o:['offset/LIMIT','cursor (keyset)','random','no paging'],a:1},
   {q:'JWTs are stateless but…',o:['always encrypted','not revocable before expiry','slow to verify','user-specific only'],a:1},
   {q:'The current user should come from…',o:['the request body','the verified auth token','a query param','client input'],a:1}
 ]}

 id:'db',title:'Databases',icon:'🗃️',color:'#0891B2',colorD:'#0E7490',
 blurb:'Pick a store by access pattern, then shape keys & indexes to match.',
 lessons:[
  {id:'model-1',title:'Pick a model',steps:[
   {t:'teach',h:'Three shapes of data',body:[
     {k:'point',i:'🧱',t:'<b>Relational</b>: tables + joins. Great for many-to-many and ad-hoc queries.'},
     {k:'point',i:'📄',t:'<b>Document</b>: nested JSON per entity. Great for one-to-many, locality, flexible schema.'},
     {k:'point',i:'🕸️',t:'<b>Graph</b>: nodes + edges. Great for many-to-many, multi-hop traversals.'}
   ]},
   {t:'match',q:'Match the model to its sweet spot.',pairs:[['Relational','Many-to-many + joins'],['Document','Self-contained nested record'],['Graph','Multi-hop relationships']]},
   {t:'mcq',q:'Highly connected data with multi-hop queries (social graph, fraud rings) suits…',o:['document','graph','key-value','column'],a:1,why:'Graph DBs make multi-hop traversals cheap; the same in SQL means many recursive joins.'},
   {t:'teach',h:'Normalize vs denormalize',body:[
     {k:'cause',a:'Denormalize (duplicate data)',b:'Faster reads, but harder writes + consistency'},
     {k:'note',t:'Normalize for write integrity; denormalize for read speed. Most systems do both, per access pattern.'}
   ]},
   {t:'htmlviz',h:'Choosing a database by access pattern',
    html:`<style>
.dbv-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}

   {t:'htmlviz',h:'…and what the data physically looks like',
    html:`<style>
.dbsh,.dbsh *{box-sizing:border-box}

.dbsh-card{background:#1e2130;border-radius:10px;padding:16px;border:1px solid #2d3148;min-width:0}
.dbsh-title{font-weight:bold;margin-bottom:4px}
.dbsh-title .sub{color:#475569;font-weight:normal}
.dbsh-desc{font-size:11px;color:#64748b;margin-bottom:12px;line-height:1.5}
.dbsh-inner{background:#131520;border-radius:6px;padding:12px}
.dbsh-note{margin-top:10px;color:#475569;font-size:10px;line-height:1.8}
.dbsh-kv{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.dbsh-k{background:#1d4ed8;color:#bfdbfe;padding:2px 8px;border-radius:4px;min-width:110px;text-align:center;font-size:11px}
.dbsh-arrow{color:#475569}
.dbsh-v{background:#1e3a5f;color:#93c5fd;padding:2px 8px;border-radius:4px;flex:1;min-width:0;font-size:11px;overflow-wrap:anywhere}
.dbsh-tbl{width:100%;border-collapse:collapse;font-size:11px;table-layout:fixed}
.dbsh-tbl th{padding:4px 8px;text-align:left;font-size:10px;overflow-wrap:anywhere}
.dbsh-tbl td{padding:4px 8px;overflow-wrap:anywhere}
.dbsh-tcap{color:#475569;font-size:10px;margin-bottom:4px}

@container (max-width:520px){.dbsh-grid{grid-template-columns:1fr}}
</style>
<div class="dbsh">
  <div class="dbsh-grid">

    <div class="dbsh-card">
      <div class="dbsh-title" style="color:#60a5fa">① KV Store <span class="sub">(Redis)</span></div>
      <div class="dbsh-desc">key → opaque value. Lookup by exact key only.</div>
      <div class="dbsh-inner">
        <div class="dbsh-kv"><div class="dbsh-k">user:123</div><div class="dbsh-arrow">→</div><div class="dbsh-v">"{name:alice,age:30}"</div></div>
        <div class="dbsh-kv"><div class="dbsh-k">session:abc</div><div class="dbsh-arrow">→</div><div class="dbsh-v">"eyJhbGci..."</div></div>
        <div class="dbsh-kv"><div class="dbsh-k">counter:likes</div><div class="dbsh-arrow">→</div><div class="dbsh-v">"18492"</div></div>
        <div class="dbsh-note">• DB is blind to value contents<br>• No range scans, no structure<br>• O(1) get/set by key</div>
      </div>
    </div>

    <div class="dbsh-card">
      <div class="dbsh-title" style="color:#fb923c">② DynamoDB <span class="sub">(Wide-KV hybrid)</span></div>
      <div class="dbsh-desc">PK + SK composite key. Structured attrs, no joins.</div>
      <div class="dbsh-inner">
        <table class="dbsh-tbl">
          <thead><tr><th style="background:#7c2d12;color:#fdba74">PK</th><th style="background:#7c2d12;color:#fdba74">SK</th><th style="background:#7c2d12;color:#fdba74">attributes</th></tr></thead>
          <tbody>
            <tr style="border-bottom:1px solid #2a1810"><td style="color:#fb923c;font-weight:bold">USER#u1</td><td style="color:#fbbf24;font-weight:bold">PROFILE</td><td style="color:#94a3b8">name, email</td></tr>
            <tr style="border-bottom:1px solid #2a1810"><td style="color:#fb923c;font-weight:bold">USER#u1</td><td style="color:#fbbf24;font-weight:bold">ORDER#2024…</td><td style="color:#94a3b8">total, status</td></tr>
            <tr style="border-bottom:1px solid #2a1810"><td style="color:#fb923c;font-weight:bold">ORDER#o9</td><td style="color:#fbbf24;font-weight:bold">ORDER#o9</td><td style="color:#94a3b8">total, userId</td></tr>
            <tr style="border-bottom:1px solid #2a1810"><td style="color:#fb923c;font-weight:bold">ORDER#o9</td><td style="color:#fbbf24;font-weight:bold">ITEM#p3</td><td style="color:#94a3b8">qty, price</td></tr>
          </tbody>
        </table>
        <div class="dbsh-note">• Items in same PK = item collection<br>• Query within partition is fast<br>• Cross-partition needs GSI</div>
      </div>
    </div>

    <div class="dbsh-card">
      <div class="dbsh-title" style="color:#a78bfa">③ Bigtable <span class="sub">(Wide-column)</span></div>
      <div class="dbsh-desc">row key → column families → columns → versioned values.</div>
      <div class="dbsh-inner">
        <table class="dbsh-tbl">
          <thead><tr><th style="background:#312e81;color:#c7d2fe">ROW KEY</th><th style="background:#312e81;color:#c7d2fe">COL FAMILY</th><th style="background:#312e81;color:#c7d2fe">COLUMN : VALUE</th></tr></thead>
          <tbody>
            <tr style="border-bottom:1px solid #1e2130"><td style="color:#a78bfa;font-weight:bold">user#123</td><td style="color:#64748b">profile</td><td style="color:#7dd3fc">name : alice</td></tr>
            <tr style="border-bottom:1px solid #1e2130"><td style="color:#a78bfa"></td><td style="color:#64748b">profile</td><td style="color:#7dd3fc">age : 30</td></tr>
            <tr style="border-bottom:1px solid #1e2130"><td style="color:#a78bfa"></td><td style="color:#64748b">activity</td><td style="color:#7dd3fc">last_login : 2026-06 @t3</td></tr>
            <tr style="border-bottom:1px solid #1e2130"><td style="color:#a78bfa;font-weight:bold">user#124</td><td style="color:#64748b">profile</td><td style="color:#7dd3fc">name : bob</td></tr>
          </tbody>
        </table>
        <div class="dbsh-note">• Rows sorted by row key → range scans<br>• Sparse columns per row OK<br>• Versioned: multiple timestamps per cell</div>
      </div>
    </div>

    <div class="dbsh-card">
      <div class="dbsh-title" style="color:#34d399">④ Relational <span class="sub">(Postgres / Spanner)</span></div>
      <div class="dbsh-desc">Fixed schema, typed columns, joins across tables.</div>
      <div class="dbsh-inner">
        <div class="dbsh-tcap">TABLE: users</div>
        <table class="dbsh-tbl" style="margin-bottom:10px">
          <thead><tr><th style="background:#064e3b;color:#6ee7b7">id</th><th style="background:#064e3b;color:#6ee7b7">name</th><th style="background:#064e3b;color:#6ee7b7">email</th></tr></thead>
          <tbody>
            <tr style="border-bottom:1px solid #1a2e25"><td style="color:#34d399;font-weight:bold">1</td><td style="color:#94a3b8">alice</td><td style="color:#94a3b8">a@x.com</td></tr>
            <tr style="border-bottom:1px solid #1a2e25"><td style="color:#34d399;font-weight:bold">2</td><td style="color:#94a3b8">bob</td><td style="color:#94a3b8">b@x.com</td></tr>
          </tbody>
        </table>
        <div class="dbsh-tcap">TABLE: orders</div>
        <table class="dbsh-tbl">
          <thead><tr><th style="background:#064e3b;color:#6ee7b7">id</th><th style="background:#064e3b;color:#6ee7b7">user_id</th><th style="background:#064e3b;color:#6ee7b7">total</th></tr></thead>
          <tbody>
            <tr style="border-bottom:1px solid #1a2e25"><td style="color:#34d399;font-weight:bold">o9</td><td style="color:#fbbf24">1 →FK</td><td style="color:#94a3b8">$42</td></tr>
            <tr style="border-bottom:1px solid #1a2e25"><td style="color:#34d399;font-weight:bold">o10</td><td style="color:#fbbf24">1 →FK</td><td style="color:#94a3b8">$18</td></tr>
          </tbody>
        </table>
        <div class="dbsh-note">• Joins link tables at query time<br>• Every row has same columns<br>• ACID transactions across tables</div>
      </div>
    </div>

  </div>

  <div class="dbsh-spec">
    <div class="dbsh-spec-label">Structure Spectrum</div>
    <div class="dbsh-bar">
      <div class="dbsh-seg" style="background:#1d4ed8;color:#bfdbfe">Redis<small>key→blob</small></div>
      <div class="dbsh-seg" style="background:#92400e;color:#fde68a">DynamoDB<small>PK+SK+attrs</small></div>
      <div class="dbsh-seg" style="background:#312e81;color:#c7d2fe">Bigtable<small>row→cf→col</small></div>
      <div class="dbsh-seg" style="background:#064e3b;color:#6ee7b7">Postgres<small>tables+joins</small></div>
    </div>
    <div class="dbsh-axis"><span>← less structure, more flexible</span><span>more structure, more queryable →</span></div>
  </div>
</div>`},

  ]},
  {id:'model-3',title:'Storage engines',steps:[
   {t:'teach',h:'B-tree vs LSM-tree',body:[
     {k:'point',i:'🌲',t:'<b>B-tree</b>: update in place on a balanced on-disk tree. Random-I/O writes; fast reads + range scans. Read-optimized (Postgres, MySQL).'},
     {k:'point',i:'📥',t:'<b>LSM-tree</b>: buffer writes in memory, flush sequentially to immutable SSTables, compact in the background. Sequential writes = high throughput; reads check multiple levels (Bloom filters help). Write-optimized (Cassandra, RocksDB).'},
     {k:'note',t:'Rule of thumb: write-heavy / ingest → LSM; read-heavy with range scans → B-tree.'}
   ]},

   {t:'teach',h:'Vector clock vs version vector',body:[

    html:`<style>

    setup:function(root,stepper){
      var STEPS=[
        {a:'—',b:'—',act:'',step:'HLC = (l, c)\n  l ≈ physical time\n  c breaks ties within the same millisecond',cap:'Physical clocks repeat or stall within a millisecond. HLC adds a small counter <b>c</b> so timestamps stay strictly ordered while staying close to real time.'},
        {a:'(100, 0)',b:'—',act:'A',step:'Node A — local event, physical = 100ms\n  l = max(0, 100) = 100   → l advanced → c = 0\n  HLC_A = (100, 0)',cap:'A local/send event sets l = max(old l, physical clock). Physical jumped ahead of l, so the counter c resets to 0.'},
        {a:'(100, 0)',b:'(101, 0)',act:'B',step:'Node B receives HLC=(100,0) from A, physical = 101ms\n  l = max(l_B=0, recv_l=100, physical=101) = 101  → l advanced → c = 0\n  HLC_B = (101, 0)',cap:'On receive, l = max(local, message l, physical). 101 is the max and beats both, so c = 0.'},
        {a:'(100, 0)',b:'(101, 1)',act:'B',step:'Two events fire on B in the same millisecond (physical = 101ms)\n  event 1: HLC = (101, 0)\n  event 2: l = max(101, 101) = 101 → l unchanged → c++\n  HLC_B = (101, 1)   ← still strictly ordered',cap:'Physical time did not advance, so l stays 101 and c increments — same-millisecond events still get distinct, ordered stamps.'},
        {a:'(100, 0)',b:'(101, 1)',act:'',step:'Compare HLC_A=(100,0) vs HLC_B=(101,0)\n  l_A < l_B  →  A happened-before B  ✓\n  100ms and 101ms are still meaningful real timestamps  ✓',cap:'Compare l first, then c on a tie. HLC gives a total causal order AND stays close to wall-clock time — unlike Lamport, whose numbers are not real times.'}
      ];
      function panel(s){return '<div class="hlc-panel"><div class="hlc-state">'
        +'<div class="hlc-node'+(s.act==='A'?' bump':(s.a==='—'?' idle':''))+'"><div class="hnm">Node A</div><div class="hval">'+s.a+'</div></div>'
        +'<div class="hlc-node'+(s.act==='B'?' bump':(s.b==='—'?' idle':''))+'"><div class="hnm">Node B</div><div class="hval">'+s.b+'</div></div>'
        +'</div><div class="hlc-box"><div class="hlc-step">'+s.step+'</div><div class="hlc-cap">'+s.cap+'</div></div></div>';}
      root.querySelector('.hlc-host').innerHTML=STEPS.map(panel).join('');
      stepper(root,STEPS.length,{panelClass:'hlc-panel',labels:['HLC = (l, c)','A: local event','B: receives','B: same-ms tie','Compare']});
    }},

{
 id:'trouble',title:'Distributed Trouble',icon:'⚠️',color:'#BE185D',colorD:'#9D174D',
 blurb:'Networks drop, clocks drift, processes pause.',
 lessons:[
  {id:'trouble-1',title:'Networks & clocks',steps:[
   {t:'teach',h:'Unreliable networks',body:[
     {k:'tldr',t:'You can’t tell a lost request from a slow one — a timeout is just a guess.'},
     {k:'point',i:'⏳',t:'Too short = false failures; too long = slow detection. There’s no perfect timeout.'}
   ]},
   {t:'teach',h:'Unreliable clocks',body:[
     {k:'vs',a:{h:'Time-of-day clock',t:'wall-clock; can jump backward on NTP sync. Don’t measure durations with it.'},b:{h:'Monotonic clock',t:'only goes forward; use it for elapsed time / timeouts.'}},
     {k:'callout',c:'warn',t:'Clock skew breaks Last-Write-Wins — a laggy clock can silently drop the newer write.'}
   ]},
   {t:'cloze',q:'Fill the clock blanks.',distract:['vector','logical'],text:[
     'Measure durations with the ',{blank:'monotonic'},' clock, never the ',{blank:'time-of-day',alt:['time of day','wall-clock','wall clock']},
     ' clock which can jump on NTP sync. Clock ',{blank:'skew'},' makes ',{blank:'LWW',alt:['last-write-wins']},' silently drop writes.'
   ]},
   {t:'mcq',q:'To measure how long an operation took, use…',o:['the time-of-day clock','the monotonic clock','a vector clock','NTP directly'],a:1,why:'Monotonic clocks never jump backward; time-of-day can be reset by NTP mid-measurement.'},
   {t:'recall',q:'Time-of-day vs monotonic clock — when each?',model:['Time-of-day: for timestamps/calendar time, but it can jump (NTP) — bad for durations.','Monotonic: always increases — use it for elapsed time, timeouts, and benchmarks.']}
  ]},
  {id:'trouble-2',title:'Pauses & truth',steps:[

     {k:'cause',a:'GC stop-the-world / VM migration / paging',b:'A node freezes, then resumes thinking no time passed'},
     {k:'callout',c:'warn',t:'A paused lock holder can wake up after its lease expired and corrupt data — TTL alone won’t save you.'}
   ]},
   {t:'teach',h:'Truth is decided by majority',body:[
     {k:'point',i:'🗳️',t:'A node can’t trust its own view; a quorum/majority decides what’s true.'},
     {k:'point',i:'🎟️',t:'<b>Fencing tokens</b>: every lock grant gets an increasing number; storage rejects an older token.'}
   ]},
   {t:'mcq',q:'A GC-paused client resumes holding a now-expired lock. What makes writes safe?',o:['a longer TTL','fencing tokens','a faster network','retries'],a:1,why:'Storage rejects writes carrying a token lower than the highest it has seen — the stale holder is fenced out.'},
   {t:'build',q:'Pick real causes of an unexpected multi-second pause.',options:['GC stop-the-world','VM live migration','Memory paging/swapping','A tight CPU loop','SIGSTOP'],correct:[0,1,2,4]},
   {t:'recall',q:'Why is a TTL lock unsafe without fencing tokens?',model:['A paused client’s clock doesn’t advance — it can wake after the lease expired, unaware it’s stale.','Fencing tokens (monotonic per grant) let storage reject the old holder’s writes, preventing corruption.']}
  ]}

{
 id:'msg',title:'Messaging & Streaming',icon:'📨',color:'#58CC02',colorD:'#46a302',
 blurb:'Decouple services and absorb spikes with queues & logs.',
 lessons:[
  {id:'msg-1',title:'Queues vs logs',steps:[
   {t:'teach',h:'Three shapes',body:[
     {k:'tldr',t:'Three ways to move messages — they differ in <b>who receives each message</b> and <b>whether it’s kept</b>.'},
     {k:'point',i:'📨',t:'<b>Queue</b> (SQS/RabbitMQ): each message → <b>one</b> consumer, then it’s gone. Work distribution; no replay.'},
     {k:'point',i:'📣',t:'<b>Pub/Sub</b> (SNS, Redis, Google Pub/Sub): each message is <b>broadcast to every subscriber</b> of a topic — fan-out. Usually ephemeral: a subscriber that’s offline misses it.'},
     {k:'point',i:'🪵',t:'<b>Log</b> (Kafka): append-only + retained; <b>consumer groups</b> give pub/sub <i>and</i> replay by offset. Ordered within a partition (key by user_id). The durable superset.'},
     {k:'callout',c:'warn',t:'<b>A queue isn’t free latency-wise.</b> It adds a hop (enqueue + poll) and decouples timing — perfect for spikes, fan-out, and slow work, but it <b>blows a tight synchronous latency budget</b>. Don’t drop one into a &lt;500ms request path just to "decouple" — the caller now waits on a queue it can’t see.'}
   ]},
   {t:'mcq',q:'Every interested service must receive each event (not split the work between them). Which model?',o:['a queue — one consumer per message','pub/sub (or a log with one consumer group per service) — broadcast to all','a synchronous call to each','a shared database row'],a:1,why:'A queue distributes work (one consumer per message). Pub/Sub broadcasts each message to every subscriber; a Kafka log does the same via one consumer group per service, and adds replay.'},
   {t:'mcq',q:'A request must respond in <500ms. Should you put a queue in its synchronous path?',o:['yes — queues are always faster','no — a queue adds a hop and decouples timing, breaking the latency budget','yes — to add backpressure','only if it’s Kafka'],a:1,why:'Queues shine for spikes / slow work / fan-out (async). In a tight synchronous path they just add latency and hide the wait from the caller.'},
   {t:'teach',h:'Kafka: partitions & offsets',body:[
     {k:'point',i:'👥',t:'<b>Consumer group</b>: each partition → exactly ONE consumer. Parallelism caps at the partition count; extra consumers sit idle. Add partitions to scale out.'},
     {k:'point',i:'📍',t:'Each group tracks the <b>offset</b> it has processed. <i>When</i> you commit it decides your delivery guarantee:'},
     {k:'vs',a:{h:'Commit AFTER processing',t:'at-least-once — a crash reprocesses the message'},b:{h:'Commit BEFORE processing',t:'at-most-once — a crash skips it'}},
     {k:'note',t:'Exactly-once = a Kafka transaction committing the offset + output write atomically.'}
   ]},
   {t:'htmlviz',h:'Kafka partitions — ordering, offsets, and idle consumers',
    html:`<style>
.kfv{display:grid;gap:10px}

</style>
<div class="kfv">
  <div class="kfv-topic">
    <div class="kfv-row"><div class="kfv-p">P0</div><div class="kfv-log"><span class="kfv-msg hot">u7:0</span><span class="kfv-msg hot">u7:1</span><span class="kfv-msg hot">u7:2</span><span class="kfv-msg">u7:3</span></div><div class="kfv-cons">C1<br>offset 3</div></div>
    <div class="kfv-row"><div class="kfv-p">P1</div><div class="kfv-log"><span class="kfv-msg">u9:0</span><span class="kfv-msg">u9:1</span><span class="kfv-msg">u9:2</span></div><div class="kfv-cons">C2<br>offset 2</div></div>
    <div class="kfv-row"><div class="kfv-p">P2</div><div class="kfv-log"><span class="kfv-msg">u4:0</span><span class="kfv-msg">u4:1</span></div><div class="kfv-cons idle">C3 idle</div></div>
  </div>
  <div class="kfv-cap"><b>Ordering is per partition.</b> All events for key u7 land in P0, so C1 sees u7:0 → u7:1 → u7:2. A consumer group can run at most one active consumer per partition; extra consumers sit idle until partitions are added.</div>
  <div class="kfv-cap"><b>Offset commit timing changes semantics.</b> Commit after processing means a crash replays work (at-least-once). Commit before processing means a crash skips work (at-most-once).</div>
</div>`},
   {t:'teach',h:'Kafka: durability & retention',body:[
     {k:'point',i:'🛡️',t:'<b>ISR</b> (in-sync replicas): the replicas — <b>including the leader</b> — currently caught up to the leader. A laggard drops out, then rejoins once it catches up.'},
     {k:'point',i:'🎚️',t:'<code>acks=all</code> + <code>min.insync.replicas</code>: commit only once that many ISR replicas hold the write — the durability ↔ latency knob.'},
     {k:'point',i:'🗄️',t:'<b>Retention</b> keeps messages for a time/size window (replayable); <b>log compaction</b> keeps only the latest value per key.'},
     {k:'callout',c:'warn',t:'<b>Hot partition vs ordering:</b> more partitions = more parallelism, but a hot key serializes onto its one partition. You can’t have global ordering AND high parallelism — pick <b>per-key</b> ordering.'}
   ]},

   {t:'htmlviz',h:'Traditional queue (SQS-style) vs Kafka — side by side',
    html:`<style>
.qkv{display:grid;gap:11px}

<div class="qkv">
  <div class="qkv-cols">
    <div class="qkv-col q"><h4>Traditional queue (SQS / RabbitMQ)</h4><p>Messages <b>compete</b> — any consumer grabs any message. After ack it’s <b>deleted</b>. No replay, no ordering guarantee.</p></div>
    <div class="qkv-col k"><h4>Kafka (log)</h4><p>Partitions are <b>assigned</b> — each consumer owns a slice at its own offset. Messages are <b>never deleted on read</b>; the log is retained N days.</p></div>
  </div>
  <table class="qkv-tbl">
    <thead><tr><th>property</th><th>traditional queue</th><th>Kafka</th></tr></thead>
    <tbody>

      <tr><td class="prop">ordering guarantee</td><td>none</td><td>per partition</td></tr>
      <tr><td class="prop">best for</td><td>tasks, jobs, work queues</td><td>event streams, audit logs</td></tr>

   {t:'mcq',q:'Billing AND analytics must each process every payment event, independently and at their own pace (with replay). Best fit?',o:['one SQS queue both poll','Kafka with one consumer group per service','a queue per message','a database table they both scan'],a:1,why:'On an SQS-style queue consumers compete — a message goes to one of them, not both. Kafka retains the log and gives each consumer group its own offsets, so both services read every event independently and can replay.'},
   {t:'teach',h:'Delivery semantics',body:[
     {k:'point',i:'1️⃣',t:'<b>At-most-once</b>: may lose, never duplicate.'},
     {k:'point',i:'🔁',t:'<b>At-least-once</b>: never lose, may duplicate → need idempotency.'},
     {k:'point',i:'🎯',t:'<b>Exactly-once</b>: hard; usually = at-least-once + idempotent processing.'}
   ]},
   {t:'cloze',q:'Fill the delivery blanks.',distract:['ordered','synchronous'],text:[
     'The pragmatic default is ',{blank:'at-least-once'},' delivery, which can ',{blank:'duplicate'},
     ' messages — so consumers must be ',{blank:'idempotent'},'. True exactly-once over a network is ',{blank:'impossible'},'.'
   ]},
   {t:'mcq',q:'Kafka guarantees ordering…',o:['globally','within a partition only','never','per consumer'],a:1,why:'Order holds within a partition; pick the partition key to keep a key’s events ordered.'},
   {t:'mcq',q:'In a Kafka consumer group, a partition is consumed by…',o:['every consumer','exactly one consumer in the group','the leader only','no one'],a:1,why:'One partition → one consumer per group, so consumer parallelism is bounded by the partition count.'},
   {t:'mcq',q:'A consumer commits its offset BEFORE processing the message. If it crashes mid-process, that message is…',o:['reprocessed (at-least-once)','skipped (at-most-once)','duplicated forever','rolled back'],a:1,why:'Committing before processing means the offset already advanced — a crash skips it (at-most-once). Commit AFTER for at-least-once.'},
   {t:'match',q:'Need → messaging choice.',pairs:[['Replay + many independent readers','Log (Kafka)'],['One consumer per message, work distribution','Queue'],['Must never lose; dupes OK if idempotent','At-least-once'],['Keep one user’s events ordered','Partition by key']]},
   {t:'mcq',q:'Payment events must never be lost (duplicates tolerable if handled). Delivery semantics?',o:['at-most-once','at-least-once + idempotent consumer','fire-and-forget','exactly-once over the wire'],a:1,why:'At-least-once guarantees no loss; an idempotent consumer makes the inevitable duplicates harmless — the cheap path to an exactly-once effect.'},
   {t:'recall',q:'How do systems achieve "exactly-once" in practice?',model:['Use at-least-once delivery plus idempotent processing (or transactional offset+write).','Repeats become harmless, so the observable effect is exactly-once — much cheaper than true EO delivery.']}
  ]},
  {id:'msg-2',title:'Reliability',steps:[
   {t:'teach',h:'Outbox & CDC',body:[
     {k:'cause',a:'Writing DB + publishing event separately',b:'A crash between them = lost/phantom events (dual-write problem)'},
     {k:'point',i:'📦',t:'<b>Outbox</b>: write business row + outbox row in one txn; a relay publishes it.'},
     {k:'point',i:'🔌',t:'<b>CDC</b> tails the DB\'s write-ahead log (WAL) to emit the change stream.'}
   ]},
   {t:'htmlviz',h:'Outbox + CDC — make publish retryable',
    html:`<style>
.obv{display:grid;gap:10px}
.obv-flow{display:grid;grid-template-columns:1fr 30px 1fr 30px 1fr;gap:7px;align-items:center}
.obv-box{min-height:66px;border:2px solid var(--color-border-primary);border-radius:14px;background:var(--color-background-secondary);padding:9px;text-align:center;display:flex;flex-direction:column;justify-content:center;gap:3px}
.obv-box.good{background:var(--color-background-success);border-color:var(--color-border-success)}
.obv-box.warn{background:var(--color-background-warning);border-color:var(--color-border-warning)}
.obv-t{font-size:13px;font-weight:900;color:var(--color-text-primary)}
.obv-s{font-size:11px;font-weight:700;color:var(--color-text-secondary);line-height:1.35}
.obv-arr{text-align:center;color:var(--color-text-tertiary);font-size:22px;font-weight:900}
.obv-cap{font-size:12.5px;color:var(--color-text-secondary);line-height:1.55;padding:10px 13px;background:var(--color-background-secondary);border-radius:12px}
.obv-cap b{color:var(--color-text-primary)}
@media(max-width:460px){.obv-flow{grid-template-columns:1fr}.obv-arr{transform:rotate(90deg)}}
</style>
<div class="obv">
  <div class="obv-flow">
    <div class="obv-box good"><div class="obv-t">1. Local DB txn</div><div class="obv-s">write order row<br>+ outbox row</div></div>
    <div class="obv-arr">→</div>
    <div class="obv-box warn"><div class="obv-t">2. Relay / CDC</div><div class="obv-s">poll outbox or tail WAL<br>publish at-least-once</div></div>
    <div class="obv-arr">→</div>
    <div class="obv-box"><div class="obv-t">3. Broker</div><div class="obv-s">event becomes replayable<br>consumer is idempotent</div></div>
  </div>
  <div class="obv-cap"><b>The atomic part is only the database transaction.</b> If the service crashes after commit, the outbox row is still there. The relay can publish later, retry safely, and mark the row sent.</div>
  <div class="obv-cap">This removes the lost-event crash gap without needing a distributed transaction between the app database and the broker.</div>
</div>`},
   {t:'mcq',q:'The transactional outbox solves…',o:['cache misses','the dual-write problem','leader election','hot keys'],a:1,why:'One local txn writes both the data and the event; a relay/CDC publishes reliably.'},
   {t:'teach',h:'Backpressure',body:[
     {k:'tldr',t:'Consumers can’t keep up → slow the producer, don’t crash.'},
     {k:'vs',a:{h:'Pull (Kafka)',t:'consumers fetch at their own pace — lag just builds, nothing falls over. Backpressure for free.'},b:{h:'Push',t:'needs explicit credit / window flow-control (Reactive Streams, gRPC) or the consumer gets overwhelmed.'}},
     {k:'callout',c:'warn',t:'Never use an <b>unbounded</b> buffer — it just defers the failure to an OOM crash later.'}
   ]},
   {t:'mcq',q:'An unbounded in-memory queue under sustained overload leads to…',o:['graceful backpressure','an OOM crash — failure just deferred','faster processing','exactly-once'],a:1,why:'Unbounded buffers hide the overload until memory runs out. Bound the buffer and pick a block/drop/shed policy.'},
   {t:'teach',h:'Bounded buffers & dead-letter queues',body:[
     {k:'point',i:'🪣',t:'Bound the buffer; when it’s <b>full</b>, choose a policy: <b>block</b> the producer, <b>drop</b> the oldest, or <b>shed</b> load (reject).'},
     {k:'point',i:'☠️',t:'A <b>poison message</b> (always fails) blocks a partition or loops forever. After N retries <b>with backoff</b>, route it to a <b>dead-letter queue</b> for human inspection.'},
     {k:'note',t:'Pair the DLQ with a <b>retry topic</b> to reprocess messages later instead of dropping them.'}
   ]},
   {t:'mcq',q:'A message fails on every attempt (poison). After a few backed-off retries you should…',o:['retry forever','drop it silently','route it to a dead-letter queue for inspection','restart the broker'],a:2,why:'A DLQ unblocks the partition and keeps the bad message for debugging, instead of looping forever or losing it.'},
   {t:'recall',q:'What is the dual-write problem and how does the outbox fix it?',model:['Writing to the DB and a broker separately has no atomicity — a crash leaves them inconsistent.','The outbox writes the row + an event in ONE DB txn; a relay (or CDC) then publishes, at-least-once.']}
  ]},
  {id:'msg-3',title:'Event sourcing & CQRS',steps:[
   {t:'teach',h:'Store events, not state',body:[
     {k:'keyt',term:'Event sourcing',def:'persist the append-only log of events as the source of truth; current state is a fold (replay) of those events.'},
     {k:'point',i:'🕰️',t:'You get a full audit trail and time-travel (rebuild state as of any point) for free.'},
     {k:'callout',c:'warn',t:'Cost: replaying long logs is slow → snapshots; and you must version/evolve event schemas forever.'}
   ]},
   {t:'teach',h:'CQRS',body:[
     {k:'keyt',term:'CQRS',def:'Command Query Responsibility Segregation — separate the write model from one or more read models (projections).'},
     {k:'point',i:'🔭',t:'Writes append events; async projections build query-optimised read views. Reads scale independently — but are eventually consistent.'},
     {k:'note',t:'Often paired with event sourcing, but not required. Don’t reach for either unless audit/temporal needs or read/write asymmetry justify the complexity.'}
   ]},
   {t:'mcq',q:'In event sourcing, the source of truth is…',o:['the current row','the append-only event log','a cache','a snapshot'],a:1,why:'State is derived by replaying the event log; snapshots are just an optimization.'},
   {t:'cloze',q:'Fill the event-sourcing blanks.',distract:['sharding','quorum'],text:[
     {blank:'Event sourcing',alt:['event-sourcing']},' stores the ',{blank:'log',alt:['event log']},' of changes as truth; current state is a ',{blank:'replay',alt:['fold','projection']},
     '. ',{blank:'CQRS',alt:['cqrs']},' splits the write model from read-optimised ',{blank:'projections',alt:['read models','views']},'.'
   ]},
   {t:'recall',q:'What are event sourcing and CQRS, and the main trade-off?',model:['Event sourcing: the append-only event log is the source of truth; state = replay of events → audit trail + time travel.','CQRS: separate write model from read models (projections), so reads scale independently — at the cost of eventual consistency.','Trade-off: more moving parts (snapshots, schema evolution, projection lag) — use only when audit/temporal or read/write asymmetry needs justify it.']}
  ]},
  {id:'msg-4',title:'Queue scenarios',steps:[
   {t:'teach',h:'Scenario 1 · Duplicate delivery',body:[
     {k:'tldr',t:'At-least-once means a message can arrive <b>more than once</b> (crash, retry, network blip). Your consumer must be safe to run twice on the same job.'},
     {k:'cause',a:'Consumer crashes before it acks',b:'Visibility timeout expires → the queue re-delivers the message'},
     {k:'point',i:'🔑',t:'<b>Fix — a dedup store keyed by job_id:</b> before running, check a processed-set (Redis/DB). Seen it? skip + ack. New? run, then record the id.'}
   ]},
   {t:'mcq',q:'A consumer pulls a job, then crashes before ack-ing. What happens to the message?',o:['it is lost','the visibility timeout expires and the queue re-delivers it','it goes straight to the DLQ','it is acked automatically'],a:1,why:'No ack → once the visibility timeout lapses the broker assumes failure and re-delivers. That redelivery is exactly why consumers must be idempotent.'},
   {t:'mcq',q:'Cheapest way to make an at-least-once consumer idempotent?',o:['a distributed lock per message','a processed-set keyed by job_id — skip if already seen','exactly-once delivery','disable retries'],a:1,why:'Record each completed job_id (Redis/DB); on redelivery you see it and skip (ack only). Turns inevitable duplicates into a no-op without needing exactly-once delivery.'},
   {t:'teach',h:'Scenario 2 · Dead-letter queue',body:[
     {k:'tldr',t:'A <b>poison-pill</b> message fails every time. Don’t let it loop forever or block the queue behind it.'},
     {k:'point',i:'🔁',t:'<code>maxReceiveCount</code> (e.g. 3): after N failed deliveries the broker moves it to the <b>DLQ</b> — parked, not lost.'},
     {k:'point',i:'🚨',t:'<b>Alert on DLQ depth &gt; 0</b> (it should normally be empty), then <b>replay</b> after fixing the bug or data.'}
   ]},
   {t:'mcq',q:'A message fails on every attempt. With maxReceiveCount=3, after the 3rd failure it…',o:['is dropped silently','moves to the dead-letter queue','retries forever','blocks the whole queue'],a:1,why:'The DLQ parks the poison message so it stops blocking healthy ones, and keeps it for inspection/replay instead of losing it.'},
   {t:'mcq',q:'Best signal that processing is silently broken?',o:['CPU usage','an alert on DLQ depth > 0','consumer count','average message size'],a:1,why:'A healthy DLQ is empty, so any depth > 0 means messages are failing repeatedly — a crisp, low-noise alarm. Then fix and replay.'},
   {t:'teach',h:'Scenario 3 · Priorities',body:[
     {k:'tldr',t:'You do <b>not</b> group jobs by consumer. Use <b>separate queues per priority</b>; every consumer polls both.'},
     {k:'point',i:'⬆️',t:'Each consumer <b>polls the high-priority queue first</b>; only when it’s empty does it fall back to the low-priority queue. No consumer "owns" a queue.'},
     {k:'callout',c:'warn',t:'One mixed queue lets a backlog of low-priority jobs <b>block</b> urgent ones — the very thing priority is meant to prevent. (Guard against starving the low queue: add aging if needed.)'}
   ]},
   {t:'mcq',q:'You need high- and low-priority jobs. Best design?',o:['one queue, sort by a priority field','separate queue per priority; all consumers poll high-first','one consumer owns high, another owns low','put low-priority jobs in a database'],a:1,why:'Queue-per-priority with every consumer polling high first keeps urgent work ahead without dedicating (and stranding) consumers. A single mixed queue lets low-priority backlog block urgent jobs.'},
   {t:'teach',h:'Scenario 4 · Fan-out (pub/sub)',body:[
     {k:'tldr',t:'One event, many <b>independent</b> consumers — "order placed → email + charge + update inventory."'},
     {k:'point',i:'📣',t:'A topic (SNS) fans one message out into <b>N queues</b>, one per subscriber (email, billing, inventory).'},
     {k:'point',i:'🧱',t:'Each queue is <b>isolated</b> — its own backlog, retries, DLQ. Email being down never blocks billing or inventory.'}
   ]},
   {t:'mcq',q:'Why give each fan-out subscriber its own queue instead of sharing one?',o:['to save money','isolation — each has its own backlog/retries/DLQ, so one slow consumer can’t block the others','to guarantee global ordering','to avoid duplicates'],a:1,why:'Per-subscriber queues decouple failure: a stuck email consumer drains its own queue without holding up billing or inventory. A shared queue couples their fates.'},
   {t:'teach',h:'Scenario 5 · Backpressure',body:[
     {k:'tldr',t:'Producer outruns consumers (1000/s in, 100/s out → +900/s). The queue can’t grow forever — something must give.'},
     {k:'point',i:'📈',t:'<b>Autoscale consumers</b> on <b>queue depth</b> — best for spiky, bursty load.'},
     {k:'point',i:'🚰',t:'<b>Rate-limit the producer</b> — shed load at the source; best when protecting a fragile DB.'},
     {k:'point',i:'🛑',t:'<b>Cap queue depth</b> and reject (429) when full — best for real-time systems where stale work is useless.'}
   ]},
   {t:'htmlviz',h:'Backpressure — three responses + the autoscale signal',
    html:`<style>
.bpv{display:grid;gap:11px}
.bpv-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:9px}
.bpv-card{border:1.5px solid var(--color-border-primary);border-radius:12px;background:var(--color-background-secondary);padding:10px;display:grid;gap:5px;min-width:0;align-content:start}
.bpv-card h4{margin:0;font-size:13px;color:var(--color-text-primary)}
.bpv-card p{margin:0;font-size:11.5px;font-weight:600;color:var(--color-text-secondary);line-height:1.45}
.bpv-tag{justify-self:start;font-size:10px;font-weight:800;border-radius:999px;padding:2px 8px}
.bpv-a{background:var(--color-background-success);color:var(--color-text-success)}
.bpv-b{background:var(--color-background-info);color:var(--color-text-info)}
.bpv-c{background:var(--color-background-warning);color:var(--color-text-warning)}
.bpv-flow{display:flex;align-items:center;gap:7px;flex-wrap:wrap;justify-content:center}
.bpv-node{border:1.5px solid var(--color-border-primary);border-radius:10px;background:var(--color-background-secondary);padding:8px 11px;text-align:center;font-size:11.5px;font-weight:800;color:var(--color-text-primary);min-width:96px}
.bpv-arr{color:var(--color-text-tertiary);font-size:18px;font-weight:900}
.bpv-cap{font-size:12px;color:var(--color-text-secondary);line-height:1.5;padding:9px 12px;background:var(--color-background-secondary);border-radius:10px}
.bpv-cap b{color:var(--color-text-primary)}
@media(max-width:560px){.bpv-grid{grid-template-columns:1fr}}
</style>
<div class="bpv">
  <div class="bpv-grid">
    <div class="bpv-card"><span class="bpv-tag bpv-a">spiky load</span><h4>Autoscale consumers</h4><p>Watch queue depth; spin up workers to drain the backlog.</p></div>
    <div class="bpv-card"><span class="bpv-tag bpv-b">protect the DB</span><h4>Rate-limit producer</h4><p>Slow ingestion — shed load at the source before it piles up.</p></div>
    <div class="bpv-card"><span class="bpv-tag bpv-c">real-time</span><h4>Cap queue depth</h4><p>Reject when full (429 to caller) — stale work is useless.</p></div>
  </div>
  <div class="bpv-flow"><div class="bpv-node">Queue depth<br>&gt; N</div><div class="bpv-arr">→</div><div class="bpv-node">Scaler<br>(k8s / ASG)</div><div class="bpv-arr">→</div><div class="bpv-node">Consumer fleet<br>drains, scales back</div></div>
  <div class="bpv-cap"><b>Queue depth is the autoscaling signal:</b> it directly measures whether consumers are keeping up. Scale out past a threshold, scale back as the backlog drains.</div>
</div>`},
   {t:'match',q:'Backpressure response → when it fits best.',pairs:[['Spiky, bursty load','Autoscale consumers'],['Protect a fragile database','Rate-limit the producer'],['Real-time; stale work is useless','Cap depth + reject (429)']]},
   {t:'mcq',q:'What metric should drive consumer autoscaling for a queue?',o:['CPU only','queue depth (backlog size)','message size','producer count'],a:1,why:'Queue depth directly reflects whether consumers keep up — scale out when depth > N, scale back as it drains. CPU alone misses an I/O-bound backlog.'},
   {t:'teach',h:'Scenario 6 · Delayed / scheduled jobs',body:[
     {k:'tldr',t:'Enqueue now, execute later — "remind me in 3 days", "retry payment in 1 hour". Two patterns, chosen by how far out.'},
     {k:'vs',a:{h:'Queue-native delay',t:'set a per-message delay (SQS ≤ 15 min): the message stays invisible for N seconds, then a consumer picks it up. Simple, but a short horizon.'},b:{h:'Scheduled-jobs table',t:'rows with a run_at timestamp; a poller runs SELECT WHERE run_at ≤ now() and enqueues ready jobs. Any future time.'}},
     {k:'callout',c:'warn',t:'<b>Multiple pollers race.</b> Two pollers can grab the same row and enqueue it twice — use row-level locking (<code>SELECT … FOR UPDATE SKIP LOCKED</code>) so each ready job is claimed by exactly one poller.'}
   ]},
   {t:'mcq',q:'"Retry this payment in exactly 36 hours." Which delay pattern?',o:['queue-native delay (e.g. SQS delay seconds)','a scheduled-jobs table with run_at + a poller','a sleep() inside the consumer','a cron that rescans all payments every minute'],a:1,why:'Queue-native delays cap out short (SQS ≤ 15 min). For an arbitrary future time, store run_at in a jobs table and let a poller enqueue rows once run_at ≤ now().'},
   {t:'mcq',q:'Several poller instances scan the jobs table. How do you avoid enqueuing a job twice?',o:['add more indexes','SELECT … FOR UPDATE SKIP LOCKED so each row is claimed once','run a single poller faster','raise the isolation level only'],a:1,why:'Row-level locking with SKIP LOCKED lets each poller claim a disjoint set of ready rows — no two pollers grab the same job, and they don’t block each other.'},
   {t:'cloze',q:'Fill the queue-scenario blanks.',distract:['sharding','leader'],text:[
     'At-least-once delivery can ',{blank:'duplicate',alt:['repeat']},' a message, so a consumer keyed by ',{blank:'job_id',alt:['id','message id']},' stays idempotent. A poison message that fails ',{blank:'maxReceiveCount',alt:['N','3']},' times is moved to the ',{blank:'DLQ',alt:['dead-letter queue','dead letter queue']},'. To autoscale consumers, scale on ',{blank:'queue depth',alt:['depth','backlog']},'.'
   ]},
   {t:'recall',q:'Name the queue gotchas an interviewer probes, with a one-line answer each.',model:['Duplicate delivery (at-least-once): make the consumer idempotent with a dedup store keyed by job_id; visibility-timeout redelivery is normal.','Poison messages: maxReceiveCount → DLQ (parked, not lost), alert on DLQ depth, replay after fixing.','Priorities: separate queue per priority; all consumers poll high-first, fall back to low.','Fan-out: a topic → one isolated queue per subscriber, so one failure can’t block the others.','Backpressure: autoscale on queue depth, rate-limit the producer, or cap depth + 429 — pick by spiky vs DB-bound vs real-time.','Delayed jobs: queue-native delay for short waits (SQS ≤ 15 min), else a run_at jobs table polled with SELECT … FOR UPDATE SKIP LOCKED.']}
  ]},
  {id:'msg-5',title:'Ordering & durability',steps:[
   {t:'teach',h:'Head-of-line blocking',body:[
     {k:'tldr',t:'You need ordering <i>within</i> a key, but one slow/stuck message shouldn’t stall everything behind it in the same ordered partition.'},
     {k:'cause',a:'msg #1 is stuck (slow / retrying)',b:'#2, #3, #4 behind it all wait — the partition is blocked'},
     {k:'point',i:'🧠',t:'This is the price of per-partition ordering: progress is serial, so the slowest message sets the pace.'}
   ]},
   {t:'teach',h:'Three ways out',body:[
     {k:'keyt',term:'DLQ + skip',def:'after N retries, park msg #1 in the DLQ and advance. Best when you can tolerate gaps.'},
     {k:'keyt',term:'Sequence gating',def:'process later messages out of order but hold their results in a buffer; flush in order once the gap fills. Preserves order, costs memory.'},
     {k:'keyt',term:'Sub-partition',def:'split the hot key finer (e.g. acct_id + day) so a stall has a smaller blast radius.'}
   ]},
   {t:'htmlviz',h:'Sequence gating — buffer until the gap fills',
    html:`<style>
.sgv{display:grid;gap:11px}
.sgv-flow{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.sgv-box{border:1.5px solid var(--color-border-primary);border-radius:11px;background:var(--color-background-secondary);padding:9px 11px;text-align:center;min-width:104px}
.sgv-box.bad{background:var(--color-background-danger);border-color:var(--color-text-danger)}
.sgv-box.info{background:var(--color-background-info);border-color:var(--color-border-info)}
.sgv-box.good{background:var(--color-background-success);border-color:var(--color-border-success)}
.sgv-t{font-size:13px;font-weight:900;color:var(--color-text-primary)}
.sgv-s{font-size:11px;font-weight:700;color:var(--color-text-secondary);margin-top:2px;line-height:1.35}
.sgv-arr{color:var(--color-text-tertiary);font-size:18px;font-weight:900}
.sgv-cap{font-size:12px;color:var(--color-text-secondary);line-height:1.5;padding:9px 12px;background:var(--color-background-secondary);border-radius:10px}
.sgv-cap b{color:var(--color-text-primary)}
@media(max-width:560px){.sgv-flow{flex-direction:column;align-items:stretch}.sgv-arr{transform:rotate(90deg)}}
</style>
<div class="sgv">
  <div class="sgv-flow">
    <div class="sgv-box bad"><div class="sgv-t">msg #1</div><div class="sgv-s">slow / retry</div></div>
    <div class="sgv-arr">→</div>
    <div class="sgv-box"><div class="sgv-t">Consumer</div><div class="sgv-s">processing #1</div></div>
    <div class="sgv-arr">→</div>
    <div class="sgv-box info"><div class="sgv-t">Sequence buffer</div><div class="sgv-s">#2, #3, #4 held here</div></div>
    <div class="sgv-arr">→</div>
    <div class="sgv-box good"><div class="sgv-t">Flush in order</div><div class="sgv-s">once #1 acks → #2, #3, #4 released</div></div>
  </div>
  <div class="sgv-cap"><b>Process ahead, release in order.</b> Later messages are worked on but their results wait in the buffer until the gap (#1) fills, so downstream still sees correct order.</div>
  <div class="sgv-cap"><b>Tradeoff:</b> the buffer costs memory + latency — bound its size. If it fills before #1 acks, treat that as a backpressure signal (stop pulling).</div>
</div>`},
   {t:'mcq',q:'msg #1 is stuck in an ordered partition and #2–#4 are waiting. You must keep order but not lose work. Which strategy?',o:['DLQ + skip','sequence gating — buffer later messages, flush in order once #1 completes','drop the partition','add more consumers'],a:1,why:'Sequence gating processes ahead but holds results until the gap fills, so order is preserved. DLQ+skip is for when gaps are acceptable; sub-partitioning just shrinks the blast radius.'},
   {t:'mcq',q:'Why does sub-partitioning (e.g. acct_id + day) ease head-of-line blocking?',o:['it removes ordering','a stuck message blocks a smaller slice of traffic — smaller blast radius','it deletes slow messages','it adds exactly-once'],a:1,why:'Finer keys spread work over more ordered partitions, so one stuck message stalls only its narrow sub-partition instead of a whole hot key.'},
   {t:'match',q:'Head-of-line strategy → when it fits.',pairs:[['Gaps are acceptable','DLQ + skip'],['Must keep order, no lost work','Sequence gating'],['Shrink the blast radius of a hot key','Sub-partition']]},
   {t:'teach',h:'Producer acks — the durability dial',body:[
     {k:'point',i:'0️⃣',t:'<b>acks=0</b>: fire-and-forget. Fastest; loses data on a leader crash.'},
     {k:'point',i:'1️⃣',t:'<b>acks=1</b>: leader confirms only. Loses data if the leader dies before followers replicate.'},
     {k:'point',i:'🛡️',t:'<b>acks=all (−1)</b>: every in-sync replica (ISR) confirms. No loss, higher latency.'},
     {k:'callout',c:'warn',t:'<b>The gotcha:</b> acks=all means "all <i>ISR</i>" — if the ISR has shrunk to just the leader (ISR=1), acks=all <b>still loses data</b> on crash. Pair it with <code>min.insync.replicas≥2</code> or it’s false security.'}
   ]},
   {t:'htmlviz',h:'The danger matrix — acks × replicas × ISR',
    html:`<style>
.dmx{width:100%;border-collapse:collapse;font-size:12.5px}
.dmx th{text-align:left;padding:7px 10px;background:var(--color-background-secondary);color:var(--color-text-tertiary);font-size:11px;text-transform:uppercase;letter-spacing:.04em;border-bottom:1.5px solid var(--color-border-primary)}
.dmx td{padding:8px 10px;border-bottom:1px solid var(--color-border-primary);color:var(--color-text-secondary);vertical-align:top;line-height:1.45}

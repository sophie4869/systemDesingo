<div class="chr-ex">Each key (outer dot) is owned by the <b>first node clockwise</b>. <b>Add / remove a node</b> and watch how few keys change colour — only the arc beside the change moves (~1/N), where <code>hash%N</code> would recolour nearly all of them. Toggle <b>virtual nodes</b> to give each machine several ring positions and smooth the load bars.</div>`,
    setup:function(root){
      var cx=115,cy=115,R=80;
      var PAL=['#14B8A6','#6366F1','#F59E0B','#EF4444','#8B5CF6','#EC4899'];
      var BASE={A:50,B:170,C:290,D:110,E:230,F:350},LBL=['A','B','C','D','E','F'];
      var KEYS=[8,22,38,55,78,95,118,142,168,188,205,228,255,278,300,318,338,352];
      var n=3,vnodes=false,prev=null;
      var svg=root.querySelector('.chr-svg'),statEl=root.querySelector('.chr-stat'),loadEl=root.querySelector('.chr-load'),vnBtn=root.querySelector('.chr-vn');
      function nodes(){var a=[];for(var i=0;i<n;i++)a.push({label:LBL[i],color:PAL[i]});return a;}
      function posOf(nd){return vnodes?[0,1,2].map(function(j){return (BASE[nd.label]+j*137)%360;}):[BASE[nd.label]];}
      function xy(a,rad){var t=(a-90)*Math.PI/180;return [cx+rad*Math.cos(t),cy+rad*Math.sin(t)];}
      function render(){
        var nd=nodes(),positions=[];
        nd.forEach(function(node,ni){posOf(node).forEach(function(a){positions.push({a:a,ni:ni});});});
        var owners=KEYS.map(function(k){var best=0,bd=1e9;positions.forEach(function(p){var d=((p.a-k)%360+360)%360;if(d<bd){bd=d;best=p.ni;}});return best;});
        var sorted=positions.slice().sort(function(a,b){return a.a-b.a;});
        function arc(a1,a2,rad){var p1=xy(a1,rad),p2=xy(a2,rad),delta=((a2-a1)%360+360)%360,lg=delta>180?1:0;return 'M'+p1[0]+' '+p1[1]+' A '+rad+' '+rad+' 0 '+lg+' 1 '+p2[0]+' '+p2[1];}
        var s='<circle cx="'+cx+'" cy="'+cy+'" r="'+R+'" fill="none" stroke="var(--color-border-tertiary)" stroke-width="1"/>';
        sorted.forEach(function(p,i){var prev=sorted[(i-1+sorted.length)%sorted.length];s+='<path d="'+arc(prev.a,p.a,R)+'" fill="none" stroke="'+nd[p.ni].color+'" stroke-width="6" opacity="0.85"/>';});
        positions.forEach(function(p){var d=xy(p.a,R);s+='<circle cx="'+d[0]+'" cy="'+d[1]+'" r="3.5" fill="'+nd[p.ni].color+'" stroke="#fff" stroke-width="1"/>';});
        nd.forEach(function(node){var b=xy(BASE[node.label],R);s+='<circle cx="'+b[0]+'" cy="'+b[1]+'" r="11" fill="'+node.color+'" stroke="#fff" stroke-width="2"/><text x="'+b[0]+'" y="'+(b[1]+4)+'" text-anchor="middle" font-size="12" font-weight="800" fill="#fff">'+node.label+'</text>';});
        KEYS.forEach(function(k,i){var d=xy(k,R+14);s+='<circle cx="'+d[0]+'" cy="'+d[1]+'" r="4.5" fill="'+nd[owners[i]].color+'"/>';});
        svg.innerHTML=s;
        var moveTxt='';
        if(prev){var moved=0;for(var i=0;i<owners.length;i++)if(nd[owners[i]].label!==prev[i])moved++;var pct=Math.round(moved/owners.length*100);moveTxt=' &middot; <b style="color:'+(moved?'var(--color-text-info)':'var(--color-text-success)')+'">'+moved+'/'+owners.length+' keys moved ('+pct+'%)</b>';}
        prev=owners.map(function(o){return nd[o].label;});
        statEl.innerHTML='<b>'+n+'</b> nodes &middot; <b>'+KEYS.length+'</b> keys'+(vnodes?' &middot; 3 vnodes each':'')+moveTxt;
        var counts=nd.map(function(){return 0;});owners.forEach(function(o){counts[o]++;});
        var mx=Math.max.apply(null,counts)||1;
        loadEl.innerHTML=nd.map(function(node,ni){var w=Math.round(counts[ni]/mx*80)+12;return '<div class="chr-lrow"><span class="chr-cdot" style="background:'+node.color+'"></span>Node '+node.label+'<span class="chr-bar" style="width:'+w+'px;background:'+node.color+'"></span>'+counts[ni]+'</div>';}).join('');
      }
      root.querySelector('.chr-add').onclick=function(){if(n<6){n++;render();}};
      root.querySelector('.chr-del').onclick=function(){if(n>2){n--;render();}};
      vnBtn.onclick=function(){vnodes=!vnodes;vnBtn.classList.toggle('on',vnodes);prev=null;render();};
      render();
    }},

   {t:'teach',h:'Rebalancing strategies',body:[

     {k:'point',i:'⚖️',t:'<b>Proportional (vnodes)</b>: a fixed number of vnodes per machine; a new machine steals a proportional slice from existing ones. (Cassandra)'},

   {t:'recall',q:'Why do vector clocks beat Lamport clocks?',model:['Lamport gives ordering but can’t distinguish concurrent from causally-ordered events.','Vector clocks track one counter per process, so element-wise comparison reveals concurrency.']},
   {t:'teach',h:'Vector clock vs version vector',body:[
     {k:'vs',a:{h:'Vector clock',t:'one counter per <b>process</b>. Orders <b>events/messages</b> across the system — the happened-before relation (what you just stepped through).'},b:{h:'Version vector',t:'one counter per <b>replica</b>. Tracks versions of <b>one data item</b> to detect concurrent writes (siblings) in leaderless / multi-leader stores.'}},
     {k:'note',t:'Same math — element-wise ≤ means happened-before, incomparable means concurrent. They differ in <b>what you count</b> (processes vs replicas of a key) and <b>why</b> (order events vs detect conflicting object versions). Dynamo & Riak attach a version vector per key — that’s the sibling-detection from the Replication unit.'}
   ]},

    html:`<style>

    setup:function(root,stepper){
      var STEPS=[
        {a:'—',b:'—',act:'',step:'HLC = (l, c)\n  l ≈ physical time\n  c breaks ties within the same millisecond',cap:'Physical clocks repeat or stall within a millisecond. HLC adds a small counter <b>c</b> so timestamps stay strictly ordered while staying close to real time.'},
        {a:'(100, 0)',b:'—',act:'A',step:'Node A — local event, physical = 100ms\n  l = max(0, 100) = 100   → l advanced → c = 0\n  HLC_A = (100, 0)',cap:'A local/send event sets l = max(old l, physical clock). Physical jumped ahead of l, so the counter c resets to 0.'},
        {a:'(100, 0)',b:'(101, 0)',act:'B',step:'Node B receives HLC=(100,0) from A, physical = 101ms\n  l = max(l_B=0, recv_l=100, physical=101) = 101  → l advanced → c = 0\n  HLC_B = (101, 0)',cap:'On receive, l = max(local, message l, physical). 101 is the max and beats both, so c = 0.'},
        {a:'(100, 0)',b:'(101, 1)',act:'B',step:'Two events fire on B in the same millisecond (physical = 101ms)\n  event 1: HLC = (101, 0)\n  event 2: l = max(101, 101) = 101 → l unchanged → c++\n  HLC_B = (101, 1)   ← still strictly ordered',cap:'Physical time did not advance, so l stays 101 and c increments — same-millisecond events still get distinct, ordered stamps.'},
        {a:'(100, 0)',b:'(101, 1)',act:'',step:'Compare HLC_A=(100,0) vs HLC_B=(101,0)\n  l_A < l_B  →  A happened-before B  ✓\n  100ms and 101ms are still meaningful real timestamps  ✓',cap:'Compare l first, then c on a tie. HLC gives a total causal order AND stays close to wall-clock time — unlike Lamport, whose numbers are not real times.'}
      ];
      function panel(s){return '<div class="hlc-panel"><div class="hlc-state">'
        +'<div class="hlc-node'+(s.act==='A'?' bump':(s.a==='—'?' idle':''))+'"><div class="hnm">Node A</div><div class="hval">'+s.a+'</div></div>'
        +'<div class="hlc-node'+(s.act==='B'?' bump':(s.b==='—'?' idle':''))+'"><div class="hnm">Node B</div><div class="hval">'+s.b+'</div></div>'
        +'</div><div class="hlc-box"><div class="hlc-step">'+s.step+'</div><div class="hlc-cap">'+s.cap+'</div></div></div>';}
      root.querySelector('.hlc-host').innerHTML=STEPS.map(panel).join('');
      stepper(root,STEPS.length,{panelClass:'hlc-panel',labels:['HLC = (l, c)','A: local event','B: receives','B: same-ms tie','Compare']});
    }},
   {t:'mcq',q:'Spanner’s commit wait exists to…',o:['save power','ensure no later txn gets a smaller timestamp','reduce storage','batch writes'],a:1,why:'Waiting out the clock uncertainty preserves external consistency globally.'},

 id:'trouble',title:'Distributed Trouble',icon:'⚠️',color:'#BE185D',colorD:'#9D174D',
 blurb:'Networks drop, clocks drift, processes pause.',
 lessons:[
  {id:'trouble-1',title:'Networks & clocks',steps:[
   {t:'teach',h:'Unreliable networks',body:[
     {k:'tldr',t:'You can’t tell a lost request from a slow one — a timeout is just a guess.'},
     {k:'point',i:'⏳',t:'Too short = false failures; too long = slow detection. There’s no perfect timeout.'}
   ]},
   {t:'teach',h:'Unreliable clocks',body:[
     {k:'vs',a:{h:'Time-of-day clock',t:'wall-clock; can jump backward on NTP sync. Don’t measure durations with it.'},b:{h:'Monotonic clock',t:'only goes forward; use it for elapsed time / timeouts.'}},
     {k:'callout',c:'warn',t:'Clock skew breaks Last-Write-Wins — a laggy clock can silently drop the newer write.'}
   ]},
   {t:'cloze',q:'Fill the clock blanks.',distract:['vector','logical'],text:[
     'Measure durations with the ',{blank:'monotonic'},' clock, never the ',{blank:'time-of-day',alt:['time of day','wall-clock','wall clock']},
     ' clock which can jump on NTP sync. Clock ',{blank:'skew'},' makes ',{blank:'LWW',alt:['last-write-wins']},' silently drop writes.'
   ]},
   {t:'mcq',q:'To measure how long an operation took, use…',o:['the time-of-day clock','the monotonic clock','a vector clock','NTP directly'],a:1,why:'Monotonic clocks never jump backward; time-of-day can be reset by NTP mid-measurement.'},
   {t:'recall',q:'Time-of-day vs monotonic clock — when each?',model:['Time-of-day: for timestamps/calendar time, but it can jump (NTP) — bad for durations.','Monotonic: always increases — use it for elapsed time, timeouts, and benchmarks.']}
  ]},
  {id:'trouble-2',title:'Pauses & truth',steps:[
   {t:'teach',h:'Process pauses',body:[
     {k:'cause',a:'GC stop-the-world / VM migration / paging',b:'A node freezes, then resumes thinking no time passed'},
     {k:'callout',c:'warn',t:'A paused lock holder can wake up after its lease expired and corrupt data — TTL alone won’t save you.'}
   ]},
   {t:'teach',h:'Truth is decided by majority',body:[
     {k:'point',i:'🗳️',t:'A node can’t trust its own view; a quorum/majority decides what’s true.'},
     {k:'point',i:'🎟️',t:'<b>Fencing tokens</b>: every lock grant gets an increasing number; storage rejects an older token.'}
   ]},
   {t:'mcq',q:'A GC-paused client resumes holding a now-expired lock. What makes writes safe?',o:['a longer TTL','fencing tokens','a faster network','retries'],a:1,why:'Storage rejects writes carrying a token lower than the highest it has seen — the stale holder is fenced out.'},
   {t:'build',q:'Pick real causes of an unexpected multi-second pause.',options:['GC stop-the-world','VM live migration','Memory paging/swapping','A tight CPU loop','SIGSTOP'],correct:[0,1,2,4]},
   {t:'recall',q:'Why is a TTL lock unsafe without fencing tokens?',model:['A paused client’s clock doesn’t advance — it can wake after the lease expired, unaware it’s stale.','Fencing tokens (monotonic per grant) let storage reject the old holder’s writes, preventing corruption.']}
  ]}
 ],

{
 id:'msg',title:'Messaging & Streaming',icon:'📨',color:'#58CC02',colorD:'#46a302',
 blurb:'Decouple services and absorb spikes with queues & logs.',
 lessons:[
  {id:'msg-1',title:'Queues vs logs',steps:[
   {t:'teach',h:'Two shapes',body:[
     {k:'vs',a:{h:'Queue (SQS/Rabbit)',t:'message goes to ONE consumer, then gone. No replay.'},b:{h:'Log (Kafka)',t:'append-only + retained; many consumers, replay by offset.'}},
     {k:'point',i:'🔢',t:'Kafka splits a topic into <b>partitions</b>. Ordering is guaranteed <b>only within a partition</b>, not across — so pick a partition key (e.g. user_id) to keep one key’s events in order.'},
     {k:'callout',c:'warn',t:'<b>A queue isn’t free latency-wise.</b> It adds a hop (enqueue + poll) and decouples timing — perfect for spikes, fan-out, and slow work, but it <b>blows a tight synchronous latency budget</b>. Don’t drop one into a &lt;500ms request path just to "decouple" — the caller now waits on a queue it can’t see.'}
   ]},
   {t:'mcq',q:'A request must respond in <500ms. Should you put a queue in its synchronous path?',o:['yes — queues are always faster','no — a queue adds a hop and decouples timing, breaking the latency budget','yes — to add backpressure','only if it’s Kafka'],a:1,why:'Queues shine for spikes / slow work / fan-out (async). In a tight synchronous path they just add latency and hide the wait from the caller.'},
   {t:'teach',h:'Kafka: partitions & offsets',body:[
     {k:'point',i:'👥',t:'<b>Consumer group</b>: each partition → exactly ONE consumer. Parallelism caps at the partition count; extra consumers sit idle. Add partitions to scale out.'},
     {k:'point',i:'📍',t:'Each group tracks the <b>offset</b> it has processed. <i>When</i> you commit it decides your delivery guarantee:'},
     {k:'vs',a:{h:'Commit AFTER processing',t:'at-least-once — a crash reprocesses the message'},b:{h:'Commit BEFORE processing',t:'at-most-once — a crash skips it'}},
     {k:'note',t:'Exactly-once = a Kafka transaction committing the offset + output write atomically.'}
   ]},
   {t:'htmlviz',h:'Kafka partitions — ordering, offsets, and idle consumers',
    html:`<style>
.kfv{display:grid;gap:10px}

   {t:'teach',h:'Kafka: durability & retention',body:[
     {k:'point',i:'🛡️',t:'<b>ISR</b> (in-sync replicas): the followers currently <b>caught up</b> to the leader. A laggard drops out, then rejoins once it catches up.'},
     {k:'point',i:'🎚️',t:'<code>acks=all</code> + <code>min.insync.replicas</code>: commit only once that many ISR replicas hold the write — the durability ↔ latency knob.'},
     {k:'point',i:'🗄️',t:'<b>Retention</b> keeps messages for a time/size window (replayable); <b>log compaction</b> keeps only the latest value per key.'},
     {k:'callout',c:'warn',t:'<b>Hot partition vs ordering:</b> more partitions = more parallelism, but a hot key serializes onto its one partition. You can’t have global ordering AND high parallelism — pick <b>per-key</b> ordering.'}
   ]},
   {t:'sort',q:'Queue or log?',buckets:['Queue','Log'],items:[
     {text:'replay from any offset',b:1},{text:'one consumer per message',b:0},{text:'multiple independent readers',b:1},{text:'deleted after consume',b:0}
   ]},
   {t:'teach',h:'Delivery semantics',body:[
     {k:'point',i:'1️⃣',t:'<b>At-most-once</b>: may lose, never duplicate.'},
     {k:'point',i:'🔁',t:'<b>At-least-once</b>: never lose, may duplicate → need idempotency.'},
     {k:'point',i:'🎯',t:'<b>Exactly-once</b>: hard; usually = at-least-once + idempotent processing.'}
   ]},
   {t:'cloze',q:'Fill the delivery blanks.',distract:['ordered','synchronous'],text:[
     'The pragmatic default is ',{blank:'at-least-once'},' delivery, which can ',{blank:'duplicate'},
     ' messages — so consumers must be ',{blank:'idempotent'},'. True exactly-once over a network is ',{blank:'impossible'},'.'
   ]},
   {t:'mcq',q:'Kafka guarantees ordering…',o:['globally','within a partition only','never','per consumer'],a:1,why:'Order holds within a partition; pick the partition key to keep a key’s events ordered.'},
   {t:'mcq',q:'In a Kafka consumer group, a partition is consumed by…',o:['every consumer','exactly one consumer in the group','the leader only','no one'],a:1,why:'One partition → one consumer per group, so consumer parallelism is bounded by the partition count.'},
   {t:'mcq',q:'A consumer commits its offset BEFORE processing the message. If it crashes mid-process, that message is…',o:['reprocessed (at-least-once)','skipped (at-most-once)','duplicated forever','rolled back'],a:1,why:'Committing before processing means the offset already advanced — a crash skips it (at-most-once). Commit AFTER for at-least-once.'},
   {t:'match',q:'Need → messaging choice.',pairs:[['Replay + many independent readers','Log (Kafka)'],['One consumer per message, work distribution','Queue'],['Must never lose; dupes OK if idempotent','At-least-once'],['Keep one user’s events ordered','Partition by key']]},
   {t:'mcq',q:'Payment events must never be lost (duplicates tolerable if handled). Delivery semantics?',o:['at-most-once','at-least-once + idempotent consumer','fire-and-forget','exactly-once over the wire'],a:1,why:'At-least-once guarantees no loss; an idempotent consumer makes the inevitable duplicates harmless — the cheap path to an exactly-once effect.'},
   {t:'recall',q:'How do systems achieve "exactly-once" in practice?',model:['Use at-least-once delivery plus idempotent processing (or transactional offset+write).','Repeats become harmless, so the observable effect is exactly-once — much cheaper than true EO delivery.']}
  ]},
  {id:'msg-2',title:'Reliability',steps:[

     {k:'point',i:'📦',t:'<b>Outbox</b>: write business row + outbox row in one txn; a relay publishes it.'},
     {k:'point',i:'🔌',t:'<b>CDC</b> tails the DB\'s write-ahead log (WAL) to emit the change stream.'}
   ]},
   {t:'htmlviz',h:'Outbox + CDC — make publish retryable',
    html:`<style>

<div class="obv">
  <div class="obv-flow">
    <div class="obv-box good"><div class="obv-t">1. Local DB txn</div><div class="obv-s">write order row<br>+ outbox row</div></div>
    <div class="obv-arr">→</div>
    <div class="obv-box warn"><div class="obv-t">2. Relay / CDC</div><div class="obv-s">poll outbox or tail WAL<br>publish at-least-once</div></div>
    <div class="obv-arr">→</div>
    <div class="obv-box"><div class="obv-t">3. Broker</div><div class="obv-s">event becomes replayable<br>consumer is idempotent</div></div>
  </div>
  <div class="obv-cap"><b>The atomic part is only the database transaction.</b> If the service crashes after commit, the outbox row is still there. The relay can publish later, retry safely, and mark the row sent.</div>
  <div class="obv-cap">This removes the lost-event crash gap without needing a distributed transaction between the app database and the broker.</div>
</div>`},
   {t:'mcq',q:'The transactional outbox solves…',o:['cache misses','the dual-write problem','leader election','hot keys'],a:1,why:'One local txn writes both the data and the event; a relay/CDC publishes reliably.'},
   {t:'teach',h:'Backpressure',body:[
     {k:'tldr',t:'Consumers can’t keep up → slow the producer, don’t crash.'},
     {k:'vs',a:{h:'Pull (Kafka)',t:'consumers fetch at their own pace — lag just builds, nothing falls over. Backpressure for free.'},b:{h:'Push',t:'needs explicit credit / window flow-control (Reactive Streams, gRPC) or the consumer gets overwhelmed.'}},
     {k:'callout',c:'warn',t:'Never use an <b>unbounded</b> buffer — it just defers the failure to an OOM crash later.'}
   ]},
   {t:'mcq',q:'An unbounded in-memory queue under sustained overload leads to…',o:['graceful backpressure','an OOM crash — failure just deferred','faster processing','exactly-once'],a:1,why:'Unbounded buffers hide the overload until memory runs out. Bound the buffer and pick a block/drop/shed policy.'},
   {t:'teach',h:'Bounded buffers & dead-letter queues',body:[
     {k:'point',i:'🪣',t:'Bound the buffer; when it’s <b>full</b>, choose a policy: <b>block</b> the producer, <b>drop</b> the oldest, or <b>shed</b> load (reject).'},
     {k:'point',i:'☠️',t:'A <b>poison message</b> (always fails) blocks a partition or loops forever. After N retries <b>with backoff</b>, route it to a <b>dead-letter queue</b> for human inspection.'},
     {k:'note',t:'Pair the DLQ with a <b>retry topic</b> to reprocess messages later instead of dropping them.'}
   ]},
   {t:'mcq',q:'A message fails on every attempt (poison). After a few backed-off retries you should…',o:['retry forever','drop it silently','route it to a dead-letter queue for inspection','restart the broker'],a:2,why:'A DLQ unblocks the partition and keeps the bad message for debugging, instead of looping forever or losing it.'},
   {t:'recall',q:'What is the dual-write problem and how does the outbox fix it?',model:['Writing to the DB and a broker separately has no atomicity — a crash leaves them inconsistent.','The outbox writes the row + an event in ONE DB txn; a relay (or CDC) then publishes, at-least-once.']}
  ]},
  {id:'msg-3',title:'Event sourcing & CQRS',steps:[
   {t:'teach',h:'Store events, not state',body:[
     {k:'keyt',term:'Event sourcing',def:'persist the append-only log of events as the source of truth; current state is a fold (replay) of those events.'},
     {k:'point',i:'🕰️',t:'You get a full audit trail and time-travel (rebuild state as of any point) for free.'},
     {k:'callout',c:'warn',t:'Cost: replaying long logs is slow → snapshots; and you must version/evolve event schemas forever.'}
   ]},
   {t:'teach',h:'CQRS',body:[
     {k:'keyt',term:'CQRS',def:'Command Query Responsibility Segregation — separate the write model from one or more read models (projections).'},
     {k:'point',i:'🔭',t:'Writes append events; async projections build query-optimised read views. Reads scale independently — but are eventually consistent.'},
     {k:'note',t:'Often paired with event sourcing, but not required. Don’t reach for either unless audit/temporal needs or read/write asymmetry justify the complexity.'}
   ]},
   {t:'mcq',q:'In event sourcing, the source of truth is…',o:['the current row','the append-only event log','a cache','a snapshot'],a:1,why:'State is derived by replaying the event log; snapshots are just an optimization.'},
   {t:'cloze',q:'Fill the event-sourcing blanks.',distract:['sharding','quorum'],text:[
     {blank:'Event sourcing',alt:['event-sourcing']},' stores the ',{blank:'log',alt:['event log']},' of changes as truth; current state is a ',{blank:'replay',alt:['fold','projection']},
     '. ',{blank:'CQRS',alt:['cqrs']},' splits the write model from read-optimised ',{blank:'projections',alt:['read models','views']},'.'
   ]},
   {t:'recall',q:'What are event sourcing and CQRS, and the main trade-off?',model:['Event sourcing: the append-only event log is the source of truth; state = replay of events → audit trail + time travel.','CQRS: separate write model from read models (projections), so reads scale independently — at the cost of eventual consistency.','Trade-off: more moving parts (snapshots, schema evolution, projection lag) — use only when audit/temporal or read/write asymmetry needs justify it.']}
  ]}

{
 id:'cache',title:'Caching',icon:'⚡',color:'#F4B400',colorD:'#C98A00',
 blurb:'Serve hot data fast — and survive expiry storms.',
 lessons:[
  {id:'cache-1',title:'Patterns',steps:[
   {t:'teach',h:'Cache-aside (lazy loading)',body:[
     {k:'tldr',t:'The app manages the cache: check cache → on a miss, read the DB and populate it. Also called <b>lazy loading</b> — data is cached only when first requested.'},
     {k:'point',i:'🐢',t:'A miss costs <b>two round trips</b> — one to the DB, one to re-populate the cache. Worth it for read-heavy data read repeatedly.'},
     {k:'point',i:'⏲️',t:'TTL is your only consistency knob: <b>too short</b> → you lose the hit-rate benefit; <b>too long</b> → you serve stale data.'},
     {k:'callout',c:'warn',t:'<b>Invalidate, don’t update</b>: on a write, DELETE the cache key. A concurrent update-then-set race can cache a stale value forever; deleting lets the next read repopulate cleanly. (Redis, Memcached)'}
   ]},
   {t:'teach',h:'Write strategies',body:[
     {k:'vs',a:{h:'Write-through',t:'write cache + DB together. Always warm + strongly consistent, but slower + write pollution.'},b:{h:'Write-behind (write-back)',t:'write cache now, flush DB later. Lowest write latency, but a crash before flush loses data.'}},
     {k:'note',t:'Names to recognise: <b>cache-aside = lazy loading</b>; <b>write-behind = write-back</b>. Cache-aside populates on read; write-through/back populate on write.'}
   ]},
   {t:'htmlviz',h:'Cache patterns — watch the data flow',
    html:`<style>
.cf-svg{width:100%;height:auto;display:block;max-width:340px;margin:0 auto}
.cf-actor{fill:var(--color-background-secondary);stroke:var(--color-border-primary);stroke-width:1.5}

    setup:function(root,stepper){
      var X={App:45,Cache:160,DB:275},BOX={App:[6,78],Cache:[121,78],DB:[236,78]},ORDER=['App','Cache','DB'];
      var PANELS=[
        {label:'Cache-aside read — HIT',msgs:[{f:'App',t:'Cache',x:'GET key'},{f:'Cache',t:'App',x:'value (hit)',k:'ok'}],ex:'Most reads are served straight from the cache — the fast path.'},
        {label:'Cache-aside read — MISS',msgs:[{f:'App',t:'Cache',x:'GET key'},{f:'Cache',t:'App',x:'miss',k:'bad'},{f:'App',t:'DB',x:'read'},{f:'DB',t:'App',x:'value'},{f:'App',t:'Cache',x:'SET key (TTL)',k:'ok'}],ex:'On a miss the app reads the DB and <b>populates</b> the cache with a TTL — the TTL is your only consistency knob.'},
        {label:'Cache-aside write — DELETE the key',msgs:[{f:'App',t:'DB',x:'write'},{f:'App',t:'Cache',x:'DELETE key',k:'bad'}],ex:'<b>Delete the key, do not update it.</b> Two writers updating the cache can interleave and cache a stale value forever; deleting forces the next read to repopulate cleanly.',warn:1},
        {label:'Write-through',msgs:[{f:'App',t:'Cache',x:'write'},{f:'Cache',t:'DB',x:'write (sync)'},{f:'DB',t:'App',x:'ack',k:'ok'}],ex:'Cache and DB are written <b>together</b> → always warm and strongly consistent, but every write pays DB latency (and rarely-read keys pollute the cache).'},
        {label:'Write-back (write-behind)',msgs:[{f:'App',t:'Cache',x:'write'},{f:'Cache',t:'App',x:'ack',k:'ok'},{f:'Cache',t:'DB',x:'flush later (async)',k:'dash'}],ex:'The cache <b>acks instantly</b> (lowest write latency) and flushes to the DB later/batched. A crash before the flush loses recent writes.',warn:1}
      ];
      function svg(p){
        var n=p.msgs.length,top=34,dy=26,h=top+n*dy+6;
        var s='<svg class="cf-svg" viewBox="0 0 320 '+h+'">';
        ORDER.forEach(function(a){var b=BOX[a];s+='<rect class="cf-actor" x="'+b[0]+'" y="4" width="'+b[1]+'" height="24" rx="6"/><text class="cf-an" x="'+X[a]+'" y="20" text-anchor="middle">'+a+'</text>';});
        ORDER.forEach(function(a){s+='<line class="cf-life" x1="'+X[a]+'" y1="28" x2="'+X[a]+'" y2="'+(h-4)+'"/>';});
        p.msgs.forEach(function(m,i){
          var y=top+i*dy+16,x1=X[m.f],x2=X[m.t],mod=m.k?(' '+m.k):'';
          s+='<line class="cf-msg'+mod+'" x1="'+x1+'" y1="'+y+'" x2="'+x2+'" y2="'+y+'"/>';
          var hc='cf-head'+(m.k==='ok'?' ok':m.k==='bad'?' bad':'');
          if(x2>x1)s+='<polygon class="'+hc+'" points="'+x2+','+y+' '+(x2-7)+','+(y-4)+' '+(x2-7)+','+(y+4)+'"/>';
          else s+='<polygon class="'+hc+'" points="'+x2+','+y+' '+(x2+7)+','+(y-4)+' '+(x2+7)+','+(y+4)+'"/>';
          var lc='cf-lbl'+(m.k==='ok'?' ok':m.k==='bad'?' bad':'');
          s+='<text class="'+lc+'" x="'+((x1+x2)/2)+'" y="'+(y-5)+'" text-anchor="middle">'+(i+1)+'. '+m.x+'</text>';
        });
        return s+'</svg>';
      }
      root.querySelector('.cf-host').innerHTML=PANELS.map(function(p){return '<div class="cf-panel">'+svg(p)+'<div class="cf-ex'+(p.warn?' warn':'')+'">'+p.ex+'</div></div>';}).join('');
      stepper(root,PANELS.length,{panelClass:'cf-panel',labels:PANELS.map(function(p){return p.label;})});
    }},

   {t:'match',q:'Constraint → best cache strategy.',pairs:[['Read-heavy, staleness OK, keep it simple','Cache-aside'],['Reads must be fresh + zero data loss','Write-through'],['Write-heavy, latency-critical, can lose recent writes','Write-back']]},
   {t:'mcq',q:'A like-counter takes massive writes; instant writes matter and losing a few on a crash is fine. Best cache strategy?',o:['cache-aside','write-through','write-back','no cache'],a:2,why:'Write-back acks from cache immediately (lowest write latency); the small crash-loss risk is acceptable for like counts.'},

     {k:'point',i:'🔒',t:'Fix 1: a mutex so only one request rebuilds the value.'},
     {k:'point',i:'🎲',t:'Fix 2: jittered TTLs so keys don’t all expire together.'},

   ]},
   {t:'htmlviz',h:'Cache stampede — one expiry, many misses',
    html:`<style>

{
 id:'rl',title:'Rate Limiting',icon:'🚦',color:'#FF4B4B',colorD:'#E63946',
 blurb:'Protect services from overload and abuse.',
 lessons:[
  {id:'rl-1',title:'Algorithms',steps:[
   {t:'teach',h:'Bucket families',body:[
     {k:'vs',a:{h:'Token bucket',t:'tokens refill at rate R, capacity B. Allows bursts up to B.'},b:{h:'Leaky bucket',t:'constant drain. Smooths output, no bursts.'}}
   ]},
   {t:'htmlviz',h:'Token bucket — drain it, watch it refill',
    html:`<style>
.tkb-bucket{display:flex;gap:7px;justify-content:center;margin:4px 0 12px}
.tkb-pip{width:30px;height:40px;border-radius:7px;border:2px solid var(--color-border-primary);background:var(--color-background-secondary);transition:all .15s}
.tkb-pip.full{background:var(--color-text-info);border-color:var(--color-text-info);box-shadow:0 2px 0 rgba(0,0,0,.12)}
.tkb-controls{display:flex;gap:8px;justify-content:center;margin-bottom:9px}
.tkb-controls button{font:inherit;font-weight:800;font-size:13px;padding:8px 16px;border-radius:10px;border:none;background:var(--color-text-info);color:#fff;cursor:pointer}
.tkb-stat{font-size:12.5px;color:var(--color-text-secondary);text-align:center;margin-bottom:5px}
.tkb-stat b{color:var(--color-text-primary)}
.tkb-log{font-size:12.5px;color:var(--color-text-secondary);text-align:center;min-height:18px}
.tkb-ex{margin-top:11px;font-size:12.5px;color:var(--color-text-secondary);line-height:1.55;padding:10px 13px;background:var(--color-background-secondary);border-radius:var(--border-radius-md)}
.tkb-ex b{color:var(--color-text-primary);font-weight:800}
</style>
<div class="tkb-bucket"></div>
<div class="tkb-controls"><button class="tkb-send" type="button">Send request</button></div>
<div class="tkb-stat"></div>
<div class="tkb-log"></div>
<div class="tkb-ex">Capacity <b>B = 5</b>, refill <b>R = 1 token / 1.2s</b>. Tap fast to <b>burst</b> — fire all 5 at once, then you’re throttled to the refill rate and extra requests get <b>429</b>. That’s the token bucket: bursts up to B, long-run average bounded by R.</div>`,
    setup:function(root){
      var B=5,tokens=B,allowed=0,rejected=0,last='';
      var bucket=root.querySelector('.tkb-bucket'),stat=root.querySelector('.tkb-stat'),log=root.querySelector('.tkb-log');
      function render(){
        var s='';for(var i=0;i<B;i++)s+='<div class="tkb-pip'+(i<tokens?' full':'')+'"></div>';
        bucket.innerHTML=s;
        stat.innerHTML='<b>'+tokens+'</b> / '+B+' tokens · refills <b>+1</b> every 1.2s';
        log.innerHTML='✓ allowed: <b>'+allowed+'</b> &nbsp;·&nbsp; ✗ 429: <b style="color:var(--color-text-danger)">'+rejected+'</b>'+(last?' &nbsp;—&nbsp; '+last:'');
      }
      root.querySelector('.tkb-send').onclick=function(){
        if(tokens>0){tokens--;allowed++;last='<span style="color:var(--color-text-success);font-weight:800">request ✓ (token spent)</span>';}
        else{rejected++;last='<span style="color:var(--color-text-danger);font-weight:800">429 — bucket empty</span>';}
        render();
      };
      var iv=setInterval(function(){
        if(!document.body.contains(root)){clearInterval(iv);return;}
        if(tokens<B){tokens++;render();}
      },1200);
      render();
    }},
   {t:'htmlviz',h:'Leaky bucket — bursts queue, output stays steady',
    html:`<style>
.lkb-bucket{display:flex;gap:7px;justify-content:center;margin:4px 0 12px}
.lkb-pip{width:30px;height:40px;border-radius:7px;border:2px solid var(--color-border-primary);background:var(--color-background-secondary);transition:all .15s}
.lkb-pip.queued{background:var(--color-text-warning);border-color:var(--color-text-warning)}
.lkb-controls{display:flex;gap:8px;justify-content:center;margin-bottom:9px}
.lkb-controls button{font:inherit;font-weight:800;font-size:13px;padding:8px 16px;border-radius:10px;border:none;background:var(--color-text-info);color:#fff;cursor:pointer}
.lkb-stat{font-size:12.5px;color:var(--color-text-secondary);text-align:center;margin-bottom:5px}
.lkb-stat b{color:var(--color-text-primary)}
.lkb-log{font-size:12.5px;color:var(--color-text-secondary);text-align:center;min-height:18px}
.lkb-ex{margin-top:11px;font-size:12.5px;color:var(--color-text-secondary);line-height:1.55;padding:10px 13px;background:var(--color-background-secondary);border-radius:var(--border-radius-md)}
.lkb-ex b{color:var(--color-text-primary);font-weight:800}
</style>
<div class="lkb-bucket"></div>
<div class="lkb-controls"><button class="lkb-send" type="button">Send request</button></div>
<div class="lkb-stat"></div>
<div class="lkb-log"></div>
<div class="lkb-ex">Requests <b>queue</b> in a fixed buffer and leak out at a <b>constant</b> 1 / 1.2s. Burst-tap: the queue fills but output stays steady, and once it’s full extra requests are <b>dropped</b>. Unlike a token bucket, bursts don’t pass through — they’re smoothed into a steady stream.</div>`,
    setup:function(root){
      var C=5,q=0,processed=0,dropped=0,last='';
      var bucket=root.querySelector('.lkb-bucket'),stat=root.querySelector('.lkb-stat'),log=root.querySelector('.lkb-log');
      function render(){
        var s='';for(var i=0;i<C;i++)s+='<div class="lkb-pip'+(i<q?' queued':'')+'"></div>';
        bucket.innerHTML=s;
        stat.innerHTML='<b>'+q+'</b> / '+C+' queued · leaks <b>1</b> every 1.2s';
        log.innerHTML='⤵ processed: <b>'+processed+'</b> &nbsp;·&nbsp; ✗ dropped: <b style="color:var(--color-text-danger)">'+dropped+'</b>'+(last?' &nbsp;—&nbsp; '+last:'');
      }
      root.querySelector('.lkb-send').onclick=function(){
        if(q<C){q++;last='<span style="color:var(--color-text-warning);font-weight:800">queued</span>';}
        else{dropped++;last='<span style="color:var(--color-text-danger);font-weight:800">dropped — bucket full</span>';}
        render();
      };
      var iv=setInterval(function(){if(!document.body.contains(root)){clearInterval(iv);return;}if(q>0){q--;processed++;render();}},1200);
      render();
    }},
   {t:'mcq',q:'You must allow short bursts but cap the average. Which?',o:['leaky bucket','token bucket','fixed window','none'],a:1,why:'Token bucket permits a burst up to capacity, then enforces the refill rate.'},
   {t:'teach',h:'Window counters',body:[
     {k:'point',i:'🪟',t:'<b>Fixed window</b>: one counter per interval — simple, but allows boundary bursts (2× at the edge).'},
     {k:'point',i:'🧾',t:'<b>Sliding window log</b>: a timestamp per request, count those in the trailing window. Exact, but <b>O(n)</b> memory.'},
     {k:'point',i:'🌊',t:'<b>Sliding window counter</b>: weight the previous window by its overlap — smooths the spike with <b>O(1)</b> memory. The usual production choice.'}
   ]},
   {t:'htmlviz',h:'Fixed window — the boundary burst',
    html:`<style>
.fw-lbl{display:flex;font-size:11px;font-weight:800;color:var(--color-text-tertiary);margin-bottom:4px}
.fw-lbl span{flex:1;text-align:center}

.fw-ex{margin-top:11px;font-size:12.5px;color:var(--color-text-secondary);line-height:1.55;padding:10px 13px;background:var(--color-background-secondary);border-radius:var(--border-radius-md)}

<div class="fw-lbl"><span>Window 1 (limit 3)</span><span>Window 2 (limit 3)</span></div>
<div class="fw-track">
  <div class="fw-win w1"><span class="fw-dot"></span><span class="fw-dot"></span><span class="fw-dot"></span></div>

     {k:'point',i:'📌',t:'<b>Sticky routing</b>: always route a given key (user / API token) to the same node so its counter is authoritative — turns the distributed problem into a local one.'},
     {k:'note',t:'Always return <b>429 + Retry-After</b> (plus limit/remaining/reset headers), and rate-limit at the edge/gateway before requests reach expensive backends.'}

     {k:'cause',a:'A dependency starts failing/slow',b:'Breaker OPENS → fail fast, stop the cascade'},
     {k:'point',i:'🔁',t:'CLOSED → (too many fails) OPEN → (cooldown) HALF-OPEN → test → CLOSED/OPEN.'}
   ]},
   {t:'htmlviz',h:'Circuit breaker — the state machine',
    html:`<style>
.cbv{display:grid;gap:10px}
.cbv-states{display:grid;grid-template-columns:1fr 32px 1fr 32px 1fr;gap:6px;align-items:center}
.cbv-state{border:2px solid var(--color-border-primary);border-radius:14px;padding:11px 8px;text-align:center;background:var(--color-background-secondary);min-height:70px}
.cbv-state.good{background:var(--color-background-success);border-color:var(--color-border-success);color:var(--color-text-success)}
.cbv-state.bad{background:var(--color-background-danger);border-color:var(--color-text-danger);color:var(--color-text-danger)}
.cbv-state.warn{background:var(--color-background-warning);border-color:var(--color-border-warning);color:var(--color-text-warning)}
.cbv-name{font-size:13px;font-weight:900}
.cbv-sub{font-size:11px;font-weight:800;margin-top:4px;line-height:1.25}
.cbv-arr{text-align:center;color:var(--color-text-tertiary);font-size:22px;font-weight:900}
.cbv-cap{font-size:12.5px;color:var(--color-text-secondary);line-height:1.55;padding:10px 13px;background:var(--color-background-secondary);border-radius:12px}
.cbv-cap b{color:var(--color-text-primary)}
@media(max-width:460px){.cbv-states{grid-template-columns:1fr}.cbv-arr{transform:rotate(90deg)}}
</style>
<div class="cbv">
  <div class="cbv-states">
    <div class="cbv-state good"><div class="cbv-name">CLOSED</div><div class="cbv-sub">calls pass<br>count failures</div></div>
    <div class="cbv-arr">→</div>
    <div class="cbv-state bad"><div class="cbv-name">OPEN</div><div class="cbv-sub">fail fast<br>no dependency calls</div></div>
    <div class="cbv-arr">→</div>
    <div class="cbv-state warn"><div class="cbv-name">HALF-OPEN</div><div class="cbv-sub">allow a few<br>trial calls</div></div>
  </div>
  <div class="cbv-cap"><b>Too many failures opens the breaker.</b> After a cooldown, a few trial calls decide the next state: success closes it; failure opens it again.</div>
  <div class="cbv-cap">The point is to free caller threads and give a sick dependency room to recover instead of making the cascade worse.</div>
</div>`},
   {t:'match',q:'Reliability term → meaning.',pairs:[['Measured number (e.g. p99 latency)','SLI'],['Internal target','SLO'],['Customer promise with penalties','SLA'],['100% − SLO (downtime you can spend)','Error budget']]},
   {t:'cloze',q:'Fill the resilience blanks.',distract:['retry','shard'],text:[
     'A circuit breaker ',{blank:'opens',alt:['open']},' after too many failures and ',{blank:'fails fast',alt:['fail fast','fail-fast']},
     ', preventing a ',{blank:'cascading',alt:['cascade']},' failure. Always pair calls with a ',{blank:'timeout'},'.'
   ]},
   {t:'mcq',q:'An OPEN circuit breaker…',o:['passes calls','fails fast without calling','queues calls','retries forever'],a:1,why:'Failing fast frees threads and lets the dependency recover.'},
   {t:'recall',q:'What is an error budget and how do teams use it?',model:['Error budget = 100% − SLO (e.g. 0.1% ≈ 43 min/month for 99.9%).','Budget left → ship features; budget spent → freeze releases and fix stability.']}
  ]},
  {id:'rel-2',title:'Retries & multi-region',steps:[
   {t:'teach',h:'Retries done right',body:[
     {k:'point',i:'📈',t:'Exponential backoff: 1s, 2s, 4s…'},
     {k:'point',i:'🎲',t:'<b>Jitter</b> so clients don’t retry in sync (retry storm). Full jitter: sleep = random(0, base × 2^attempt).'},
     {k:'point',i:'✅',t:'Only retry <b>idempotent + retryable</b> errors (timeout, 503 — never a 400), and cap them with a <b>retry budget</b> (≤10% of requests).'},
     {k:'callout',c:'warn',t:'Retry at ONE layer only — 3 layers × 3 retries = 27× amplification in an incident.'}
   ]},
   {t:'htmlviz',h:'Retry jitter — spread the herd',
    html:`<style>
.rjv{display:grid;gap:10px}
.rjv-row{display:grid;grid-template-columns:86px 1fr;gap:9px;align-items:center}
.rjv-l{font-size:12px;font-weight:900;color:var(--color-text-secondary)}
.rjv-track{height:44px;border-radius:12px;background:var(--color-background-secondary);border:1.5px solid var(--color-border-tertiary);position:relative;overflow:hidden}
.rjv-dot{position:absolute;top:10px;width:22px;height:22px;border-radius:50%;background:var(--color-background-danger);border:2px solid var(--color-text-danger)}
.rjv-dot.ok{background:var(--color-background-success);border-color:var(--color-border-success)}
.rjv-tick{position:absolute;top:0;bottom:0;width:1px;background:var(--color-border-tertiary)}
.rjv-cap{font-size:12.5px;color:var(--color-text-secondary);line-height:1.55;padding:10px 13px;background:var(--color-background-secondary);border-radius:12px}
.rjv-cap b{color:var(--color-text-primary)}
</style>
<div class="rjv">
  <div class="rjv-row"><div class="rjv-l">No jitter</div><div class="rjv-track"><span class="rjv-tick" style="left:25%"></span><span class="rjv-tick" style="left:50%"></span><span class="rjv-tick" style="left:75%"></span><span class="rjv-dot" style="left:48%"></span><span class="rjv-dot" style="left:50%"></span><span class="rjv-dot" style="left:52%"></span><span class="rjv-dot" style="left:54%"></span></div></div>
  <div class="rjv-row"><div class="rjv-l">Full jitter</div><div class="rjv-track"><span class="rjv-tick" style="left:25%"></span><span class="rjv-tick" style="left:50%"></span><span class="rjv-tick" style="left:75%"></span><span class="rjv-dot ok" style="left:18%"></span><span class="rjv-dot ok" style="left:35%"></span><span class="rjv-dot ok" style="left:62%"></span><span class="rjv-dot ok" style="left:80%"></span></div></div>
  <div class="rjv-cap"><b>Backoff without jitter synchronizes clients.</b> They all wake up at the same retry boundary and re-overload the dependency. Full jitter picks a random delay inside the backoff window, spreading retries across time.</div>
</div>`},
   {t:'mcq',q:'Why add jitter to backoff?',o:['retry faster','prevent synchronized retry storms','make idempotent','cut latency'],a:1,why:'Randomness spreads retries so a recovering service isn’t re-stampeded.'},
   {t:'match',q:'Retry failure mode → the fix.',pairs:[
     ['Clients that failed together all retry at the same instant','Jitter — randomize each delay'],
     ['3 layers each retry 3× → 27 backend calls in an incident','Retry at one layer; fail fast at the rest'],
     ['Retries pile onto an already-overloaded service','Retry budget (cap at ~10% of requests)'],
     ['The failure is a 400 or a non-idempotent charge','Don’t retry — only idempotent, retryable errors']
   ]},
   {t:'mcq',q:'Which failure is safe to retry automatically?',o:['a 400 Bad Request','a timeout on an idempotent GET','a 403 Forbidden','a duplicate-charge POST with no idempotency key'],a:1,why:'Retry only idempotent, transient failures. A 400/403 will just fail again, and re-sending a non-idempotent write without an idempotency key risks a double charge.'},
   {t:'teach',h:'Multi-region & DR',body:[
     {k:'vs',a:{h:'Active-passive',t:'standby takes over on failure. Simple; failover delay.'},b:{h:'Active-active',t:'all regions serve; needs conflict resolution.'}},
     {k:'point',i:'⏱️',t:'RPO ≈ data you can lose (replication lag); RTO ≈ time to recover.'}
   ]},
   {t:'recall',q:'Explain RPO vs RTO in one line each.',model:['RPO = how much data you can afford to lose — set by replication lag (sync≈0, async≈lag).','RTO = how fast you must be back — set by failover automation + DNS/anycast propagation.']}
  ]},
  {id:'rel-3',title:'Isolation & observability',steps:[
   {t:'teach',h:'Contain the blast radius',body:[
     {k:'keyt',term:'Bulkhead',def:'isolate resources (separate thread/connection pools per dependency) so one slow dependency can’t exhaust everything and sink the whole service.'},
     {k:'keyt',term:'Load shedding',def:'under overload, drop or reject low-priority work early (429) to protect the core — better to serve some than topple over.'},
     {k:'note',t:'Pair with backpressure: shed at the edge before expensive work, and prioritise (e.g. paying users / health checks) when shedding.'}
   ]},
   {t:'teach',h:'Observability: know what’s happening',body:[
     {k:'point',i:'📊',t:'Three pillars: <b>metrics</b> (aggregate trends), <b>logs</b> (discrete events), <b>traces</b> (one request across services).'},
     {k:'point',i:'🚦',t:'<b>RED</b> (Rate, Errors, Duration) for services; <b>USE</b> (Utilization, Saturation, Errors) for resources. Alert on SLO burn, not raw CPU.'},
     {k:'point',i:'🧵',t:'Propagate a <b>trace/correlation ID</b> through every hop so you can follow a single request end-to-end.'}
   ]},
   {t:'htmlviz',h:'Golden signals · RED · USE',
    html:`<style>
      .obsf{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;font-family:inherit;margin:2px 0}

    </style>
    <div class="obsf">
      <div class="obsf-col obsf-ind">
        <div class="obsf-hd">Four golden signals</div>
        <div class="obsf-cap">Any service</div>
        <div class="obsf-cell"><b>Latency</b><span>How long requests take</span></div>
        <div class="obsf-cell"><b>Traffic</b><span>Demand on the system</span></div>
        <div class="obsf-cell"><b>Errors</b><span>Failure rate of requests</span></div>
        <div class="obsf-cell"><b>Saturation</b><span>How "full" the service is</span></div>
        <div class="obsf-foot">Broadest coverage</div>
      </div>
      <div class="obsf-col obsf-grn">
        <div class="obsf-hd">RED</div>
        <div class="obsf-cap">Request-driven services</div>
        <div class="obsf-cell"><b>Rate</b><span>Requests per second</span></div>
        <div class="obsf-cell"><b>Errors</b><span>Failed request rate</span></div>
        <div class="obsf-cell"><b>Duration</b><span>Latency distribution</span></div>
        <div class="obsf-fill">3 signals only</div>
        <div class="obsf-foot">APIs &amp; microservices</div>
      </div>
      <div class="obsf-col obsf-org">
        <div class="obsf-hd">USE</div>
        <div class="obsf-cap">Infrastructure resources</div>
        <div class="obsf-cell"><b>Utilization</b><span>% of capacity in use</span></div>
        <div class="obsf-cell"><b>Saturation</b><span>Queue / overflow depth</span></div>
        <div class="obsf-cell"><b>Errors</b><span>Error events on resource</span></div>
        <div class="obsf-fill">3 signals only</div>
        <div class="obsf-foot">CPUs, disks, queues</div>
      </div>
    </div>`},
   {t:'match',q:'Observability — what is it?',pairs:[['Aggregate trends, dashboards & alerts','Metrics'],['Discrete events for debugging','Logs'],['One request across services','Traces'],['Rate · Errors · Duration (services)','RED'],['Utilization · Saturation · Errors (resources)','USE']]},
   {t:'mcq',q:'A bulkhead protects you by…',o:['retrying faster','isolating resource pools so one dependency can’t starve the rest','adding caches','sharding data'],a:1,why:'Separate pools per dependency contain failures — a hung dependency exhausts only its own pool.'},
   {t:'mcq',q:'Under overload, load shedding means…',o:['retry everything','drop/reject low-priority work to protect the core','scale to zero','ignore errors'],a:1,why:'Serving a subset cleanly beats collapsing under everything; shed early and by priority.'},
   {t:'teach',h:'Changing schema without downtime',body:[
     {k:'keyt',term:'Expand–contract',def:'roll schema changes in phases: EXPAND (add the new column/table, write both), MIGRATE (backfill + read new), CONTRACT (drop the old) — each step is backward-compatible.'},
     {k:'callout',c:'warn',t:'Never rename/drop in one shot during a rolling deploy — old and new code run at once. Backfill in batches to avoid long locks.'}
   ]},
   {t:'cloze',q:'Fill the resilience blanks.',distract:['sharding','quorum'],text:[
     'A ',{blank:'bulkhead'},' isolates pools so one dependency can’t starve the rest; ',{blank:'load shedding',alt:['shedding','load-shedding']},
     ' drops low-priority work under overload. Schema changes roll out ',{blank:'expand',alt:['expand-contract','expand–contract']},'-then-contract, backward-compatible at each step.'
   ]},
   {t:'recall',q:'How do you change a column safely under a rolling deploy?',model:['Expand–contract: add the new column (don’t touch the old), deploy code that writes BOTH.','Backfill the new column in batches, then switch reads to it.','Once nothing uses the old column, contract: drop it. Every step is backward-compatible so old + new code coexist.']},
   {t:'teach',h:'Graceful shutdown & connection draining',body:[
     {k:'tldr',t:'On a deploy or scale-down, don’t kill a node mid-request — drain it first.'},
     {k:'point',i:'🚪',t:'<b>Deregister</b> from the load balancer (or fail the readiness check) so NO new requests are routed to it.'},
     {k:'point',i:'⏳',t:'<b>Drain</b>: on SIGTERM, stop accepting new work but let in-flight requests/streams finish (up to a grace timeout), then exit.'},
     {k:'callout',c:'warn',t:'Skip the drain and every routine deploy drops in-flight requests — users see 5xx / connection resets during rollouts and autoscale-downs.'}
   ]},
   {t:'mcq',q:'On a rolling deploy, how do you stop a node without dropping in-flight requests?',o:['kill it immediately','deregister from the LB, let in-flight work finish, then exit (drain)','rely on client retries only','scale up first'],a:1,why:'Connection draining: stop new traffic (deregister / fail readiness), let existing requests finish within a grace period, then shut down.'}
  ]}
 ],
 boss:{title:'Reliability Boss',time:85,q:[
   {q:'Error budget =',o:['SLO','100% − SLO','SLA','uptime'],a:1},
   {q:'An OPEN breaker…',o:['passes calls','fails fast','queues','retries'],a:1},
   {q:'Jitter on retries prevents…',o:['data loss','retry storms','stale reads','GC'],a:1},
   {q:'Retry amplification is fixed by…',o:['more retries','retrying at one layer','no timeouts','sticky sessions'],a:1},
   {q:'RPO is bounded by…',o:['DNS TTL','replication lag','RTO','CPU'],a:1},
   {q:'Active-active needs…',o:['no replication','conflict resolution','one region','a lock'],a:1},
   {q:'A bulkhead…',o:['retries faster','isolates resource pools','adds caching','shards data'],a:1},
   {q:'Load shedding under overload…',o:['retries all','drops low-priority work','scales to zero','disables logs'],a:1},
   {q:'Safe online schema change uses…',o:['rename in place','expand–contract + backfill','a global lock','downtime'],a:1}
 ]}
},
{
 id:'batch',title:'Batch & Stream',icon:'🌊',color:'#EA580C',colorD:'#C2410C',
 blurb:'MapReduce, dataflow, windows, and exactly-once.',
 lessons:[
  {id:'batch-1',title:'Batch processing',steps:[
   {t:'teach',h:'MapReduce',body:[
     {k:'cause',a:'Map (transform each record) → shuffle by key',b:'Reduce (aggregate per key) → output'},
     {k:'point',i:'🗺️',t:'<b>Map</b> emits key→value; <b>Reduce</b> folds all values for a key.'}
   ]},
   {t:'teach',h:'Beyond MapReduce',body:[
     {k:'vs',a:{h:'MapReduce',t:'materializes every intermediate step to disk. Robust but slow.'},b:{h:'Dataflow (Spark/Flink)',t:'keeps intermediates in memory, pipelines stages. Much faster.'}}
   ]},
   {t:'mcq',q:'Why do Spark/Flink beat classic MapReduce?',o:['they use SQL','they don’t materialize every intermediate step to disk','they avoid the shuffle','they need no cluster'],a:1,why:'Dataflow engines pipeline stages in memory instead of writing each step to disk.'},
   {t:'teach',h:'Distributed joins',body:[
     {k:'point',i:'📡',t:'<b>Broadcast-hash</b>: when one side is <b>small</b>, copy it to every node and build an in-memory hash table, then stream the big side past it. No shuffle of the big table — the fastest option when the small side fits in memory.'},
     {k:'point',i:'🔀',t:'<b>Partitioned-hash (shuffle)</b>: when <b>both sides are large</b>, shuffle both by the join key so matching rows land on the same node, then hash-join each partition locally. The general-purpose distributed join.'},
     {k:'point',i:'🪜',t:'<b>Sort-merge</b>: sort both sides by the join key, then walk them together in one pass. Wins when inputs are already sorted (or too big to hash) and handles range joins.'},
     {k:'callout',c:'mem',t:'Pick by size: <b>small + large → broadcast</b>; large + large → partitioned-hash; already-sorted / huge → sort-merge.'}
   ]},
   {t:'mcq',q:'You join a huge events table with a tiny lookup table. Best strategy?',o:['sort-merge','broadcast-hash the small table','partitioned-hash (shuffle both)','a cross join'],a:1,why:'Broadcasting the small table to every node avoids shuffling the huge one — each node hash-joins locally against the in-memory copy.'},
   {t:'recall',q:'Describe map and reduce in one line each.',model:['Map: transform each input record into key→value pairs (embarrassingly parallel).','Reduce: gather all values for a key (after a shuffle) and aggregate them into output.']}
  ]},
  {id:'batch-2',title:'Stream processing',steps:[
   {t:'teach',h:'Time & windows',body:[
     {k:'point',i:'⏰',t:'<b>Event time</b> (when it happened) vs <b>processing time</b> (when seen). Prefer event time.'},
     {k:'point',i:'🪟',t:'Windows: tumbling (fixed, non-overlap), hopping (overlap), session (by activity gap).'},
     {k:'point',i:'🌊',t:'<b>Watermarks</b> bound how long to wait for late events.'}
   ]},
   {t:'htmlviz',h:'Watermarks: when is a window done?',
    html:`<style>
      .wm-leg{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;font-weight:700;margin-top:6px}
      .wm-leg span{display:inline-flex;align-items:center;gap:5px;color:var(--color-text-secondary)}
      .wm-dot{width:10px;height:10px;border-radius:50%;display:inline-block}
      .wm-cap{font-size:11.5px;color:var(--color-text-secondary);line-height:1.55;font-weight:600;margin-top:9px}
      .wm-cap b{color:var(--color-text-primary)}
    </style>
    <svg viewBox="0 0 460 168" style="width:100%;height:auto;font-family:inherit">
      <rect x="55" y="56" width="279" height="70" rx="7" fill="var(--color-background-success)" opacity="0.45"/>
      <rect x="334" y="56" width="93" height="70" rx="7" fill="var(--color-background-secondary)"/>
      <text x="63" y="72" font-size="9.5" font-weight="800" fill="var(--color-text-success)">complete — windows here can fire</text>
      <text x="340" y="72" font-size="9.5" font-weight="800" fill="var(--color-text-secondary)">still waiting…</text>
      <line x1="48" y1="120" x2="434" y2="120" stroke="var(--color-text-secondary)" stroke-width="1.4"/>
      <g font-size="9" fill="var(--color-text-secondary)" text-anchor="middle">
        <text x="55" y="138">0s</text><text x="148" y="138">3s</text><text x="241" y="138">6s</text><text x="334" y="138">9s</text><text x="427" y="138">12s</text>
        <text x="427" y="152" text-anchor="end" font-weight="700">event time →</text>
      </g>
      <!-- on-time events: x = 55 + t*31, number = arrival order -->
      <g text-anchor="middle">
        <circle cx="86" cy="120" r="6" fill="var(--color-text-info)"/><text x="86" y="106" font-size="9" font-weight="800" fill="var(--color-text-secondary)">1</text>
        <circle cx="179" cy="120" r="6" fill="var(--color-text-info)"/><text x="179" y="106" font-size="9" font-weight="800" fill="var(--color-text-secondary)">2</text>
        <circle cx="148" cy="120" r="6" fill="var(--color-text-info)"/><text x="148" y="106" font-size="9" font-weight="800" fill="var(--color-text-secondary)">3</text>
        <circle cx="303" cy="120" r="6" fill="var(--color-text-info)"/><text x="303" y="106" font-size="9" font-weight="800" fill="var(--color-text-secondary)">4</text>
        <circle cx="241" cy="120" r="6" fill="var(--color-text-info)"/><text x="241" y="106" font-size="9" font-weight="800" fill="var(--color-text-secondary)">5</text>
        <circle cx="117" cy="120" r="6" fill="var(--color-text-danger)"/><text x="117" y="106" font-size="9" font-weight="800" fill="var(--color-text-danger)">6</text>
        <text x="117" y="152" font-size="9" font-weight="800" fill="var(--color-text-danger)">late!</text>
      </g>
      <!-- watermark -->
      <line x1="334" y1="46" x2="334" y2="128" stroke="var(--color-text-warning)" stroke-width="2.2" stroke-dasharray="5 4"/>
      <text x="334" y="40" text-anchor="middle" font-size="10.5" font-weight="800" fill="var(--color-text-warning)">watermark = 9s</text>
    </svg>
    <div class="wm-leg">
      <span><i class="wm-dot" style="background:var(--color-text-info)"></i>on-time</span>
      <span><i class="wm-dot" style="background:var(--color-text-danger)"></i>late</span>
      <span>number = arrival order</span>
    </div>
    <div class="wm-cap">Events stream in <b>out of order</b> (see the arrival numbers). The <b>watermark</b> is the engine's promise: “I’ve seen everything with event-time ≤ 9s.” Any window ending ≤ 9s can now safely fire. Event #6 has event-time 2s but arrived <b>after</b> the watermark passed it → it's <b>late</b> (dropped, or sent to a side-output). Bigger lateness allowance = more correct, but more delay.</div>
    `},
   {t:'teach',h:'Handling late data',body:[
     {k:'point',i:'🪂',t:'<b>Allowed lateness</b>: keep a window open a little past the watermark so late events still <b>update</b> its result, then finalize.'},
     {k:'point',i:'📥',t:'<b>Side-output</b>: route anything later than that to a separate stream / dead-letter — fix it offline instead of dropping silently.'},
     {k:'callout',c:'note',t:'The default is to <b>drop</b> late events. The watermark sets the cutoff; allowed-lateness and side-outputs are how you avoid losing them.'}
   ]},
   {t:'teach',h:'Recovering stateful operators',body:[
     {k:'point',i:'📸',t:'A <b>checkpoint</b> is a consistent snapshot of every operator\'s state <b>plus the source offsets</b>, taken periodically.'},
     {k:'point',i:'🚧',t:'The engine injects a <b>barrier</b> into the stream; each operator snapshots as the barrier passes (Flink-style) — async, no global pause.'},
     {k:'point',i:'♻️',t:'On crash: <b>restore</b> the last snapshot, <b>rewind</b> the source to its offset, and <b>replay</b>. No state lost.'}
   ]},
   {t:'htmlviz',h:'Checkpoint → crash → replay',
    html:`<style>
      .ckp{display:grid;gap:12px;font-family:inherit}
      .ckp-row{border:1.5px solid var(--color-border-primary);border-radius:12px;background:var(--color-background-secondary);padding:11px 12px}
      .ckp-h{font-weight:800;color:var(--color-text-primary);font-size:12.5px;margin-bottom:9px}
      .ckp-flow{display:flex;align-items:stretch;gap:5px;flex-wrap:wrap}
      .ckp-node{flex:1;min-width:62px;text-align:center;border:1.5px solid var(--bd);background:var(--bg);color:var(--c);border-radius:10px;padding:8px 5px;font-weight:800;font-size:11.5px;display:flex;flex-direction:column;justify-content:center}
      .ckp-node small{display:block;font-weight:600;font-size:9px;opacity:.85;margin-top:2px}
      .ckp-arr{align-self:center;color:var(--color-text-secondary);font-weight:800;flex:0 0 auto;font-size:13px}
      .ckp-blue{--c:#4f46e5;--bg:#eef2ff;--bd:#c7d2fe}
      .ckp-amber{--c:#b45309;--bg:#fffbeb;--bd:#fde68a}
      .ckp-green{--c:#059669;--bg:#ecfdf5;--bd:#a7f3d0}
      .ckp-red{--c:#dc2626;--bg:#fef2f2;--bd:#fecaca}
      .ckp-note{font-size:10.5px;color:var(--color-text-secondary);font-weight:600;margin-top:8px;line-height:1.5}
      .ckp-note b{color:var(--color-text-primary)}
    </style>
    <div class="ckp">
      <div class="ckp-row">
        <div class="ckp-h">📸 Checkpoint — every few seconds</div>
        <div class="ckp-flow">
          <div class="ckp-node ckp-blue">Source<small>offset 1200</small></div>
          <div class="ckp-arr">▸</div>
          <div class="ckp-node ckp-amber">Operator<small>state snapshot</small></div>
          <div class="ckp-arr">▸</div>
          <div class="ckp-node ckp-blue">Sink</div>
        </div>
        <div class="ckp-note">A <b>barrier</b> flows downstream with the data; as it passes each operator, that operator saves its <b>state + the source offset</b> — no stop-the-world.</div>
      </div>
      <div class="ckp-row">
        <div class="ckp-h">💥 Crash → recover</div>
        <div class="ckp-flow">
          <div class="ckp-node ckp-red">Crash</div>
          <div class="ckp-arr">▸</div>
          <div class="ckp-node ckp-amber">Restore<small>last snapshot</small></div>
          <div class="ckp-arr">▸</div>
          <div class="ckp-node ckp-blue">Rewind source<small>offset 1200</small></div>
          <div class="ckp-arr">▸</div>
          <div class="ckp-node ckp-green">Replay → sink<small>idempotent / txn</small></div>
        </div>
        <div class="ckp-note">Restore state, <b>rewind the source</b> to the checkpoint's offset, and replay. Replays re-emit records — so the <b>sink must be idempotent or transactional</b> to apply each effect once.</div>
      </div>
    </div>`},
   {t:'teach',h:'Exactly-once = “effectively once”',body:[
     {k:'point',i:'⚠️',t:'Recovery <b>replays</b> from the last checkpoint, so a naive sink would write some records <b>twice</b>.'},
     {k:'point',i:'✅',t:'Fix the output: an <b>idempotent</b> sink (dedupe by key) or a <b>transactional</b> sink (2-phase commit — output commits only when the checkpoint does).'},
     {k:'callout',c:'mem',t:'It\'s exactly-once <b>processing</b>, not delivery — the wire still duplicates; you just apply each effect once.'}
   ]},
   {t:'mcq',q:'After a crash, how does a stream job avoid losing or double-counting state?',o:['start from scratch','restore the last checkpoint, rewind the source to its offset, and replay','ignore the failed records','switch to processing time'],a:1,why:'The checkpoint pairs operator state with source offsets, so restoring state and replaying from that offset reprocesses exactly the un-checkpointed tail — an idempotent/transactional sink makes the replayed effects apply once.'},
   {t:'cloze',q:'Fill the streaming blanks.',distract:['offset','partition'],text:[
     'Group by ',{blank:'event time',alt:['event-time']},', not processing time. ',{blank:'Watermarks',alt:['watermark']},
     ' bound lateness, and ',{blank:'tumbling'},' windows are fixed and non-overlapping. Checkpoints give ',{blank:'exactly-once'},' processing.'
   ]},
   {t:'match',q:'Match the window to its shape.',pairs:[['Tumbling','Fixed, non-overlapping'],['Hopping','Fixed, overlapping'],['Session','Bounded by an activity gap']]},
   {t:'mcq',q:'Which window groups events by gaps of inactivity?',o:['tumbling','hopping','session','global'],a:2,why:'A session window closes after a period of no events for that key.'},
   {t:'recall',q:'Why prefer event time over processing time?',model:['Event time reflects when things actually happened, so results are correct regardless of delays or replays.','Processing time depends on when the system happened to see the event — it drifts with lag and reprocessing.']}
  ]},
  {id:'batch-3',title:'Lambda & Kappa',steps:[
   {t:'htmlviz',h:'Lambda vs Kappa',
    html:`<style>
      .lk{display:grid;gap:12px;font-family:inherit}
      .lk-card{border:1.5px solid var(--color-border-primary);background:var(--color-background-secondary);border-radius:12px;padding:11px 12px}
      .lk-h{font-weight:800;font-size:12.5px;margin-bottom:9px;display:flex;align-items:center;gap:7px}
      .lk-badge{font-size:9.5px;font-weight:800;padding:2px 8px;border-radius:999px}
      .lk-row{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
      .lk-node{text-align:center;border:1.5px solid var(--bd);background:var(--bg);color:var(--c);border-radius:9px;padding:7px 9px;font-weight:800;font-size:11.5px}
      .lk-node small{display:block;font-weight:600;font-size:9px;opacity:.85;margin-top:1px}
      .lk-arr{color:var(--color-text-secondary);font-weight:800;flex:0 0 auto;font-size:13px}
      .lk-branch{display:grid;gap:6px}
      .lk-blue{--c:#4f46e5;--bg:#eef2ff;--bd:#c7d2fe}
      .lk-green{--c:#059669;--bg:#ecfdf5;--bd:#a7f3d0}
      .lk-amber{--c:#b45309;--bg:#fffbeb;--bd:#fde68a}
      .lk-note{font-size:10.5px;color:var(--color-text-secondary);font-weight:600;margin-top:8px;line-height:1.5}
      .lk-note b{color:var(--color-text-primary)}
      .lk-tip{font-size:11px;color:var(--color-text-success);font-weight:700;background:var(--color-background-success);border-radius:10px;padding:9px 12px;line-height:1.5}
    </style>
    <div class="lk">
      <div class="lk-card">
        <div class="lk-h" style="color:#4f46e5">Lambda <span class="lk-badge" style="background:#eef2ff;color:#4f46e5">two pipelines</span></div>
        <div class="lk-row">
          <div class="lk-node lk-blue">events</div>
          <div class="lk-arr">▸</div>
          <div class="lk-node lk-blue">Kafka</div>
          <div class="lk-arr">▸</div>
          <div class="lk-branch">
            <div class="lk-node lk-green">speed: Flink<small>real-time · approximate</small></div>
            <div class="lk-node lk-amber">batch: Spark / S3<small>periodic · exact, corrects</small></div>
          </div>
          <div class="lk-arr">▸</div>
          <div class="lk-node lk-blue">serving<small>merge both</small></div>
          <div class="lk-arr">▸</div>
          <div class="lk-node lk-blue">query</div>
        </div>
        <div class="lk-note">Two parallel paths — a <b>batch</b> layer (accurate, reprocessable) and a <b>speed</b> layer (fresh, approximate); serving merges them. Powerful, but you maintain <b>two codebases</b> that can drift.</div>
      </div>
      <div class="lk-card">
        <div class="lk-h" style="color:#059669">Kappa <span class="lk-badge" style="background:#ecfdf5;color:#059669">stream only</span></div>
        <div class="lk-row">
          <div class="lk-node lk-blue">events</div>
          <div class="lk-arr">▸</div>
          <div class="lk-node lk-blue">Kafka<small>long retention</small></div>
          <div class="lk-arr">▸</div>
          <div class="lk-node lk-green">Flink<small>replayable</small></div>
          <div class="lk-arr">▸</div>
          <div class="lk-node lk-blue">serving</div>
          <div class="lk-arr">▸</div>
          <div class="lk-node lk-blue">query</div>
        </div>
        <div class="lk-note">One streaming path. <b>Reprocess</b> = reset the offset to 0 and replay the whole log through the <b>same</b> processor — one codebase, simpler ops. Needs a durable, long-retention log.</div>
      </div>
      <div class="lk-tip">💡 Kappa is the modern default when your processor can replay; Lambda lingers where batch tools are much cheaper / more accurate for the bulk path.</div>
    </div>`},
   {t:'mcq',q:'Kappa architecture differs from Lambda by…',o:['using two code paths','using one streaming path and replaying to reprocess','dropping streaming','requiring a warehouse'],a:1,why:'Kappa keeps a single streaming codebase and reprocesses by replaying the log; Lambda maintains separate batch + speed layers.'},
   {t:'cloze',q:'Fill the Lambda/Kappa blanks.',distract:['shard','quorum'],text:[
     {blank:'Lambda',alt:['lambda']},' runs batch + speed layers; ',{blank:'Kappa',alt:['kappa']},' uses one stream and ',{blank:'replays',alt:['replay']},' to reprocess.'
   ]},
   {t:'recall',q:'Lambda vs Kappa — when would you pick each?',model:['Lambda: a batch layer (accurate, reprocessable) plus a speed layer (fresh, approximate), merged at serving — but two codebases that can drift.','Kappa: one streaming pipeline; reprocess by replaying the log — simpler, and the default when your stream processor can replay.']}
  ]}
 ],

   {q:'Reduce runs after…',o:['the map + shuffle','the output','nothing','a window'],a:0},

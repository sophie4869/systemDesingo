   {t:'mcq',q:'A celebrity post must notify 50M followers. The risk?',o:['too few notifications','fan-out write amplification / hot producer','inbox is too small','email is slow'],a:1,why:'Naive fan-out-on-write explodes for high-fan-out producers; use async workers, batching, and pull/hybrid for huge audiences.'},
   {t:'build',q:'4 · High-level components.',options:['Event ingress + queue','Per-channel workers (push/email/inbox)','Preference + device-token store','Dedup + coalesce layer','A synchronous loop over all followers'],correct:[0,1,2,3]},
   {t:'htmlviz',h:'4 · Architecture',html:'',setup:function(root){root.innerHTML=archDiagram({w:790,h:306,cap:'Events hit an ingress queue → dedup/coalesce (one push, not five) → per-channel workers. Workers check preferences + device tokens, then deliver via APNs/FCM, email (SES), or the in-app inbox. At-least-once + dedupe on event id.',nodes:[{x:18,y:132,w:150,t:'Event ingress',s:'queue',c:'blue'},{x:200,y:132,w:175,t:'Dedup + coalesce',c:'purple'},{x:410,y:40,w:175,t:'Channel workers',s:'push / email / inbox',c:'green'},{x:410,y:224,w:185,t:'Prefs + tokens',s:'store',c:'gray'},{x:625,y:40,w:155,t:'APNs / SES',c:'amber'}],edges:[[0,1],[1,2],[2,3],[2,4]]});}},
   {t:'mcq',q:'5 · Bottleneck?',o:['inbox reads','fan-out volume + 3rd-party send limits (APNs/FCM/SMTP)','preferences','dedup'],a:1,why:'Delivery is gated by provider rate limits and fan-out size; smooth with queues, batching, and backpressure.'},
   {t:'recall',q:'6 · Deep dive + failure.',model:['Async fan-out workers per channel; dedup by event_id; coalesce a burst into one push; respect provider rate limits with retries/backoff.','Failure: provider 5xx → retry/backoff then dead-letter; at-least-once + idempotent send (store sent id) avoids double-notifying.']}
  ]},
  {id:'mock-11',title:'Nearby / geospatial search',steps:[
   {t:'teach',h:'1 · Requirements',body:[
     {k:'tldr',t:'Design proximity / nearby search (Uber, Yelp).'},
     {k:'spoiler',items:[
       {k:'reqs',i:'✅',label:'Functional',items:['find nearby drivers/places (ranked)','fresh location updates','dense-city read traffic']},
       {k:'reqs',i:'📐',label:'NFRs',items:['low-latency radius/k-NN queries','frequent location updates','high read fan-out in hotspots']}
     ]}
   ]},
   {t:'recall',q:'2 · Entities + 3 · API.',model:['Entity: <code>entity(id, lat, lng, geo-cell, updated_at)</code> + ranking attributes','<code>update_location(id, lat, lng)</code>','<code>nearby(lat, lng, radius/k)</code> → ranked results']},
   {t:'mcq',q:'How do you index location for fast nearby queries?',o:['B-tree on lat then lng','a geohash / quadtree / S2 cell index','full scan + distance filter','hash of (lat,lng)'],a:1,why:'Space-filling curves (geohash/S2) or quadtrees map 2-D proximity to a 1-D key so nearby points share a prefix/cell.'},
   {t:'build',q:'4 · High-level components.',options:['Geo index (geohash/S2/quadtree)','Hot in-memory location store (Redis)','Ranking service','Sharding by geo-cell','One row scan per query'],correct:[0,1,2,3]},
   {t:'htmlviz',h:'4 · Architecture',html:'',setup:function(root){root.innerHTML=archDiagram({w:745,h:306,cap:'Drivers stream locations into a hot in-memory store, sharded by geo-cell. A query maps the viewport to geohash/S2 cells (+ neighbours), pulls candidates, and the ranking service orders by distance/ETA.',nodes:[{x:18,y:132,w:120,t:'Client',c:'gray'},{x:165,y:132,w:150,t:'Query API',c:'blue'},{x:355,y:40,w:185,t:'Geo index',s:'geohash / S2',c:'green'},{x:355,y:224,w:195,t:'Location store',s:'Redis, by geo-cell',c:'red'},{x:585,y:40,w:150,t:'Ranking svc',c:'purple'}],edges:[[0,1],[1,2],[2,3],[2,4]]});}},
   {t:'mcq',q:'5 · Bottleneck?',o:['location writes are rare','dense-city read hotspots + churny location writes','ranking math','storage size'],a:1,why:'A few cells (downtown) get most traffic; replicate hot cells, cache, and keep live positions in memory.'},
   {t:'recall',q:'6 · Deep dive + failure.',model:['Geohash/S2 cells as the shard + index key; live positions in Redis with short TTL; query the target cell + neighbours, then rank.','Hot-cell relief: replicas + caching; precision-vs-recall tuned by cell size.','Failure: stale positions → TTL + last-seen filter; a cell shard down → serve neighbours degraded, not error.']}
  ]},
  {id:'mock-12',title:'Search autocomplete / typeahead',steps:[
   {t:'teach',h:'1 · Requirements',body:[
     {k:'tldr',t:'Design search autocomplete / typeahead.'},
     {k:'spoiler',items:[
       {k:'reqs',i:'✅',label:'Functional',items:['return prefix suggestions in &lt;100ms','ranked by popularity','trending-aware','safe to roll out']},
       {k:'reqs',i:'📐',label:'NFRs',items:['very low latency','read-heavy','near-real-time popularity','no offensive/unsafe suggestions']}
     ]}
   ]},
   {t:'recall',q:'2 · Entities + 3 · API.',model:['Entities: <code>prefix → top-k suggestions</code> (precomputed), query-frequency counts','<code>suggest(prefix)</code> → ranked list','Offline / stream job rebuilds the prefix → top-k structure']},
   {t:'mcq',q:'Why precompute top-k per prefix instead of querying at request time?',o:['it saves storage','reads must be ~O(1); ranking at query time is too slow','it improves write throughput','it avoids caching'],a:1,why:'Typeahead is extremely read-heavy and latency-critical; a prebuilt trie / prefix→top-k served from memory beats per-keystroke ranking.'},
   {t:'build',q:'4 · High-level components.',options:['Trie / prefix→top-k index','Frequency aggregation pipeline (stream)','In-memory serving tier + CDN/edge','Safe-suggestion filter','A SQL LIKE %prefix% per keystroke'],correct:[0,1,2,3]},
   {t:'htmlviz',h:'4 · Architecture',html:'',setup:function(root){root.innerHTML=archDiagram({w:800,h:306,cap:'Keystrokes hit an in-memory serving tier (CDN/edge) backed by a precomputed prefix→top-k index (trie). A streaming frequency pipeline rebuilds the index for trending; a safe-suggestion filter strips unsafe results.',nodes:[{x:18,y:132,w:120,t:'Client',c:'gray'},{x:165,y:132,w:185,t:'Serving tier',s:'in-mem + CDN',c:'green'},{x:400,y:40,w:185,t:'Prefix → top-k',s:'trie index',c:'blue'},{x:400,y:224,w:185,t:'Freq pipeline',s:'stream',c:'purple'},{x:625,y:40,w:160,t:'Safe filter',s:'block unsafe',c:'red'}],edges:[[0,1],[1,2],[3,2],[2,4]]});}},
   {t:'mcq',q:'5 · Bottleneck?',o:['index rebuild','per-keystroke read latency at scale','storage','the filter'],a:1,why:'Every keystroke is a query; serve from memory/edge and debounce on the client. Rebuilds happen offline.'},
   {t:'recall',q:'6 · Deep dive + failure.',model:['Stream-count queries → periodically rebuild prefix→top-k (trie) → push to in-memory/edge serving; debounce client input.','Trending: decay old counts so fresh terms surface; filter unsafe suggestions before publish.','Failure: rebuild job fails → keep serving the last good index (stale but available); bad index → fast rollback to previous version.']}
  ]},
  {id:'mock-13',title:'Distributed job scheduler',steps:[
   {t:'teach',h:'1 · Requirements',body:[
     {k:'tldr',t:'Design a distributed job scheduler.'},
     {k:'spoiler',items:[
       {k:'reqs',i:'✅',label:'Functional',items:['enqueue immediate and delayed jobs','workers claim, heartbeat, complete, or fail jobs','support retries, priority, cancellation, and dead-letter handling']},
       {k:'reqs',i:'📐',label:'NFRs',items:['durable jobs','high worker throughput','at-least-once delivery with exactly-once effect','no two workers successfully complete the same leased job']}
     ]}
   ]},
   {t:'recall',q:'2 · Entities + 3 · API.',model:['Entity: <code>jobs(id,type,payload,status,run_at,priority,attempts,max_attempts,lease_token,locked_until,idempotency_key)</code>','<code>POST /jobs</code> with an idempotency key → enqueue delayed/priority job','<code>POST /workers/{id}:claim</code> → due jobs + lease token','<code>POST /jobs/{id}:heartbeat|complete|fail|cancel</code> with the lease token']},
   {t:'mcq',q:'What is the correct guarantee to promise?',o:['exactly-once execution','at-least-once delivery + idempotent handler = exactly-once effect','best-effort fire-and-forget','a global lock around every job'],a:1,why:'A worker can crash after doing the external effect but before acking. You cannot guarantee exactly-once execution; you design idempotent effects with keys/results so redelivery is safe.'},
   {t:'build',q:'4 · High-level components.',options:['Job API with idempotency keys','Durable job store indexed by (status, run_at, priority)','Worker pool with leases + heartbeats','Retry/backoff scheduler + DLQ','Outbox/effect idempotency table','One long DB transaction per running job'],correct:[0,1,2,3,4]},
   {t:'htmlviz',h:'4 · Architecture',html:'',setup:function(root){root.innerHTML=archDiagram({w:820,h:330,cap:'Clients enqueue durable jobs with idempotency keys. Workers claim due jobs ordered by priority, receive a short lease token, heartbeat while running, and complete/fail only if the token still matches. Failed jobs move back to the due queue with backoff; poison jobs land in a DLQ. Effects are idempotent because execution is at-least-once.',nodes:[{x:18,y:132,w:120,t:'Client',c:'gray'},{x:165,y:132,w:140,t:'Job API',s:'idempotent enqueue',c:'blue'},{x:345,y:40,w:180,t:'Job store',s:'run_at + priority',c:'gray'},{x:345,y:224,w:180,t:'Retry scheduler',s:'backoff + jitter',c:'amber'},{x:560,y:40,w:230,t:'Worker pool',s:'claim + lease + heartbeat',c:'green'},{x:560,y:224,w:105,t:'DLQ',s:'poison jobs',c:'red'},{x:685,y:224,w:105,t:'Effect store',s:'dedupe keys',c:'purple'}],edges:[[0,1],[1,2],[2,4],[4,2],[4,3],[3,2],[3,5],[4,6]]});}},
   {t:'mcq',q:'A worker lease expires, another worker reclaims the job, then the old worker tries to complete. What prevents corruption?',o:['hope the old worker exits','complete with a matching lease token / fencing check','a longer timeout only','turn off retries'],a:1,why:'Completion must be conditional: UPDATE ... WHERE id=? AND lease_token=? AND locked_until>now(). The stale worker no longer has the valid fencing token.'},
   {t:'mcq',q:'How should retries be scheduled?',o:['retry instantly forever','retry with exponential backoff + jitter, then DLQ after max_attempts','drop failed jobs','block the whole queue'],a:1,why:'Backoff avoids retry storms; jitter spreads load; max_attempts + DLQ isolate poison jobs for inspection/replay.'},
   {t:'recall',q:'6 · Deep dive + failure.',model:['Claim query: due queued jobs ordered by priority/run_at, using <code>FOR UPDATE SKIP LOCKED</code> or an equivalent atomic claim; set <code>lease_token</code> and <code>locked_until</code>.','Complete/fail is fenced by the lease token. Expired leases become claimable again, so handlers must be idempotent.','Exactly-once effect: unique effect key / result table / downstream idempotency key prevents duplicate emails, charges, exports, etc.','Failure: poison job retries with backoff + jitter, then DLQ; stuck worker stops heartbeating and another worker reclaims after timeout.']}
  ]},
  {id:'mock-crawler',title:'Web crawler',steps:[
   {t:'teach',h:'1 · Requirements',body:[
     {k:'tldr',t:'Design a web crawler that feeds a search engine’s index.'},
     {k:'spoiler',items:[
       {k:'reqs',i:'✅',label:'Functional',items:['start from seed URLs, fetch pages, extract links, follow them (a BFS of the web)','parse + store page content for downstream indexing','respect <code>robots.txt</code>','re-crawl pages to keep the index fresh']},
       {k:'reqs',i:'📐',label:'NFRs',items:['scale to <b>billions</b> of pages','<b>politeness</b> — never hammer one domain','crawl each URL/page roughly <b>once</b> (dedupe)','fault-tolerant + <b>resumable</b>; extensible to images/PDFs later']}
     ]}
   ]},
   {t:'recall',q:'2 · Entities + 3 · the core interfaces. Say them out loud.',model:['Entity: <code>pages(url PK, content_hash, status, fetched_at, next_crawl_at)</code>','<code>seen</code> — a Bloom filter / set of URL fingerprints (was this URL ever enqueued?)','<code>robots_cache(domain, rules, crawl_delay, fetched_at)</code>','Frontier ops: <code>frontier.add(url, priority)</code> and <code>url = frontier.next()</code> → a URL that is polite to fetch right now']},
   {t:'teach',h:'The URL frontier is the whole design',body:[
     {k:'tldr',t:'The frontier is the queue of URLs still to crawl. It must serve two competing goals at once: crawl important pages first (priority) and never overload a single host (politeness).'},
     {k:'point',i:'⭐',t:'<b>Priority</b>: a prioritizer scores each URL (page rank, freshness, depth) and drops it into one of several <b>front queues</b> by priority band. High-value pages get pulled more often.'},
     {k:'point',i:'🤝',t:'<b>Politeness</b>: a router pins each host to exactly <b>one back queue</b>, so all of a domain’s URLs sit together and only one worker pulls it — one in-flight request per host. A heap keyed by each queue’s <b>next-allowed-fetch time</b> enforces the per-host <code>crawl_delay</code>.'},
     {k:'callout',c:'warn',t:'Front queues = <b>what to crawl next</b>; back queues = <b>when it’s polite to</b>. Forgetting politeness is the classic way to get your crawler IP-banned.'}
   ]},
   {t:'htmlviz',h:'URL frontier — priority meets politeness',
    html:`<style>
.fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fr .col{border:2px solid var(--line);border-bottom-width:4px;border-radius:14px;padding:12px 13px;display:flex;flex-direction:column;gap:8px}
.fr .col.f{border-color:var(--blue)}.fr .col.b{border-color:var(--green)}
.fr h4{font-size:15px;font-weight:900;margin:0;color:var(--ink)}
.fr .tag{font-size:11px;font-weight:900;text-transform:uppercase;letter-spacing:.4px;color:var(--muted);margin-top:-4px}
.fr .q{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:11.5px;background:var(--panel);border-radius:9px;padding:6px 9px;color:var(--ink);display:flex;justify-content:space-between;gap:8px}
.fr ul{list-style:none;margin:2px 0 0;padding:0;display:flex;flex-direction:column;gap:4px}
.fr li{font-size:12.5px;font-weight:700;line-height:1.35;color:var(--ink);display:flex;gap:6px}
.fr li::before{content:'›';color:var(--muted);font-weight:900}
.fr-cap{font-size:13px;color:var(--muted);font-weight:700;line-height:1.55;margin-top:10px;padding:10px 13px;background:var(--panel);border-radius:12px}
.fr-cap b{color:var(--ink)}
@media(max-width:560px){.fr{grid-template-columns:1fr}}
</style>
<div class="fr">
  <div class="col f">
    <h4>Front queues</h4><div class="tag">priority — what next</div>
    <div class="q"><span>F1 · high</span><span>news, homepages</span></div>
    <div class="q"><span>F2 · med</span><span>normal pages</span></div>
    <div class="q"><span>F3 · low</span><span>deep / stale</span></div>
    <ul><li>Prioritizer scores each URL (rank, freshness, depth)</li><li>Pulled more often from higher bands</li></ul>
  </div>
  <div class="col b">
    <h4>Back queues</h4><div class="tag">politeness — when</div>
    <div class="q"><span>B1 → a.com</span><span>next: 0.0s</span></div>
    <div class="q"><span>B2 → b.org</span><span>next: 1.2s</span></div>
    <div class="q"><span>B3 → c.net</span><span>next: 0.4s</span></div>
    <ul><li>One host per queue → 1 request in flight per host</li><li>Heap by next-fetch time enforces crawl_delay</li></ul>
  </div>
</div>
<div class="fr-cap"><b>Two queues, two jobs.</b> A URL flows prioritizer → front queue (by importance) → router → back queue (by host). A worker always pulls the back queue whose next-fetch time is due, fetches one URL, then pushes that host’s next-allowed time forward. Priority decides <b>order</b>; back queues guarantee <b>politeness</b>.</div>`},
   {t:'mcq',q:'How do you stop the crawler from overloading any single website?',o:['crawl as fast as the network allows','route each host to one back queue + gate it by a per-host crawl_delay','add more fetcher machines','retry failed fetches faster'],a:1,why:'Politeness is per-host, not global. Pin each domain to a single back queue so only one request to it is in flight, and gate each queue by a next-fetch time that respects robots.txt crawl_delay. More machines without politeness just gets you banned faster.'},
   {t:'build',q:'4 · Pick the high-level components.',options:['URL frontier (priority + politeness queues)','Fetchers (DNS resolve → HTTP GET)','Parser / link extractor','Seen-URL filter (Bloom) + content-hash dedupe','robots.txt cache','Raw-page object store + metadata DB','A relational join across every page'],correct:[0,1,2,3,4,5]},
   {t:'htmlviz',h:'4 · Architecture',html:'',setup:function(root){root.innerHTML=archDiagram({w:860,h:360,cap:'Seeds prime the <b>frontier</b>. Fetchers pull polite URLs (consulting the <b>robots.txt cache</b>), download pages, and hand them to the <b>parser</b>, which stores raw HTML + metadata and extracts new links. Each new link passes the <b>seen filter</b> (Bloom + content hash); if fresh, it loops back into the frontier. The fetch → parse → enqueue loop <em>is</em> the crawler.',nodes:[{x:18,y:152,w:115,t:'Seed URLs',c:'gray'},{x:160,y:152,w:150,t:'URL frontier',s:'priority + politeness',c:'blue'},{x:345,y:48,w:155,t:'Fetchers',s:'DNS → HTTP GET',c:'green'},{x:345,y:256,w:155,t:'robots.txt cache',s:'rules + crawl_delay',c:'purple'},{x:535,y:48,w:160,t:'Parser / extractor',s:'pull links + text',c:'blue'},{x:535,y:256,w:160,t:'Seen filter',s:'Bloom + content hash',c:'amber'},{x:720,y:48,w:130,t:'Page store',s:'raw HTML + meta',c:'gray'}],edges:[[0,1],[1,2],[3,2],[2,4],[4,6],[4,5],[5,1]]});}},
   {t:'mcq',q:'Two different URLs return byte-identical content (a syndicated article). What catches that, and what catches a re-seen URL?',o:['both caught by the same URL set','content hash catches duplicate bodies; a Bloom filter of URL fingerprints catches re-seen URLs','only re-crawl scheduling','a relational UNIQUE constraint on the URL'],a:1,why:'Two layers. A Bloom filter over URL fingerprints answers “have I enqueued this URL?” cheaply at huge scale (rare false positives just skip a page — acceptable). A content hash (or SimHash for near-duplicates) answers “have I already stored this body?”, so syndicated/mirrored pages don’t bloat the index.'},
   {t:'teach',h:'Failure mode: crawler traps',body:[
     {k:'tldr',t:'Some sites generate infinite URL spaces — a calendar with a “next month” link forever, session ids in the query string, faceted-search permutations. A naive BFS pours its whole budget into one trap.'},
     {k:'point',i:'📏',t:'<b>Bound the crawl</b>: a max depth per page, plus a per-domain URL budget so no single host monopolizes the frontier.'},
     {k:'point',i:'🧹',t:'<b>URL normalization</b>: strip session ids / tracking params, lowercase the host, resolve <code>.</code> and <code>..</code> — so trivially-different URLs collapse to one fingerprint.'},
     {k:'point',i:'🐢',t:'<b>DNS is a hidden bottleneck</b>: a fresh lookup per fetch is slow — cache DNS aggressively.'}
   ]},
   {t:'mcq',q:'A site’s calendar has an endless chain of “next month” links and your crawler is stuck on it forever. Fix?',o:['add more fetchers','depth limit + per-domain URL budget + URL normalization','crawl it faster to get it over with','blocklist the whole domain'],a:1,why:'This is a crawler trap — an infinite URL space. Cap depth, cap how many URLs you take from one domain, and normalize URLs so trap variations collapse to one fingerprint. You cannot out-fetch infinity.'},
   {t:'recall',q:'6 · Deep dive + a failure mode.',model:['Frontier = front queues (priority) + back queues (one host each, gated by next-fetch time) — the core of the design.','Dedupe in two layers: Bloom filter of URL fingerprints (seen URL?) + content hash / SimHash (seen body?).','Scale: shard the frontier by host hash across crawler nodes; cache DNS and robots.txt; store raw HTML in object storage, metadata in a KV/DB.','Freshness: schedule re-crawls by observed change rate — news hourly, static pages rarely.','Failure: crawler traps / infinite spaces → depth + per-domain budget + normalization; a dead fetcher just means its in-flight URLs time out and return to the frontier (resumable).']}
  ]},
  {id:'mock-search',title:'Search engine (indexing + serving)',steps:[
   {t:'teach',h:'1 · Requirements',body:[
     {k:'tldr',t:'Design the search engine that serves queries over a crawled corpus — the layer <b>after</b> the crawler.'},
     {k:'spoiler',items:[
       {k:'reqs',i:'✅',label:'Functional',items:['full-text query → <b>ranked</b> documents','pagination','newly-crawled docs become searchable (freshness)']},
       {k:'reqs',i:'📐',label:'NFRs',items:['low latency (<b>&lt;200ms</b>)','<b>billions</b> of documents','high read QPS','near-real-time index updates']}
     ]}
   ]},
   {t:'recall',q:'2 · Entities + 3 · API. Say them out loud.',model:['Entity: <code>documents(doc_id PK, url, title, body, lang, fetched_at)</code>','The <b>inverted index</b>: <code>term → posting list [(doc_id, term_freq, positions)]</code>','<code>GET /search?q=…&page=…</code> → ranked <code>doc_id</code>s → hydrate title/url/snippet','Indexer ingests crawled docs and appends to each term’s posting list']},
   {t:'teach',h:'The inverted index is the core',body:[
     {k:'tldr',t:'A search engine never scans documents at query time. It flips the data around: instead of <i>doc → words</i>, it stores <b>word → docs</b>.'},
     {k:'point',i:'🔁',t:'<b>Inverted index</b>: each term maps to a sorted <b>posting list</b> of doc ids. A query <b>intersects</b> (AND) or merges (OR) those lists — work proportional to <i>matching</i> docs, never the whole corpus.'},
     {k:'point',i:'🔨',t:'<b>Build</b>: tokenize + normalize each doc (lowercase, stem, drop stopwords), then append its <code>doc_id</code> to every term it contains. Postings also carry term frequency + positions → ranking and phrase matching.'},
     {k:'point',i:'🧱',t:'<b>Immutable segments</b>: indexes are written as read-only segments and merged in the background (Lucene-style). New docs land in a small fresh segment → searchable in minutes.'},
     {k:'callout',c:'warn',t:'Scanning every document for the query string is the trap. The inverted index turns search into a posting-list lookup + merge.'}
   ]},
   {t:'htmlviz',h:'Inverted index — word → docs',
    html:`<style>
.invx{display:flex;flex-direction:column;gap:8px}
.invx .row{display:grid;grid-template-columns:110px 1fr;gap:10px;align-items:center}
.invx .term{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:13px;font-weight:900;color:var(--ink);background:var(--panel);border-radius:9px;padding:7px 10px;text-align:center}
.invx .post{display:flex;gap:6px;flex-wrap:wrap}
.invx .doc{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:12px;font-weight:800;border:2px solid var(--line);border-radius:8px;padding:4px 9px;color:var(--muted)}
.invx .doc.hit{border-color:var(--green);color:var(--green-d)}
.invx-cap{font-size:13px;color:var(--muted);font-weight:700;line-height:1.55;margin-top:10px;padding:10px 13px;background:var(--panel);border-radius:12px}
.invx-cap b{color:var(--ink)}
</style>
<div class="invx">
  <div class="row"><div class="term">"search"</div><div class="post"><span class="doc">d1</span><span class="doc hit">d4</span><span class="doc hit">d9</span><span class="doc">d23</span></div></div>
  <div class="row"><div class="term">"engine"</div><div class="post"><span class="doc hit">d4</span><span class="doc hit">d9</span><span class="doc">d12</span></div></div>
  <div class="row"><div class="term">"cache"</div><div class="post"><span class="doc">d2</span><span class="doc">d7</span><span class="doc">d18</span></div></div>
</div>
<div class="invx-cap"><b>The index is flipped.</b> Store <b>word → docs</b> (a sorted posting list per term), not doc → words. The query <code>"search engine"</code> intersects both lists → <b>d4, d9</b> — touching only matching docs, never the corpus. Each posting carries term frequency + positions, which feed ranking (BM25) and phrase matching.</div>`},
   {t:'mcq',q:'Why an inverted index instead of scanning documents for the query terms?',o:['it uses less disk','a query becomes a posting-list lookup + merge — work scales with matches, not corpus size','it makes writes faster','it removes the need to rank'],a:1,why:'Scanning billions of docs per query is hopeless. The inverted index maps term → sorted doc-id postings, so a query intersects/merges a few lists and touches only matching documents. Ranking still runs, but only over that candidate set.'},
   {t:'build',q:'4 · Pick the high-level components.',options:['Indexer (tokenize → postings, build segments)','Sharded inverted index','Query coordinator (scatter-gather)','Ranker (BM25 over candidates)','Result / query cache','A single SQL table with LIKE %q%'],correct:[0,1,2,3,4]},
   {t:'htmlviz',h:'4 · Architecture',html:'',setup:function(root){root.innerHTML=archDiagram({w:780,h:330,cap:'A query hits the <b>coordinator</b>, which <b>scatters</b> it to every index shard; each shard returns its local top-k from its posting lists, and the coordinator <b>gathers</b>, merges, and re-ranks (BM25) before hydrating doc metadata. Separately, the <b>indexer</b> tokenizes crawled docs into postings and writes immutable segments to the shards. Query path and index-build path are independent.',nodes:[{x:18,y:142,w:110,t:'Client',s:'GET /search',c:'gray'},{x:150,y:142,w:170,t:'Coordinator',s:'scatter-gather + BM25',c:'blue'},{x:360,y:48,w:160,t:'Index shard 1',s:'⅓ of docs',c:'green'},{x:360,y:218,w:160,t:'Index shard N',s:'…',c:'green'},{x:560,y:48,w:175,t:'Indexer',s:'tokenize → postings',c:'purple'},{x:560,y:218,w:175,t:'Crawled corpus',s:'from the crawler',c:'gray'}],edges:[[0,1],[1,2],[1,3],[5,4],[4,2],[4,3]]});}},
   {t:'mcq',q:'5 · How do you shard a billion-document index?',o:['by term — each shard owns a slice of the vocabulary','by document — each shard holds a subset of docs; every query scatter-gathers across all shards','one giant index, no sharding','by user'],a:1,why:'Document partitioning is the default: each shard indexes a slice of the corpus, every query fans out to all shards, and each returns a local top-k that the coordinator merges. It balances load and parallelizes ranking. Term partitioning (a shard per vocabulary slice) avoids fan-out but makes multi-term queries hit and join across specific hot shards — usually worse.'},
   {t:'teach',h:'Deep dive: ranking, freshness, tail latency',body:[
     {k:'tldr',t:'Three things separate a toy from a real search engine: relevance, freshness, and the tail.'},
     {k:'point',i:'🏅',t:'<b>Ranking</b>: score candidates with <b>BM25</b> (term frequency, inverse document frequency, doc-length normalization) — sturdier than raw TF-IDF. Optionally re-rank just the top-k with a learned model.'},
     {k:'point',i:'🌿',t:'<b>Freshness</b>: new docs go into a small in-memory segment that’s immediately searchable, then merged into larger segments in the background — near-real-time without rebuilding everything.'},
     {k:'point',i:'⏱️',t:'<b>Tail latency</b>: scatter-gather makes the <b>slowest shard</b> your query latency. Replicate shards and use hedged requests, per-shard timeouts, and partial results so one slow node can’t stall the whole query.'}
   ]},
   {t:'mcq',q:'Your p50 search latency is great but p99 is terrible. Most likely cause and fix?',o:['the inverted index is too small','scatter-gather: the slowest shard gates every query — add shard replicas + hedged requests + timeouts','BM25 is too slow — drop ranking','clients aren’t caching'],a:1,why:'A query is only done when its slowest shard replies, so tail latency tracks the worst shard, not the average. Replicate shards and hedge (send to two replicas, take the first), cap per-shard time, and return partial results rather than waiting forever.'},
   {t:'recall',q:'6 · Deep dive + a failure mode.',model:['Inverted index (term → posting list) is the core; queries intersect/merge postings, never scan docs.','Shard by document; the coordinator scatter-gathers, each shard returns a local top-k, coordinator merges + ranks (BM25).','Freshness: new docs → small fresh segment (searchable now) → background-merged into larger immutable segments.','Tail latency: shard replicas + hedged requests + per-shard timeouts + partial results.','Failure: a shard (or replica) is down → serve from its replica, or return partial results and flag degraded recall rather than failing the whole query.']}
  ]}
 ],

let toastT=null;

/* ---------------- helpers ---------------- */
const APP=()=>document.getElementById('app');
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function lessonById(id){for(const u of UNITS)for(const l of u.lessons)if(l.id===id)return{u,l};return null;}
const GOOD_PCT=80; // best score at/above this counts as a ✓ pass (no retry nudge)
function tierOf(id){if(!S.done[id])return null;if(S.perfect[id])return 'perfect';return (S.best[id]||0)>=GOOD_PCT?'good':'partial';}
function unitProgress(u){const total=u.lessons.length+1;let d=0;u.lessons.forEach(l=>{if(S.done[l.id])d++;});if(S.done['boss-'+u.id])d++;return{d,total};}
function unitUnlocked(ui){if(S.unlockAll||ui===0)return true;const prev=UNITS[ui-1];return !!S.done['boss-'+prev.id];}
function lessonUnlocked(u,li){if(S.unlockAll||li===0)return true;return !!S.done[u.lessons[li-1].id];}
function bossUnlocked(u){if(S.unlockAll)return true;return u.lessons.every(l=>S.done[l.id]);}

/* Revisit dot: a completed lesson that still contains a graded question you've never answered
   (e.g. quizzes added after you finished it). One-time seed below marks everything in your
   already-completed lessons as answered so the back-catalog doesn't all light up — except steps
   flagged nu:true, which are treated as "added this release" and so still flag. */
function seedAnswered(){
  if(S.answeredSeeded)return;
  UNITS.forEach(u=>u.lessons.forEach(l=>{
    if(!S.done[l.id])return;
    l.steps.forEach(s=>{if(isQuizStep(s.t)&&!s.nu)S.answered[sigOf(s)]=1;});
  }));
  S.answeredSeeded=1;save();
}
function lessonNeedsRevisit(l){
  if(!S.done[l.id])return false;
  return l.steps.some(s=>isQuizStep(s.t)&&!S.answered[sigOf(s)]);
}

/* ============================ LESSON RUNNER ============================ */
var R=null; // active run state
function isQuizStep(t){return t==='mcq'||t==='sort'||t==='match'||t==='order'||t==='build'||t==='cloze'||t==='recall';}
/* mock "Requirements" stage: a teach step with a masked spoiler — it's a timed recall, so the clock should tick on it */
function isMockReqStep(step){return step&&step.t==='teach'&&Array.isArray(step.body)&&step.body.some(b=>b.k==='spoiler');}
function stepBudget(s,base){
  // time allotted to one step. Multi-item steps (sort/match/order) require placing
  // each item one at a time, so they get time PER ITEM, not one flat question's worth.
  if(!isQuizStep(s.t)) return 0;
  const per=Math.max(8,Math.round(base*0.45));
  if(s.t==='sort'||s.t==='order') return Math.max(base,(s.items?s.items.length:1)*per);
  if(s.t==='match') return Math.max(base,(s.pairs?s.pairs.length:1)*per);
  if(s.t==='cloze') return Math.max(base,(Array.isArray(s.text)?s.text.filter(x=>x&&x.blank).length:1)*Math.max(10,Math.round(base*0.6)));
  return base; // mcq / build / recall — a single submit
}
function startLesson(id){
  const {u,l}=lessonById(id);
  const isMock=(u.id==='mock');
  const stageTime=300; // mock designs: a generous ~5 min budget per "explain it" stage, reset at each stage
  const t=isMock?stageTime:Math.max(60,l.steps.reduce((a,s)=>a+stepBudget(s,25),0)); // non-mock: ~25s/question, but multi-item sort/match/order steps get time per item
  R={mode:'lesson',unit:u,lesson:l,steps:l.steps,idx:0,frontier:0,hearts:HEARTS,combo:0,maxCombo:0,xp:0,correct:0,graded:0,mistakes:0,time:t,timeLeft:t,isMock:isMock,stageTime:stageTime,_stageIdx:-1};
  renderStep(); // renderStep starts/pauses the timer per step
}
/* run the countdown only on a fresh quiz step (or in boss mode); pause it on learning/review steps */
function manageTimer(){
  if(R.timeLeft==null){return;}
  const step=R.steps[R.idx];
  const active=(R.mode==='boss')||(R.idx>=R.frontier&&step&&(isQuizStep(step.t)||(R.isMock&&isMockReqStep(step))));
  if(active){startTimer();}else{stopTimer();}
}
function startBoss(uid){
  const u=UNITS.find(x=>x.id===uid);
  const steps=shuffle(u.boss.q).map(q=>({t:'mcq',q:q.q,o:q.o,a:q.a,boss:true}));
  R={mode:'boss',unit:u,bossTitle:u.boss.title,steps,idx:0,frontier:0,hearts:HEARTS,combo:0,maxCombo:0,xp:0,correct:0,graded:0,mistakes:0,time:u.boss.time,timeLeft:u.boss.time};
  startTimer();
  renderStep();
}
/* 🎲 Random-mix SPEED RUN: N random AUTO-GRADED questions of any type from any lesson, on one
   shared countdown. Recall is excluded (it self-grades + pauses the clock → can't be a timed sweep).
   Bonus: +50 for all-correct, +1 XP per leftover second. */
function startRandomMix(n){
  n=n||15;
  const sel=(Array.isArray(S.speedUnits)&&S.speedUnits.length)?S.speedUnits:null; // null = all chapters
  const units=(sel?UNITS.filter(u=>sel.includes(u.id)):UNITS).filter(u=>u.id!=='mock'); // never mix in guided mock-design questions
  const pool=units.flatMap(u=>u.lessons.flatMap(l=>l.steps)).filter(s=>isQuizStep(s.t)&&s.t!=='recall');
  if(pool.length<3){toast(sel?'Not enough questions in the chosen chapters — pick more.':'Not enough questions to mix yet.');return;}
  const steps=shuffle(pool).slice(0,Math.min(n,pool.length));
  const time=steps.reduce((a,s)=>a+stepBudget(s,12),0); // ~12s/question, more for multi-item sort/match/order, pooled across the run
  R={mode:'speed',source:'mix',unit:{id:'speed'},steps,idx:0,frontier:0,hearts:HEARTS,combo:0,maxCombo:0,xp:0,correct:0,graded:0,mistakes:0,time,timeLeft:time};
  renderStep(); // manageTimer() starts the clock (speed mode keeps it active)
}
/* Standalone LLM coach tool — interactive widget only, no timer/hearts/scoring. */
function openTool(id){
  const t=TOOLS.find(x=>x.id===id);if(!t)return;
  stopTimer();
  APP().innerHTML='<div class="lhead"><button class="close" id="quitBtn">×</button></div><div class="stage" id="stage"></div>';
  document.getElementById('quitBtn').onclick=()=>renderHome();
  const stage=document.getElementById('stage');
  let s='<div class="q-sub">🤖 LLM coach</div><div class="q-title">'+t.title+'</div>';
  t.steps.forEach(step=>{
    if(step.t==='teach')step.body.forEach(b=>s+=blockHTML(b));
    else if(step.t==='htmlviz')s+='<div class="htmlviz" data-viz>'+step.html+'</div>';
  });
  stage.innerHTML=s;
  const roots=stage.querySelectorAll('[data-viz]');let vi=0;
  t.steps.forEach(step=>{if(step.t==='htmlviz'&&step.setup){try{step.setup(roots[vi++]);}catch(e){}}});
  try{window.scrollTo(0,0);}catch(e){}
}
function startReview(){
  let pool=Object.values(S.mistakes);
  if(S.reviewSkipRecall)pool=pool.filter(s=>s.t!=='recall');
  const steps=shuffle(pool).slice(0,15);
  if(!steps.length){toast(S.reviewSkipRecall?'No non-explain-it mistakes to review 🎉':'No mistakes to review — nice! 🎉');return;}
  R={mode:'review',source:'mistakes',unit:{id:'review'},steps,idx:0,frontier:0,hearts:99,combo:0,maxCombo:0,xp:0,correct:0,graded:0,mistakes:0};
  renderStep();
}
function startRecallReview(){
  const steps=shuffle(UNITS.flatMap(u=>u.lessons.flatMap(l=>l.steps)).filter(s=>s.t==='recall'));
  if(!steps.length){toast('No explain-it questions found.');return;}
  R={mode:'review',source:'recall',unit:{id:'recall'},steps,idx:0,frontier:0,hearts:99,combo:0,maxCombo:0,xp:0,correct:0,graded:0,mistakes:0};
  renderStep();
}
function startUnitRecall(uid){
  const u=UNITS.find(x=>x.id===uid);
  const steps=shuffle(u.lessons.flatMap(l=>l.steps).filter(s=>s.t==='recall'));
  if(!steps.length){toast('No explain-it questions in this unit.');return;}
  R={mode:'review',source:'unitrecall',unit:u,steps,idx:0,frontier:0,hearts:99,combo:0,maxCombo:0,xp:0,correct:0,graded:0,mistakes:0};
  renderStep();
}

let timerH=null;
function fmtTime(s){return s>=60?(Math.floor(s/60)+':'+String(s%60).padStart(2,'0')):(s+'s');}
function startTimer(){
  stopTimer();
  timerH=setInterval(()=>{
    R.timeLeft--;
    const el=document.getElementById('timerTxt');
    if(el){el.textContent=fmtTime(R.timeLeft);el.parentElement.classList.toggle('low',R.timeLeft<=15);}
    if(R.timeLeft<=0){stopTimer();finishRun(true);}
  },1000);
}
function stopTimer(){if(timerH){clearInterval(timerH);timerH=null;}}
/* Revealing the requirements answer = you're done recalling → stop the clock (mirrors the recall step's Reveal). */
function toggleSpoiler(el){el.classList.toggle('revealed');if(el.classList.contains('revealed')){stopTimer();const t=document.querySelector('.timer');if(t)t.classList.add('paused');}}

function topbarHTML(){
  const pct=Math.round(R.idx/R.steps.length*100);
  const curStep=R.steps[R.idx];
  const canSkip=(R.idx>=R.frontier)&&curStep&&isQuizStep(curStep.t)&&R.mode!=='speed';
  const aheadNew=nextUnseenIdx()>=0; // a never-answered question is ahead → offer the jump
  const curNew=!aheadNew&&R.mode==='lesson'&&R.lesson&&S.done[R.lesson.id]&&curStep&&isQuizStep(curStep.t)&&!S.answered[sigOf(curStep)]; // sitting on the last new one
  let right='';
  if(R.timeLeft!=null){
    const step=R.steps[R.idx];
    const active=(R.mode==='boss')||(R.idx>=R.frontier&&step&&(isQuizStep(step.t)||(R.isMock&&isMockReqStep(step))));
    right=active
      ?'<div class="timer" title="'+(R.isMock?'~5 min per stage — refills at each explain-it step':'Beat the clock — it ticks on quiz steps. Run out of time and the round ends.')+'"><span>⏱️</span><span id="timerTxt">'+fmtTime(R.timeLeft)+'</span></div>'
      :'<div class="timer paused" title="Timer pauses while you learn — runs during quiz steps"><span>⏸</span><span>'+fmtTime(R.timeLeft)+'</span></div>';
  }
  const back=(R.idx>0&&R.mode!=='boss')?'<button class="lback" id="backBtn" title="Previous">←</button>':'';
  return '<div class="lhead">'
    +'<button class="close" id="quitBtn">×</button>'
    +back
    +'<div class="pbar"><i style="width:'+pct+'%"></i></div>'
    +'<div class="lhearts" title="Lives — a wrong answer costs one ❤️. Lose them all and the round ends (separate from the timer).">❤️ '+R.hearts+'</div>'
    +right
    +(aheadNew?'<button class="lskip lnew" id="newBtn" title="Jump to the next question you’ve never answered (added since you finished this lesson)">New →</button>':curNew?'<span class="lskip lnew" title="A new question added since you finished this lesson — answer it">✦ new</span>':'')
    +(canSkip?'<button class="lskip" id="skipBtn" title="Skip this question — it won’t count toward your score">Skip →</button>':'')
    +'</div>';
}

function renderStep(){
  if(R.idx>=R.steps.length){finishRun(false);return;}
  const step=R.steps[R.idx];
  // mock designs: refill the clock to a full ~5 min budget at the start of each "explain it" stage
  if(R.isMock&&R.idx>=R.frontier&&step&&(step.t==='recall'||isMockReqStep(step))&&R._stageIdx!==R.idx){R.timeLeft=R.stageTime;R._stageIdx=R.idx;}
  let h=topbarHTML()+'<div class="stage" id="stage"></div>';
  h+='<div class="combo" id="combo"></div>';
  APP().innerHTML=h;
  document.getElementById('quitBtn').onclick=()=>{stopTimer();if(R.mode!=='boss'){renderHome(R.mode==='lesson');return;}if(confirm('Quit the timed boss? Your attempt will be lost.'))renderHome(true);else startTimer();};
  const bb=document.getElementById('backBtn');if(bb)bb.onclick=backStep;
  const sk=document.getElementById('skipBtn');if(sk)sk.onclick=skipStep;
  const nb=document.getElementById('newBtn');if(nb)nb.onclick=jumpToNextUnseen;
  const stage=document.getElementById('stage');
  if(R.idx<R.frontier){renderReview(stage,step);}
  else{({teach:stTeach,mcq:stMcq,sort:stSort,match:stMatch,order:stOrder,build:stBuild,recall:stRecall,cloze:stCloze,vecviz:stVecViz,htmlviz:stHtmlViz}[step.t])(stage,step);}
  manageTimer();
  try{window.scrollTo(0,0);}catch(e){}
}
function backStep(){if(R.idx>0){R.idx--;renderStep();}}
/* Red-dot lessons only: index of the next never-answered quiz AHEAD of the current step (or -1). */
function nextUnseenIdx(){
  if(R.mode!=='lesson'||!R.lesson||!S.done[R.lesson.id])return -1;
  for(let i=R.idx+1;i<R.steps.length;i++){const s=R.steps[i];if(isQuizStep(s.t)&&!S.answered[sigOf(s)])return i;}
  return -1;
}
function jumpToNextUnseen(){const j=nextUnseenIdx();if(j<0)return;R.idx=j;R.frontier=j;/* land ON the never-answered question as FRESH — set frontier to it, not just forward, so a frontier already past j doesn't make renderStep show it as review */renderStep();}
function skipStep(){
  const step=R.steps[R.idx];
  // Skipping still means you've SEEN the question — mark it answered so the lesson keeps
  // your historical record for it instead of flagging it as never-answered ("missing").
  if(step&&isQuizStep(step.t)){S.answered[sigOf(step)]=1;save();}
  toast('⏭ Skipped — not scored');nextStep();
}
function renderReview(stage,step){
  if(step.t==='vecviz'){stVecViz(stage,step);return;}
  if(step.t==='htmlviz'){stHtmlViz(stage,step);return;}
  const ws=(R&&R.isMock&&isMockReqStep(step));
  let h='<div class="q-sub">↩ Review (already answered)</div>';
  if(step.t==='teach'){h+='<div class="q-title">'+step.h+'</div>';step.body.forEach(b=>h+=blockHTML(b));if(ws)h+=mockWorksheetHTML();}
  else if(step.t==='mcq'){const pick=S.picks?S.picks[sigOf(step)]:undefined;const gotWrong=(pick!=null&&pick!==step.a);h+='<div class="q-title">'+step.q+'</div><div class="opts">';step.o.forEach((o,i)=>{let cls='dim';if(i===step.a)cls='correct';else if(i===pick)cls='wrong';h+='<div class="opt '+cls+'">'+o+'</div>';});h+='</div>';if(gotWrong)h+='<div class="rev-note">❌ You picked the red option. ✅ '+(step.why||'The green option is correct.')+'</div>';else if(step.why)h+='<div class="rev-note">✅ '+step.why+'</div>';}
  else if(step.t==='sort'){h+='<div class="q-title">'+step.q+'</div><div class="rev-list">'+step.items.map(it=>'<div>'+it.text+' → <b>'+step.buckets[it.b]+'</b></div>').join('')+'</div>';}

  else if(step.t==='order'){h+='<div class="q-title">'+step.q+'</div><div class="rev-list">'+step.items.map((t,n)=>'<div><b>'+(n+1)+'.</b> '+t+'</div>').join('')+'</div>';}
  else if(step.t==='build'){h+='<div class="q-title">'+step.q+'</div><div class="rev-list">'+step.correct.map(i=>'<div>✓ '+step.options[i]+'</div>').join('')+'</div>';if(step.why)h+='<div class="rev-note">✅ '+step.why+'</div>';}
  else if(step.t==='cloze'){h+='<div class="q-title">'+(step.q||'')+'</div><div class="rev-fill">'+step.text.map(t=>typeof t==='string'?t:'<b>'+t.blank+'</b>').join('')+'</div>';}
  else if(step.t==='recall'){h+='<div class="q-title">'+step.q+'</div>';h+='<div style="margin-top:12px"><h4 style="font-size:13px;font-weight:900;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:7px">Your answer (editable)</h4><div class="recall"><textarea id="raReview" placeholder="Jot your answer or say it aloud — edits save automatically."></textarea></div></div>';h+='<div class="model"><h4>Model answer</h4><ul>'+step.model.map(x=>'<li>'+x+'</li>').join('')+'</ul></div>';}
  stage.innerHTML=h;
  if(ws)wireWorksheet(); // keep the requirements input visible + restore what you wrote when stepping back
  // recall review → make "Your answer" editable, restoring + auto-saving to the same key as the live step
  if(step.t==='recall'){const raR=document.getElementById('raReview');if(raR){const rk=recallKey(step);try{raR.value=localStorage.getItem(rk)||'';}catch(e){}raR.addEventListener('input',function(){try{localStorage.setItem(rk,raR.value);}catch(e){}});}}

  stage.querySelectorAll('.v2-spoiler').forEach(function(s){s.classList.add('revealed');});

/* reusable prev/next stepper for htmlviz widgets. Panels (class panelClass) are pre-rendered in the html; this toggles visibility + dots + label. */
function vizStepper(root,n,opts){
  opts=opts||{};let cur=0;
  const dots=root.querySelector('.hv-dots');
  if(dots)for(let i=0;i<n;i++){const d=document.createElement('span');d.className='hv-dot';dots.appendChild(d);}
  const panels=root.querySelectorAll('.'+opts.panelClass);
  const prev=root.querySelector('.hv-prev'),next=root.querySelector('.hv-next'),lbl=root.querySelector('.hv-lbl');
  function show(){
    panels.forEach((p,i)=>{p.style.display=i===cur?'':'none';});
    root.querySelectorAll('.hv-dot').forEach((d,i)=>d.classList.toggle('on',i===cur));
    if(lbl&&opts.labels)lbl.textContent=opts.labels[cur];
    if(prev)prev.disabled=cur===0;
    if(next)next.disabled=cur===n-1;
  }
  if(prev)prev.addEventListener('click',()=>{if(cur>0){cur--;show();}});
  if(next)next.addEventListener('click',()=>{if(cur<n-1){cur++;show();}});
  show();
}

/* feedback bar + advance */
function feedback(ok,msg,onNext){
  // Once an answer is checked, pause the countdown so the clock doesn't drain while you read the result.
  // Speed runs stay a pure race (no pause). The timer resumes on the next step via manageTimer().
  if(R&&R.timeLeft!=null&&R.mode!=='speed'){
    stopTimer();
    const tEl=document.querySelector('.timer');
    if(tEl){tEl.classList.add('paused');const ic=tEl.querySelector('span');if(ic)ic.textContent='⏸';}
  }
  const bar=document.createElement('div');
  bar.className='feedback '+(ok?'good':'bad');
  bar.innerHTML='<div class="inner"><h4>'+(ok?'✅ Nice!':'❌ Not quite')+'</h4><p>'+msg+'</p><button class="btn '+(ok?'':'red')+'" id="contBtn">Continue</button></div>';
  APP().appendChild(bar);
  let done=false;
  const go=()=>{if(done)return;done=true;clearTimeout(tm);bar.remove();onNext();};
  document.getElementById('contBtn').onclick=go;
  // auto-advance on a correct answer; wrong answers wait so you can read the explanation
  const tm=ok?setTimeout(go,3500):null;
}

/* heart / xp / combo bookkeeping for graded steps */
function grade(ok,gain){
  R.graded++;
  if(ok){R.correct++;R.combo++;R.maxCombo=Math.max(R.maxCombo,R.combo);const bonus=Math.max(0,R.combo-1)*2;R.xp+=gain+bonus;showCombo();}
  else{R.combo=0;R.hearts--;R.mistakes++;}
  const heartEl=document.querySelector('.lhearts');if(heartEl)heartEl.textContent='❤️ '+R.hearts;
}

/* mistake bank — records graded steps you miss, removes them once mastered */
function hashStr(s){let h=5381;for(let i=0;i<s.length;i++)h=((h<<5)+h+s.charCodeAt(i))>>>0;return h.toString(36);}
function sigOf(step){return step.q?(step.t+'|'+step.q):(step.t+'|'+JSON.stringify(step.text||step.items||step.pairs||step.options||''));}
// recall steps reuse generic titles ("2 · Entities + 3 · API.") across mocks, so the saved-answer storage key
// folds in the (distinct) model answer to stay unique per step. Kept SEPARATE from sigOf so answered/mistake
// tracking (and its revisit dots) is unaffected.
function recallKey(step){return 'sdp_recall_'+(step.q||'')+'|'+hashStr((step.model||[]).join('~'));}
function finishGraded(step,perfect){
  const sig=sigOf(step);
  S.answered[sig]=1;  // you've now actually answered this question → clears any revisit dot
  if(perfect){if(S.mistakes[sig])delete S.mistakes[sig];}
  else{const c=Object.assign({},step);delete c.__d;S.mistakes[sig]=c;}
  save();
}

  if(b.k==='cause')return '<div class="cause"><div class="box">'+b.a+'</div><div class="arrow">→</div><div class="box">'+b.b+'</div></div>';

  if(b.k==='callout')return '<div class="callout '+b.c+'"><span>'+(b.c==='warn'?'⚠️':b.c==='mem'?'🧠':'💡')+'</span><span>'+b.t+'</span></div>';
  if(b.k==='note')return '<div class="callout note"><span>💡</span><span>'+b.t+'</span></div>';

/* Excalidraw-style architecture diagram from a {nodes,edges,cap} spec. Nodes: {x,y,w,h?,t,s?,c}. Edges: [fromIdx,toIdx]. */
function archDiagram(spec){
  var PAL={amber:['#fff3bf','#f08c00'],green:['#d3f9d8','#2f9e44'],blue:['#d0ebff','#1971c2'],gray:['#f1f3f5','#868e96'],purple:['#f3d9fa','#9c36b5'],red:['#ffc9c9','#e03131'],teal:['#c3fae8','#0ca678']};
  var N=spec.nodes, E=spec.edges||[], W=spec.w||806, H=spec.h||306;
  function hh(b){return b.h||62;}
  function ctr(b){return [b.x+b.w/2, b.y+hh(b)/2];}
  function edgePt(b,tx,ty){var c=ctr(b),dx=tx-c[0],dy=ty-c[1];if(!dx&&!dy)return c;var hw=b.w/2,hv=hh(b)/2,t=Math.min(dx?hw/Math.abs(dx):1e9, dy?hv/Math.abs(dy):1e9);return [c[0]+dx*t, c[1]+dy*t];}
  var lines='';
  E.forEach(function(p){var a=N[p[0]],b=N[p[1]],ca=ctr(a),cb=ctr(b),p1=edgePt(a,cb[0],cb[1]),p2=edgePt(b,ca[0],ca[1]);
    var ang=Math.atan2(p2[1]-p1[1],p2[0]-p1[0]);
    var h1=[p2[0]-10*Math.cos(ang-0.42),p2[1]-10*Math.sin(ang-0.42)], h2=[p2[0]-10*Math.cos(ang+0.42),p2[1]-10*Math.sin(ang+0.42)];
    function L(x1,y1,x2,y2){return '<path d="M'+x1.toFixed(1)+' '+y1.toFixed(1)+' L'+x2.toFixed(1)+' '+y2.toFixed(1)+'"/>';}
    lines+=L(p1[0],p1[1],p2[0],p2[1])+L(p2[0],p2[1],h1[0],h1[1])+L(p2[0],p2[1],h2[0],h2[1]);
  });
  var boxes='',txt='';
  N.forEach(function(b){var p=PAL[b.c]||PAL.gray,h=hh(b),cx=b.x+b.w/2,cy=b.y+h/2;
    boxes+='<rect x="'+b.x+'" y="'+b.y+'" width="'+b.w+'" height="'+h+'" rx="9" fill="'+p[0]+'" stroke="'+p[1]+'" stroke-width="2.5"/>';
    if(b.s){txt+='<text x="'+cx+'" y="'+(cy-2)+'" font-size="14.5" font-weight="700">'+b.t+'</text><text x="'+cx+'" y="'+(cy+15)+'" font-size="11" fill="'+p[1]+'">'+b.s+'</text>';}
    else{txt+='<text x="'+cx+'" y="'+(cy+5)+'" font-size="14.5" font-weight="700">'+b.t+'</text>';}
  });
  return '<div class="exarch"><svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">'
    +'<defs><filter id="rgh2" x="-5%" y="-15%" width="110%" height="130%"><feTurbulence type="fractalNoise" baseFrequency="0.013" numOctaves="2" seed="5" result="n"/><feDisplacementMap in="SourceGraphic" in2="n" scale="3.2"/></filter></defs>'
    +'<g filter="url(#rgh2)"><g fill="none" stroke="#495057" stroke-width="2.5" stroke-linecap="round">'+lines+'</g>'+boxes+'</g>'
    +'<g text-anchor="middle" fill="#1e1e1e">'+txt+'</g></svg>'
    +(spec.cap?'<div class="exarch-cap">'+spec.cap+'</div>':'')+'</div>';
}

/* ---------- step: vecviz (interactive version-vector walkthrough) ---------- */
/* ---- ported timeline clock viz (Lamport + vector), shared by htmlviz steps ---- */
const CLK_EVENTS=[
  {p:0,type:'local',col:1},
  {p:0,type:'send',msg:'m1',col:2},
  {p:1,type:'recv',msg:'m1',col:3},
  {p:1,type:'send',msg:'m2',col:4},
  {p:2,type:'recv',msg:'m2',col:5},
  {p:0,type:'local',col:6}
];
function computeClocks(){
  const L=[],V=[],lc=[0,0,0],vc=[[0,0,0],[0,0,0],[0,0,0]],msgL={},msgV={};
  CLK_EVENTS.forEach((e,idx)=>{
    if(e.type==='recv'){
      lc[e.p]=Math.max(lc[e.p],msgL[e.msg])+1;
      for(let i=0;i<3;i++)vc[e.p][i]=Math.max(vc[e.p][i],msgV[e.msg][i]);
      vc[e.p][e.p]++;
    }else{
      lc[e.p]++;vc[e.p][e.p]++;
      if(e.type==='send'){msgL[e.msg]=lc[e.p];msgV[e.msg]=vc[e.p].slice();}
    }
    L[idx]=lc[e.p];V[idx]=vc[e.p].slice();
  });
  return {L,V};
}
function makeClockViz(mount,mode,uid){
  const {L,V}=computeClocks();
  const names=['A','B','C'],laneY=[46,104,162],W=460,H=196;
  const colX=c=>72+(c-1)*64;
  const sendByMsg={};CLK_EVENTS.forEach((e,i)=>{if(e.type==='send')sendByMsg[e.msg]=i;});
  const msgs=[];CLK_EVENTS.forEach((e,i)=>{if(e.type==='recv')msgs.push({from:sendByMsg[e.msg],to:i});});
  const stamp=i=>mode==='lamport'?String(L[i]):'['+V[i].join(',')+']';
  const evtName=i=>names[CLK_EVENTS[i].p]+' '+stamp(i);
  function relation(a,b){let ale=true,ble=true,lt=false,gt=false;for(let k=0;k<3;k++){if(V[a][k]>V[b][k]){ale=false;gt=true;}if(V[a][k]<V[b][k]){ble=false;lt=true;}}if(ale&&lt)return'before';if(ble&&gt)return'after';return'concurrent';}
  let revealed=0,sel=[],caption='Press <b>Step</b> to advance the simulation event by event.',timer=null;
  function stepCaption(i){
    const e=CLK_EVENTS[i],nm=names[e.p];
    if(e.type==='local')return nm+' has a <b>local event</b> → '+(mode==='lamport'?('increment counter to <b>'+L[i]+'</b>'):('bump slot '+nm+' → <b>'+stamp(i)+'</b>'))+'.';
    if(e.type==='send')return nm+' <b>sends '+e.msg+'</b> → increment and attach '+(mode==='lamport'?('counter <b>'+L[i]+'</b>'):('vector <b>'+stamp(i)+'</b>'))+'.';
    return nm+' <b>receives '+e.msg+'</b> → '+(mode==='lamport'?('max(local, '+L[sendByMsg[e.msg]]+')+1 = <b>'+L[i]+'</b>'):('element-wise max with '+stamp(sendByMsg[e.msg])+', then bump slot '+nm+' = <b>'+stamp(i)+'</b>'))+'.';
  }
  function render(){
    let s='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">';
    s+='<defs><marker id="cvarr'+uid+'" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path class="cv-arrow" d="M0,0 L8,3 L0,6 Z"/></marker></defs>';
    for(let p=0;p<3;p++){s+='<line class="cv-lane" x1="50" y1="'+laneY[p]+'" x2="'+(W-12)+'" y2="'+laneY[p]+'"/><text class="cv-label" x="22" y="'+(laneY[p]+5)+'">'+names[p]+'</text>';}
    msgs.forEach(m=>{if(m.from<revealed&&m.to<revealed){const e1=CLK_EVENTS[m.from],e2=CLK_EVENTS[m.to];s+='<line class="cv-msg" x1="'+colX(e1.col)+'" y1="'+laneY[e1.p]+'" x2="'+colX(e2.col)+'" y2="'+laneY[e2.p]+'" marker-end="url(#cvarr'+uid+')"/>';}});
    for(let i=0;i<revealed;i++){const e=CLK_EVENTS[i],x=colX(e.col),y=laneY[e.p];s+='<text class="cv-stamp" x="'+x+'" y="'+(y-12)+'" text-anchor="middle">'+stamp(i)+'</text><circle class="cv-dot'+(sel.includes(i)?' sel':'')+'" data-i="'+i+'" cx="'+x+'" cy="'+y+'" r="7"/>';}
    s+='</svg>';
    s+='<div class="cv-controls"><button data-act="back"'+(revealed===0?' disabled':'')+'>◀ Back</button><button data-act="step"'+(revealed>=CLK_EVENTS.length?' disabled':'')+'>Step ▶</button><button data-act="play">Play</button><button data-act="reset">Reset</button><span class="cv-hint">'+(revealed<CLK_EVENTS.length?('Event '+revealed+' / '+CLK_EVENTS.length):'All revealed — tap two events to compare')+'</span></div>';
    s+='<div class="cv-cap">'+caption+'</div>';
    mount.innerHTML=s;
    mount.querySelectorAll('.cv-dot').forEach(d=>d.addEventListener('click',()=>onDot(+d.dataset.i)));
    mount.querySelectorAll('.cv-controls button').forEach(b=>b.addEventListener('click',()=>onAct(b.dataset.act)));
  }
  function onAct(a){
    if(timer){clearInterval(timer);timer=null;}
    if(a==='step'){if(revealed<CLK_EVENTS.length){caption=stepCaption(revealed);revealed++;}render();}
    else if(a==='back'){if(revealed>0){revealed--;sel=[];caption=revealed>0?stepCaption(revealed-1):'Press <b>Step</b> to advance the simulation event by event.';}render();}
    else if(a==='reset'){revealed=0;sel=[];caption='Press <b>Step</b> to advance the simulation event by event.';render();}
    else if(a==='play'){revealed=0;sel=[];caption='Playing…';render();timer=setInterval(()=>{if(revealed<CLK_EVENTS.length){caption=stepCaption(revealed);revealed++;render();}else{clearInterval(timer);timer=null;caption='Done. Tap two events to test their causal relationship.';render();}},850);}
  }
  function onDot(i){
    if(sel.includes(i))sel=sel.filter(x=>x!==i);else{sel.push(i);if(sel.length>2)sel.shift();}
    if(sel.length===2){const[a,b]=sel,r=relation(a,b);
      if(r==='concurrent')caption='<b>'+evtName(a)+'</b> ∥ <b>'+evtName(b)+'</b> — <b>concurrent</b> (neither vector dominates).'+(mode==='lamport'?' Their Lamport numbers ('+L[a]+', '+L[b]+') look ordered, but Lamport can’t prove this — only vector clocks can.':'');
      else{const[x,y]=r==='before'?[a,b]:[b,a];caption='<b>'+evtName(x)+'</b> → <b>'+evtName(y)+'</b> — causally <b>happened-before</b> (its vector is ≤ the other, strictly less in ≥1 slot).';}
    }else if(sel.length===1)caption='Selected <b>'+evtName(sel[0])+'</b>. Tap one more to compare.';
    else caption='Tap two events to compare their causal relationship.';
    render();
  }
  mount.addEventListener('click',e=>e.stopPropagation());
  render();
}

function stVecViz(stage,step){
  const nodes=step.nodes,frames=step.frames,nc=['na','nb','nc'];
  let f=0;
  const legend='each clock = [ '+nodes.map((n,i)=>'<span class="vv-tag '+nc[i]+'">'+n+'</span>').join(' , ')+' ]';
  function draw(){
    const fr=frames[f];
    let h='<div class="q-sub">🎬 Watch it run · use ← → to step</div><div class="q-title">'+step.h+'</div>';
    h+='<div class="vv-legend">'+legend+'</div>';
    h+='<div class="vv-cap">'+fr.cap+'</div>';
    h+='<div class="vv-grid">';
    nodes.forEach((nm,r)=>{
      const sending=fr.msg&&fr.msg.from===r,receiving=fr.msg&&fr.msg.to===r;
      h+='<div class="vv-row">';
      h+='<div class="vv-node '+nc[r]+'">'+nm+'</div>';
      h+='<div class="vv-vec">[ ';
      fr.v[r].forEach((val,c)=>{
        const hot=(fr.hi||[]).some(p=>p[0]===r&&p[1]===c);
        h+='<span class="vv-cell'+(hot?' hot':'')+'">'+val+'</span>';
        h+=c<fr.v[r].length-1?'<span class="vv-comma">, </span>':'';
      });
      h+=' ]</div>';
      if(sending)h+='<div class="vv-tagmsg out">sends ✉️</div>';
      else if(receiving)h+='<div class="vv-tagmsg in">📥 incoming…</div>';
      h+='</div>';
    });
    h+='</div>';
    if(fr.msg)h+='<div class="vv-msg">✉️ <b>'+nodes[fr.msg.from]+' → '+nodes[fr.msg.to]+'</b> &nbsp;carries clock '+fr.msg.label+'</div>';
    if(fr.verdict)h+='<div class="vv-verdict '+fr.verdict.cls+'">'+fr.verdict.t+'</div>';
    if(step.rule)h+='<div class="vv-rule">📏 '+step.rule+'</div>';
    h+='<div class="vv-nav"><button class="vv-btn" id="vzPrev"'+(f===0?' disabled':'')+'>← Prev</button>';
    h+='<div class="vv-dots">';
    frames.forEach((_,i)=>h+='<span class="vv-dot'+(i===f?' on':i<f?' seen':'')+'"></span>');
    h+='</div><button class="vv-btn" id="vzNext"'+(f===frames.length-1?' disabled':'')+'>Next →</button></div>';
    stage.innerHTML=h;
    const p=document.getElementById('vzPrev'),n=document.getElementById('vzNext');
    if(p)p.onclick=()=>{if(f>0){f--;draw();}};
    if(n)n.onclick=()=>{if(f<frames.length-1){f++;draw();}};
  }
  draw();
  footBtn('Got it',()=>nextStep());
}

/* ---------- step: mcq ---------- */
function stMcq(stage,step){
  // shuffle option order so the correct answer isn't always in the same slot
  const order=shuffle(step.o.map((_,i)=>i)), aIdx=order.indexOf(step.a);
  let h='<div class="q-sub">'+(step.boss?'⚡ Speed round':'🧩 Quick check')+'</div><div class="q-title">'+step.q+'</div><div class="opts">';
  order.forEach((orig,i)=>h+='<button class="opt" data-i="'+i+'">'+step.o[orig]+'</button>');
  h+='</div>';stage.innerHTML=h;
  let locked=false;
  stage.querySelectorAll('.opt').forEach(b=>b.onclick=()=>{
    if(locked)return;locked=true;
    const i=+b.dataset.i, ok=i===aIdx;
    stage.querySelectorAll('.opt').forEach((x,j)=>{x.classList.add('dim');if(j===aIdx)x.classList.add('correct');});
    b.classList.remove('dim');b.classList.add(ok?'correct':'wrong');
    S.picks[sigOf(step)]=order[i];  // remember which option you chose (original index), for the back/review view
    grade(ok,10);finishGraded(step,ok);
    if(R.hearts<=0&&!ok){setTimeout(()=>finishRun(false),650);return;}
    if(step.boss){setTimeout(()=>nextStep(),ok?550:900);}
    else feedback(ok,ok?(step.why||'Correct.'):(step.why||'Review and continue.'),nextStep);
  });
}

/* ---------- step: sort ---------- */
function stSort(stage,step){
  let qi=0,wrong=0;const items=shuffle(step.items);
  function draw(){
    if(qi>=items.length){finishGraded(step,wrong===0);nextStep();return;}
    const it=items[qi];
    let locked=false;
    stage.innerHTML='<div class="q-sub">👆 Sort it</div><div class="q-title">'+step.q+'</div>'
      +'<div class="sortcard" id="sc">'+it.text+'</div>'
      +'<div class="bucketrow"><button class="btn grey" data-b="0">'+step.buckets[0]+'</button><button class="btn blue" data-b="1">'+step.buckets[1]+'</button></div>';
    stage.querySelectorAll('[data-b]').forEach(btn=>btn.onclick=()=>{
      if(locked)return;locked=true;
      const b=+btn.dataset.b, ok=b===it.b;
      const sc=document.getElementById('sc');
      sc.classList.add(ok?'flash-g':'flash-r');
      grade(ok,6);if(!ok)wrong++;
      if(!ok)sc.textContent=it.text+'  →  '+step.buckets[it.b];
      if(R.hearts<=0&&!ok){setTimeout(()=>finishRun(false),700);return;}
      setTimeout(()=>{qi++;draw();},ok?420:950);
    });
  }
  draw();
}

/* ---------- step: match ---------- */
function stMatch(stage,step){
  const L=shuffle(step.pairs.map((p,i)=>({t:p[0],i})));
  const Rr=shuffle(step.pairs.map((p,i)=>({t:p[1],i})));
  let h='<div class="q-sub">🔗 Match pairs</div><div class="q-title">'+step.q+'</div><div class="matchgrid"><div class="matchcol" id="mL"></div><div class="matchcol" id="mR"></div></div>';
  stage.innerHTML=h;
  const cL=document.getElementById('mL'),cR=document.getElementById('mR');
  L.forEach(x=>{const b=document.createElement('button');b.className='mitem';b.textContent=x.t;b.dataset.i=x.i;b.dataset.side='L';cL.appendChild(b);});
  Rr.forEach(x=>{const b=document.createElement('button');b.className='mitem';b.textContent=x.t;b.dataset.i=x.i;b.dataset.side='R';cR.appendChild(b);});
  let selL=null,selR=null,left=step.pairs.length,wrong=0;
  function clearSel(){selL&&selL.classList.remove('sel');selR&&selR.classList.remove('sel');selL=selR=null;}
  function tryMatch(){
    if(!selL||!selR)return;
    if(selL.dataset.i===selR.dataset.i){
      [selL,selR].forEach(e=>{e.classList.remove('sel');e.classList.add('done');e.disabled=true;});
      grade(true,7);clearSel();left--;
      if(left===0){finishGraded(step,wrong===0);setTimeout(()=>nextStep(),450);}
    }else{
      const a=selL,b=selR;a.classList.add('bad');b.classList.add('bad');grade(false,0);wrong++;
      setTimeout(()=>{a.classList.remove('bad','sel');b.classList.remove('bad','sel');},350);clearSel();
      if(R.hearts<=0)setTimeout(()=>finishRun(false),500);
    }
  }
  stage.querySelectorAll('.mitem').forEach(b=>b.onclick=()=>{
    if(b.classList.contains('done'))return;
    if(b.dataset.side==='L'){selL&&selL.classList.remove('sel');selL=b;}
    else{selR&&selR.classList.remove('sel');selR=b;}
    b.classList.add('sel');tryMatch();
  });
}

/* ---------- step: order ---------- */
function stOrder(stage,step){
  const correct=step.items;
  const bank=shuffle(correct.map((t,i)=>({t,i})));
  let placed=[];
  function draw(){
    let h='<div class="q-sub">🔢 Put in order</div><div class="q-title">'+step.q+'</div>';
    h+='<div class="orderzone" id="zone">'+(placed.length?'':'<span class="muted" style="font-weight:700;font-size:13px">tap chips below in order…</span>')+'</div>';
    h+='<div class="bank" id="bank"></div>';
    stage.innerHTML=h;
    const zone=document.getElementById('zone');zone.innerHTML=placed.length?'':zone.innerHTML;
    placed.forEach((p,n)=>{const d=document.createElement('div');d.className='chip placed';d.innerHTML='<span class="num">'+(n+1)+'</span>'+p.t;zone.appendChild(d);});
    const bk=document.getElementById('bank');
    bank.forEach(b=>{if(placed.find(p=>p.id===b.i))return;const el=document.createElement('button');el.className='chip';el.textContent=b.t;el.onclick=()=>{placed.push({t:b.t,id:b.i});if(placed.length===correct.length)check();else draw();};bk.appendChild(el);});
    if(placed.length){footBtn('Undo last',()=>{placed.pop();draw();},'grey');}
  }
  function check(){
    let ok=placed.every((p,n)=>p.id===n);
    grade(ok,16);finishGraded(step,ok);
    let h='<div class="q-sub">🔢 Put in order</div><div class="q-title">'+step.q+'</div><div class="bank">';
    placed.forEach((p,n)=>{const right=p.id===n;h+='<div class="chip '+(right?'ok':'no')+'"><span class="num">'+(n+1)+'</span>'+p.t+(right?'  ✓':'  ✗')+'</div>';});
    h+='</div>';stage.innerHTML=h;
    clearFoot();
    if(R.hearts<=0&&!ok){setTimeout(()=>finishRun(false),700);return;}
    feedback(ok,ok?(step.reveal?'Perfect! '+step.reveal:'Perfect order!'):'Correct order: '+(step.reveal||correct.join(' → ')),nextStep);
  }
  draw();
}

/* ---------- step: build (multi-select) ---------- */
function stBuild(stage,step){
  const sel=new Set();
  let h='<div class="q-sub">🛠️ Build it</div><div class="q-title">'+step.q+'</div><div class="buildgrid" id="bg"></div>';
  stage.innerHTML=h;
  const bg=document.getElementById('bg');
  step.options.forEach((o,i)=>{const b=document.createElement('button');b.className='bopt';b.textContent=o;b.onclick=()=>{if(sel.has(i)){sel.delete(i);b.classList.remove('on');}else{sel.add(i);b.classList.add('on');}};bg.appendChild(b);});
  footBtn('Check',()=>{
    const correct=new Set(step.correct);
    const ok=sel.size===correct.size&&[...sel].every(i=>correct.has(i));
    bg.querySelectorAll('.bopt').forEach((b,i)=>{b.disabled=true;b.classList.remove('on');if(correct.has(i))b.classList.add('good');else if(sel.has(i))b.classList.add('miss');});
    grade(ok,16);finishGraded(step,ok);clearFoot();
    if(R.hearts<=0&&!ok){setTimeout(()=>finishRun(false),700);return;}
    const base=ok?'Exactly the right set!':'Green = correct picks.';
    feedback(ok,step.why?base+'<br><br>'+step.why:base,nextStep);
  });
}

/* ---------- step: recall (output / explain) ---------- */
function stRecall(stage,step){
  const rkey=recallKey(step);
  let h='<div class="q-sub">🗣️ Explain it (out loud!)</div><div class="q-title">'+step.q+'</div>'
    +'<div class="recall"><textarea id="ra" placeholder="Optional: jot your answer or say it aloud, then reveal."></textarea></div>';
  stage.innerHTML=h;
  const ra=document.getElementById('ra');
  try{ra.value=localStorage.getItem(rkey)||'';}catch(e){}
  ra.addEventListener('input',function(){try{localStorage.setItem(rkey,ra.value);}catch(e){}});
  footBtn('Reveal model answer',()=>{
    stopTimer(); // self-graded from here — stop the clock while you read + judge
    const tEl=document.querySelector('.timer');if(tEl)tEl.classList.add('paused');
    const m=document.createElement('div');m.className='model';
    m.innerHTML='<h4>Model answer</h4><ul>'+step.model.map(x=>'<li>'+x+'</li>').join('')+'</ul>'
      +'<div class="gradebtns"><button class="btn" data-g="2">Nailed it</button><button class="btn blue" data-g="1">Partly</button><button class="btn grey" data-g="0">Missed</button></div>';
    document.getElementById('stage').appendChild(m);
    clearFoot();
    m.querySelectorAll('[data-g]').forEach(b=>b.onclick=()=>{
      const g=+b.dataset.g;
      // recall is self-graded → kept OUT of the accuracy % (graded/correct untouched), but still earns XP + tracks recallNailed
      R.xp+= (g===2?15:g===1?8:3);
      if(g===2){S.recallNailed=(S.recallNailed||0)+1;}
      else{R.mistakes++;} // a self-acknowledged miss means the run isn't flawless (no flawless bonus / gold)
      // Partly / Missed → log for review; Nailed it → clears it from the review queue
      finishGraded(step,g===2);
      nextStep();
    });
  });
}

/* ---------- step: cloze (masked fill-in) ---------- */
function stCloze(stage,step){
  const tokens=step.text;
  const slotPos=[];tokens.forEach((t,i)=>{if(typeof t!=='string')slotPos.push(i);});
  const answers=slotPos.map(i=>tokens[i].blank);
  const bank=shuffle(answers.concat(step.distract||[]).map((w,i)=>({w,used:false,id:i})));
  const filled={};
  const norm=s=>String(s).toLowerCase().replace(/[^a-z0-9+>]/g,'');
  // grouped blanks are order-independent: any group member is accepted in any of its slots
  const groupAccept={};
  slotPos.forEach(i=>{const b=tokens[i];if(b.group){(groupAccept[b.group]=groupAccept[b.group]||[]).push(norm(b.blank),...(b.alt||[]).map(norm));}});
  const slotGood=(ti,got)=>{const ans=tokens[ti];if(ans.group)return groupAccept[ans.group].includes(norm(got));return norm(got)===norm(ans.blank)||(ans.alt||[]).some(a=>norm(a)===norm(got));};
  function nextEmpty(){for(let p=0;p<slotPos.length;p++)if(filled[p]==null)return p;return -1;}
  function allFilled(){return slotPos.every((_,p)=>filled[p]!=null);}
  function draw(){
    let h='<div class="q-sub">🧩 Masked recall — fill the blanks</div>';
    if(step.q)h+='<div class="q-title" style="font-size:17px">'+step.q+'</div>';
    h+='<div class="cloze">';let p=0;
    tokens.forEach(t=>{
      if(typeof t==='string'){h+='<span>'+t+'</span>';}
      else{const pos=p++;const bid=filled[pos];const w=bid!=null?bank.find(x=>x.id===bid).w:'';h+='<button class="slot'+(w?' filled':'')+'" data-p="'+pos+'">'+(w||'_____')+'</button>';}
    });
    h+='</div><div class="wordbank" id="wb"></div>';
    stage.innerHTML=h;
    const wb=document.getElementById('wb');
    bank.forEach(b=>{const c=document.createElement('button');c.className='word';c.textContent=b.w;c.disabled=b.used;c.onclick=()=>{const e=nextEmpty();if(e<0)return;filled[e]=b.id;b.used=true;draw();};wb.appendChild(c);});
    stage.querySelectorAll('.slot').forEach(s=>s.onclick=()=>{const pos=+s.dataset.p;if(filled[pos]!=null){bank.find(x=>x.id===filled[pos]).used=false;delete filled[pos];draw();}});
    if(allFilled())footBtn('Check',check);else clearFoot();
  }
  function check(){
    let ok=true;
    slotPos.forEach((ti,p)=>{const got=bank.find(x=>x.id===filled[p]).w;if(!slotGood(ti,got))ok=false;});
    stage.querySelectorAll('.slot').forEach(s=>{const p=+s.dataset.p;const ti=slotPos[p];const ans=tokens[ti];const got=bank.find(x=>x.id===filled[p]).w;const good=slotGood(ti,got);s.classList.add(good?'sgood':'sbad');s.disabled=true;if(!good)s.textContent=ans.blank;});
    stage.querySelectorAll('#wb .word').forEach(c=>c.disabled=true);
    grade(ok,14);finishGraded(step,ok);clearFoot();
    if(R.hearts<=0&&!ok){setTimeout(()=>finishRun(false),700);return;}
    feedback(ok,ok?'Every blank correct — that’s the real text, locked in.':'Filled the right words in for you — read the full sentence once more.',nextStep);
  }
  draw();
}

/* ---------- footer button helpers ---------- */
function footBtn(label,fn,cls){
  clearFoot();
  const bar=document.createElement('div');bar.className='footbar';bar.id='footbar';
  bar.innerHTML='<div class="inner"><button class="btn '+(cls||'')+'" id="fbtn">'+label+'</button></div>';
  APP().appendChild(bar);document.getElementById('fbtn').onclick=fn;
}
function clearFoot(){const f=document.getElementById('footbar');if(f)f.remove();}

/* ============================ RESULTS ============================ */
function finishRun(timedOut){
  stopTimer();
  if(R.mode==='speed'){
    const finished = !timedOut && R.hearts>0;          // got through all N in time, hearts intact
    R.finished=finished;
    R.allCorrect = finished && R.mistakes===0;
    if(finished){
      if(R.allCorrect)R.xp+=50;                         // all-correct bonus
      R.speedBonus=Math.max(0,R.timeLeft);              // +1 XP per leftover second
      R.xp+=R.speedBonus;
    }else{R.speedBonus=0;}
    commitRun(false);                                   // bank R.xp, no extra completion/flawless bonus
    return resultsScreen(finished);
  }
  if(R.mode==='review'){commitRun(true);return resultsScreen(true);}
  if(R.mode==='boss'){
    const ok = !timedOut && R.hearts>0 && acc()>=0.6;
    if(ok){S.done['boss-'+R.unit.id]=true;recordResult('boss-'+R.unit.id);commitRun(true);}
    else{commitRun(false);}
    return resultsScreen(ok);
  }
  if(R.hearts>0&&!timedOut){S.done[R.lesson.id]=true;recordResult(R.lesson.id);commitRun(true);resultsScreen(true);}
  else{commitRun(false);resultsScreen(false);}
}
function recordResult(id){
  const flawless=R.mistakes===0 && R.correct===R.graded;
  S.perfect[id]=S.perfect[id]||flawless;
  S.best[id]=Math.max(S.best[id]||0, R.graded?Math.round(R.correct/R.graded*100):100);
}
function acc(){return R.graded?R.correct/R.graded:0;}
function commitRun(success){
  if(success){
    R.xp+=20; // completion bonus
    if(R.mistakes===0){R.xp+=20;S.flawless=true;}
  }
  S.xp+=R.xp;
  save();checkBadges();
}
function resultsScreen(success){
  stopTimer();
  if(R.mode==='speed'){
    let sh;
    if(R.finished){
      const a=Math.round(acc()*100);
      sh='<div class="center"><div class="big">🏁</div><h2>'+(R.allCorrect?'Perfect speed run!':'Speed run done!')+'</h2>'
        +'<p>'+(R.allCorrect?'Every answer correct — full bonus banked.':'Good pace — go for a clean sweep next time.')+'</p>'
        +'<div class="statrow">'
        +'<div class="statbox xp"><div class="v">+'+R.xp+'</div><div class="l">XP</div></div>'
        +'<div class="statbox combo"><div class="v">'+R.maxCombo+'</div><div class="l">Max combo</div></div>'
        +'<div class="statbox acc"><div class="v">'+a+'%</div><div class="l">Accuracy</div></div>'
        +'</div>'
        +'<div class="bonusline">'+(R.allCorrect?'<span>🎯 All-correct +50</span>':'')+(R.speedBonus?'<span>⚡ Speed +'+R.speedBonus+'</span>':'')+'</div>'
        +'<button class="btn blue" id="retryBtn">Run again</button><div style="height:10px"></div><button class="btn grey" id="homeBtn">Done</button></div>';
    }else{
      const ranOut=R.hearts<=0;
      sh='<div class="center"><div class="big">'+(ranOut?'💔':'⏱️')+'</div><h2>'+(ranOut?'Out of hearts':'Time’s up!')+'</h2>'
        +'<p>Answered '+R.graded+' of '+R.steps.length+' — '+Math.round(acc()*100)+'% correct.</p>'
        +'<div class="statrow"><div class="statbox xp"><div class="v">+'+R.xp+'</div><div class="l">XP earned</div></div></div>'
        +'<button class="btn blue" id="retryBtn">Try again</button><div style="height:10px"></div><button class="btn grey" id="homeBtn">Done</button></div>';
    }
    clearFoot();APP().innerHTML=sh;
    const hb=document.getElementById('homeBtn');if(hb)hb.onclick=()=>renderHome(false); // speed run doesn't unlock a quest — stay at the top near the drill buttons
    const rb=document.getElementById('retryBtn');if(rb)rb.onclick=()=>startRandomMix(R.steps.length);
    if(R.finished)burst();
    return;
  }
  let h;
  if(success){
    const a=Math.round(acc()*100);
    h='<div class="center"><div class="big">🎉</div><h2>'+(R.mode==='boss'?'Boss defeated!':'Quest complete!')+'</h2>'
      +'<p>'+(R.mistakes===0?'Flawless run — perfect!':'Nice work. Keep the streak going!')+'</p>'
      +'<div class="statrow">'
      +'<div class="statbox xp"><div class="v">+'+R.xp+'</div><div class="l">XP</div></div>'
      +'<div class="statbox combo"><div class="v">'+R.maxCombo+'</div><div class="l">Max combo</div></div>'
      +'<div class="statbox acc"><div class="v">'+a+'%</div><div class="l">Accuracy</div></div>'
      +'</div>';
    h+='<button class="btn" id="homeBtn">Continue</button></div>';
  }else{
    h='<div class="center"><div class="big">💔</div><h2>Out of hearts</h2>'
      +'<p>'+(R.mode==='boss'?'The boss got you this time.':'Almost! Review and try again — you’ve got this.')+'</p>'
      +'<div class="statrow"><div class="statbox xp"><div class="v">+'+R.xp+'</div><div class="l">XP earned</div></div></div>';
    h+='<button class="btn blue" id="retryBtn">Try again</button><div style="height:12px"></div><button class="btn grey" id="homeBtn">Back to map</button></div>';
  }
  clearFoot();APP().innerHTML=h;
  const hb=document.getElementById('homeBtn');if(hb)hb.onclick=()=>renderHome(R.mode!=='review'); // review/recall drills don't unlock a quest — return to the top, not deep into the map
  const rb=document.getElementById('retryBtn');if(rb)rb.onclick=()=>{R.mode==='boss'?startBoss(R.unit.id):R.mode==='review'?(R.source==='recall'?startRecallReview():R.source==='unitrecall'?startUnitRecall(R.unit.id):startReview()):startLesson(R.lesson.id);};
  if(success){burst();}
}
function burst(){
  const t=document.getElementById('toast');
  // lightweight celebratory toast already; add confetti emojis
  toast('🎊 +'+R.xp+' XP'+(levelOf(S.xp)>levelOf(S.xp-R.xp)?'  —  Level up!':''));
}

/* ============================ keyboard control ============================ */
function keyAction(e){
  if(e.metaKey||e.ctrlKey||e.altKey)return;
  const tag=(e.target&&e.target.tagName)||'';
  if(tag==='INPUT'||tag==='TEXTAREA')return; // let typing work (recall textarea)
  const k=e.key;
  if(k==='Escape'){const q=document.getElementById('quitBtn');if(q){q.click();e.preventDefault();}return;}
  if(k==='Backspace'){const b=document.getElementById('backBtn');if(b){b.click();e.preventDefault();}return;}
  // recall self-grade after reveal: 1=Nailed, 2=Partly, 3=Missed
  const grades=document.querySelectorAll('.gradebtns [data-g]');
  if(grades.length){const map={'1':'2','2':'1','3':'0'};if(map[k]){const b=document.querySelector('.gradebtns [data-g="'+map[k]+'"]');if(b){b.click();e.preventDefault();}}return;}
  // feedback Continue bar
  const cont=document.getElementById('contBtn');
  if(cont){if(k==='Enter'||k===' '){cont.click();e.preventDefault();}return;}
  // MCQ options 1..N (only before answering)
  const opts=document.querySelectorAll('.opts .opt');
  if(opts.length){
    if(!document.querySelector('.opt.dim,.opt.correct,.opt.wrong')){const n=parseInt(k,10);if(n>=1&&n<=opts.length){opts[n-1].click();e.preventDefault();}}
    return;
  }
  // sort buckets: 1/← and 2/→
  const buckets=document.querySelectorAll('.bucketrow [data-b]');
  if(buckets.length){if(k==='1'||k==='ArrowLeft'){buckets[0].click();e.preventDefault();}else if(k==='2'||k==='ArrowRight'){buckets[1].click();e.preventDefault();}return;}
  // build: number toggles, Enter checks
  const bopts=document.querySelectorAll('#bg .bopt');
  if(bopts.length){
    const n=parseInt(k,10);
    if(n>=1&&n<=bopts.length){if(!bopts[n-1].disabled){bopts[n-1].click();e.preventDefault();}return;}
    if(k==='Enter'||k===' '){const fb=document.getElementById('fbtn');if(fb){fb.click();e.preventDefault();}return;}
  }
  // vecviz frame stepping with ← →
  const vzP=document.getElementById('vzPrev'),vzN=document.getElementById('vzNext');
  if(vzP&&vzN){if(k==='ArrowLeft'){if(!vzP.disabled)vzP.click();e.preventDefault();return;}if(k==='ArrowRight'){if(!vzN.disabled)vzN.click();e.preventDefault();return;}}
  // generic footer (Got it / Reveal / Check / Next) — but never auto-Undo
  const fb=document.getElementById('fbtn');
  if(fb&&(k==='Enter'||k===' ')&&!/undo/i.test(fb.textContent)){fb.click();e.preventDefault();}
}
document.addEventListener('keydown',keyAction);

/* ============================ boot ============================ */
seedAnswered();
renderHome(true);
</script>

<style>
#toTop{position:fixed;bottom:80px;right:18px;z-index:40;width:46px;height:46px;border-radius:50%;border:2px solid var(--blue-d);border-bottom-width:4px;background:var(--blue);color:#fff;font-size:22px;font-weight:900;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:inherit;opacity:0;visibility:hidden;transform:translateY(8px);transition:opacity .2s,transform .2s,visibility .2s}
#toTop.show{opacity:1;visibility:visible;transform:translateY(0)}
#toTop:active{border-bottom-width:2px;transform:translateY(2px)}
</style>
<script>(function(){
  var btn=document.getElementById('toTop');
  function onScroll(){if((window.scrollY||document.documentElement.scrollTop)>300)btn.classList.add('show');else btn.classList.remove('show');}
  window.addEventListener('scroll',onScroll,{passive:true});
  btn.addEventListener('click',function(){window.scrollTo({top:0,behavior:'smooth'});});
  onScroll();
})();</script>
